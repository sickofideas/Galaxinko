<script>
// ==========================================
// GALAXINKO LITE - PURE DOPAMINE EDITION
// ==========================================
const GAME_TITLE = "GALAXINKO LITE";
const GAME_VERSION = "v15.6.1"; 

let currentLang = "CZ";
const W = 900;
const H = 1100;       
const PLAY_H = 1000;  
const ZONE_H = 80;

const T = {
  EN: {
    LIVE: "🔴 LIVE ", SYS_ON: "SYSTEM: ONLINE", SYNC: "TELEMETRY: GREEN",
    GFORCE: "G-FORCE:", BOUNCEX: "BOUNCE-X:", REC: "RECORDS",
    WARP_CORE: "MISSION TIME:", TOP: "ROUND LEADERS", ALL_TIME: "ALL-TIME TOP 10",
    WARN: "WARNING: RE-ENTRY", RET: "CALCULATING ORBITS...", COMPL: "MISSION COMPLETE",
    SECTOR: "ORBIT:", NEXT: "NEXT LAUNCH IN:", NEW_C: "🔥 NEW COMMANDER! 🔥", L_PL: "PLAYER_UPLINK",
    TTS_POW: "Thruster boost from ", TTS_INC: "Incoming payload from ",
    TTS_SEC_C: "Orbit operations complete.", TTS_SEC_W: "Welcome to orbit ",
    TTS_WELC: "Welcome aboard ", 
    GIFT_MSGS: ["Make way, space sponsor {0} is dropping credits!", "Attention! {0} just bought a piece of the galaxy!", "{0} activated the money warp drive!"],
    GIFT_ALERT: "🔥 {0} ACTIVATED GIFT RAIN! 🔥",
    ROUND: "ROUND "
  },
  CZ: {
    LIVE: "🔴 ŽIVĚ ", SYS_ON: "SYSTÉM: ONLINE", SYNC: "TELEMETRIE: OK",
    GFORCE: "G-SÍLA:", BOUNCEX: "ODRAZ-X:", REC: "REKORDY",
    WARP_CORE: "ČAS MISE:", TOP: "LÍDŘI KOLA", ALL_TIME: "SÍŇ SLÁVY (TOP 10)",
    WARN: "VAROVÁNÍ: NÁVRAT", RET: "KALKULACE ORBITY...", COMPL: "MISE DOKONČENA",
    SECTOR: "ORBITA:", NEXT: "DALŠÍ START ZA:", NEW_C: "🔥 NOVÝ VELITEL! 🔥", L_PL: "HRÁČ_UPLINK",
    TTS_POW: "Zážeh motorů od ", TTS_INC: "Přilétá náklad od ",
    TTS_SEC_C: "Operace na orbitě dokončeny.", TTS_SEC_W: "Vítejte na orbitě ",
    TTS_WELC: "Vítej na palubě ",
    GIFT_MSGS: ["Ustupte, vesmírný sponzor {0} rozhazuje kredity!", "Pozor! {0} si právě koupil kus galaxie!", "{0} aktivuje peněžní warp pohon!"],
    GIFT_ALERT: "🔥 {0} SPUSTIL DÉŠŤ DÁRKŮ! 🔥",
    ROUND: "KOLO "
  }
};

const UI_THEMES = [
  [0, 255, 255], [255, 50, 255], [50, 255, 50], 
  [255, 200, 0], [255, 100, 50], [100, 150, 255]
];
let currentTheme = UI_THEMES[0];

let engine, world;
let balls = [], pegs = [], zones = [], walls = [], explosions = [];
let leaderboard = {}; 
let allTimeLeaderboard = {}; 
let giftLeaderboard = {}; 
let timer = 180, resultsTimer = 10, lastTick = 0, roundCount = 1, waitStartTime = 0;
let gameState = "PLAYING", flashEffect = 0, shakeAmount = 0;
let currentGravity = 0.8, currentBounce = 0.8;
let portals = [], floatingTexts = [], shockwaves = [], joinPopupQueue = [], activeJoinPopup = null;
let spamBuffer = {};
let avatarRibbon = [], userAvatars = {};
let fxSynth, audioStarted = false;
let isAutoMode = true;

let isRotatingRound = false;
let rotationSpeed = 0;
let shapePivot = { x: W/2, y: 500 };

let stars = [], dust = [];
const TIKFINITY_URL = "ws://localhost:21213/";
let socket;
let camOffset = { x: 0, y: 0, z: 1.0 }; 

function setup() {
  let cvs = createCanvas(W, H);
  cvs.parent('game-container');
  smooth();
  textFont('Press Start 2P');
  
  fxSynth = new p5.PolySynth();
  fxSynth.setADSR(0.01, 0.1, 0.2, 0.1);
  
  for (let i = 0; i < 150; i++) stars.push({ x: random(W), y: random(H), s: random(1, 3), speed: random(0.2, 0.6) });
  for (let i = 0; i < 300; i++) dust.push({ x: random(W), y: random(H), s: random(0.5, 2) });
  
  let savedData = localStorage.getItem('galaxinko_alltime_lite');
  if (savedData) {
      try { allTimeLeaderboard = JSON.parse(savedData); } catch(e) {}
  }
  
  currentTheme = random(UI_THEMES);

  setupDOMControls();
  initTTS();
  initGame();
  connectTikfinity();
}

function setupDOMControls() {
  document.getElementById('langBtn').onclick = () => {
    currentLang = currentLang === "EN" ? "CZ" : "EN";
    document.getElementById('langBtn').innerText = 'LANG: ' + currentLang;
  };
  document.getElementById('autoBtn').onclick = () => {
    isAutoMode = !isAutoMode;
    document.getElementById('autoBtn').innerText = isAutoMode ? 'AUTO: ON' : 'AUTO: OFF';
    document.getElementById('autoBtn').style.background = isAutoMode ? '#4CAF50' : '#555';
  };
  document.getElementById('resetBtn').onclick = () => {
    leaderboard = {};
    giftLeaderboard = {};
    allTimeLeaderboard = {}; 
    localStorage.removeItem('galaxinko_alltime_lite');
  };
}

function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onopen = () => console.log("[Tikfinity] Connected");
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data);
      let evt = d?.event || d?.type || "";
      let n = d?.data?.nickname || d?.data?.uniqueId || "Anonym";
      
      if (n && n !== "Anonym") {
        let u = n.substring(0, 15).replace(/[^\p{L}\p{N} ]/gu, "").trim() || "Pilot";
        
        let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
        if (imgUrl && !userAvatars[u]) {
          loadImage(imgUrl, img => { userAvatars[u] = img; joinPopupQueue.push({name: u, img: img}); }, () => {});
        } else if (!userAvatars[u]) {
          joinPopupQueue.push({name: u, img: null});
          userAvatars[u] = "loaded"; 
        }

        if (evt === "chat") {
          spawnBall(u);
        } else if (evt === "gift") {
          let giftValue = d?.data?.diamonds || 1; 
          let amountOfBalls = giftValue * 3; 
          spawnGiftBalls(u, amountOfBalls);
        } else if (evt === "like") {
          let c = d.data?.likeCount || 1;
          handleLikes(u, c);
        } else if (evt === "follow") {
          spawnBall(u, 3);
          if (random() < 0.3) speakName(u);
        }
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function handleLikes(u, c) {
  if (!spamBuffer[u]) {
    spamBuffer[u] = { total: 0, buffered: 0, state: 'CHARGING', fade: 255, lastUpdate: millis() };
    if (!avatarRibbon.find(a => a.name === u)) {
      avatarRibbon.push({ name: u, color: color(random(100,255), random(100,255), random(100,255)), displayUntil: millis() + 3600000 });
    }
  }
  let sp = spamBuffer[u];
  sp.state = 'CHARGING';
  sp.fade = 255;
  sp.lastUpdate = millis();
  sp.total += c;
  
  // Efekt poskočení kuliček nasbíraných dole v chlívcích
  for (let b of balls) {
      if (b.scored && b.body.position.y > PLAY_H - 20) {
          Matter.Sleeping.set(b.body, false);
          Matter.Body.applyForce(b.body, b.body.position, { x: random(-0.002, 0.002), y: -0.015 });
      }
  }

  if (sp.total < 10) {
    for (let i = 0; i < min(c, 10); i++) setTimeout(() => spawnBall(u), i * 100);
  } else {
    sp.buffered += c;
  }
}

function spawnGiftBalls(userName, amount) {
  if (!audioStarted) startSpaceAudio();
  
  if (!giftLeaderboard[userName]) giftLeaderboard[userName] = { totalGifts: 0, expireTime: 0 };
  giftLeaderboard[userName].totalGifts += amount;
  giftLeaderboard[userName].expireTime = millis() + (amount * 60000); 
  
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  speakAnnouncer(random(T[currentLang].GIFT_MSGS).replace("{0}", userName), 2);
  
  shakeAmount = 40;
  playJackpotSound();
  addFloatingText(T[currentLang].GIFT_ALERT.replace("{0}", userName), W/2, H/2, color(255, 215, 0), true);

  for (let i = 0; i < amount; i++) {
    setTimeout(() => {
      let bSize = 22; 
      let b = Matter.Bodies.circle(W/2 + random(-150, 150), 30, bSize/2, { 
        restitution: 0.5, friction: 0.1, density: 0.05 
      });
      let bCol = (i % 2 === 0) ? color(255, 215, 0) : color(random(100,255), random(100,255), 255);
      
      balls.push({ 
        body: b, name: userName, color: bCol, scored: false, combo: 0, currentScore: 0,
        spawnTime: millis(), isRainbow: true, trail: [], portalCooldown: 0, 
        multiplier: 1, size: bSize, isGiftBall: true 
      });
      Matter.World.add(world, b);
      playSpawnSound();
    }, i * 120);
  }
}

function spawnBall(userName, mult = 1) {
  if (gameState !== "PLAYING" || balls.length > 500) return;
  if (!audioStarted) startSpaceAudio();
  playSpawnSound();
  
  let bSize = 18; 
  let ballBody = Matter.Bodies.circle(W/2 + random(-30, 30), 40, bSize/2, { 
    restitution: currentBounce, friction: 0.2, density: 0.001 
  });
  
  if (!leaderboard[userName]) leaderboard[userName] = { score: 0, color: color(random(100, 255), random(150, 255), random(150, 255)) };
  
  let isRnbw = random() < 0.05;

  balls.push({ 
    body: ballBody, name: userName, color: leaderboard[userName].color, 
    scored: false, combo: 0, currentScore: 0, spawnTime: millis(), isRainbow: isRnbw, trail: [], 
    portalCooldown: 0, multiplier: mult, size: bSize, isGiftBall: false 
  });
  Matter.World.add(world, ballBody);
}

function initGame() {
  engine = Matter.Engine.create({ enableSleeping: true }); 
  world = engine.world; 
  world.gravity.y = currentGravity;

  Matter.Events.on(engine, 'collisionStart', function(event) {
    let pairs = event.pairs;
    for (let i = 0; i < pairs.length; i++) {
        let bodyA = pairs[i].bodyA;
        let bodyB = pairs[i].bodyB;
        
        let ball = balls.find(b => b.body === bodyA || b.body === bodyB);
        let peg = pegs.find(p => p === bodyA || p === bodyB);

        if (ball && peg && !peg.isBlocker) {
            peg.glow = 255;
            if (peg.isBonus) {
                ball.currentScore += 500;
                createExplosion(peg.position.x, peg.position.y, color(255, 50, 50));
                addFloatingText("CRIT +500!", peg.position.x, peg.position.y, color(255, 50, 50), true);
                if(audioStarted) try { fxSynth.play(800, 0.05, 0, 0.1); } catch(e){}
            } else {
                ball.currentScore += 10;
            }
        }
    }
  });

  let opts = { isStatic: true, restitution: 1.2, friction: 0 };
  Matter.World.add(world, [ 
    Matter.Bodies.rectangle(-25, H / 2, 50, H * 2, opts), 
    Matter.Bodies.rectangle(W + 25, H / 2, 50, H * 2, opts), 
    // Podlaha posunuta až dolů pod VIP lištu (H je 1100, podlaha je pod obrazovkou)
    Matter.Bodies.rectangle(W / 2, H + 50, W, 100, { isStatic: true, friction: 1 }) 
  ]);
  
  let blocker = Matter.Bodies.circle(W / 2, 130, 4, { isStatic: true, restitution: 1.5 }); 
  blocker.isBlocker = true; 
  pegs.push(blocker); Matter.World.add(world, blocker);
  
  portals = [{ x: random(100, W - 100), y: random(200, 400) }, { x: random(100, W - 100), y: random(PLAY_H - 350, PLAY_H - 150) }];
  
  let layoutType = roundCount % 8;
  let spacingX = 40, spacingY = 40, startY = 220;
  let rows = Math.floor((PLAY_H - 300) / spacingY);
  let cols = Math.floor((W - 100) / spacingX);
  let startX = (W - (cols * spacingX)) / 2;

  isRotatingRound = random() < 0.25; 
  rotationSpeed = random(0.002, 0.006) * (random() < 0.5 ? 1 : -1);
  shapePivot = { x: W / 2, y: startY + (rows * spacingY) / 2 };

  for (let r = 0; r < rows; r++) {
    let isOffset = (r % 2 === 1);
    let rowCols = isOffset ? cols - 1 : cols;
    let rStartX = startX + (isOffset ? spacingX / 2 : 0);

    for (let c = 0; c < rowCols; c++) {
      let addPeg = false;
      let cx = rowCols / 2;
      let cDist = Math.abs(c - cx);
      let midR = rows / 2; 
      let rDist = Math.abs(r - midR); 

      if (layoutType === 0) {
        if (cDist + rDist * 0.8 <= cols / 2) addPeg = true;
      } else if (layoutType === 1) {
        if (random() > 0.15) addPeg = true;
      } else if (layoutType === 2) {
        if (cDist >= r * 0.4) addPeg = true;
      } else if (layoutType === 3) {
        if (Math.abs(cDist - rDist * 0.5) < 3.5) addPeg = true;
      } else if (layoutType === 4) {
        let distCenter = dist(c, r, cols/2, rows/2);
        if (distCenter > cols/5 && distCenter < cols/2.5) addPeg = true;
      } else if (layoutType === 5) {
        if (Math.abs((c + r) % 6 - 3) < 1.5) addPeg = true;
      } else if (layoutType === 6) {
        if (Math.abs(c - cols/3) < 1.5 || Math.abs(c - 2*cols/3) < 1.5) addPeg = true;
      } else if (layoutType === 7) {
        if (cDist <= Math.abs(r - rows/2) * 0.8 + 1.5) addPeg = true;
      }

      if (addPeg) {
        let px = rStartX + c * spacingX + random(-1, 1);
        let py = startY + r * spacingY;
        let pg = Matter.Bodies.circle(px, py, 4, { isStatic: true, restitution: currentBounce, collisionFilter: { category: 2 } });
        pg.isBonus = random() < 0.03;
        pegs.push(pg); Matter.World.add(world, pg);
      }
    }
  }
  
  let sV = [5000, 1000, 500, 200, 100, 50, 20, 10, 5, 2, 1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 5000];
  let cX = 0; zones = [];
  for (let i = 0; i < 21; i++) {
    let zW = (map(abs(i - 10), 0, 10, 2.5, 1.0) / 36.1) * W;
    zones.push({ 
      x: cX, w: zW, score: sV[i], flash: 0, 
      baseColor: sV[i] >= 5000 ? color(currentTheme[0]*0.5, currentTheme[1]*0.5, currentTheme[2]*0.5, 180) : color(10, 10, 40, 180) 
    });
    if (i > 0) { 
      // Protažení zdí chlívků až úplně dolů k podlaze (H)
      let wl = Matter.Bodies.rectangle(cX, PLAY_H + 10, 6, ZONE_H + 120, { isStatic: true, friction: 0.5 }); 
      walls.push(wl); Matter.World.add(world, wl); 
    }
    cX += zW;
  }
}

function draw() {
  if (!engine) return;
  
  let gV = parseFloat(document.getElementById('gravSlider').value);
  let bV = parseFloat(document.getElementById('bounceSlider').value);
  if (gV !== currentGravity || bV !== currentBounce) {
    if (isAutoMode) document.getElementById('autoBtn').click();
    currentGravity = gV; currentBounce = bV;
    world.gravity.y = currentGravity;
  }

  if (isAutoMode && frameCount % 600 === 0) {
    currentGravity = random(0.5, 1.5);
    currentBounce = random(0.5, 1.2);
    document.getElementById('gravSlider').value = currentGravity;
    document.getElementById('bounceSlider').value = currentBounce;
    world.gravity.y = currentGravity;
  }

  if (isRotatingRound) {
    let cosA = Math.cos(rotationSpeed);
    let sinA = Math.sin(rotationSpeed);
    for (let p of pegs) {
      if (p.isBlocker) continue;
      let dx = p.position.x - shapePivot.x;
      let dy = p.position.y - shapePivot.y;
      Matter.Body.setPosition(p, {
        x: shapePivot.x + dx * cosA - dy * sinA,
        y: shapePivot.y + dx * sinA + dy * cosA
      });
    }
  }

  background(currentTheme[0] * 0.05, currentTheme[1] * 0.05, currentTheme[2] * 0.05 + 10);
  drawBackground();
  
  Matter.Engine.update(engine, 1000 / 60);

  // Prevence proti lagu: Pokud se kuličky v chlívcích přemnoží, postupně mažeme ty nejstarší
  while (balls.length > 300) {
      let idx = balls.findIndex(b => b.scored);
      if (idx !== -1) removeBall(balls[idx]);
      else break;
  }

  push();
  if (shakeAmount > 0) {
    translate(random(-shakeAmount, shakeAmount), random(-shakeAmount, shakeAmount));
    shakeAmount *= 0.85;
  }

  drawPortals();
  drawZones();
  drawWalls();
  drawPegs();
  handleSpamBuffer();
  drawBalls();
  drawExplosions();
  handleShockwaves();
  handleFloatingTexts();
  handleJoinPopups();
  
  drawUI();
  drawVIPGifterBar();
  drawProceduralHUD();
  drawAntiBotOverlay();
  
  if (gameState === "WAITING") {
    drawTxt(T[currentLang].WARN, W/2, PLAY_H/2, color(255, 50, 50), 30, CENTER);
  }
  if (gameState === "RESULTS") {
    drawResultsOverlay();
  }

  if (flashEffect > 0) {
    noStroke(); fill(255, 255, 255, map(flashEffect, 0, 60, 0, 150)); 
    rect(0, 0, W, H); flashEffect--;
  }
  
  drawCallToAction();
  pop();

  if (millis() - lastTick > 1000) {
    if (gameState === "PLAYING") {
      timer--;
      if (timer <= 0) {
        gameState = "WAITING"; 
        shakeAmount = 10;
        speakAnnouncer(T[currentLang].TTS_SEC_C, 2);
        waitStartTime = millis();
      }
    } else if (gameState === "RESULTS") {
      resultsTimer--;
      if (resultsTimer <= 0) resetGame();
    }
    lastTick = millis();
  }

  if (gameState === "WAITING" && (balls.length === 0 || millis() - waitStartTime > 8000)) {
    gameState = "RESULTS"; resultsTimer = 10;
  }
}

function drawBackground() {
  noStroke();
  fill(255, 150);
  for (let s of stars) {
    s.y += s.speed; if (s.y > H) { s.y = 0; s.x = random(W); }
    ellipse(s.x, s.y, s.s);
  }
  for (let d of dust) {
    d.y += d.s; if (d.y > H) { d.y = 0; d.x = random(W); }
    fill(currentTheme[0], currentTheme[1], currentTheme[2], 30); ellipse(d.x, d.y, d.s * 2);
  }
}

function drawBalls() {
  for (let i = balls.length - 1; i >= 0; i--) {
    let b = balls[i];
    if (!b.body) { removeBall(b); continue; }
    
    let pos = b.body.position;
    if (b.portalCooldown > 0) b.portalCooldown--;
    
    if (portals.length === 2 && b.portalCooldown <= 0) {
      if (dist(pos.x, pos.y, portals[0].x, portals[0].y) < 40) {
        Matter.Body.setPosition(b.body, { x: portals[1].x, y: portals[1].y });
        Matter.Body.setVelocity(b.body, { x: random(-5, 5), y: 0 });
        b.portalCooldown = 60; playSpawnSound();
      } else if (dist(pos.x, pos.y, portals[1].x, portals[1].y) < 40) {
        Matter.Body.setPosition(b.body, { x: portals[0].x, y: portals[0].y });
        Matter.Body.setVelocity(b.body, { x: random(-5, 5), y: 0 });
        b.portalCooldown = 60; playSpawnSound();
      }
    }

    if (pos.y < PLAY_H - 100) {
      for (let p of pegs) {
        let dx = pos.x - p.position.x, dy = pos.y - p.position.y;
        if (dx*dx + dy*dy < 300) {
          p.glow = 255;
          if (p.isBonus) {
            createExplosion(p.position.x, p.position.y, color(50,255,100));
            updateScore(b.name, 500, b.color);
            addFloatingText("+500", p.position.x, p.position.y, color(50,255,100));
            if(audioStarted) try { fxSynth.play(600, 0.05, 0, 0.1); } catch(e){}
          }
        }
      }
    }

    if (pos.y > PLAY_H - ZONE_H - 30 && !b.scored) {
      let czIndex = zones.findIndex(z => pos.x >= z.x && pos.x < z.x + z.w);
      if (czIndex !== -1) {
        b.scored = true;
        let cz = zones[czIndex];
        
        if (b.isGiftBall) {
          updateScore(b.name, 50000 + b.currentScore, b.color);
          addFloatingText("+50,000", pos.x, pos.y, color(255, 215, 0), true);
          cz.flash = 255; cz.flashColor = color(255, 215, 0);
          shakeAmount = 8; playJackpotSound();
        } else {
          let pts = (cz.score * b.multiplier) + b.currentScore;
          updateScore(b.name, pts, b.color);
          addFloatingText("+" + pts, pos.x, pos.y, pts >= 5000 ? color(255, 215, 0) : color(100, 255, 100), pts >= 5000);
          cz.flash = 255; cz.flashColor = b.color;
          if (pts >= 5000) { shakeAmount = 5; playJackpotSound(); }
        }
      }
    }

    // DRAWING
    push(); translate(pos.x, pos.y); rotate(b.body.angle);
    
    if (b.isRainbow) {
      b.trail.push({x: pos.x, y: pos.y});
      if (b.trail.length > 15) b.trail.shift();
      
      push();
      rotate(-b.body.angle); 
      translate(-pos.x, -pos.y);
      colorMode(HSB);
      noStroke();
      for (let t = 0; t < b.trail.length; t++) {
         let trCol = color((frameCount * 5 + t * 15) % 360, 255, 255, map(t, 0, b.trail.length, 0, 150));
         fill(trCol);
         ellipse(b.trail[t].x, b.trail[t].y, b.size * (t / b.trail.length));
      }
      colorMode(RGB);
      pop();
    }

    let pulseR = sin(frameCount * 0.1 + b.spawnTime) * 30;
    let pulseG = cos(frameCount * 0.13 + b.spawnTime) * 30;
    let pulseB = sin(frameCount * 0.17 + b.spawnTime) * 30;
    let drawCol = b.isRainbow ? (colorMode(HSB), color((frameCount*15)%360, 255, 255)) : color(red(b.color) + pulseR, green(b.color) + pulseG, blue(b.color) + pulseB);
    if (b.isRainbow) colorMode(RGB);

    // VYKRESLENÍ AVATARA MÍSTO KULIČKY
    if (userAvatars[b.name] && userAvatars[b.name] !== "loaded" && !b.isGiftBall) {
        drawingContext.save();
        drawingContext.beginPath();
        drawingContext.arc(0, 0, b.size/2, 0, TWO_PI);
        drawingContext.clip();
        imageMode(CENTER);
        image(userAvatars[b.name], 0, 0, b.size, b.size);
        drawingContext.restore();
        
        // Kroužek okolo avatara
        noFill(); stroke(drawCol); strokeWeight(2);
        ellipse(0, 0, b.size, b.size);
    } else {
        // Klasická kulička (nebo dárková)
        if (b.isGiftBall) {
          drawingContext.shadowBlur = 20; drawingContext.shadowColor = drawCol;
          fill(drawCol); noStroke(); 
          ellipse(0, 0, b.size, b.size);
          drawingContext.shadowBlur = 0; fill(0); textAlign(CENTER, CENTER); textSize(12); text("🎁", 0, 0);
        } else {
          fill(drawCol); noStroke(); 
          ellipse(0, 0, b.size, b.size);
        }
    }
    
    rotate(-b.body.angle);
    
    // Jméno dole
    if (!b.isGiftBall) {
      textAlign(CENTER); textSize(9); noStroke();
      fill(0, 150); text(b.name.substring(0,8), 1, b.size/2 + 8 + 1);
      fill(255); text(b.name.substring(0,8), 0, b.size/2 + 8);
    }
    pop();

    // Skóre plovoucí s kuličkou nahoře (mimo rotaci)
    if (b.currentScore > 0) {
      push(); translate(pos.x, pos.y);
      textAlign(CENTER); textSize(9); noStroke();
      fill(0, 150); text(b.currentScore, 1, -b.size/2 - 5 + 1);
      fill(255, 255, 100); text(b.currentScore, 0, -b.size/2 - 5);
      pop();
    }

    // Odstranění jen když kulička opravdu opustí H+100 (podlaha je prodloužena pro hromadění)
    if (pos.y > H + 100 || pos.x < -100 || pos.x > W + 100) removeBall(b);
  }
}

function handleSpamBuffer() {
  let active = Object.keys(spamBuffer).filter(u => spamBuffer[u].state === 'CHARGING' || spamBuffer[u].state === 'RELEASING');
  if (active.length === 0) return;
  
  let spacing = 60, startX = (W / 2) - ((active.length - 1) * spacing) / 2;
  for (let i = 0; i < active.length; i++) {
    let u = active[i]; let sp = spamBuffer[u];
    let bx = startX + i * spacing, by = 120;
    
    push(); translate(bx, by); scale(sp.state === 'CHARGING' ? 1 + sin(frameCount*0.2)*0.2 : 1);
    let uCol = leaderboard[u] ? leaderboard[u].color : color(255);
    
    drawingContext.shadowBlur = 15; drawingContext.shadowColor = uCol;
    stroke(uCol); strokeWeight(2); fill(10, 10, 30, sp.fade); ellipse(0, 0, 40);
    drawingContext.shadowBlur = 0;
    
    noStroke(); fill(255, 200, 0, sp.fade); textAlign(CENTER, CENTER); textSize(12);
    if (sp.total > 0) text("+" + sp.total, 0, -30);
    fill(uCol); textSize(9); text(u.substring(0,6), 0, 30);
    pop();

    if (sp.state === 'CHARGING' && millis() - sp.lastUpdate > 1500) {
        sp.state = 'RELEASING';
        if (sp.buffered > 0) {
            for (let j = 0; j < sp.buffered; j++) {
                setTimeout(() => spawnBall(u), j * 80);
            }
        }
    }

    if (sp.state === 'RELEASING') {
      sp.fade -= 10; if (sp.fade <= 0) delete spamBuffer[u];
    }
  }
}

function drawPixelAvatar(x, y, w, h) {
  push(); translate(x, y); noStroke();
  let vlasy = color(240, 220, 110), kuze = color(245, 200, 170), triko = color(currentTheme[0], currentTheme[1], currentTheme[2]), stin = color(0, 0, 0, 50), oci = color(40);
  let pw = w / 20, ph = h / 15, sway = sin(frameCount * 0.05) * 2, handMove = sin(frameCount * 0.2) * 4, eyesOpen = (frameCount % 120 > 5);
  
  fill(triko); rect(pw * 5 + sway, ph * 7, pw * 10, ph * 8, 2); fill(stin); rect(pw * 7 + sway, ph * 7, pw * 6, ph * 1);
  let headSway = sway * 0.5; fill(kuze); rect(pw * 6 + headSway, ph * 2, pw * 8, ph * 6, 3);
  fill(vlasy); rect(pw * 5 + headSway, ph * 1, pw * 10, ph * 3, 2); rect(pw * 5 + headSway, ph * 3, pw * 2, ph * 7, 2); rect(pw * 13 + headSway, ph * 3, pw * 2, ph * 7, 2);
  
  if (eyesOpen) { fill(oci); rect(pw * 8 + headSway, ph * 4, pw * 1, ph * 2); rect(pw * 11 + headSway, ph * 4, pw * 1, ph * 2); } 
  else { fill(stin); rect(pw * 8 + headSway, ph * 5, pw * 1, ph * 1); rect(pw * 11 + headSway, ph * 5, pw * 1, ph * 1); }
  
  fill(color(200, 100, 100)); rect(pw * 9 + headSway, ph * 7, pw * 2, ph * 1);
  fill(kuze); rect(pw * 3, ph * 8 + handMove, pw * 3, ph * 4, 2); rect(pw * 14, ph * 8 - handMove, pw * 3, ph * 4, 2); pop();
}

// UTILS & PHYSICS
// ======================
function removeBall(b) {
  Matter.World.remove(world, b.body);
  balls.splice(balls.indexOf(b), 1);
}

function updateScore(n, p, c) {
  if (!leaderboard[n]) leaderboard[n] = { score: 0, color: c || color(255) };
  leaderboard[n].score += p;
  
  if (!allTimeLeaderboard[n]) allTimeLeaderboard[n] = { score: 0, color: c || color(255) };
  allTimeLeaderboard[n].score += p;
}

function createExplosion(x, y, c) {
  for (let i = 0; i < 15; i++) explosions.push({ x: x, y: y, vx: random(-4, 4), vy: random(-4, 4), life: 255, col: c });
}

function drawExplosions() {
  noStroke();
  for (let i = explosions.length - 1; i >= 0; i--) {
    let e = explosions[i]; fill(red(e.col), green(e.col), blue(e.col), e.life); rect(e.x, e.y, 4, 4);
    e.x += e.vx; e.y += e.vy; e.life -= 8; if (e.life <= 0) explosions.splice(i, 1);
  }
}

function addFloatingText(txt, x, y, col, isJp = false) {
  floatingTexts.push({ text: txt, x: x, y: y, life: 255, color: col, scale: isJp ? 1.5 : 1, vy: -1 });
}

function handleFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    let ft = floatingTexts[i];
    drawTxt(ft.text, ft.x, ft.y, color(red(ft.color), green(ft.color), blue(ft.color), ft.life), 12 * ft.scale, CENTER);
    ft.y += ft.vy; ft.life -= 3; if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function handleShockwaves() {
  noFill(); strokeWeight(3);
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    let sw = shockwaves[i]; stroke(255, 255, 255, sw.life); ellipse(sw.x, sw.y, sw.radius * 2);
    sw.radius += 8; sw.life -= 10; if (sw.life <= 0) shockwaves.splice(i, 1);
  }
}

function handleJoinPopups() {
  if (!activeJoinPopup && joinPopupQueue.length > 0) {
    activeJoinPopup = joinPopupQueue.shift(); activeJoinPopup.timer = 150;
    speakAnnouncer(T[currentLang].TTS_WELC + activeJoinPopup.name, 1);
  }
  if (activeJoinPopup) {
    activeJoinPopup.timer--;
    push(); translate(W / 2, PLAY_H / 2);
    fill(10, 10, 30, 220); stroke(currentTheme); strokeWeight(2);
    rectMode(CENTER); rect(0, 0, 400, 100, 10); rectMode(CORNER);
    
    if (activeJoinPopup.img && activeJoinPopup.img !== "loaded") { 
      imageMode(CENTER); image(activeJoinPopup.img, -140, 0, 60, 60); 
    }
    textAlign(LEFT, CENTER); noStroke();
    fill(currentTheme); textSize(12); text(T[currentLang].NEW_C, -90, -20);
    fill(255); textSize(24); text(activeJoinPopup.name, -90, 15);
    pop();
    if (activeJoinPopup.timer <= 0) activeJoinPopup = null;
  }
}

function resetGame() {
  localStorage.setItem('galaxinko_alltime_lite', JSON.stringify(allTimeLeaderboard));
  currentTheme = random(UI_THEMES);
  roundCount++; gameState = "PLAYING"; resultsTimer = 10; timer = 180;
  spamBuffer = {}; avatarRibbon = [];

function mouseClicked() { 
  if (!audioStarted) startSpaceAudio(); 
  if (mouseY > 40 && mouseY < PLAY_H - 100) spawnBall("Player" + floor(random(100))); 
  
  // Efekt jako u lajku pro manuální testování

      if (b.scored && b.body.position.y > PLAY_H - 20) {
          Matter.Sleeping.set(b.body, false);
          Matter.Body.applyForce(b.body, b.body.position, { x: random(-0.002, 0.002), y: -0.015 });
      }
  }
}

function initTTS() {
  if ('speechSynthesis' in window) {
    let setV = () => { availableVoices = window.speechSynthesis.getVoices(); };
    window.speechSynthesis.onvoiceschanged = setV; setV();
  }
}

function speakAnnouncer(txt, pri = 0) {
  if (!audioStarted || !('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking && pri < 1) return;
  let u = new SpeechSynthesisUtterance(txt);
  let vol = parseFloat(document.getElementById('volSlider').value);
  u.volume = vol; u.pitch = 0.8; u.rate = 1.1;
  window.speechSynthesis.speak(u);
}

function speakName(n) {
  if (!audioStarted || !('speechSynthesis' in window)) return;
  let u = new SpeechSynthesisUtterance(n);
  u.volume = parseFloat(document.getElementById('volSlider').value);
  window.speechSynthesis.speak(u);
}
</script>
