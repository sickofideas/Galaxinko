function generateNewRiddle() {
    if (!isRiddleModeActive) return;
    clearTimeout(autoSkipRiddleTimer);
    clearTimeout(riddleHintTimer);
    riddleRevealedLetters = [];

    // Pؤ¹آکEDNOST MAJؤ‚إ¤ Hؤ‚آپDANKY - أ„إ¤ؤ‚آ­slo aؤ¹ؤ¾ kdyؤ¹ؤ¾ dojdou
    let available = RIDDLES.filter(r => !usedRiddles.includes(r.a));
    
    if (available.length > 0) {
        // Jsou jeؤ¹ث‡tأ„â€؛ nevyuؤ¹ؤ¾itؤ‚آ© hؤ‚ث‡danky
        let picked = random(available);
        usedRiddles.push(picked.a);
        let displayAns = RIDDLE_DISPLAY[picked.a] || picked.a;
        activeRiddle = { question: picked.q, answer: picked.a, displayAnswer: displayAns };
    } else {
        // Vؤ¹ث‡echny hؤ‚ث‡danky byly pouؤ¹ؤ¾ity أ¢â€ â€™ jednou أ„إ¤ؤ‚آ­slo, pak reset poolu
        let num = Math.floor(random(1, 1000));
        activeRiddle = { question: `Uhodni أ„إڑؤ‚إ¤SLO od 1 do 999`, answer: num.toString(), displayAnswer: num.toString() };
        usedRiddles = []; // Reset pro dalؤ¹ث‡ؤ‚آ­ kolo hؤ‚ث‡danek
    }

    // Nؤ‚آپPOVأ„إ،DA PO 2 MINUTؤ‚آپCH: Odhalؤ‚آ­ nؤ‚ث‡hodnؤ‚آ© pؤ‚آ­smenko
    riddleHintTimer = setTimeout(() => {
        if (isRiddleModeActive && activeRiddle.answer && activeRiddle.answer.length > 1) {
            let unrevealed = [];
            for (let i = 0; i < activeRiddle.answer.length; i++) {
                if (!riddleRevealedLetters.includes(i)) unrevealed.push(i);
            }
            if (unrevealed.length > 0) {
                let idx = unrevealed[Math.floor(Math.random() * unrevealed.length)];
                riddleRevealedLetters.push(idx);
            }
        }
    }, 120000);

    // AUTOMATICKؤ‚إ¥ SKIP PO 3 MINUTؤ‚آپCH (180 000 ms)
    autoSkipRiddleTimer = setTimeout(() => {
        if (isRiddleModeActive && activeRiddle.answer) {

            setTimeout(generateNewRiddle, random(5000, 30000));
        }
    }, 180000);
}

function updateSawHum(anyPlayerBuffed) {
    if (!audioStarted) return;
    if (anyPlayerBuffed && !sawHumActive) {
        try {
            if (!sawHumCtx) sawHumCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (sawHumCtx.state === 'suspended') sawHumCtx.resume();

            // 1. Zؤ‚آپKLADNؤ‚إ¤ HUKOT (Bass)
            sawHumOsc = sawHumCtx.createOscillator();
            sawHumGain = sawHumCtx.createGain();
            sawHumOsc.type = 'sine';
            sawHumOsc.frequency.setValueAtTime(180, sawHumCtx.currentTime);
            sawHumGain.gain.setValueAtTime(0, sawHumCtx.currentTime);
            sawHumGain.gain.linearRampToValueAtTime(0.015, sawHumCtx.currentTime + 0.5);
            sawHumOsc.connect(sawHumGain);
            sawHumGain.connect(sawHumCtx.destination);
            sawHumOsc.start();

            // 2. KOVOVؤ‚â€° CINKؤ‚آپNؤ‚إ¤ (Realistic Clink with Decay)
            let clinkRate = 10; 
            let bufferLen = Math.floor(sawHumCtx.sampleRate / clinkRate); 
            
            sawBellBuffer = sawHumCtx.createBuffer(1, bufferLen, sawHumCtx.sampleRate);
            let data = sawBellBuffer.getChannelData(0);
            let freqs = [1500, 2500, 3500]; // Stؤ¹â„¢ednؤ‚آ­, أ„إ¤istؤ¹ث‡ؤ‚آ­ frekvence
            
            for (let i = 0; i < bufferLen; i++) {
                let t = i / sawHumCtx.sampleRate;
                let envelope = Math.exp(-t * 15); // Jeؤ¹ث‡tأ„â€؛ rychlejؤ¹ث‡ؤ‚آ­ dozvuk pro أ„إ¤istؤ¹ث‡ؤ‚آ­ zvuk
                let sample = 0;
                for (let f of freqs) {
                    sample += Math.sin(TWO_PI * f * t) * (f === freqs[0] ? 0.5 : 0.25);
                }
                data[i] = sample * envelope * 0.22; 
            }

            sawBellSource = sawHumCtx.createBufferSource();
            sawBellSource.buffer = sawBellBuffer;
            sawBellSource.loop = true;
            
            sawBellGain = sawHumCtx.createGain();
            sawBellGain.gain.setValueAtTime(0, sawHumCtx.currentTime);
            // VYVؤ‚آپؤ¹ث‌ENؤ‚آپ HLASITOST (0.03)
            sawBellGain.gain.linearRampToValueAtTime(0.03, sawHumCtx.currentTime + 0.2); 
            
            sawBellSource.connect(sawBellGain);
            sawBellGain.connect(sawHumCtx.destination);
            sawBellSource.start();

            sawHumActive = true;
        } catch(e) {}
    } else if (!anyPlayerBuffed && sawHumActive) {
        try {
            if (sawHumCtx) {
                if (sawHumGain) sawHumGain.gain.linearRampToValueAtTime(0, sawHumCtx.currentTime + 0.5);
                if (sawBellGain) sawBellGain.gain.linearRampToValueAtTime(0, sawHumCtx.currentTime + 0.5);
                
                let oRef = sawHumOsc;
                let bSrcRef = sawBellSource;
                
                setTimeout(() => { 
                    try { 
                        if(oRef) oRef.stop(); 
                        if(bSrcRef) bSrcRef.stop();
                    } catch(e){} 
                }, 600);
            }
            sawHumActive = false;
            sawHumOsc = null;
            sawHumGain = null;
            sawBellSource = null;
            sawBellGain = null;
        } catch(e) { sawHumActive = false; }
    }
}

// --- PENTATONICKؤ‚آپ STUPNICE (Vؤ¹ؤ¾dy znؤ‚آ­ pؤ¹â„¢ؤ‚آ­jemnأ„â€؛ a harmonicky) ---
var PENTA_NOTES = [
    261.63, 293.66, 329.63, 392.00, 440.00,  // C4, D4, E4, G4, A4
    523.25, 587.33, 659.25, 783.99, 880.00,  // C5, D5, E5, G5, A5
    1046.50, 1174.66, 1318.51                 // C6, D6, E6
];
function pentatonic(octaveRange) {
    // octaveRange: 'low' (0-4), 'mid' (3-9), 'high' (7-12)
    if (octaveRange === 'low') return PENTA_NOTES[floor(random(0, 5))];
    if (octaveRange === 'high') return PENTA_NOTES[floor(random(7, 13))];
    return PENTA_NOTES[floor(random(3, 10))]; // 'mid' default
}

function safePlaySound(f, v, d) {
    if (!audioStarted || !synth) return;
    
    // ZTLUMENؤ‚إ¤ Pؤ¹آکI Zؤ‚آپTأ„إ،ؤ¹ث‌I: أ„إڑؤ‚آ­m vؤ‚آ­c hrؤ‚ث‡أ„إ¤ؤ¹إ», tؤ‚آ­m menؤ¹ث‡ؤ‚آ­ ؤ¹ث‡ance na pؤ¹â„¢ehrؤ‚ث‡nؤ‚آ­ bأ„â€؛ؤ¹ؤ¾nؤ‚آ©ho zvuku
    let loadFactor = players.length;
    if (loadFactor > 30 && random() < (loadFactor / 100)) return; 

    if (millis() - lastGlobalSound < 50) return; // Mؤ‚آ­rnأ„â€؛ delؤ¹ث‡ؤ‚آ­ cooldown pro mؤ‚آ©nأ„â€؛ kakofonie
    try { 
        synth.play(f, Math.min(v, 0.25), 0, d); // Globؤ‚ث‡lnؤ‚آ­ strop hlasitosti
        lastGlobalSound = millis(); 
    } catch(e) {}
}

    if (!audioStarted || !synth) return;

    let base = pentatonic('mid');
    let idx = PENTA_NOTES.indexOf(base);
    let n2 = PENTA_NOTES[Math.min(idx + 2, PENTA_NOTES.length - 1)];

}

function playWhooshSound() {
    // Jemnؤ‚ث‌ svistivؤ‚ث‌ zvuk - rؤ¹إ»ؤ¹ؤ¾nؤ‚آ© hlasitosti jako zvuk pily, ale jinؤ‚ث‌ charakter
    if (!audioStarted) return;
    try {
        let ctx = getAudioContext(); // p5.sound internؤ‚آ­ kontext
        if (!ctx) return;
        
        // Bؤ‚آ­lؤ‚ث‌ ؤ¹ث‡um -> bandpass filtr = svistivؤ‚ث‌ vzduchovأ½ zvuk
        let bufSize = ctx.sampleRate * 0.22; // 220ms
        let buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        let data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
        
        let src = ctx.createBufferSource();
        src.buffer = buf;
        
        // Bandpass: stؤ¹â„¢ed 1200Hz, klesؤ‚ث‡ na 400Hz -> whoosh charakter
        let bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.setValueAtTime(1200, ctx.currentTime);
        bp.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.18);
        bp.Q.value = 3.5;
        
        // Gain obؤ‚ث‡lka: rychlؤ‚ث‌ nؤ‚ث‡bأ„â€؛h, plynulؤ‚ث‌ fade-out
        let gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.13, ctx.currentTime + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
        
        src.connect(bp);
        bp.connect(gain);
        gain.connect(ctx.destination);
        src.start(ctx.currentTime);
        src.stop(ctx.currentTime + 0.23);
    } catch(e) {}
}

function generateSpaceBackground() {
  stars = []; nebulas = []; shootingStars = []; activePlanets = []; milkyWay = []; activeCrafts = [];
  
  let mwPoints = 80;
  for (let i = 0; i < mwPoints; i++) {
      let t = i / mwPoints;
      let baseX = lerp(-W, W * 2, t) + random(-400, 400);
      let baseY = lerp(-H, H * 2, t) + random(-500, 500);
      colorMode(HSB);
      let mwCol = color((hue(roundThemeColor) + random(-30, 30)) % 360, 60, random(50, 100), random(0.02, 0.08));
      colorMode(RGB);
      milkyWay.push({ x: baseX, y: baseY, r: random(150, 450), color: mwCol });
  }

  for(let i=0; i<2500; i++) {
    let layer = random([0.2, 0.5, 1.0, 1.5]); 
    stars.push({
        x: random(-W, W * 2), y: random(-H, H * 2), s: random(2, 6) * layer, speed: random(0.8, 4.0) * layer,
        rC: random(150, 255), gC: random(200, 255), bC: 255, baseAlpha: random(50, 200) * layer,
        isPulsing: random() < 0.6, pulseSpeed: random(0.05, 0.15), pulsePhase: random(TWO_PI), layer: layer

  for(let i=0; i<30; i++) {
      colorMode(HSB);
      let nCol = color((hue(roundThemeColor) + random(-40, 40)) % 360, random(60, 100), random(50, 100), random(0.02, 0.09));
      colorMode(RGB);
      nebulas.push({ x: random(-W, W * 2), y: random(-H, H * 2), r: random(200, 1000), color: nCol, speed: random(0.1, 0.4) });
  }
  
  let pTypes = ['EARTH', 'MOON', 'JUPITER', 'SATURN', 'MARS', 'ICE_GIANT', 'SUN'];
  for(let i=0; i<25; i++) {
    let pt = random(pTypes);
    let z = random(0.1, 1.0); 
    activePlanets.push({
        x: random(-W, W * 2), y: random(-H, H * 2), r: random(30, 150) * z,
        type: pt,
        vx: random(-0.2, 0.2) * z, vy: random(0.5, 2.5) * z,
        angle: random(TWO_PI), rotSpeed: random(-0.02, 0.02), z: z
    });
  }
  
  for(let i=0; i<6; i++) {

        rot: random(TWO_PI), rotS: random(-0.03, 0.03), z: z

  }

function formatK(num) {
  return Math.floor(Math.max(0, num || 0)).toLocaleString();

function getStartingHp(name) {
    let hist = allTimeHpLeaderboard[name];
    let base = 500; // Zvؤ‚ث‌ؤ¹ث‡eno ze 150 na 500 dle poؤ¹ؤ¾adavku
    // Pokud uؤ¹ؤ¾ hrؤ‚ث‡أ„إ¤ nأ„â€؛kdy mأ„â€؛l hodnأ„â€؛ HP, zaأ„إ¤ne s mؤ‚آ­rnؤ‚ث‌m bonusem
    if (hist && hist.score > 2000) base = 600;
    else if (hist && hist.score > 500) base = 550;
    return base;
}

function getRadius(hp) { 
    // Zpomaleno o 3x (z 0.7 na 0.233), aby koule nezabؤ‚آ­raly pؤ¹â„¢ؤ‚آ­liؤ¹ث‡ mؤ‚آ­sta

}

function triggerGiftEffect(p, diam, comboMult = 1) {
    if (diam >= 1000) {
        let tts = currentLang === "CZ" ? `Mega dؤ‚ث‡rek od ${p.name}! Rؤ‚ث‡zovؤ‚ث‡ vlna!` : `Mega gift incoming from ${p.name}! Shockwave!`;
        let txt = currentLang === "CZ" ? "MEGA Dؤ‚آپREK!" : "MEGA GIFT INCOMING!";
        if (diam >= 10000) { tts = currentLang === "CZ" ? `Bؤ¹آ®H VSTOUPIL DO ARؤ‚â€°NY! ${p.name} NIأ„إڑؤ‚إ¤ Vؤ¹آ E ؤ¹ث‌IVؤ‚â€°!` : `A GOD HAS ENTERED! ${p.name} DESTROYS EVERYTHING!`; txt = "ARMAGEDON!"; }
        else if (diam >= 5000) { tts = currentLang === "CZ" ? `GALAXY GIFT! ${p.name} VYSؤ‚آپVؤ‚آپ ARؤ‚â€°NU!` : `GALAXY GIFT! ${p.name} IS SUCKING THE ARENA!`; txt = "GALAXY GIFT!"; }
        triggerMegaAnnouncement(p.name, diam, tts, txt);
    }

    // TIER 5: Pؤ‚ث‡n Vesmؤ‚آ­ru (Armagedon - 10000+ mincؤ‚آ­)
    if (diam >= 10000) {
        p.immunityTimer += 50 * 60; // 50 sekund God Mode
        p.hasCrown = true;
        p.auraFlash = 120;
        nukeEffectTimer = 180; // 3 vteؤ¹â„¢iny slow-mo a temnoty
        engine.timing.timeScale = 0.2;
        
        // Zniأ„إ¤enؤ‚آ­ vؤ¹ث‡ech malؤ‚ث‌ch a stؤ¹â„¢ednؤ‚آ­ch hrؤ‚ث‡أ„إ¤ؤ¹إ» (Armagedon)
        for (let other of players) {
            if (other === p || other.hp <= 0 || other.immunityTimer > 0) continue;
            let dx = other.body.position.x - p.body.position.x;
            let dy = other.body.position.y - p.body.position.y;
            let distSq = dx * dx + dy * dy;
            let dist = Math.sqrt(distSq) || 1;
            
            // Masivnؤ‚آ­ sؤ‚آ­la odhozenؤ‚آ­
            let forceMag = 1.5 * other.body.mass; 
            Matter.Body.applyForce(other.body, other.body.position, { x: (dx / dist) * forceMag, y: (dy / dist) * forceMag });
            
            // Instakill pro vؤ¹ث‡echny, co nemajؤ‚آ­ aspoؤ¹ث† 5000 HP
            if (other.hp < 5000) {
                other.hp = 0;
                other.hpBuffer = 0;
            }
        }
        
        deathShockwaves.push({x: p.body.position.x, y: p.body.position.y, r: p.r + 100, color: color(255, 0, 0), life: 255, isNuke: true});
        let popText = comboMult > 1 ? `${comboMult}X COMBO GOD! ؤ‘إ؛â€‌ؤ„` : "ARMAGEDON!";
        addPopup(popText, p.body.position.x, p.body.position.y - p.r - 30, color(255, 0, 0), true);
        safePlaySound(pentatonic('low'), 0.15, 2.0); // Hlubokؤ‚ث‌ ale pؤ¹â„¢ؤ‚آ­jemnؤ‚ث‌ tؤ‚إ‚n
    }

function reviveZombie(p) {
    if (!p.isZombie) return;

function handleAction(name, amount, isGift = false, diam = 0, allowSpawn = true, comboMult = 1) {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  // RESET IDLE TIMERU Pؤ¹ثœI REؤ‚ LNؤ‚â€° AKCI
  lastRealInteractionTime = millis();
  
  let finalAmount = amount || 0;
  if (isGift) {
      if (diam >= 5000) finalAmount = diam * 2000 * comboMult;
      else if (diam >= 1000) finalAmount = diam * 1500 * comboMult;
      else if (diam >= 100) finalAmount = diam * 1000 * comboMult;
      else finalAmount = diam * 100 * comboMult;
  }

  let p = players.find(x => x.name === name);

  if (p) {
    if (p.isZombie) reviveZombie(p); // Okamؤ¹ؤ¾itؤ‚آ© oؤ¹ؤ¾ivenؤ‚آ­!
    if (finalAmount !== 0) {
        p.hp += finalAmount;
        p.auraFlash = 30; // Zؤ‚ث‡blesk pؤ¹â„¢i zmأ„â€؛nأ„â€؛ HP
        
        // AKUMULACE PRO ؤ‚إ،SPORNؤ‚â€° ZOBRAZENؤ‚إ¤
        if (finalAmount > 0) {
            p.healDisplayValue += finalAmount;
            p.healDisplayTimer = 45; // Zobrazit na 45 framؤ¹إ» (~0.7s)
        } else {
            p.dmgDisplayValue += Math.abs(finalAmount);
            p.dmgDisplayTimer = 45;
        }
    }
    
    // AKTUALIZOVANؤ‚آپ LOGIKA TRVؤ‚آپNؤ‚إ¤ PILY: Kaؤ¹ؤ¾dؤ‚ث‌ like resetuje pilu na 5 sekund
    p.likeBuffTimer = Math.max(p.likeBuffTimer || 0, millis() + 5000); 
    if (isGift) triggerGiftEffect(p, diam, comboMult);
  } else {
        if (allowSpawn) {
            let baseHp = getStartingHp(name);
            spawnPlayer(name, baseHp + finalAmount, isGift, diam, false, comboMult, false, true); 
        }
  }
}

function spawnPlayer(name, hp, isGift = false, diam = 0, isZombie = false, comboMult = 1, isBot = false, shouldQueue = true) {
  let safeHp = Math.max(0, hp || 500); 
  let r = getRadius(safeHp);
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let viewW = W / cameraScale; let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  let bestX = cx; let bestY = cy; let maxMinDist = -1;
  
  for (let i = 0; i < 20; i++) {
      let testX = cx + random(-viewW/2 + r*2, viewW/2 - r*2);
      let testY = cy + random(-viewH/2 + r*2, viewH/2 - r*2);
      let minDist = Infinity;
      for (let p of players) {
          if (!p.body) continue;
          let d = dist(testX, testY, p.body.position.x, p.body.position.y);
          if (d < minDist) minDist = d;
      }
      if (players.length === 0) { bestX = testX; bestY = testY; break; }
      if (minDist > maxMinDist) { maxMinDist = minDist; bestX = testX; bestY = testY; }
  }

  let sx = shipX === 0 ? W/2 : shipX; let sy = shipY === 0 ? ARENA_TOP : shipY;
  let wPos = screenToWorld(sx, sy);
  let dx = bestX - wPos.x; let dy = bestY - wPos.y;
  let distToTarget = Math.sqrt(dx*dx + dy*dy); let spd = distToTarget / 45; 
  
  colorMode(HSB, 360, 100, 100);
  let hueVal = random(360);
  if (hueVal > 80 && hueVal < 160) hueVal = (hueVal + 100) % 360; // Ochrana proti zelenؤ‚آ© (chroma key)
  let pColor = isZombie ? color(0, 0, 40) : color(hueVal, random(80, 100), random(90, 100));
  colorMode(RGB, 255);
  
  spawnModules.push({
      name: name, hp: safeHp, x: wPos.x, y: wPos.y, targetX: bestX, targetY: bestY,
      vx: (dx/distToTarget)*spd, vy: (dy/distToTarget)*spd,
      life: 45, trail: [], color: pColor, isGift: isGift, diam: diam, isZombie: isZombie, comboMult: comboMult,
      isBot: isBot, shouldQueue: shouldQueue
  });
      safePlaySound(pentatonic('high'), 0.008, 0.15);
}

function handleRoundStartQueue() {
    if (roundStartQueue.length === 0) return;
    
    // Postupnؤ‚آ© spawnovؤ‚ث‡nؤ‚آ­ bأ„â€؛hem 10 sekund (600 framؤ¹إ»)
    let interval = Math.max(1, Math.floor(600 / Math.max(1, initialQueueLength)));
    if (frameCount % interval === 0) {
        let p = roundStartQueue.shift();
        spawnPlayer(p.name, p.hp, p.isGift, p.diam, p.isZombie, p.comboMult, p.isBot, p.shouldQueue);
    }
}

function handleSpawnModules() {
    for (let i = spawnModules.length - 1; i >= 0; i--) {
        let m = spawnModules[i];
        // ODSTRANأ„إ،N KOUؤ¹آک (trail) PRO ZVؤ‚إ¥ؤ¹آ ENؤ‚إ¤ FPS
        m.x += m.vx; m.y += m.vy; m.life--;
        
        push(); translate(m.x, m.y); rotate(atan2(m.vy, m.vx));
        // Raketka a plamؤ‚آ­nek smazؤ‚ث‡ny - jen أ„إ¤istؤ‚ث‡ kuliأ„إ¤ka letؤ‚آ­cؤ‚آ­ do arؤ‚آ©ny
        fill(m.color); stroke(255); strokeWeight(1); ellipse(0, 0, 16, 16); 
        pop();
        
        if (m.life <= 0 || dist(m.x, m.y, m.targetX, m.targetY) < 10) {
            finalizeSpawnPlayer(m.name, m.hp, m.targetX, m.targetY, m.color, m.isGift, m.diam, m.isZombie, m.comboMult, m.isBot, m.shouldQueue);
            spawnModules.splice(i, 1);
        }
    }
}

function removePlayerCompletely(name) {
    // 1. Matter.js body removal
    for (let i = players.length - 1; i >= 0; i--) {
        if (players[i].name === name) {
            if (players[i].body) Matter.World.remove(world, players[i].body);
            players.splice(i, 1);
        }
    }
    
    // 2. Queue removal
    egoQueue = egoQueue.filter(n => n !== name);
    previousTop10 = previousTop10.filter(n => n !== name);
    
    // 3. Boss Planet removal
    for (let i = bossPlanets.length - 1; i >= 0; i--) {
        if (bossPlanets[i].name === name) {
            bossPlanets.splice(i, 1);
        }
    }
    if (lastValidBossName === name) {
        lastValidBossName = null;
    }
    
    // 4. Persistence removal (Permanentnؤ‚آ­ smazؤ‚ث‡nؤ‚آ­ ze vؤ¹ث‡ech statistik)
    delete allTimeHpLeaderboard[name];
    delete allTimeGifts[name];
    delete allTimeKills[name];
    delete sessionLikes[name];
    delete roundGifts[name];
    delete roundGiftStreaks[name];
    
    // 5. Avatar cache
    delete userAvatars[name];
    
    // 6. Force save leaderboards
    saveLeaderboards();
}

      handleCombat(p1, p2);

function handleCombat(p1, p2) {
  if (!p1.body || !p2.body) return;

  // --- I-FRAMES (Ochrana proti spamu damage v chumlu) ---
  // Hrؤ‚ث‡أ„إ¤ mؤ¹إ»ؤ¹ؤ¾e bojovat maximؤ‚ث‡lnأ„â€؛ 1x za 0.2 sekundy (12 framؤ¹إ»).
  if (p1.attackCooldown > 0 || p2.attackCooldown > 0) return;
  
  p1.attackCooldown = 12;
  p2.attackCooldown = 12;

  let distVec = Matter.Vector.sub(p2.body.position, p1.body.position);
  if (distVec.x === 0 && distVec.y === 0) distVec.x = 1;
  let distVal = Matter.Vector.magnitude(distVec);

  let speed = Matter.Vector.magnitude(Matter.Vector.sub(p1.body.velocity, p2.body.velocity));
  // Odstranأ„â€؛no blokovؤ‚ث‡nؤ‚آ­ malؤ‚آ© rychlosti, aby se dؤ‚ث‡val damage i pؤ¹â„¢i mletؤ‚آ­ v chumlu
  if (isNaN(speed) || !isFinite(speed)) return; 
  if (speed > 100) speed = 100; 

  // --- HP DRAIN MECHANIKA (Hrؤ‚ث‡أ„إ¤ vysؤ‚ث‡vؤ‚ث‡ 1 HP/s z bota pؤ¹â„¢i dotyku) ---
  if (p1.isBot !== p2.isBot) {
      let bot = p1.isBot ? p1 : p2;
      let player = p1.isBot ? p2 : p1;
      let drain = 0.2; // Snؤ‚آ­ؤ¹ؤ¾eno z 1.0 na 0.2 HP/s
      bot.hp -= drain;
      player.hp += drain;
      // Akumulace: أ„إڑؤ‚آ­slo se zobrazؤ‚آ­ aؤ¹ؤ¾ ve chvؤ‚آ­li, kdy nasbؤ‚آ­rؤ‚ث‡ alespoؤ¹آˆ +1 HP
      player.healDisplayValue += drain;
      if (player.healDisplayValue >= 1) {
          player.healDisplayTimer = 45;
      }
  }

  let safeHp1 = Math.max(1, p1.hp); let safeHp2 = Math.max(1, p2.hp);
  let massAdvantage1 = Math.min(1.5, Math.max(1, Math.sqrt(safeHp1 / safeHp2)));
  let massAdvantage2 = Math.min(1.5, Math.max(1, Math.sqrt(safeHp2 / safeHp1)));
  
  // OCHRANA: Snؤ‚آ­ؤ¹ؤ¾ena minimؤ‚ث‡lnؤ‚آ­ rychlost pro vؤ‚ث‌poأ„إ¤et damage z 2.0 na 1.0
  let effectiveSpeed = Math.max(speed, 1.0);
  
  // NOVؤ‚آپ LOGIKA: Snؤ‚آ­ؤ¹ؤ¾eno na polovinu pro delؤ¹ث‡ؤ‚آ­ hru
  let calcDmg = (p, spd) => {
      let d = random(0.5, 1.0); // Zؤ‚ث‡klad 0.5-1.0
      if (spd > 5) d = random(0.5, 1.5); // Rychlؤ‚ث‌ 0.5-1.5
      if (p.likeBuffTimer > millis()) d = random(0.5, 2.0); // Pila 0.5-2.0
      if (p.giftSpeedTimer > 0) d *= 2; // Gift bonus zdvojnؤ‚ث‡sobؤ‚آ­ dmg
      return d;
  };

  let finalDmgTo2 = (p1.isZombie || (p1.isBot && !p2.isBot)) ? 0 : calcDmg(p1, speed);
  let finalDmgTo1 = (p2.isZombie || (p2.isBot && !p1.isBot)) ? 0 : calcDmg(p2, speed);

  // IMMUNITY CHECK (Novؤ‚آ© pravidlo pro prevenci damage)
  if (p1.immunityTimer > 0) finalDmgTo1 = 0;
  if (p2.immunityTimer > 0) finalDmgTo2 = 0;

  let hp1Before = p1.hp; let hp2Before = p2.hp;
  if (finalDmgTo1 > 0) {
      p1.hp -= finalDmgTo1;
      if (!p1.isBot || !p2.isBot) {
          p1.dmgDisplayValue += finalDmgTo1;
          p1.dmgDisplayTimer = 45;
      }
  }

  if (finalDmgTo2 > 0) {
      p2.hp -= finalDmgTo2;
      if (!p1.isBot || !p2.isBot) {
          p2.dmgDisplayValue += finalDmgTo2;
          p2.dmgDisplayTimer = 45;
      }
  }

  let healLogic = (winner, loserData) => {
      let mult = loserData.isBounty ? 5 : 1;
      let heal = Math.floor(loserData.hpBeforeDead * 0.3 + 10) * mult; 
      winner.hp += heal;
      winner.healDisplayValue += heal;
      winner.healDisplayTimer = 45;
      winner.auraFlash = 20;
      
      if (loserData.isBounty) {
          activeEvent = null;
          bountyTarget = null;
          nextEventTime = millis() + random(60000, 150000);
          let cleanWinner = cleanNameForTTS(winner.name);
          speakTTS(currentLang === "CZ" ? `Odmأ„â€؛na vybrؤ‚ث‡na! ${cleanWinner} zniأ„إ¤il cؤ‚آ­l!` : `Bounty claimed! ${cleanWinner} destroyed the target!`, true);
          safePlaySound(pentatonic('high'), 0.08, 0.5); 
      }
  };

  if (p1.hp <= 0 && hp1Before > 0) { healLogic(p2, {hpBeforeDead: hp1Before, isBounty: p1.isBounty}); addKill(p2.name, p2.color); }
  if (p2.hp <= 0 && hp2Before > 0) { healLogic(p1, {hpBeforeDead: hp2Before, isBounty: p2.isBounty}); addKill(p1.name, p1.color); }
  
  let forceDir = { x: distVec.x / distVal, y: distVec.y / distVal };
  // Zmenؤ¹ث‡enؤ‚ث‌ odraz, aby se v chumlu nerozstؤ¹â„¢elili pؤ¹â„¢ؤ‚آ­liؤ¹ث‡ agresivnأ„â€؛, ale poؤ¹â„¢ؤ‚ث‡d se hؤ‚ث‌bali
  let forceMag = 0.0003 + speed * 0.0003; 
  
  if(isFinite(forceDir.x) && isFinite(forceDir.y)) {
      Matter.Body.applyForce(p1.body, p1.body.position, { x: -forceDir.x * forceMag * p1.body.mass, y: -forceDir.y * forceMag * p1.body.mass });
      Matter.Body.applyForce(p2.body, p2.body.position, { x: forceDir.x * forceMag * p2.body.mass, y: forceDir.y * forceMag * p2.body.mass });
  }
  
  let isHeavyLoad = players.length > 40;
  let isExtremeLoad = players.length > 60;
  
  if (!isExtremeLoad && (p1.hp >= 1000 || p2.hp >= 1000)) {
      let cx = (p1.body.position.x + p2.body.position.x)/2;
      let cy = (p1.body.position.y + p2.body.position.y)/2;
      let dominantColor = finalDmgTo2 > finalDmgTo1 ? p1.color : p2.color;
      lightnings.push({x1: p1.body.position.x, y1: p1.body.position.y, x2: p2.body.position.x, y2: p2.body.position.y, life: 15, c: dominantColor});
      createParticles(cx, cy, dominantColor, 6); 
      safePlaySound(pentatonic('low'), 0.008, 0.3); // Jemnؤ‚ث‌ basovؤ‚ث‌ tؤ‚إ‚n pؤ¹â„¢i nؤ‚ث‡razu
  }
  
  // Pؤ¹â„¢ؤ‚آ­mؤ‚آ© popupy pro damage a zvuky critu smazؤ‚ث‡ny (nynؤ‚آ­ bأ„â€؛ؤ¹ؤ¾ؤ‚آ­ plynule po -1)
}

function shootBonusFromShip() {
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let viewW = W / cameraScale; let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  
  let bestX = cx; let bestY = cy;
  let maxMinDist = -1;
  for (let i = 0; i < 20; i++) {
      let testX = cx + random(-viewW/3, viewW/3);
      let testY = cy + random(-viewH/3, viewH/3);
      let minDist = Infinity;
      for (let p of players) {
          if (!p.body) continue;
          let d = dist(testX, testY, p.body.position.x, p.body.position.y);
          if (d < minDist) minDist = d;
      }
      if (players.length === 0) { bestX = testX; bestY = testY; break; }
      if (minDist > maxMinDist) { maxMinDist = minDist; bestX = testX; bestY = testY; }
  }

  let wPos = screenToWorld(shipX, shipY);
  let dx = bestX - wPos.x;
  let dy = bestY - wPos.y;
  let distToTarget = Math.sqrt(dx*dx + dy*dy);
  let spd = 12; 
  
  let isSpeedOrb = random() < 0.35; // 35% ؤ¹ث‡ance na speed orb
  orbs.push({ 
      x: wPos.x, y: wPos.y, 
      targetX: bestX, targetY: bestY,
      vx: (dx/distToTarget)*spd, vy: (dy/distToTarget)*spd,
      r: 15, value: 1000, 
      isFlying: true,
      type: isSpeedOrb ? 'SPEED' : 'HP'
  });
  safePlaySound(pentatonic('mid'), 0.01, 0.25);
}

function handleOrbs() {
  let isHeavyLoad = players.length > 40;
  for (let i = orbs.length - 1; i >= 0; i--) {
      let o = orbs[i];
      
      let orbColor = o.type === 'SPEED' ? color(255, 255, 0) : color(0, 255, 255);
      
      if (o.isFlying) {
          o.x += o.vx; o.y += o.vy;
          let d = dist(o.x, o.y, o.targetX, o.targetY);
          
          if (d < 20) {
              o.isFlying = false;
              o.x = o.targetX; o.y = o.targetY;
              createParticles(o.x, o.y, color(0, 255, 255), 20);
              safePlaySound(pentatonic('high'), 0.015, 0.25);
          }
          
          push();
          translate(o.x, o.y);
          let angle = atan2(o.vy, o.vx);
          rotate(angle);
          fill(20, 30, 50); stroke(orbColor); strokeWeight(2);
          rectMode(CENTER);
          rect(0, 0, 30, 15, 5);
          fill(orbColor); noStroke();
          triangle(-15, -5, -15, 5, -25 - random(5), 0);
          fill(255); textSize(6); textAlign(CENTER, CENTER); textStyle(BOLD);
          text(o.type === 'SPEED' ? "SPEED" : "BONUS", 0, 0);
          pop();
          
          if (frameCount % 3 === 0 && !isHeavyLoad) createParticles(o.x, o.y, orbColor, 2);
          continue; 
      }
      
      push();
      translate(o.x, o.y);
      rotate(frameCount * 0.02);
      
      if (!isHeavyLoad) {
          drawingContext.shadowBlur = 15;
          drawingContext.shadowColor = orbColor;
      }
      
      fill(20, 30, 50, 200);
      stroke(red(orbColor), green(orbColor), blue(orbColor), 180 + sin(frameCount * 0.1) * 75);
      strokeWeight(2);
      rectMode(CENTER);
      rect(0, 0, o.r * 2.2, o.r * 2.2, 5); 
      
      noStroke();
      fill(red(orbColor), green(orbColor), blue(orbColor), 150 + sin(frameCount * 0.2) * 100);
      ellipse(0, 0, o.r * 1.2);
      fill(255);
      if (o.type === 'SPEED') {
          beginShape();
          vertex(2, -8); vertex(-4, 0); vertex(1, 0);
          vertex(-2, 8); vertex(4, 0); vertex(-1, 0);
          endShape(CLOSE);
      } else {
          rect(-o.r * 0.2, -o.r * 0.6, o.r * 0.4, o.r * 1.2);
          rect(-o.r * 0.6, -o.r * 0.2, o.r * 1.2, o.r * 0.4);
      }
      rectMode(CORNER);
      
      if (!isHeavyLoad) drawingContext.shadowBlur = 0;
      pop();

      fill(255); textSize(10); textStyle(BOLD); textAlign(CENTER);
      text(o.type === 'SPEED' ? "5x SPEED" : "+" + o.value, o.x, o.y - 20);

      let collected = false;
      for (let p of players) {
          if (p.hp > 0 && !p.isZombie && dist(p.body.position.x, p.body.position.y, o.x, o.y) < p.r + o.r) {
              if (o.type === 'SPEED') {
                  p.orbSpeedTimer = 10 * 60; // 10 sekund pؤ¹â„¢i 60 FPS
                  if (!isHeavyLoad) addPopup("5x SPEED BOOST!", p.body.position.x, p.body.position.y - p.r, color(255, 255, 0));
                  safePlaySound(pentatonic('high'), 0.01, 0.25);
              } else {
                  p.hp += o.value;
                  safePlaySound(pentatonic('mid'), 0.01, 0.2);
              }
              createParticles(o.x, o.y, orbColor, 15);
              collected = true; break;
          }
      }
      if (collected) orbs.splice(i, 1);
  }
}

function screenToWorld(sx, sy) {
    let cx = W/2; let cy = (ARENA_TOP + ARENA_BOT) / 2;
    return { x: (sx - cx) / cameraScale + cx, y: (sy - cy) / cameraScale + cy };
}

function drawSpaceshipTimer() {
    if (maxRoundTimer <= 0) return;
    let isHeavyLoad = players.length > 40;
    
    let p = 1.0 - (roundTimerFrames / (maxRoundTimer * 60)); 
    p = constrain(p, 0, 1.0); // Ochrana proti couvnuti za start pؤ¹â„¢i extrؤ‚آ©mnؤ‚آ­m prodlouؤ¹ؤ¾enؤ‚آ­ kola
    let aH = ARENA_BOT - ARENA_TOP;
    let perim = 2 * W + 2 * aH;
    let currentDist = p * perim;
    
    stroke(roundThemeColor); strokeWeight(3);
    if(!isHeavyLoad) { drawingContext.shadowBlur = 10; drawingContext.shadowColor = roundThemeColor; }
    
    let points = [ 
        {x: W/2, y: ARENA_TOP}, 
        {x: W, y: ARENA_TOP}, 
        {x: W, y: ARENA_BOT}, 
        {x: 0, y: ARENA_BOT}, 
        {x: 0, y: ARENA_TOP},
        {x: W/2, y: ARENA_TOP} 
    ];
    
    let d = 0; let shipAngle = 0; shipX = points[0].x; shipY = points[0].y;

    for (let i = 0; i < points.length - 1; i++) {
        let p1 = points[i]; let p2 = points[i+1]; let segLen = dist(p1.x, p1.y, p2.x, p2.y);
        if (currentDist > d + segLen) {
            line(p1.x, p1.y, p2.x, p2.y); d += segLen;
        } else {
            let t = (currentDist - d) / segLen;
            shipX = lerp(p1.x, p2.x, t); shipY = lerp(p1.y, p2.y, t);
            line(p1.x, p1.y, shipX, shipY);
            shipAngle = atan2(p2.y - p1.y, p2.x - p1.x);
            break;
        }
    }
    if(!isHeavyLoad) drawingContext.shadowBlur = 0;

    push(); translate(shipX, shipY); rotate(shipAngle);
    
    fill(255, 100, 0, 150 + sin(frameCount * 0.5) * 100);
    noStroke();
    triangle(-20, -6, -20, 6, -35 - random(10), 0);
    fill(255, 200, 0);
    triangle(-20, -3, -20, 3, -28 - random(5), 0);
    
    fill(100, 150, 255); stroke(0, 255, 255); strokeWeight(1);
    triangle(-10, 10, -20, 20, 5, 10);
    triangle(-10, -10, -20, -20, 5, -10);
    
    fill(220, 220, 255); stroke(0, 255, 255); strokeWeight(2);
    beginShape();
    vertex(20, 0); vertex(5, 10); vertex(-20, 8); vertex(-20, -8); vertex(5, -10);
    endShape(CLOSE);
    
    fill(0, 200, 255); noStroke(); ellipse(5, 0, 10, 6);
    fill(255); ellipse(7, -1, 3, 2);
    
    pop();

    if (frameCount % 4 === 0 && roundTimerFrames > 0 && !isHeavyLoad) {
        let wPos = screenToWorld(shipX, shipY);
        particles.push({x: wPos.x, y: wPos.y, vx: -cos(shipAngle)*3 + random(-1,1), vy: -sin(shipAngle)*3 + random(-1,1), life: 200, c: roundThemeColor, size: random(4, 8)});
    }
    
    // أ„إڑasomؤ‚آ­ra vedle raketky
    let timeStr = nf(floor(roundTimer/60),2) + ":" + nf(roundTimer%60,2);
    push();
    translate(shipX, shipY);
    let dirX = (W/2) - shipX;
    let dirY = ((ARENA_TOP+ARENA_BOT)/2) - shipY;
    let len = dist(0, 0, dirX, dirY);
    if (len > 0) {
        dirX = (dirX / len) * 35;
        dirY = (dirY / len) * 35;
    }
    
    // Pozadؤ‚آ­ pro lepؤ¹ث‡ؤ‚آ­ أ„إ¤itelnost na chromأ„â€؛
    rectMode(CENTER);
    fill(0, 180); noStroke();
    rect(dirX, dirY, 58, 24, 5);
    
    fill(255); // Bؤ‚آ­lؤ‚ث‡, aby ji chroma key nesmazal
    if (roundTimer <= 30 && roundTimer % 2 === 0) fill(255, 50, 50);
    textSize(18); textStyle(BOLD); textAlign(CENTER, CENTER);
    stroke(0); strokeWeight(3);
    text(timeStr, dirX, dirY);
    pop();
}

function drawNotifications() {
  // CHROMA KEY pozadؤ‚آ­ - plnأ„â€؛ zelenؤ‚آ© pro prؤ¹إ»hlednost v OBS
  fill(0, 255, 0);
  noStroke();
  rect(0, ARENA_BOT, W, H - ARENA_BOT);

  // Zvؤ‚ث‌ؤ¹ث‡ؤ‚آ­me vأ„â€؛k aktuؤ‚ث‡lnأ„â€؛ zobrazenؤ‚ث‌m notifikacؤ‚آ­m
  for (let n of notifications) {
      if (n.state === 'DISPLAY') n.age++;
  }

  // Logika pro zaؤ¹â„¢azovؤ‚ث‡nؤ‚آ­ do fronty zobrazenؤ‚آ­
  let displayed = notifications.filter(n => n.state === 'DISPLAY');
  let waiting = notifications.filter(n => n.state === 'WAITING');

  // AUTO-DISMISS: Notifikace zmizؤ‚آ­ po ~4 sekundؤ‚ث‡ch neaktivity (ؤ¹ؤ¾ؤ‚ث‡dnؤ‚آ© novؤ‚آ© ve frontأ„â€؛)
  if (waiting.length === 0 && displayed.length > 0) {
      for (let n of displayed) {
          let maxAge = n.type === 'GIFT' ? 360 : 240; // Dؤ‚ث‡rky vydrؤ¹ؤ¾ؤ‚آ­ 6s, ostatnؤ‚آ­ 4s
          if (n.age >= maxAge) {
              n.state = 'LEAVING';
          }
      }
      // Odstranؤ‚آ­ opouؤ¹ث‡tأ„â€؛jؤ‚آ­cؤ‚آ­ z displayed pole
      displayed = displayed.filter(n => n.state === 'DISPLAY');
  }

  if (waiting.length > 0) {
      // 1. VIP Pؤ¹آکEDNOST: Dؤ‚ث‡rky pؤ¹â„¢eskakujؤ‚آ­ frontu na prvnؤ‚آ­ mؤ‚آ­sto
      waiting.sort((a, b) => (a.type === 'GIFT' ? -1 : (b.type === 'GIFT' ? 1 : 0)));

      if (displayed.length >= 4) { // Pؤ¹آکIDؤ‚آپNO: Mؤ‚آ­sto pro 4 menؤ¹ث‡ؤ‚آ­ notifikace
          // 2. أ„إڑASOVؤ‚آپNؤ‚إ¤: Dؤ‚ث‡rky drؤ¹ؤ¾ؤ‚آ­ dؤ‚آ©le, ostatnؤ‚آ­ rychleji mizؤ‚آ­
          let requiredAge = displayed[0].type === 'GIFT' ? 300 : 120;
          
          // 3. VYHAZOVؤ‚آپK: Pokud أ„إ¤ekؤ‚ث‡ Dؤ‚ث‡rek a zavazؤ‚آ­ tam obyأ„إ¤ejnؤ‚ث‡ vأ„â€؛c
          if (waiting[0].type === 'GIFT' && displayed[0].type !== 'GIFT' && displayed[0].age >= 40) {
              requiredAge = 40; 
          }

          if (displayed[0].age >= requiredAge) {
              displayed[0].state = 'LEAVING';
              displayed.shift(); 
          }
      }
      if (displayed.length < 4) {
          let next = waiting[0];
          next.state = 'DISPLAY';
          next.x = W + 300; // Start zprava
          displayed.push(next);
      }
  }

  // Urأ„إ¤ؤ‚آ­me pozice pro aktuؤ‚ث‡lnأ„â€؛ zobrazenؤ‚آ© (nejnovأ„â€؛jؤ¹ث‡ؤ‚آ­ napravo)
  displayed.reverse();
  for (let i = 0; i < displayed.length; i++) {
      displayed[i].targetX = W - 175 - (i * 180); // Uؤ¹ؤ¾ؤ¹ث‡ؤ‚آ­ mezery
  }

  for (let n of notifications) {
      if (n.state === 'WAITING') continue;
      
      if (n.state === 'LEAVING') n.targetX = -300;
      
      n.x = lerp(n.x, n.targetX, 0.15);
      
      push();
      translate(n.x, ARENA_BOT + 12);
      
      let actionText, icon;
      colorMode(HSB);
      let hueShift = sin(frameCount * 0.05 + n.age * 0.1) * 25;
      let borderColor;
      
      // ZMأ„إ،NA TEXTؤ¹آ®: Skrytؤ‚آ­ "Follow", "Like", "Join" za hernؤ‚آ­ lore (TikTok AI friendly)
      if (n.type === 'JOIN') { borderColor = color((120 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "Vؤ‚ث‌sadek" : "Deployed"; icon = "ؤ‘إ؛إ،â‚¬"; }
      else if (n.type === 'FOLLOW') { borderColor = color((300 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "Radar lock" : "Radar lock"; icon = "ؤ‘إ؛â€œث‡"; }
      else if (n.type === 'LIKE') { borderColor = color((0 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? `Energie +${n.extra}` : `Energy +${n.extra}`; icon = "أ¢إ،ث‡"; }
      else if (n.type === 'BOOST') { borderColor = color((180 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "Pohon!" : "Thrusters!"; icon = "أ¢آکâ€‍ؤڈآ¸إ¹"; }
      else if (n.type === 'SHIELD') { borderColor = color((270 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "ؤ¹آ tؤ‚آ­ty!" : "Shields!"; icon = "ؤ‘إ؛â€؛ث‡ؤڈآ¸إ¹"; }
      else if (n.type === 'CODE') { borderColor = color((50 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "Hack" : "Hack"; icon = "ؤ‘إ؛â€™آ»"; }
      else if (n.type === 'GIFT') { 
          colorMode(HSB);
          borderColor = color((frameCount * 5) % 360, 100, 100); 
          colorMode(RGB);
          actionText = currentLang === "CZ" ? `DROP (${n.extra})` : `DROP (${n.extra})`; 
          icon = n.extra >= 1000 ? "ؤ‘إ؛â€؛آ¸" : (n.extra >= 100 ? "ؤ‘إ؛â€œآ¦" : "ؤ‘إ؛â€؛آ°ؤڈآ¸إ¹"); 
      }
      else { borderColor = color(0, 0, 100); actionText = "Akce"; icon = "أ¢إ›آ¨"; }
      colorMode(RGB);
      
      // CHROMA KEY pozadؤ‚آ­ karet - plnأ„â€؛ zelenؤ‚آ© pro prؤ¹إ»hlednost v OBS
      if (n.type === 'GIFT' && n.extra >= 100) {
          fill(0, 255, 0); 
          stroke(borderColor);

          drawingContext.shadowBlur = 0;
      } else {

      }
      
      // Vykreslenؤ‚آ­ zkosenؤ‚آ©ho rؤ‚ث‡meأ„إ¤ku (Sci-fi panel)

      let currentAvatar = userAvatars[n.name] || n.img;

      if (currentAvatar && currentAvatar !== "loaded") {

          drawingContext.arc(22, 22, avSize/2, 0, TWO_PI);

      if (n.type === 'LIKE' && n.extra >= 100) {

      } else if (n.type === 'LIKE' && n.isMegaLike) {

      } else if (n.type === 'GIFT') {

  }
  
  notifications = notifications.filter(n => !(n.state === 'LEAVING' && n.x < -200));
}
