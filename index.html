  let allKillsSorted = Object.entries(allTimeKills).sort((a,b) => b[1].score - a[1].score).slice(0, 30);
  killsLbRect = {x: 530, y: HUD_TOP + 30, w: 150, h: 15}; 
  
  let hoverKills = mouseX > killsLbRect.x && mouseX < killsLbRect.x + killsLbRect.w && mouseY > killsLbRect.y && mouseY < killsLbRect.y + killsLbRect.h;
  textAlign(LEFT, TOP); fill(hoverKills ? color(255, 50, 50) : roundThemeColor); textSize(9); textStyle(BOLD); 
  text(currentLang === "CZ" ? "TOP ZABIJÁCI" : "TOP KILLERS", 530, HUD_TOP + 30);
  
  textStyle(NORMAL); textSize(9);
  for(let i=0; i<Math.min(3, allKillsSorted.length); i++) {
      let pName = allKillsSorted[i][0]; let pData = allKillsSorted[i][1]; let y = HUD_TOP + 45 + i*16; let xBase = 530;
      let currAv = userAvatars[pName] || pData.avatar;
      if (currAv && currAv !== "loaded") {
          drawingContext.save(); drawingContext.beginPath(); drawingContext.arc(xBase + 6, y + 5, 6, 0, TWO_PI); drawingContext.clip();
          image(currAv, xBase, y - 1, 12, 12); drawingContext.restore();
          fill(pData.color); textStyle(BOLD); text(`${i+1}. ${pName.substring(0,8)}`, xBase + 16, y);
      } else {
          fill(pData.color); textStyle(BOLD); text(`${i+1}. ${pName.substring(0,10)}`, xBase, y);
      }
      fill(255); textStyle(BOLD); text(pData.score + " ☠", xBase + 130, y); textStyle(NORMAL);
  }

  if (allKillsSorted.length > 3) {
      let numExtra = allKillsSorted.length - 3; let scrollYBase = HUD_TOP + 45 + 3*16; 
      drawingContext.save(); drawingContext.beginPath(); drawingContext.rect(525, scrollYBase - 2, 190, 2 * 16 + 4); drawingContext.clip();
      let itemH = 16; let totalExtraH = numExtra * itemH; let scrollPos = (frameCount * 0.4) % totalExtraH; 
      
      for(let i=0; i<numExtra * 2; i++) { 
          let idx = 3 + (i % numExtra); let pName = allKillsSorted[idx][0]; let pData = allKillsSorted[idx][1]; let y = scrollYBase + (i * itemH) - scrollPos; let xBase = 530;
          let currAv = userAvatars[pName] || pData.avatar;
          if (currAv && currAv !== "loaded") {
              drawingContext.save(); drawingContext.beginPath(); drawingContext.arc(xBase + 6, y + 5, 6, 0, TWO_PI); drawingContext.clip();
              image(currAv, xBase, y - 1, 12, 12); drawingContext.restore();
              fill(pData.color); textStyle(BOLD); text(`${idx+1}. ${pName.substring(0,8)}`, xBase + 16, y);
          } else { fill(pData.color); textStyle(BOLD); text(`${idx+1}. ${pName.substring(0,10)}`, xBase, y); }
          fill(255); textStyle(BOLD); text(pData.score + " ☠", xBase + 130, y); textStyle(NORMAL);
      }
      drawingContext.restore();
  }
}

function handleTTSCommentary() {
  if (millis() > nextCommentTime && (!('speechSynthesis' in window) || !window.speechSynthesis.speaking)) {
      let txt = "", arr = [];
      if (players.length === 0) arr = currentLang === "CZ" ? COMMENTARY_EMPTY.CZ : COMMENTARY_EMPTY.EN;
      else if (players.length === 1) arr = currentLang === "CZ" ? COMMENTARY_SOLO.CZ : COMMENTARY_SOLO.EN;
      else {
          if (random() < 0.25) {
              let top = [...players].sort((a,b) => b.hp - a.hp)[0];
              if (top) txt = currentLang === "CZ" ? `${top.name} dominuje aréně s ${Math.floor(Math.max(0, top.hp))} body! Jděte po něm!` : `${top.name} dominates the arena with ${Math.floor(Math.max(0, top.hp))} points! Go after them!`;
          } else { arr = currentLang === "CZ" ? COMMENTARY_GENERAL.CZ : COMMENTARY_GENERAL.EN; }
      }
              
      if (txt === "" && arr && arr.length > 0) {
          let attempts = 0; 
          do { txt = random(arr); attempts++; } while (txt === lastCommentString && attempts < 5);
          if (players.length === 1 && txt) txt = txt.replace("{p}", players[0].name);
      }
              
      if (txt) {
          lastCommentString = txt; 
          speakTTS(txt);
          nextCommentTime = millis() + random(8000, 15000); 
      } else {
          nextCommentTime = millis() + 2000;
      }
  }
}

function draw() {
  // Plynulá změna barvy (Anti-Bot TikTok ochrana)
  colorMode(HSB, 360, 100, 100);
  let dynamicBg = color((frameCount * 0.05) % 360, 45, 8); 
  background(dynamicBg);
  colorMode(RGB, 255);
  
  drawTopHUD();

  fill(10, 12, 15, 230); // Průhledný podklad arény
  noStroke(); rect(0, ARENA_BOT, W, H - ARENA_BOT);
  drawNotifications(); 
  drawChatCommands();

  stroke(roundThemeColor); strokeWeight(2); noFill(); rect(2, ARENA_TOP, W-4, ARENA_BOT - ARENA_TOP);

  if (gameState === "PLAYING") drawSpaceshipTimer();

  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);
  drawingContext.clip();

  drawSpaceBackground();
  
  // Temné pozadí při Slow-mo Nuke efektu
  if (nukeEffectTimer > 0) {
      nukeEffectTimer--;
      let alpha = constrain(map(nukeEffectTimer, 120, 0, 220, 0), 0, 220);
      fill(0, 0, 0, alpha);
      rect(-W, -H, W * 3, H * 3);
      if (nukeEffectTimer <= 0) engine.timing.timeScale = 1.0;
  }

  try { Matter.Engine.update(engine, 1000/60); } catch(e) {} 
  
  processCombatQueue();

  if (gameState === "PLAYING" || gameState === "EXPLODING" || gameState === "RESULTS") {
    if (gameState === "PLAYING") {
        handleSecretCode();
        handleCameraAndPlayers(); 
        handleSpawnModules();
    } else {
        screenShake *= 0.95; 
        for (let p of players) {
            if (p.body) {
                Matter.Body.setVelocity(p.body, {x: 0, y: 0});
            }
        }
    }
    
    push();
    translate(W/2, (ARENA_TOP + ARENA_BOT)/2);
    scale(cameraScale);
    if (screenShake > 0.5) translate(random(-screenShake, screenShake), random(-screenShake, screenShake));
    translate(-W/2, -(ARENA_TOP + ARENA_BOT)/2);
    
    if(players.length < 50) { drawDeathShockwaves(); }
    if(players.length < 60) { drawLightnings(); }
    
    if (gameState === "PLAYING" && activeEvent === "MAGNET") {
        let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
        push(); translate(cx, cy); rotate(frameCount * 0.1); noStroke();
        let pulse = sin(frameCount * 0.2) * 20;
        fill(20, 0, 40, 150); ellipse(0, 0, 200 + pulse);
        fill(10, 0, 20, 200); ellipse(0, 0, 120 + pulse);
        fill(0); ellipse(0, 0, 60);
        stroke(100, 50, 255, 150); strokeWeight(4);
        for(let i=0; i<4; i++) {
            let a = i * HALF_PI;
            arc(0, 0, 100 + pulse, 100 + pulse, a, a + QUARTER_PI);
        }
        pop();
    }

    if (gameState === "PLAYING") {
        handleOrbs();
    }
    
    let sortedToDraw = [...players].sort((a,b) => a.r - b.r);
    sortedToDraw.forEach(p => drawPlayer(p));
    
    if (particles.length > 80) particles.splice(0, particles.length - 80);
    if (floatingTexts.length > 25) floatingTexts.splice(0, floatingTexts.length - 25);
    
    drawParticles();
    drawPopups();
    pop();

    if (gameState !== "RESULTS") {
        updateTimers();
        if (gameState === "PLAYING") handleTTSCommentary();
    }
  } 
  
  if (gameState === "RESULTS") {
    drawResults();
  }
  
  drawingContext.restore(); 
  drawSecretCodeUI();
}

function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data); let evt = d?.event || d?.type || ""; let n = d?.data?.nickname || d?.data?.uniqueId || "Anonym";
      if (n === "Anonym") return;
      let u = n.substring(0, 15);
      
      let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
      if (imgUrl && !userAvatars[u]) loadImage(imgUrl, img => { userAvatars[u] = img; }, () => {});
      
      if (evt === "follow") {
          addNotification('FOLLOW', u, userAvatars[u]);
      }
      
      if (!players.find(x => x.name === u) && evt !== "gift") {
          spawnPlayer(u, getStartingHp(u));
          addNotification('JOIN', u, userAvatars[u]); // Nový štítek pro připojení
      }

      if (evt === "chat") {
          let msg = (d?.data?.comment || "").trim();
          let msgLower = msg.toLowerCase();
          let p = players.find(x => x.name === u);
          
          if (p && msgLower.startsWith("!boost") && p.boostCooldown <= 0) {
              p.boostCooldown = 60 * 60; // 60 vteřin cooldown
              p.orbSpeedTimer = Math.max(p.orbSpeedTimer, 2.5 * 60); // 2.5 sekundy speed boost
              createParticles(p.body.position.x, p.body.position.y, color(0,255,255), 20);
              addPopup("BOOST!", p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
              safePlaySound(600, 0.1, 0.1);
              addNotification('BOOST', u, userAvatars[u]);
          }
          else if (p && msgLower.startsWith("!shield") && p.shieldCooldown <= 0) {
              p.shieldCooldown = 60 * 60; // 60 vteřin cooldown
              p.immunityTimer = Math.max(p.immunityTimer, 2.5 * 60); // 2.5 sekundy štít
              addPopup("SHIELD!", p.body.position.x, p.body.position.y - p.r, color(100, 50, 255));
              safePlaySound(800, 0.1, 0.2);
              addNotification('SHIELD', u, userAvatars[u]);
          }
          else if (!p && msgLower === "!join") {
              let m = spawnModules.find(x => x.name === u);
              if (!m) {
                  let baseHp = getStartingHp(u);
                  spawnPlayer(u, baseHp);
                  addNotification('JOIN', u, userAvatars[u]);
                  speakTTS(currentLang === "CZ" ? `Hráč ${u} se oživil a vrátil se do bitvy!` : `Player ${u} has respawned and joined the battle!`);
              }
          }

          if (codeActive && msg.toUpperCase() === secretCode) {
              codeActive = false;
              lastCodeWinner = { name: u, img: userAvatars[u] };
              nextCodeTime = millis() + random(30000, 60000);
              let reward = isUltraCode ? 3000 : 1500;
                handleAction(u, reward, false, 0, true);
              addPopup(isUltraCode ? "ULTRA CODE CRACKED!" : "CODE CRACKED!", W/2, H/2, color(255, 215, 0), true);
              speakTTS(currentLang === "CZ" ? `Hráč ${u} prolomil ${isUltraCode ? "ultra" : "tajný"} kód!` : `Player ${u} cracked the ${isUltraCode ? "ultra" : "secret"} code!`);
              createParticles(W/2, H/2, color(255, 215, 0), 100);
          }
            handleAction(u, 10, false, 0, false); 
      }
      else if (evt === "like") {
          let likesCount = d.data?.likeCount || 1;
          sessionLikes[u] = (sessionLikes[u] || 0) + likesCount;
          
          if(!pendingLikes[u]) pendingLikes[u] = { count: 0, lastUpdate: millis() };
          pendingLikes[u].count += likesCount;
          pendingLikes[u].lastUpdate = millis();

          // Plynulé přidávání HP bez zátěže (řeší lagy)
          let p = players.find(x => x.name === u);
          if (p) {
              p.hp += likesCount * 2;
          } else {
              if(!spawnModules.find(x => x.name === u)) {
                  handleAction(u, likesCount * 2, false, 0, true);
              }
          }
      }
      else if (evt === "gift") { 
          let diam = d?.data?.diamonds || 1;
            handleAction(u, 0, true, diam, true); 
          let col = players.find(x=>x.name===u)?.color || color(255);
          updateGiftLB(u, diam, col);
          
          if (!roundGifts[u]) roundGifts[u] = { score: 0, color: col, avatar: userAvatars[u] || null };
          roundGifts[u].score += diam;
          if (userAvatars[u]) roundGifts[u].avatar = userAvatars[u];

          if (diam >= 1000) {
              let msg = random(COMMENTARY_GIFT[currentLang]).replace("{p}", u);
              speakTTS(msg);
          } else {
              let giftMsgsCZ = [
                  "Obrovské díky, " + u + "! Tvá energie je naprosto úžasná!",
                  "Páni, " + u + " nám posílá nádhernou podporu! Moc děkujeme!",
                  "Vesmír jásá! Děkujeme ti, " + u + ", za tvoji štědrost!",
                  "Neuvěřitelné! " + u + " je opravdová hvězda arény. Děkujeme moc!"
              ];
              let giftMsgsEN = [
                  "Massive thanks, " + u + "! Your energy is absolutely amazing!",
                  "Wow, " + u + " is sending beautiful support! Thank you so much!",
                  "The universe rejoices! Thank you, " + u + ", for your generosity!",
                  "Incredible! " + u + " is a true star of the arena. Thank you very much!"
              ];
              speakTTS(currentLang === "CZ" ? random(giftMsgsCZ) : random(giftMsgsEN)); 
          }
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function removeDiacritics(text) {
    return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function speakTTS(txt) {
  if (!audioStarted || !('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking) return; 
  
  // Očištění od emoji
  let cleanTxt = txt.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F910}-\u{1F96B}\u{1F970}-\u{1F99F}]/gu, '');
  
  // 1. KONTROLA VULGARIT
  let textWithoutDiacritics = removeDiacritics(cleanTxt.toLowerCase());
  for (let word of FORBIDDEN_WORDS) {
      if (textWithoutDiacritics.includes(word)) {
          console.log("TTS zablokováno (vulgarita): " + cleanTxt);
          return; // Zastaví čtení
      }
  }

  // 2. OPRAVA VÝSLOVNOSTI
  cleanTxt = cleanTxt.replace(/ú ú ú/gi, "bum bum bum");
  
  var msg = new SpeechSynthesisUtterance(cleanTxt); 
  msg.lang = currentLang === "CZ" ? "cs-CZ" : "en-US"; 
  msg.rate = 1.15; 
  msg.pitch = 1.2; 
  window.speechSynthesis.speak(msg);
}

function mousePressed() {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  if (mouseX > allTimeLbRect.x && mouseX < allTimeLbRect.x + allTimeLbRect.w && mouseY > allTimeLbRect.y && mouseY < allTimeLbRect.y + allTimeLbRect.h) { 
      allTimeHpLeaderboard = {}; 
      localStorage.removeItem('galaxinko_alltime_hp');
      safePlaySound(200, 0.1, 0.5); 
  }
  if (mouseX > giftLbRect.x && mouseX < giftLbRect.x + giftLbRect.w && mouseY > giftLbRect.y && mouseY < giftLbRect.y + giftLbRect.h) { 
      allTimeGifts = {}; 
      localStorage.removeItem('galaxinko_alltime_gifts');
      safePlaySound(200, 0.1, 0.5); 
  }
  if (mouseX > killsLbRect.x && mouseX < killsLbRect.x + killsLbRect.w && mouseY > killsLbRect.y && mouseY < killsLbRect.y + killsLbRect.h) { 
      allTimeKills = {}; 
      localStorage.removeItem('galaxinko_alltime_kills');
      safePlaySound(200, 0.1, 0.5); 
  }
}
