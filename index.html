  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0; background-color: #020204;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden; font-family: 'Press Start 2P', cursive;
    }
    /* TikTok 9:16 rozlišení */
    #game-container {
      position: relative; width: 720px; height: 1280px;
      box-shadow: 0 0 80px rgba(0, 255, 255, 0.15);
      transform-origin: top left;
      transform: scale(min(window.innerHeight / 1280, window.innerWidth / 720));
      background: #030306;
    }
    canvas { display: block; }
    
    #admin-bar {
      position: absolute; top: 0; left: 0; width: 100%; height: 50px;
      background: rgba(0,0,0,0.9); display: flex; align-items: center; gap: 8px;
      padding: 0 10px; box-sizing: border-box; z-index: 100;
      border-bottom: 2px solid #00ffff;
    }
    #admin-bar button {
      background: #2196F3; color: white; border: 2px solid #fff; padding: 5px 8px;
      cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 9px;
      border-radius: 4px; text-shadow: 1px 1px 0 #000; transition: all 0.2s;
    }
    #admin-bar button:hover { background: #00ffff; color: #000; border-color: #000; text-shadow: none; }
    #admin-bar .lang-btn { background: #ff9800; }
    #admin-bar .reset-btn { background: #f44336; }
  </style>
</head>

<script>

    "Epický souboj tancujících pil!", "Tady se mažou jména z historie a tvoří se legendy!",
    "Bez lajků jste jen potrava pro ostatní kruhy!", "Taková pecka a on se ještě drží na mapě!",
    "Pošlete dárek a udělejte ze sebe nezastavitelného boha!", "Všichni se sráží do jednoho velkého chumlu!",
    "Taktika tu nepomůže, tady rozhoduje hrubá síla a vaše lajky!", "Tyhle pily by přeřízly i křižník!",
    "Jeden letí tam, druhý sem... naprostý chaos!", "Zásah, potopeno! Kdo si půjde pro další ránu?",
    "Lajkujte jako o život, nebo se váš kruh rozpadne v prach!", "Neuvěřitelná rychlost! Roztočte to ještě víc!",
    "Tohle je přesně ta vesmírná mela, na kterou jsme čekali!", "Krutá srážka dvou titánů!",
    "Vesmírný bumerang v praxi, tohle je slušná jízda!", "Štíty jiskří, plechy praskají, tohle je Galaxinko Wars!",
    "Tenhle souboj je napínavější než cokoliv, co jsem dneska viděl!"
  ],
  EN: [
    "Ouch, that had to hurt!", "Incredible impact!", "Like it up or get crushed!", "Sparks are flying!",
    "Who will survive this massacre?", "What a brawl!", "Spinning to the max!",
    "Wow, threw him away like dirty laundry!", "This is live space demolition!",
    "Tap the screen or your favorite will be wiped off the map!", "They heard that crash all the way to Mars!",
    "Heavy hits! No wimps survive here!", "Took that one right in the core!",
    "Rev up those saws! We want to see more damage!", "If you're not tapping, you're not playing!",
    "A glowing shield won't last forever, send likes!", "Look at those bounces, absolute madness!",
    "We are writing this round in the history books!", "Someone stop these giant spinning monsters!",
    "Whoever has the biggest gear rules the arena!", "Here comes a crushing blow from the right!",
    "An epic battle of dancing saws!", "Names are erased and legends are born right here!",
    "Without likes, you're just food for the others!", "What a hit, and they're still spinning!",
    "Send a gift and become an unstoppable god!", "Everyone is crashing into one massive pile!",
    "Tactics won't help, raw power and likes decide here!", "These saws could cut through a cruiser!",
    "One flies here, another there... pure chaos!", "Direct hit! Who's taking the next punch?",
    "Like for your life, or your circle turns to dust!", "Unbelievable speed! Spin it even faster!",
    "This is exactly the space brawl we were waiting for!", "Cruel collision between two titans!",
    "Space boomerang in action, what a ride!", "Shields sparking, metal breaking, this is Galaxinko Wars!",
    "This fight is more thrilling than anything I've seen today!"
  ]
};

let engine, world;
let players = [];
let particles = [];
let floatingTexts = [];
let lightnings = [];
let userAvatars = {};

// Systém poškození (Žebříčky)
let allTimeDamageLeaderboard = {};
let roundDamageLeaderboard = {};
let allTimeLbRect = {x: 10, y: ARENA_TOP + 10, w: 200, h: 30};

// Vesmírné efekty
let stars = [];
let nebulas = [];
let shootingStars = [];

let roundTimer = 0;
let gameState = "PLAYING"; 
let resultsTimer = 10;
let cameraScale = 1.0;
let audioStarted = false;
let synth;

let nextCommentTime = 0;
let lastHitSound = 0;

const TIKFINITY_URL = "ws://localhost:21213/";
let socket;
const TEST_NAMES = ["PixelKing", "RetroZ", "Void", "Nebula", "StarLord", "Glitch", "Cosmos", "Apollo"];

function setup() {
  let cvs = createCanvas(W, H);
  cvs.parent('game-container');
  smooth();
  noCursor();
  
  synth = new p5.PolySynth();
  synth.setADSR(0.01, 0.1, 0.2, 0.1);
  
  engine = Matter.Engine.create({ enableSleeping: false });
  world = engine.world;
  world.gravity.y = 0; 
  world.gravity.x = 0;
  
  // Zdi arény
  let wallOpts = { isStatic: true, restitution: 1.0, friction: 0 };
  Matter.World.add(world, [
    Matter.Bodies.rectangle(W/2, ARENA_TOP - 25, W, 50, wallOpts),
    Matter.Bodies.rectangle(W/2, ARENA_BOT + 25, W, 50, wallOpts),
    Matter.Bodies.rectangle(-25, (ARENA_TOP+ARENA_BOT)/2, 50, ARENA_BOT-ARENA_TOP, wallOpts),
    Matter.Bodies.rectangle(W+25, (ARENA_TOP+ARENA_BOT)/2, 50, ARENA_BOT-ARENA_TOP, wallOpts)
  ]);

  generateSpaceBackground();
  
  setupEvents();
  startNewRound();
  connectTikfinity();
}

function generateSpaceBackground() {
  stars = [];
  nebulas = [];
  shootingStars = [];
  
  for(let i=0; i<150; i++) {
    stars.push({
        x: random(W), y: random(ARENA_TOP, ARENA_BOT), 
        s: random(1, 3.5), speed: random(0.1, 1.0),
        color: color(random(150, 255), random(200, 255), 255, random(100, 200))
    });
  }
  
  for(let i=0; i<6; i++) {
    nebulas.push({
        x: random(W), y: random(ARENA_TOP, ARENA_BOT),
        r: random(200, 600),
        color: color(random(50, 150), random(0, 100), random(150, 255), random(10, 30))
    });
  }
}

function startNewRound() {
  players.forEach(p => Matter.World.remove(world, p.body));
  
  let oldPlayers = players.map(p => p.name);
  players = [];
  roundDamageLeaderboard = {}; // Reset poškození za kolo
  
  oldPlayers.forEach(name => spawnPlayer(name, 200));

  roundTimer = floor(random(180, 900)); 
  gameState = "PLAYING";
  cameraScale = 1.0;
  particles = [];
  floatingTexts = [];
  lightnings = [];
  nextCommentTime = millis() + random(8000, 15000);
  generateSpaceBackground();
}

function setupEvents() {
  document.getElementById('langBtn').onclick = (e) => {
    currentLang = currentLang === "CZ" ? "EN" : "CZ";
    e.target.innerText = "LANG: " + currentLang;
  };
  document.getElementById('tJoin').onclick = () => {
    handleAction(random(TEST_NAMES) + floor(random(99)), 200);
  };
  document.getElementById('tLike').onclick = () => {
    if(players.length > 0) handleAction(random(players).name, floor(random(50, 150)));
    else document.getElementById('tJoin').click();
  };
  document.getElementById('tGift').onclick = () => {
    if(players.length > 0) handleAction(random(players).name, 5000);
  };
  document.getElementById('tChat').onclick = () => {
    speakTTS("Sputnik: Zpráva přijata!");
  };
  document.getElementById('resetBtn').onclick = () => startNewRound();

  Matter.Events.on(engine, 'collisionStart', (event) => {
    let playedSoundThisFrame = false;
    event.pairs.forEach(pair => {
      let p1 = players.find(p => p.body === pair.bodyA);
      let p2 = players.find(p => p.body === pair.bodyB);
      if(p1 && p2) {
          handleCombat(p1, p2);
          if (!playedSoundThisFrame && audioStarted && millis() - lastHitSound > 100) {
              try { fxSynth.play(random([800, 1000, 1200]), 0.02, 0, 0.1); } catch(e){} // Kovový zvuk srážky
              lastHitSound = millis();
              playedSoundThisFrame = true;
          }
      }
    });
  });
}

function formatK(num) {
  let safeNum = Math.max(0, num || 0);
  if (safeNum >= 1000000) return (safeNum / 1000000).toFixed(1) + 'M';
  if (safeNum >= 1000) return (safeNum / 1000).toFixed(1) + 'K';
  return Math.floor(safeNum).toString();
}

function getRadius(hp) {
    let safeHp = Math.max(0, hp || 0); 
    return Math.min(32 + Math.sqrt(safeHp) * 0.5, 110); 
}

function spawnPlayer(name, hp) {
  let safeHp = Math.max(0, hp || 200);
  let r = getRadius(safeHp);
  let body = Matter.Bodies.circle(random(50, W-50), random(ARENA_TOP+50, ARENA_BOT-50), r, {
    restitution: 0.95, frictionAir: 0.0, friction: 0, density: 0.001
  });
  
  Matter.Body.setVelocity(body, { x: random(-3.5, 3.5), y: random(-3.5, 3.5) });
  
  let player = {
    name: name, hp: safeHp, body: body, r: r,
    color: color(random(100,255), random(100,255), random(100,255)),
    rot: 0, auraFlash: 0,
    baseRotDir: random() < 0.5 ? 1 : -1, // Jen směr rotace
    noiseOffsetX: random(1000), noiseOffsetY: random(2000),
    damageDealt: 0 
  };
  
  players.push(player);
  Matter.World.add(world, body);
  speakTTS(T[currentLang].NEW + name);
  createParticles(body.position.x, body.position.y, player.color, 15);
  if(audioStarted) try{ synth.play(440, 0.05, 0, 0.1); }catch(e){}
}

function handleAction(name, amount) {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  let p = players.find(x => x.name === name);
  if(p) {
    p.hp += amount;
    p.auraFlash = 15; 
    let newR = getRadius(p.hp);
    if (newR > p.r + 0.5) {
        let scale = newR / p.r;
        Matter.Body.scale(p.body, scale, scale);
        p.r = newR;
        Matter.Body.setDensity(p.body, 0.001 + (newR * 0.0001));
    }
    addPopup("+" + amount, p.body.position.x, p.body.position.y - p.r, color(50, 255, 100));
  } else {
    spawnPlayer(name, 200 + amount);
  }
}

function updateDamageLB(name, dmg, col) {
    let ava = userAvatars[name];
    if (!roundDamageLeaderboard[name] || dmg > roundDamageLeaderboard[name].score) {
        roundDamageLeaderboard[name] = { score: dmg, color: col, avatar: ava };
    }
    if (!allTimeDamageLeaderboard[name] || dmg > allTimeDamageLeaderboard[name].score) {
        allTimeDamageLeaderboard[name] = { score: dmg, color: col, avatar: ava };
    }
}

function handleCombat(p1, p2) {
  let speed = Matter.Vector.magnitude(Matter.Vector.sub(p1.body.velocity, p2.body.velocity));
  if (speed < 1.0) return; 

  let safeHp1 = Math.max(1, p1.hp);
  let safeHp2 = Math.max(1, p2.hp);

  let dmg1 = Math.max(1, Math.floor((Math.log10(safeHp2) * 3 + speed * 1.5)));
  let dmg2 = Math.max(1, Math.floor((Math.log10(safeHp1) * 3 + speed * 1.5)));
  
  p1.hp -= dmg1;
  p2.hp -= dmg2;

  p1.damageDealt += dmg2;
  p2.damageDealt += dmg1;

  updateDamageLB(p1.name, p1.damageDealt, p1.color);
  updateDamageLB(p2.name, p2.damageDealt, p2.color);
  
  let cx = (p1.body.position.x + p2.body.position.x)/2;
  let cy = (p1.body.position.y + p2.body.position.y)/2;

  // Aktivní odskok od sebe
  let forceDir = Matter.Vector.normalise(Matter.Vector.sub(p2.body.position, p1.body.position));
  let forceMag = 0.02 + speed * 0.004;
  Matter.Body.applyForce(p1.body, p1.body.position, Matter.Vector.mult(forceDir, -forceMag * p1.body.mass));
  Matter.Body.applyForce(p2.body, p2.body.position, Matter.Vector.mult(forceDir, forceMag * p2.body.mass));
  
  lightnings.push({x1: p1.body.position.x, y1: p1.body.position.y, x2: p2.body.position.x, y2: p2.body.position.y, life: 10, c: color(255, 255, 0)});

  // Vizuální efekty poškození
  createParticles(cx, cy, color(255, 200, 50), 12); 
  addPopup("-" + dmg1, p1.body.position.x, p1.body.position.y, color(255, 80, 80));
  addPopup("-" + dmg2, p2.body.position.x, p2.body.position.y, color(255, 80, 80));
}

function draw() {
  background(3, 4, 8); 
  
  drawTopHUD();

  fill(10, 12, 15); noStroke();
  rect(0, ARENA_BOT, W, H - ARENA_BOT);
  fill(50); textAlign(CENTER, CENTER); textSize(16);
  text(T[currentLang].DAYZ_SPACE, W/2, ARENA_BOT + (H - ARENA_BOT)/2);

  stroke(0, 150, 255, 100); strokeWeight(2); noFill();
  rect(2, ARENA_TOP, W-4, ARENA_BOT - ARENA_TOP);

  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);
  drawingContext.clip();

  drawSpaceBackground();
  Matter.Engine.update(engine, 1000/60);

  if (gameState === "PLAYING") {
    handleCameraAndPlayers();
    
    push();
    translate(W/2, (ARENA_TOP + ARENA_BOT)/2);
    scale(cameraScale);
    translate(-W/2, -(ARENA_TOP + ARENA_BOT)/2);
    
    drawLightnings();
    let sortedToDraw = [...players].sort((a,b) => a.r - b.r);
    sortedToDraw.forEach(p => drawPlayer(p));
    
    drawParticles();
    drawPopups();
    pop();

    updateTimers();
    handleTTSCommentary();
    drawLeaderboards(); // Vykreslení žebříčků přímo nad arénou
  } else {
    drawResults();
  }
  
  drawingContext.restore(); 
}

function handleTTSCommentary() {
  if (millis() > nextCommentTime) {
      let txt = "";
      if (players.length === 0) {
          txt = random(COMMENTARY_EMPTY[currentLang]);
      } else if (players.length === 1) {
          txt = random(COMMENTARY_SOLO[currentLang]).replace("{p}", players[0].name);
      } else {
          txt = random(COMMENTARY[currentLang]);
          if (random() < 0.3) {
              let top = [...players].sort((a,b) => b.hp - a.hp)[0];
              if (top) {
                  txt = currentLang === "CZ" ? 
                      `${top.name} dominuje aréně s ${formatK(Math.max(0, top.hp))} životy! Sundejte ho!` : 
                      `${top.name} dominates the arena with ${formatK(Math.max(0, top.hp))} HP! Take them down!`;
              }
          }
      }
      speakTTS(txt);
      nextCommentTime = millis() + random(12000, 20000);
  }
}

function drawTopHUD() {
  fill(8, 10, 18); noStroke();
  rect(0, HUD_TOP, W, ARENA_TOP - HUD_TOP);
  
  textAlign(LEFT, CENTER);
  drawingContext.shadowBlur = 10; drawingContext.shadowColor = color(0, 255, 255);
  fill(0, 255, 255); textSize(18); textStyle(BOLD);
  text(GAME_TITLE, 20, HUD_TOP + 30);
  drawingContext.shadowBlur = 0;
  fill(150); textSize(10); textStyle(NORMAL);
  text(GAME_VERSION, 20, HUD_TOP + 55);

  textAlign(CENTER, CENTER);
  let timeStr = nf(floor(roundTimer/60),2) + ":" + nf(roundTimer%60,2);
  fill(100, 255, 100); textSize(32); textStyle(BOLD);
  if (roundTimer <= 30 && roundTimer % 2 === 0) fill(255, 50, 50);
  text(timeStr, W/2, HUD_TOP + 40);
  fill(150); textSize(10); textStyle(NORMAL);
  text(T[currentLang].TIME, W/2, HUD_TOP + 15);
}

function drawLeaderboards() {
    // 1. ALL-TIME TOP 5 DMG (NALEVO)
    let allTimeSorted = Object.entries(allTimeDamageLeaderboard).sort((a,b) => b[1].score - a[1].score).slice(0, 5);
    push();
    translate(10, ARENA_TOP + 10);
    allTimeLbRect = {x: 10, y: ARENA_TOP + 10, w: 200, h: 30};
    
    fill(0, 0, 20, 180); stroke(0, 255, 255, 100); strokeWeight(2);
    rect(0, 0, 200, 35 + allTimeSorted.length * 28, 8);
    
    // Hover efekt pro smazání
    if (mouseX > allTimeLbRect.x && mouseX < allTimeLbRect.x + allTimeLbRect.w && mouseY > allTimeLbRect.y && mouseY < allTimeLbRect.y + allTimeLbRect.h) {
        fill(255, 50, 50, 200);
    } else {
        fill(0, 255, 255);
    }
    
    noStroke(); textAlign(CENTER, CENTER); textSize(10); textStyle(BOLD);
    text(currentLang === "CZ" ? "ALL-TIME TOP 5 DMG" : "ALL-TIME TOP 5 DMG", 100, 15);
    stroke(0, 255, 255, 80); strokeWeight(1); line(10, 25, 190, 25);
    
    textAlign(LEFT, CENTER);
    for(let i=0; i<allTimeSorted.length; i++) {
        let pName = allTimeSorted[i][0];
        let pData = allTimeSorted[i][1];
        let y = 40 + i * 28;
        fill(pData.color); textSize(9);
        text((i+1)+".", 10, y);
        if (pData.avatar && pData.avatar !== "loaded") {
            drawingContext.save(); drawingContext.beginPath();
            drawingContext.arc(35, y, 8, 0, TWO_PI); drawingContext.clip();
            image(pData.avatar, 35, y, 16, 16);
            drawingContext.restore();
            text(pName.substring(0,8), 50, y);
        } else {
            text(pName.substring(0,10), 30, y);
        }
        textAlign(RIGHT, CENTER); fill(255);
        text(formatK(pData.score), 190, y);
        textAlign(LEFT, CENTER);
    }
    pop();

    // 2. ROUND TOP 20 DMG (NAPRAVO - První 3 staticky, 17 scrolluje)
    let roundSorted = Object.entries(roundDamageLeaderboard).sort((a,b) => b[1].score - a[1].score).slice(0, 20);
    if (roundSorted.length > 0) {
        push();
        let rbWidth = 210;
        let visibleCount = Math.min(roundSorted.length, 8); // 3 pevné + max 5 rolovacích zobrazeno
        translate(W - rbWidth - 10, ARENA_TOP + 10);
        
        fill(0, 0, 20, 180); stroke(0, 255, 255, 100); strokeWeight(2);
        rect(0, 0, rbWidth, 35 + visibleCount * 28, 8);
        
        fill(0, 255, 255); noStroke(); textAlign(CENTER, CENTER); textSize(10); textStyle(BOLD);
        text(currentLang === "CZ" ? "TOP 20 KOLA (DMG)" : "ROUND TOP 20 (DMG)", rbWidth/2, 15);
        stroke(0, 255, 255, 80); strokeWeight(1); line(10, 25, rbWidth-10, 25);
        
        textAlign(LEFT, CENTER);
        
        // Top 3 pevné
        for(let i=0; i<Math.min(roundSorted.length, 3); i++) {
            let pName = roundSorted[i][0];
            let pData = roundSorted[i][1];
            let y = 40 + i * 28;
            fill(pData.color); textSize(9);
            text((i+1)+".", 10, y);
            if (pData.avatar && pData.avatar !== "loaded") {
                drawingContext.save(); drawingContext.beginPath();
                drawingContext.arc(35, y, 8, 0, TWO_PI); drawingContext.clip();
                image(pData.avatar, 35, y, 16, 16);
                drawingContext.restore();
                text(pName.substring(0,8), 50, y);
            } else {
                text(pName.substring(0,10), 30, y);
            }
            textAlign(RIGHT, CENTER); fill(255);
            text(formatK(pData.score), rbWidth - 10, y);
            textAlign(LEFT, CENTER);
        }

        // Zbytek rolující (4-20)
        if (roundSorted.length > 3) {
            let scrollArr = roundSorted.slice(3);
            let scrollIndex = 0;
            if (scrollArr.length > 5) {
                // Přesun o jednu položku každou cca 1.5 vteřinu
                scrollIndex = floor(frameCount / 90) % scrollArr.length; 
            }
            for(let j=0; j<Math.min(scrollArr.length, 5); j++) {
                let actualIdx = (scrollIndex + j) % scrollArr.length;
                let pName = scrollArr[actualIdx][0];
                let pData = scrollArr[actualIdx][1];
                let rank = 3 + actualIdx + 1; // 4. a dále
                let y = 40 + (3 + j) * 28;
                
                fill(pData.color); textSize(9);
                text(rank+".", 10, y);
                if (pData.avatar && pData.avatar !== "loaded") {
                    drawingContext.save(); drawingContext.beginPath();
                    drawingContext.arc(35, y, 8, 0, TWO_PI); drawingContext.clip();
                    image(pData.avatar, 35, y, 16, 16);
                    drawingContext.restore();
                    text(pName.substring(0,8), 50, y);
                } else {
                    text(pName.substring(0,10), 30, y);
                }
                textAlign(RIGHT, CENTER); fill(180); // Lehce ztmavené pro rolovací sekci
                text(formatK(pData.score), rbWidth - 10, y);
                textAlign(LEFT, CENTER);
            }
        }
        pop();
    }
}

function drawSpaceBackground() {
  noStroke();
  nebulas.forEach(n => {
     fill(n.color);
     ellipse(n.x, n.y, n.r); 
  });

  stars.forEach(s => {
    fill(s.color);
    rect(s.x, s.y, s.s, s.s);
    s.y += s.speed;
    if (s.y > ARENA_BOT) { s.y = ARENA_TOP; s.x = random(W); }
  });

  if (random() < 0.03) {
      shootingStars.push({
          x: random(W), y: ARENA_TOP, 
          vx: random(-15, 15), vy: random(15, 30), 
          life: 255, length: random(20, 60)
      });
  }

  shootingStars.forEach((s, i) => {
      stroke(255, 255, 255, s.life); strokeWeight(2);
      line(s.x, s.y, s.x - s.vx * (s.length/10), s.y - s.vy * (s.length/10));
      s.x += s.vx; s.y += s.vy; s.life -= 15;
      if (s.life <= 0 || s.y > ARENA_BOT) shootingStars.splice(i, 1);
  });
  noStroke();
}

function handleCameraAndPlayers() {
  if (players.length === 0) { cameraScale = lerp(cameraScale, 1.0, 0.05); return; }
  
  let minX = W, maxX = 0, minY = ARENA_BOT, maxY = ARENA_TOP;
  let targetSpeed = 2.5;
  
  for (let i = players.length - 1; i >= 0; i--) {
    let p = players[i];
    
    if (p.hp <= 0) {
      createParticles(p.body.position.x, p.body.position.y, p.color, 40);
      if(audioStarted) try{ synth.play(100, 0.1, 0, 0.4); }catch(e){}
      Matter.World.remove(world, p.body);
      players.splice(i, 1);
      continue;
    }
    
    if (p.hp >= 5000 && frameCount % 30 === (i % 30)) {
      let range = p.r + 150;
      for (let other of players) {
        if (other === p || other.hp <= 0) continue;
        let d = dist(p.body.position.x, p.body.position.y, other.body.position.x, other.body.position.y);
        if (d < range) {
          let safeHp = Math.max(1, p.hp);
          let dmg = Math.floor(Math.log10(safeHp) * 8 + 10);
          other.hp -= dmg;
          
          p.damageDealt += dmg;
          updateDamageLB(p.name, p.damageDealt, p.color);
          
          lightnings.push({x1: p.body.position.x, y1: p.body.position.y, x2: other.body.position.x, y2: other.body.position.y, life: 15, c: p.color});
          createParticles(other.body.position.x, other.body.position.y, p.color, 5);
          addPopup("-" + dmg, other.body.position.x, other.body.position.y, color(255, 50, 50));
          if(audioStarted && random() < 0.2) try{ synth.play(1200, 0.02, 0, 0.1); }catch(e){}
          break; 
        }
      }
    }
    
    p.noiseOffsetX += 0.02; p.noiseOffsetY += 0.02;
    let wanderX = (noise(p.noiseOffsetX) - 0.5) * 0.0001 * p.body.mass;
    let wanderY = (noise(p.noiseOffsetY) - 0.5) * 0.0001 * p.body.mass;
    Matter.Body.applyForce(p.body, p.body.position, { x: wanderX, y: wanderY });

    if (frameCount % 10 === (i % 10)) attractToNearest(p);

    let currentSpeed = Matter.Vector.magnitude(p.body.velocity);
    if (currentSpeed > 0.1) {
        let factor = targetSpeed / currentSpeed;
        Matter.Body.setVelocity(p.body, { 
            x: lerp(p.body.velocity.x, p.body.velocity.x * factor, 0.1), 
            y: lerp(p.body.velocity.y, p.body.velocity.y * factor, 0.1) 
        });
    }

    minX = min(minX, p.body.position.x - p.r);
    maxX = max(maxX, p.body.position.x + p.r);
    minY = min(minY, p.body.position.y - p.r);
    maxY = max(maxY, p.body.position.y + p.r);
  }

  let pW = maxX - minX;
  let pH = maxY - minY;
  let targetScale = min(1.0, min((W-80)/max(pW, 1), (ARENA_BOT-ARENA_TOP-80)/max(pH, 1)));
  cameraScale = lerp(cameraScale, Math.max(0.4, targetScale), 0.03);
}

function attractToNearest(p) {
  let closest = null; let minDist = Infinity;
  for(let other of players) {
    if(other === p) continue;
    let d = dist(p.body.position.x, p.body.position.y, other.body.position.x, other.body.position.y);
    if(d < minDist && d < 400) { minDist = d; closest = other; } 
  }
  if(closest) {
    let force = Matter.Vector.sub(closest.body.position, p.body.position);
    let norm = Matter.Vector.normalise(force);
    Matter.Body.applyForce(p.body, p.body.position, Matter.Vector.mult(norm, 0.00005 * p.body.mass));
  }
}

function drawLightnings() {
  for(let i = lightnings.length - 1; i >= 0; i--) {
    let l = lightnings[i];
    stroke(red(l.c), green(l.c), blue(l.c), l.life * 15);
    strokeWeight(l.life * 0.3);
    noFill();
    beginShape();
    vertex(l.x1, l.y1);
    let segs = 3;
    for(let j = 1; j < segs; j++) {
        vertex(lerp(l.x1, l.x2, j/segs) + random(-15, 15), lerp(l.y1, l.y2, j/segs) + random(-15, 15));
    }
    vertex(l.x2, l.y2);
    endShape();
    l.life--;
    if(l.life <= 0) lightnings.splice(i, 1);
  }
}

function drawPlayer(p) {
  let pos = p.body.position;
  let safeHp = Math.max(0, p.hp);
  
  // Rychlost rotace úměrná počtu lajků/HP (Začíná velmi pomalu)
  let rotSpd = (0.01 + Math.min(safeHp * 0.00001, 0.3)) * p.baseRotDir;
  p.rot += rotSpd;

  push();
  translate(pos.x, pos.y);
  rotate(p.rot);
  
  let glowAlpha = p.auraFlash > 0 ? p.auraFlash * 15 : 40;
  fill(red(p.color), green(p.color), blue(p.color), glowAlpha);
  noStroke();
  ellipse(0, 0, p.r * 2.4);
  if(p.auraFlash > 0) p.auraFlash--;

  if (p.hp >= 1000) {
    fill(160, 165, 170); stroke(80); strokeWeight(2);
    ellipse(0, 0, p.r * 1.9); 
    
    let teeth = 12 + Math.floor(safeHp / 2000);
    fill(190, 195, 200); noStroke();
    for(let i=0; i<teeth; i++) {
        let a = i * TWO_PI/teeth;
        let a2 = a + TWO_PI/teeth * 0.4;
        triangle(
            cos(a)*p.r*0.9, sin(a)*p.r*0.9,
            cos(a)*p.r*1.3, sin(a)*p.r*1.3,
            cos(a2)*p.r*0.9, sin(a2)*p.r*0.9
        );
    }
  } else {
    fill(20, 25, 30); stroke(p.color); strokeWeight(3);
    let teeth = 8 + Math.floor(safeHp / 200);
    beginShape();
    for(let i=0; i<teeth*2; i++) {
        let a = i * PI/teeth;
        let rad = (i%2===0) ? p.r : p.r*0.85;
        vertex(cos(a)*rad, sin(a)*rad);
    }
    endShape(CLOSE);
  }

  // Zruší rotaci pro fotku a text
  rotate(-p.rot); 
  
  let imgSize = p.r * 1.6;
  if (userAvatars[p.name] && userAvatars[p.name] !== "loaded") {
      drawingContext.save(); drawingContext.beginPath();
      drawingContext.arc(0, 0, imgSize / 2, 0, TWO_PI); 
      drawingContext.clip();
      imageMode(CENTER); image(userAvatars[p.name], 0, 0, imgSize, imgSize);
      drawingContext.restore();
  } else {
      fill(35); noStroke(); ellipse(0, 0, imgSize);
  }

  noFill(); stroke(0, 150); strokeWeight(3); ellipse(0, 0, imgSize);

  rectMode(CENTER); noStroke(); fill(0, 0, 0, 160);
  let hpTxtSize = Math.max(10, p.r * 0.35);
  rect(0, p.r * 0.25, p.r * 1.4, hpTxtSize + 6, 5); 

  if (p.r > 25) {
      let nameTxtSize = Math.max(7, p.r * 0.22);
      rect(0, -p.r * 0.3, p.r * 1.2, nameTxtSize + 4, 3); 
  }
  rectMode(CORNER);

  let txtCol = color(255);
  if (p.hp > 50000) txtCol = color(100, 255, 100);
  else if (p.hp > 10000) txtCol = color(255, 255, 0);

  fill(txtCol); textAlign(CENTER, CENTER); textStyle(BOLD);
  textSize(hpTxtSize);
  text(formatK(Math.floor(safeHp)), 0, p.r * 0.25); 

  if (p.r > 25) {
      fill(220); textStyle(NORMAL);
      textSize(Math.max(7, p.r * 0.22)); 
      text(p.name.substring(0, 8), 0, -p.r * 0.3); 
  }
  pop();
}

function createParticles(x, y, c, count) {
  let actualCount = players.length > 50 ? Math.floor(count/2) : count;
  for(let i=0; i<actualCount; i++) particles.push({x: x, y: y, vx: random(-5,5), vy: random(-5,5), life: 255, c: c});
}

function drawParticles() {
  noStroke();
  for(let i=particles.length-1; i>=0; i--) {
    let p = particles[i];
    fill(red(p.c), green(p.c), blue(p.c), p.life);
    rect(p.x, p.y, 4, 4);
    p.x += p.vx; p.y += p.vy; p.life -= 15; 
    if(p.life <= 0) particles.splice(i, 1);
  }
}

function addPopup(txt, x, y, c) {
  floatingTexts.push({txt: txt, x: x, y: y, life: 255, c: c, vy: -1.5});
}

function drawPopups() {
  for(let i=floatingTexts.length-1; i>=0; i--) {
    let f = floatingTexts[i];
    stroke(0, f.life); strokeWeight(3);
    fill(red(f.c), green(f.c), blue(f.c), f.life);
    textSize(14); textAlign(CENTER); textStyle(BOLD); text(f.txt, f.x, f.y);
    f.y += f.vy; f.life -= 8;
    if(f.life <= 0) floatingTexts.splice(i, 1);
  }
  textStyle(NORMAL);
}

function updateTimers() {
  if (frameCount % 60 === 0 && roundTimer > 0) {
    roundTimer--;
    if (roundTimer <= 0) gameState = "RESULTS";
  }
}

function drawResults() {
  background(0, 220);
  textAlign(CENTER, CENTER);
  
  fill(0, 255, 255); textSize(30); textStyle(BOLD);
  text(T[currentLang].ROUND_END, W/2, ARENA_TOP + 150);
  
  let winner = [...players].sort((a,b) => b.hp - a.hp)[0];
  if(winner) {
    fill(255); textSize(18); textStyle(NORMAL);
    text(T[currentLang].WINNER, W/2, ARENA_TOP + 230);
    fill(winner.color); textSize(24); textStyle(BOLD);
    text(winner.name + "\n" + formatK(floor(Math.max(0, winner.hp))) + " HP", W/2, ARENA_TOP + 290);
    textStyle(NORMAL);
    
    if (userAvatars[winner.name] && userAvatars[winner.name] !== "loaded") {
      imageMode(CENTER);
      stroke(winner.color); strokeWeight(5); noFill();
      rect(W/2 - 60, ARENA_TOP + 340, 120, 120, 10);
      image(userAvatars[winner.name], W/2, ARENA_TOP + 400, 110, 110);
    }
  }
  
  fill(255); textSize(14);
  text(T[currentLang].NEXT + resultsTimer + "s", W/2, ARENA_BOT - 100);
  
  if (frameCount % 60 === 0) {
    resultsTimer--;
    if (resultsTimer <= 0) {
      resultsTimer = 10;
      startNewRound();
    }
  }
}

// --- TIKFINITY A TTS ---
function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data);
      let evt = d?.event || d?.type || "";
      let u = (d?.data?.nickname || d?.data?.uniqueId || "Anonym").substring(0, 15).trim();
      if (u === "Anonym") return;

      let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
      if (imgUrl && !userAvatars[u]) loadImage(imgUrl, img => { userAvatars[u] = img; }, () => {});

      if (!players.find(x => x.name === u)) {
          spawnPlayer(u, 200);
      }

      if (evt === "chat") {
          handleAction(u, 10);
      } else if (evt === "like") {
          handleAction(u, (d.data?.likeCount || 1) * 2);
      } else if (evt === "gift") {
          handleAction(u, (d?.data?.diamonds || 1) * 500);
          speakTTS("Díky " + u + " za dárek!");
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function speakTTS(txt) {
  if (!audioStarted || !('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking) return; 
  let msg = new SpeechSynthesisUtterance(txt);
  msg.lang = currentLang === "CZ" ? "cs-CZ" : "en-US";
  msg.rate = 1.1;
  window.speechSynthesis.speak(msg);
}

function mousePressed() {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  // Smazání ALL-TIME žebříčku kliknutím na nadpis
  if (mouseX > allTimeLbRect.x && mouseX < allTimeLbRect.x + allTimeLbRect.w && 
      mouseY > allTimeLbRect.y && mouseY < allTimeLbRect.y + allTimeLbRect.h) {
      allTimeDamageLeaderboard = {};
      if(audioStarted) try{ synth.play(200, 0.1, 0, 0.5); }catch(e){}
  }
}
