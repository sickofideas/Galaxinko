function updateTimers() {
  if (frameCount % 60 === 0) {
      currentTop10 = [...players].sort((a,b) => b.hp - a.hp).slice(0, 10).map(p => p.name);
  }

  for (let p of players) {
      // 1. Odečet imunity
      if (p.immunityTimer > 0) {
          p.immunityTimer--;
          if (p.immunityTimer <= 0) {
              safePlaySound(300, 0.1, 0.5);
              createParticles(p.body.position.x, p.body.position.y, color(0, 255, 255), 40);
              p.hasCrown = false; 
          }
      }
      
      // 2. DAŇ Z VELIKOSTI (Gravitační rozpad)
      if (frameCount % 60 === 0 && p.hp > 2000 && !p.hasCrown && !p.isZombie) {
          let isExtremeLoad = players.length > 60;
          let decay = Math.floor(p.hp * 0.015); // Ztrácí 1.5 % ze své velikosti KAŽDOU VTEŘINU
          p.hp -= decay;
          if (!isExtremeLoad) {
              addPopup("-" + decay + " GRAVITY", p.body.position.x, p.body.position.y, color(150, 150, 150));
          }
      }
  }
  
  if (gameState === "PLAYING") {
      if (activeEvent) {
          eventTimer--;
          if (eventTimer <= 0) {
              if (activeEvent === "BOUNTY" && bountyTarget) {
                  let bp = players.find(p => p.name === bountyTarget);
                  if (bp) bp.isBounty = false;
              }
              activeEvent = null;
              bountyTarget = null;
              nextEventTime = millis() + random(60000, 150000);
          } else if (activeEvent === "BOUNTY" && bountyTarget) {
              let bp = players.find(p => p.name === bountyTarget);
              if (bp && bp.body) {
                  for (let p of players) {
                      if (!p.body || p === bp) continue;
                      let dx = bp.body.position.x - p.body.position.x;
                      let dy = bp.body.position.y - p.body.position.y;
                      let distSq = dx*dx + dy*dy;
                      let dist = Math.sqrt(distSq) || 1;
                      let forceMag = 0.0001 * p.body.mass;
                      Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
                  }
              }
          } else if (activeEvent === "MAGNET") {
              let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
              for (let p of players) {
                  if (!p.body) continue;
                  let dx = cx - p.body.position.x;
                  let dy = cy - p.body.position.y;
                  let distSq = dx*dx + dy*dy;
                  let dist = Math.sqrt(distSq) || 1;
                  
                  // Vizuální vylepšení a ochrana: Černá díra hráče roztáčí do víru, ne jen natvrdo do středu
                  let pullForce = 0.00012 * p.body.mass; // Oslabený tah přímo do středu
                  let swirlForce = 0.00035 * p.body.mass; // Silná rotace kolem dokola tvořící vír
                  
                  let fx = (dx/dist)*pullForce - (dy/dist)*swirlForce;
                  let fy = (dy/dist)*pullForce + (dx/dist)*swirlForce;
                  Matter.Body.applyForce(p.body, p.body.position, { x: fx, y: fy });

                  // SMRTÍCÍ EFEKT PRO GIGANTY V ČERNÉ DÍŘE
                  if (frameCount % 30 === 0 && p.hp > 3000 && distSq < 35000) { // Zvětšen radius, protože vír je drží dál
                      let shred = Math.floor(p.hp * 0.15); // Ustřihne jim to 15 %!
                      p.hp -= shred;
                      addPopup("SHREDDED!", p.body.position.x, p.body.position.y, color(255, 0, 0), true);
                      createParticles(p.body.position.x, p.body.position.y, color(150, 0, 255), 20);
                      screenShake = 5;
                      safePlaySound(150, 0.05, 1.0);
                  }
              }
          }
      // ZAKÁZÁNO: Náhodné události bez interakce
      // } else if (millis() > nextEventTime && players.length > 2) {
      //     triggerRandomEvent();
      }
  }

  if (gameState === "PLAYING" && roundTimerFrames > 0) {
    if (roundTimerPause > 0) {
        roundTimerPause--; // Pokud se spamuje na startu, odpočet čeká
    } else {
        roundTimerFrames--;
    }
    
    // ZAKÁZÁNO: Náhodné spawnování bonusových orbů
    // if (bonusFrames.includes(roundTimerFrames)) { shootBonusFromShip(); }
    
    if (frameCount % 60 === 0) roundTimer = Math.ceil(roundTimerFrames / 60);

    if (roundTimerFrames <= 0) {
        gameState = "EXPLODING"; explosionTimer = 90; screenShake = 40; 
        codeActive = false; // Zruší probíhající hádání kódu
        
        safePlaySound(80, 0.5, 0.8); setTimeout(() => { safePlaySound(60, 0.8, 1.0); }, 200);
        
        let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
        deathShockwaves.push({x: cx, y: cy, r: 80, color: color(0, 255, 255), life: 255, isNuke: true});
        deathShockwaves.push({x: cx, y: cy, r: 150, color: color(255, 100, 0), life: 255, isNuke: true});
        createParticles(cx, cy, color(0, 255, 255), 100); 
        createParticles(cx, cy, color(255, 100, 0), 100);

        // Epický zpomalený odhoz všech hráčů do stran
        for (let p of players) {
            if (!p.body) continue;
            let dx = p.body.position.x - cx; let dy = p.body.position.y - cy; let dist = Math.sqrt(dx*dx + dy*dy) || 1;
            let forceMag = 0.2 * p.body.mass; // Masivní odhazovací síla
            Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
        }
        
        engine.timing.timeScale = 0.2; // Slow-mo pro epický závěr
    }
  } else if (gameState === "EXPLODING") {
      explosionTimer--; screenShake *= 0.95;
      if (explosionTimer <= 0) { 
          gameState = "RESULTS"; 
          let donorCount = Object.keys(roundGifts).length;
          maxResultsTimer = Math.min(16, 8 + Math.floor(donorCount / 2));
          resultsTimer = maxResultsTimer; 
          winnerAnnounced = false;
      } 
  }
  
  // ZPRACOVÁNÍ NASTŘÁDANÝCH LAJKŮ (Ochrana výkonu)
  let nowTime = millis();
  for (let u in pendingLikes) {
      let data = pendingLikes[u];
      
      // Dynamický limit: čím víc lidí, tím víc lajků je potřeba na efekt
      let reqLikes = players.length > 30 ? 100 : 50; 
      let timeLimit = players.length > 30 ? 2000 : 1000;

      // Odpal až při splnění dynamického limitu
      if (data.count >= reqLikes || (data.count > 0 && nowTime - data.lastUpdate > timeLimit)) {
          let amount = data.count;
          let isMega = amount >= reqLikes;

          let p = players.find(x => x.name === u);
          if (p) {
              p.likeBuffTimer = 90;
              if (players.length < 50) {
                  addPopup("+" + (amount * 2), p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
                  // Méně částic = méně lagů, typ ENERGY
                  createParticles(p.body.position.x, p.body.position.y, color(255, 215, 0), isMega ? 8 : 3, 'ENERGY');
              }
              
              if (p.hp >= 200) {
                  // Zvuk pily (jemný, hlubší, mechanický rachtavý zvuk)
                  safePlaySound(random(100, 150), 0.005, 0.1);
              } else {
                  safePlaySound(random([400, 500, 600, 700]), 0.01, 0.1);
              }
          }

          if (amount >= 5) {
              let existingNotif = notifications.find(n => n.type === 'LIKE' && n.name === u && (n.state === 'WAITING' || n.state === 'DISPLAY'));
              if (existingNotif) {
                  existingNotif.extra += amount;
                  existingNotif.age = 0; // Reset věku pro setrvání na obrazovce
                  if (existingNotif.extra >= 50) existingNotif.isMegaLike = true;
              } else {
                  addNotification('LIKE', u, userAvatars[u], amount, isMega);
              }
          }
          data.count = 0; 
      }
  }

  // ZOMBIE COOLDOWN (Vystřelení po 20 vteřinách)
  let alivePlayersCount = players.filter(p => !p.isZombie).length;
  let activeZombiesCount = players.filter(p => p.isZombie).length;

  for (let i = deadPlayersQueue.length - 1; i >= 0; i--) {
      if (millis() - deadPlayersQueue[i].timeOfDeath > deadPlayersQueue[i].respawnDelay) {
          let zName = deadPlayersQueue[i].name;
          // Pokud hráč náhodou už nehraje (např. nedal hned !join)
            if (!players.find(x => x.name === zName)) {
              if (alivePlayersCount < 25 && activeZombiesCount < 15) {
                      spawnPlayer(zName, 50, false, 0, true); // true = isZombie, menší HP
                  activeZombiesCount++;
                  deadPlayersQueue.splice(i, 1);
                          break; // PŘIDÁNO: Zastaví cyklus. Další mrtvý se spawne až v dalším framu!
              } else {
                  // Pokud je na ploše už dost hráčů, odložíme spawn tohoto zombíka o 5 vteřin
                  deadPlayersQueue[i].timeOfDeath += 5000;
              }
          } else {
              // Hráč se už připojil jako živý, mažeme z fronty mrtvých
              deadPlayersQueue.splice(i, 1);
          }
      }
  }
}

      let curH = ph * anim;
      
      push();

      rect(px - 45, bY - curH, 90, curH, 10, 10, 0, 0);
      
      fill(pcol); noStroke(); textSize(24); textAlign(CENTER, CENTER); textStyle(BOLD);

          } else {
              fill(p.color); noStroke(); ellipse(px, imgY, imgSize);
          }
          noFill(); stroke(pcol); strokeWeight(3); ellipse(px, imgY, imgSize);

          fill(p.color); noStroke(); textSize(i===0 ? 14 : 11); textStyle(BOLD); textAlign(CENTER, BOTTOM);

          fill(255); textSize(i===0 ? 12 : 10);

      }
  }

  let mvpArr = Object.entries(roundGifts).sort((a,b)=>b[1].score - a[1].score);

      let donorY = bY + 60;

      rect(20, donorY, W - 40, 130, 15);

      fill(255, 215, 0); noStroke(); textSize(15); textAlign(CENTER, TOP); textStyle(BOLD);
      text(currentLang === "CZ" ? "💎 DÁRCI TOHOTO KOLA 💎" : "💎 ROUND GIFTERS 💎", W/2, donorY + 15);

      let cardW = 180;

      if (totalW > W - 60) {
          let availableFrames = maxResultsTimer * 60;
          let neededSpeed = (totalW + W) / availableFrames;
          let speed = Math.max(1.5, neededSpeed); 
          scrollX = (frameCount * speed) % (totalW + W);
      }

      drawingContext.save();
      drawingContext.beginPath();
      drawingContext.rect(25, donorY + 40, W - 50, 80);

    textAlign(RIGHT, CENTER); fill(255); textStyle(BOLD); text(Math.floor(Math.max(0, p.hp)).toLocaleString(), W/2 + 180, yPos); textAlign(LEFT, CENTER); 
  }
  
  let timerY = ARENA_BOT - 40; 
  fill(0, 0, 0, 220); stroke(255, 50, 50); strokeWeight(2); rect(W/2 - 150, timerY - 20, 300, 40, 10);
  noStroke(); fill(255); textSize(14); textAlign(CENTER, CENTER); textStyle(BOLD); text(T[currentLang].NEXT + " " + resultsTimer + "s", W/2, timerY); textStyle(NORMAL);
  
  if (frameCount % 60 === 0) { resultsTimer--; if (resultsTimer <= 0) { maxResultsTimer = 8; resultsTimer = 8; startNewRound(); } } 
}

function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data); let evt = d?.event || d?.type || ""; let n = d?.data?.nickname || d?.data?.uniqueId || "Anonym";
      if (n === "Anonym") return;
      let u = n.substring(0, 15);
      
      let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
      if (imgUrl && !userAvatars[u]) loadImage(imgUrl, img => { userAvatars[u] = img; }, () => {});
      
      if (evt === "follow") {
          playFollowSound();
          addNotification('FOLLOW', u, userAvatars[u]);
      }
      
      if (!players.find(x => x.name === u) && evt !== "gift") {
          spawnPlayer(u, getStartingHp(u));
          addNotification('JOIN', u, userAvatars[u]); // Nový štítek pro připojení
      }

      if (evt === "chat") {
          let msg = (d?.data?.comment || "").trim();
          let msgLower = msg.toLowerCase();
          let p = players.find(x => x.name === u);
          
          // Oživení zombíka při jakémkoliv chatu
          if (p && p.isZombie) {
              reviveZombie(p);
          }

          playChatSound();

          if (p && (msgLower.startsWith("!boost") || msgLower.startsWith("boost")) && p.boostCooldown <= 0) {
              p.boostCooldown = 60 * 60; // 60 vteřin cooldown
              p.orbSpeedTimer = Math.max(p.orbSpeedTimer, 2.5 * 60); // 2.5 sekundy speed boost
              createParticles(p.body.position.x, p.body.position.y, color(0,255,255), 20);
              addPopup("BOOST!", p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
              safePlaySound(600, 0.1, 0.1);
              addNotification('BOOST', u, userAvatars[u]);
          }
          else if (p && (msgLower.startsWith("!shield") || msgLower.startsWith("shield")) && p.shieldCooldown <= 0) {
              p.shieldCooldown = 60 * 60; // 60 vteřin cooldown
              p.immunityTimer = Math.max(p.immunityTimer, 2.5 * 60); // 2.5 sekundy štít
              addPopup("SHIELD!", p.body.position.x, p.body.position.y - p.r, color(100, 50, 255));
              safePlaySound(800, 0.1, 0.2);
              addNotification('SHIELD', u, userAvatars[u]);
          }
          else if (p && (msgLower.startsWith("!repost") || msgLower.startsWith("repost")) && !p.hasUsedRepost) {
              p.hasUsedRepost = true; // Lze použít jen jednou za život/kolo
              p.hp += 500;
              p.likeBuffTimer = 180; // Dlouhý vizuální buff
              addPopup("REPOST BONUS!", p.body.position.x, p.body.position.y - p.r, color(255, 215, 0));
              createParticles(p.body.position.x, p.body.position.y, color(255, 215, 0), 50);
              safePlaySound(1000, 0.2, 0.5);
          speakTTS(currentLang === "CZ" ? `Hráč ${u} objevil skrytý bonus!` : `Player ${u} found a hidden bonus!`);
              addNotification('BOOST', u, userAvatars[u], "REPOST"); 
          }
          else if (!p && (msgLower === "!join" || msgLower === "join")) {
              let baseHp = getStartingHp(u);
              spawnPlayer(u, baseHp);
              addNotification('JOIN', u, userAvatars[u]);
              speakTTS(currentLang === "CZ" ? `Hráč ${u} se oživil a vrátil se do bitvy!` : `Player ${u} has respawned and joined the battle!`);
          }

          if (codeActive && msg.toUpperCase() === secretCode) {
              codeActive = false;
              lastCodeWinner = { name: u, img: userAvatars[u] };
              nextCodeTime = millis() + random(45000, 85000);

              let p = players.find(x => x.name === u);
              let cType = typeof codeType !== 'undefined' ? codeType : "HP";
              if (cType === "HP") {
                  let reward = isUltraCode ? 750 : 375;
                  handleAction(u, reward, false, 0, true);
              } else if (cType === "BOOST") {
                  if (p) { p.orbSpeedTimer = Math.max(p.orbSpeedTimer, 5 * 60); p.hp += 250; } 
                  else handleAction(u, 250, false, 0, true);
              } else if (cType === "SHIELD") {
                  if (p) { p.immunityTimer = Math.max(p.immunityTimer, 5 * 60); p.hp += 250; } 
                  else handleAction(u, 250, false, 0, true);
              }
              
              addPopup(isUltraCode ? "ULTRA CODE CRACKED!" : "CODE CRACKED!", W/2, H/2, color(255, 215, 0), true);
              speakTTS(currentLang === "CZ" ? `Hráč ${u} prolomil kód!` : `Player ${u} cracked the code!`, true);
              createParticles(W/2, H/2, color(255, 215, 0), 100);
          }
            handleAction(u, 10, false, 0, false); 
      }
      else if (evt === "like") {
          let likesCount = d.data?.likeCount || 1;
          sessionLikes[u] = (sessionLikes[u] || 0) + likesCount;
          
          if(!pendingLikes[u]) pendingLikes[u] = { count: 0, lastUpdate: millis() };
          pendingLikes[u].count += likesCount;
          pendingLikes[u].lastUpdate = millis();

          // Plynulé přidávání HP bez zátěže (řeší lagy)
          let p = players.find(x => x.name === u);
          if (p) {
              if (p.isZombie) reviveZombie(p); // Oživení při liku
              p.hp += likesCount * 2;
          } else {
              handleAction(u, likesCount * 2, false, 0, true);
          }
      }
      else if (evt === "gift") { 
          let diam = d?.data?.diamonds || d?.data?.coins || 1;
          playDonateSound();
          
          // --- 1. FOMO PROGRESS (Sčítání pro všechny) ---
          lastEnergyAddedTime = millis();
          roundTotalCoins += diam;

          // --- PŘIDÁNO: PRODLOUŽENÍ KOLA (1 coin = 1s) ---
          roundTimerFrames += diam * 60;
          
          if (roundTimerFrames >= maxRoundTimer * 60) {
              roundTimerFrames = maxRoundTimer * 60; // Zastropuje se, neprodlužuje max délku kola
              roundTimerPause = 60; // 1 vteřina čekání po posledním donatu na startovní čáře
          }
          
          roundTimer = Math.ceil(roundTimerFrames / 60);
          let wPos = screenToWorld(shipX, shipY);
          addPopup("🌹 +" + diam + "s", wPos.x + random(-20, 20), wPos.y - random(30, 60), color(255, 50, 100), true);

          // Fading logic pro posledniho donatora
          if (currentLastGifter.name === "") {
              currentLastGifter = {name: u, coins: diam, img: userAvatars[u]};
              gifterFadeAlpha = 255;
          } else {
              nextLastGifter = {name: u, coins: diam, img: userAvatars[u]};
          }

          if (roundTotalCoins >= ARMAGEDDON_GOAL && !globalArmageddonActive) {
              globalArmageddonActive = true;
              arenaRedTimer = 60 * 120; // 2 minuty krve pro všechny!
              screenShake = 50;
              addPopup("🚨 GLOBAL ARMAGEDDON UNLOCKED! 🚨", W/2, H/2, color(255, 0, 0), true);
              safePlaySound(150, 0.8, 1.0); 
              speakTTS(currentLang === "CZ" ? "Komunitní cíl splněn! Globální Armagedon odemčen!" : "Community goal reached! Global Armageddon unlocked!", true);
          }

          // 1. Zpracování TOP Giftera
          if (diam > topGifter.coins) {
              topGifter = { name: u, coins: diam };
              safePlaySound(1000, 0.4, 0.8); // Zvuk pro změnu krále
              topGifterBannerTimer = 600; // 10 vteřin zablokuje běžné notifikace!
          } else if (diam >= 100) {
              topGifterBannerTimer = 300; // 5 vteřin zablokuje běžné notifikace
          }

          // --- 2. COMBO MULTIPLIKÁTOR (Jen pro dárky 100+ mincí) ---
          let comboMult = 1;
          if (diam >= 100) {
              if (!roundGiftStreaks[u]) roundGiftStreaks[u] = 0;
              roundGiftStreaks[u]++;
              comboMult = roundGiftStreaks[u];
          }

          // Tohle zajistí spawn i provedení fyzických efektů (Armagedon, Nuke, Black Hole...)
          handleAction(u, 0, true, diam, true, comboMult); 
          let p = players.find(x => x.name === u);
          
          if (p) {
              // Legenda status
              if (comboMult >= 3 && !p.isLegendary) {
                  p.isLegendary = true;
                  addPopup("🌟 LEGENDARY SPONSOR! 🌟", p.body.position.x, p.body.position.y - 60, color(255, 215, 0), true);
              }

              // Aplikace nových speciálních vlastností z TIER SYSTÉMU
              if (diam >= 10000) {
                  p.isGodMode = true;
                  p.godModeTimer = 60 * 60; // 60 vteřin
                  p.hasRainbowCrown = true;
                  p.hasFireTrail = true;
                  arenaRedTimer = Math.max(arenaRedTimer, 60 * 60); // Aréna zčervená na minutu!
              } else if (diam >= 5000) {
                  p.hasRainbowCrown = true;
                  p.hasFireTrail = true; // Zůstane navždy
              }
          }

          let col = p ? p.color : color(255);
          updateGiftLB(u, diam, col);
          
          if (!roundGifts[u]) roundGifts[u] = { score: 0, color: col, avatar: userAvatars[u] || null };
          roundGifts[u].score += diam;
          if (userAvatars[u]) roundGifts[u].avatar = userAvatars[u];

          addNotification('GIFT', u, userAvatars[u], diam);

          if (diam >= 1000) {
              let msg = random(COMMENTARY_GIFT[currentLang]).replace("{p}", u);
              speakTTS(msg, true);
          } else {
              let giftMsgsCZ = [
                  "Obrovské díky, " + u + "! Tvá energie je naprosto úžasná!",
                  "Páni, " + u + " nám posílá nádhernou podporu! Moc děkujeme!",
                  "Vesmír jásá! Děkujeme ti, " + u + ", za tvoji štědrost!",
                  "Neuvěřitelné! " + u + " je opravdová hvězda arény. Děkujeme moc!"
              ];
              let giftMsgsEN = [
                  "Massive thanks, " + u + "! Your energy is absolutely amazing!",
                  "Wow, " + u + " is sending beautiful support! Thank you so much!",
                  "The universe rejoices! Thank you, " + u + ", for your generosity!",
                  "Incredible! " + u + " is a true star of the arena. Thank you very much!"
              ];
              speakTTS(currentLang === "CZ" ? random(giftMsgsCZ) : random(giftMsgsEN), true); 
          }
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function removeDiacritics(text) {
    return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function speakTTS(txt, force = false) {
  if (!('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking) return; 
  
  // Omezovač proti spamu (Pokud to není vynucené, čeká aspoň 12 vteřin mezi běžnými promluvami)
  if (!force && millis() - lastSpeakTime < 12000) return;
  
  // Očištění od emoji
  let cleanTxt = txt.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F910}-\u{1F96B}\u{1F970}-\u{1F99F}]/gu, '');
  
  // MAXIMÁLNÍ OCHRANA: Odstraní diakritiku a SMAŽE všechny mezery, tečky a pomlčky
  // Tím TTS chytne i jména jako "n i g e r", "n.e.g.r", "p.i.c.a"
  let checkText = removeDiacritics(cleanTxt.toLowerCase()).replace(/[\s\.\-_]/g, "");
  
  for (let word of FORBIDDEN_WORDS) {
      if (checkText.includes(word)) {
          console.log("TTS ZABLOKOVÁNO (Ochrana proti banu): " + cleanTxt);
          return; // Zastaví čtení
      }
  }

  // 2. OPRAVA VÝSLOVNOSTI
  cleanTxt = cleanTxt.replace(/ú ú ú/gi, "bum bum bum");
  
  // Explicitní čtení vykřičníku u herních příkazů
  let exclamWord = currentLang === "CZ" ? "vykřičník " : "exclamation mark ";
  cleanTxt = cleanTxt.replace(/!(join|boost|shield)/gi, exclamWord + "$1");
  
  var msg = new SpeechSynthesisUtterance(cleanTxt); 
  msg.lang = currentLang === "CZ" ? "cs-CZ" : "en-US"; 
  
  // HUMANIZE: Náhodné odchylky v rychlosti a výšce hlasu pro každý proslov
  msg.rate = random(1.05, 1.25); 
  msg.pitch = random(0.9, 1.2); 
  
  window.speechSynthesis.speak(msg);
  lastSpeakTime = millis();
}

function mousePressed() {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  // Reset FOMO baru manuálně po kliknutí kamkoli do prostoru lišty
  if (mouseY > ARENA_TOP + 10 && mouseY < ARENA_TOP + 60 && mouseX > W/2 - (W*0.85)/2 && mouseX < W/2 + (W*0.85)/2) {
      roundTotalCoins = 0;
      globalArmageddonActive = false;
      arenaRedTimer = 0;
      currentLastGifter = {name: "", coins: 0, img: null};
      nextLastGifter = null;
      safePlaySound(200, 0.1, 0.5);
      return;
  }

  if (showLeaderboards) {
      if (mouseX > allTimeLbRect.x && mouseX < allTimeLbRect.x + allTimeLbRect.w && mouseY > allTimeLbRect.y && mouseY < allTimeLbRect.y + allTimeLbRect.h) { 
          allTimeHpLeaderboard = {}; 
          localStorage.removeItem('galaxinko_alltime_hp');
          safePlaySound(200, 0.1, 0.5); 
      }
          if (mouseX > giftLbRect.x && mouseX < giftLbRect.x + giftLbRect.w && mouseY > giftLbRect.y && mouseY < giftLbRect.y + giftLbRect.h) { 
              allTimeGifts = {}; 
              localStorage.removeItem('galaxinko_alltime_gifts');
              safePlaySound(200, 0.1, 0.5); 
          }
          if (mouseX > killsLbRect.x && mouseX < killsLbRect.x + killsLbRect.w && mouseY > killsLbRect.y && mouseY < killsLbRect.y + killsLbRect.h) { 
              allTimeKills = {}; 
              localStorage.removeItem('galaxinko_alltime_kills');
              safePlaySound(200, 0.1, 0.5); 
          }
  }
}
