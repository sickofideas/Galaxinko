      } else {
          fill(0, 255, 0);
          stroke(borderColor); 
          strokeWeight(1.5);
          drawingContext.shadowBlur = 0;
      }
      
      // VykreslenĂ­ zkosenĂ©ho rĂˇmeÄŤku (Sci-fi panel)
      beginShape();
      vertex(8, 0);
      vertex(170, 0);
      vertex(170, 36);
      vertex(162, 44);
      vertex(0, 44);
      vertex(0, 8);
      endShape(CLOSE);
      drawingContext.shadowBlur = 0; 
      
      let currentAvatar = userAvatars[n.name] || n.img;
      let avSize = 28;
      if (currentAvatar && currentAvatar !== "loaded") {
          imageMode(CENTER);
          image(currentAvatar, 22, 22, avSize, avSize);
      } else {
          fill(80); noStroke(); ellipse(22, 22, avSize, avSize);
      }
      
      textAlign(LEFT, CENTER);
      fill(255); textSize(11); textStyle(BOLD); noStroke();
      text((n.name || "").substring(0, 11), 42, 14);
      
      let actionTextColor = borderColor;
      if (n.type === 'LIKE' && n.extra >= 100) {
          colorMode(HSB); actionTextColor = color((frameCount * 8) % 360, 80, 100); colorMode(RGB);
      } else if (n.type === 'LIKE' && n.isMegaLike) {
          actionTextColor = color(255, 215, 0); 
      } else if (n.type === 'GIFT') {
          colorMode(HSB); actionTextColor = color((frameCount * 5 + 180) % 360, 80, 100); colorMode(RGB);
      }
      
      fill(actionTextColor); noStroke();
      textSize(10);
      text(`${icon} ${actionText}`, 42, 30);
      textStyle(NORMAL); // Reset
      
      pop();
  }
  
  notifications = notifications.filter(n => !(n.state === 'LEAVING' && n.x < -200));
}

function drawChatCommands() {
    // Funkci nechĂˇme prĂˇzdnou.
    // Texty "TAP TAP" a "!join" jsme smazali, aby TikTok AI nemohla dĂˇt ban za "Engagement Bait".
}

function handleCameraAndPlayers() {
  if (players.length === 0) { cameraScale = lerp(cameraScale, 1.0, 0.05); return; }
  
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let isHeavyLoad = players.length > 80;    // DĹ™Ă­vÄ›jĹˇĂ­ Ăşleva pro grafiku
  let isExtremeLoad = players.length > 120;  // DĹ™Ă­vÄ›jĹˇĂ­ Ăşleva pro grafiku
  let maxV = 4; // SNĂŤĹ˝ENO (z 5)
  
  for (let i = players.length - 1; i >= 0; i--) {
    let p = players[i];
    
    if (!p.isZombie) updateHpLB(p.name, p.hp, p.color);

    let bx = p.body ? p.body.position.x : 0;
    let by = p.body ? p.body.position.y : 0;
    if (!p.body || isNaN(bx) || isNaN(by) || bx < -10000 || bx > W+10000 || by < -10000 || by > H+10000) {
        p.hp = 0; 
    }
    
    if (p.boostCooldown > 0) p.boostCooldown--;
    if (p.shieldCooldown > 0) p.shieldCooldown--;
    if (p.attackCooldown > 0) p.attackCooldown--;

    let targetR = getRadius(p.hp);
    if (Math.abs(targetR - p.r) > 1.0 && p.body && p.hp > 0) {
        let s = targetR / p.r;
        if (isFinite(s) && s > 0) {
            Matter.Body.scale(p.body, s, s);
            p.r = targetR;
            Matter.Body.setDensity(p.body, 0.001 + (p.r * 0.0001));
            // DynamickĂ˝ odpor: VÄ›tĹˇĂ­ koule majĂ­ niĹľĹˇĂ­ frictionAir pro lepĹˇĂ­ "prĹŻraznost"
            p.body.frictionAir = 0.06 - Math.min(0.04, Math.sqrt(p.hp) * 0.0004);
        }
    }
    
    if (!isExtremeLoad && p.hp > 0) {
        p.trail.push({x: p.body.position.x, y: p.body.position.y});
        if (p.trail.length > 8) p.trail.shift();
    } else {
        p.trail = [];
    }
    
    if (p.hp <= 0) {
      // PĹIDĂNO: ZapsĂˇnĂ­ do fronty na oĹľivenĂ­ (jen pokud dal hrĂˇÄŤ alespoĹ jeden like)
      if (sessionLikes[p.name] > 0) {
          deadPlayersQueue.push({name: p.name, timeOfDeath: millis(), respawnDelay: 20000 + random(500, 20000)}); // 20s cooldown + nĂˇhodnĂ˝ ÄŤas (0.5s - 20s)
      }
      
      if (p.body && !isNaN(p.body.position.x)) {
          let px = p.body.position.x;
          let py = p.body.position.y;

          // EFEKT GRANĂTU: OdstrÄŤenĂ­ nejbliĹľĹˇĂ­ch hrĂˇÄŤĹŻ
          for (let other of players) {
              if (other === p || !other.body) continue;
              let dx = other.body.position.x - px;
              let dy = other.body.position.y - py;
              let distSq = dx*dx + dy*dy;
              let effectRadius = p.r + 150; // Dosah exploze zvĂ˝Ĺˇen pro vÄ›tĹˇĂ­ dopad
              let effectRadiusSq = effectRadius * effectRadius;
              
              if (distSq < effectRadiusSq && distSq > 0) {
                  let dist = Math.sqrt(distSq); // PotĹ™ebujeme pro vĂ˝poÄŤet sĂ­ly
                  let forceMag = 0.012 * other.body.mass * (effectRadius / dist); // SĂ­la zvĂ˝Ĺˇena
                  forceMag = Math.min(forceMag, 0.12 * other.body.mass); // Max odhoz zvĂ˝Ĺˇen
                  Matter.Body.applyForce(other.body, other.body.position, {
                      x: (dx / dist) * forceMag,
                      y: (dy / dist) * forceMag
                  });

                  // --- ODSTRANÄšNO: POĹ KOZENĂŤ OKOLĂŤ (ZpĹŻsobovalo Ĺ™etÄ›zovou reakci a "pĂˇd" arĂ©ny) ---
              }
          }

          if (!isHeavyLoad) {
              if (p.isZombie) {
                  createParticles(px, py, color(0, 255, 255), 20); // ZmÄ›nÄ›no ze zelenĂ© na azurovou pro Chroma Key
                  safePlaySound(pentatonic('low'), 0.01, 0.2); 
              } else {
                  createParticles(px, py, p.color, 35); // VĂ­ce ÄŤĂˇstic pro hrĂˇÄŤe
                  deathShockwaves.push({x: px, y: py, r: p.r, color: p.color, life: 255});
                  safePlaySound(pentatonic('low'), 0.01, 0.15);
              }
          }
      }
      if (p.body) Matter.World.remove(world, p.body);
      players.splice(i, 1);
      continue;
    }

    // --- BLESKY OD GIANT (1x za sekundu, -1 HP nejblizsi kouli) ---
    if (p.hp >= 1000 && !p.isZombie && frameCount % 60 === (i % 60)) {
        let closest = null;
        let closestDist = Infinity;
        for (let other of players) {
            if (other === p || other.hp <= 0 || other.immunityTimer > 0 || !other.body) continue;
            let ld = dist(p.body.position.x, p.body.position.y, other.body.position.x, other.body.position.y);
            if (ld < closestDist) { closestDist = ld; closest = other; }
        }
        if (closest) {
            closest.hp -= 1;
            if (!isExtremeLoad) {
                lightnings.push({x1: p.body.position.x, y1: p.body.position.y, x2: closest.body.position.x, y2: closest.body.position.y, life: 15, c: p.color});
            }
            if (!isHeavyLoad) createParticles(closest.body.position.x, closest.body.position.y, p.color, 3);
            if (!isHeavyLoad) addPopup("-1", closest.body.position.x, closest.body.position.y, color(255, 100, 100));
            safePlaySound(pentatonic('low'), 0.008, 0.25);
        }
    }
    
    // GALAKTICKĂť VORTEX (PohyblivĂ˝ stĹ™ed, aby nevznikla statickĂˇ zĂˇcpa)
    // StĹ™ed gravitace nynĂ­ neustĂˇle pomalu cestuje po arĂ©nÄ›
    let cx = W/2 + Math.sin(frameCount * 0.005) * (W * 0.40); 
    let cy = (ARENA_TOP+ARENA_BOT)/2 + Math.cos(frameCount * 0.007) * ((ARENA_BOT-ARENA_TOP) * 0.40);
    
    let dx = cx - p.body.position.x;
    let dy = cy - p.body.position.y;
    let distToCenter = Math.sqrt(dx*dx + dy*dy) || 1;

    let dirX = dx / distToCenter;
    let dirY = dy / distToCenter;
    
    // MIXÉR EFEKT: Plynulejší a vyváženější síly
    let pullForce = 0.00003 * p.body.mass;  // Mírně sníženo pro méně agresivní tah do středu
    let vortexForce = 0.0001 * p.body.mass * p.baseRotDir; // Mírně sníženo pro hladší rotaci

    let finalFx = (dirX * pullForce) + (-dirY * vortexForce);
    let finalFy = (dirY * pullForce) + (dirX * vortexForce);

    // OPTIMALIZACE: Noise poÄŤĂ­tĂˇme jen kaĹľdĂ˝ 3. frame pĹ™i zĂˇtÄ›Ĺľi
    if (!p.lastNoiseX || frameCount % (players.length > 60 ? 3 : 1) === 0) {
        p.lastNoiseX = noise(p.noiseOffsetX) - 0.5;
        p.lastNoiseY = noise(p.noiseOffsetY) - 0.5;
    }
    let noiseValX = p.lastNoiseX;
    let noiseValY = p.lastNoiseY;

    finalFx += noiseValX * 0.00015 * p.body.mass; // Plynulejší náhodná síla
    finalFy += noiseValY * 0.00015 * p.body.mass;

    // Pomalejší posun šumu = plynulejší změny pohybu
    // POMALEJŠÍ ZMĚNA: Pohyb bude plynulejší a táhlejší
    p.noiseOffsetX += 0.005; 
    p.noiseOffsetY += 0.005;

    // Občasné silnější pošťouchnutí (ponecháno, ale mírně oslabeno)
    if (Math.random() < 0.02) { // Méně často
        finalFx += (Math.random() - 0.5) * 0.0005 * p.body.mass;
        finalFy += (Math.random() - 0.5) * 0.0005 * p.body.mass;
    }

    // --- BOT BEHAVIOR (Chaos movement) ---
    if (p.isBot && frameCount % 60 === (i % 60)) {
        let chaosForce = 0.0002 * p.body.mass; // SnĂ­Ĺľeno pro pomalĂ© plouĹľenĂ­
        Matter.Body.applyForce(p.body, p.body.position, {
            x: (random() - 0.5) * chaosForce,
            y: (random() - 0.5) * chaosForce
        });
    }

    // Ĺ˝ĂˇdnĂˇ ochrannĂˇ zĂłna - vĹˇichni se rurou do jednoho bodu!
    Matter.Body.applyForce(p.body, p.body.position, { x: finalFx, y: finalFy });

    let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
    let isTop10 = currentTop10.includes(p.name);
    let tSpd = isTop10 ? 1.6 : 1.3; // SNĂŤĹ˝ENO (z 2.2 / 1.8) pro klidnÄ›jĹˇĂ­ arĂ©nu
    
    // SĂŤLA PODLE HP: ÄŚĂ­m vÄ›tĹˇĂ­ koule, tĂ­m lehce vyĹˇĹˇĂ­ tah na brĂˇnu
    tSpd *= (1.0 + Math.sqrt(p.hp) * 0.0015);
    let currentMaxV = maxV;
    
    // ZOMBĂŤCI SE PLOUĹ˝ĂŤ (-60% rychlost)
    if (p.isZombie) {
        tSpd *= 0.4;
        currentMaxV *= 0.4;
    }

    // BOTI JSOU POMALEJĹ ĂŤ (-40% rychlost oproti hrĂˇÄŤĹŻm)
    if (p.isBot) {
        tSpd *= 0.3; // Zpomaleno ze 0.6 pro "plouĹľenĂ­"
        currentMaxV *= 0.3;
    }

    // --- ZRYCHLENĂŤ ZA TAPOVĂNĂŤ (LIKE BUFF) ---
    // Pokud hrĂˇÄŤ aktivnÄ› posĂ­lĂˇ liky, zĂ­skĂˇ doÄŤasnÄ› o 100 % vyĹˇĹˇĂ­ rychlost (kompenzace za pomalejĹˇĂ­ zĂˇklad)
    if (isBuffed) {
        tSpd *= 1.25; 
        currentMaxV *= 2.0;
        
        // VizuĂˇlnĂ­ jiskry smazĂˇny
    }

    if (p.isBounty) {
        tSpd *= 1.4;
        currentMaxV *= 1.4;
    }
    
    if (p.giftSpeedTimer > 0) {
        p.giftSpeedTimer--;
        let speedMult = map(p.giftSpeedTimer, 0, 300, 1.0, 3.0); // PostupnĂ© vytrĂˇcenĂ­ rychlosti
        tSpd *= speedMult;
        currentMaxV *= speedMult;
    }

    if (p.orbSpeedTimer > 0) {
        p.orbSpeedTimer--;
        tSpd *= 5.0;
        currentMaxV *= 5.0;
        // Ĺ˝lutĂ© jiskry smazĂˇny
    }

    if (p.shareCooldown > 0) p.shareCooldown--;

    // --- PLYNULĂ‰ PĹIDĂVĂNĂŤ/UBĂŤRĂNĂŤ HP (BUFFEROVANĂ‰) ---
    if (p.hpBuffer !== 0) {
        // Rychlost zmÄ›ny: min 1 HP, ale pĹ™i velkĂ©m rozdĂ­lu zrychlĂ­me, aby to netrvalo vÄ›ÄŤnost
        let step = 1;
        if (Math.abs(p.hpBuffer) > 100) step = Math.ceil(Math.abs(p.hpBuffer) / 60);
        
        if (p.hpBuffer > 0) {
            let add = Math.min(step, p.hpBuffer);
            p.hp += add;
            p.hpBuffer -= add;
            // Popupy jen obÄŤas pro Ăşsporu FPS
            if (frameCount % 10 === 0) {
                addPopup("+1", p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
            }
        } else if (p.hpBuffer < 0) {
            let sub = Math.min(step, Math.abs(p.hpBuffer));
            p.hp -= sub;
            p.hpBuffer += sub;
            if (frameCount % 10 === 0) {
                addPopup("-1", p.body.position.x, p.body.position.y - p.r, color(255, 80, 80));
            }
        }
    }

    let vx = p.body.velocity.x;
    let vy = p.body.velocity.y;
    
    if (isNaN(vx) || isNaN(vy) || !isFinite(vx) || !isFinite(vy)) {
        Matter.Body.setVelocity(p.body, {x: 0, y: 0});
    } else {
        let currentSpeed = Math.sqrt(vx*vx + vy*vy);
        if (currentSpeed > 0.1) {
            let factor = tSpd / currentSpeed;
            Matter.Body.setVelocity(p.body, { x: lerp(vx, vx * factor, 0.1), y: lerp(vy, vy * factor, 0.1) });
        }
        
        vx = p.body.velocity.x; vy = p.body.velocity.y;
        if (Math.abs(vx) > currentMaxV || Math.abs(vy) > currentMaxV) {
            Matter.Body.setVelocity(p.body, {
                x: Math.max(-currentMaxV, Math.min(currentMaxV, vx)),
                y: Math.max(-currentMaxV, Math.min(currentMaxV, vy))
            });
        }
    }
  }

  // DYNAMICKĂ KAMERA: Oddaluje se podle toho, kolik fyzickĂ©ho prostoru koule zabĂ­rajĂ­!
  let totalArea = 0;
  for (let i = 0; i < players.length; i++) {
      totalArea += players[i].r * players[i].r * Math.PI;
  }
  let screenArea = W * (ARENA_BOT - ARENA_TOP);
  let coverageRatio = totalArea / screenArea;
  
  if (coverageRatio > 0) {
      // Koule nechĂˇme natÄ›snat vĂ­ce (aĹľ na 65 % obrazovky) neĹľ oddĂˇlĂ­me kameru
      targetCameraScale = Math.sqrt(0.65 / coverageRatio);
  } else {
      targetCameraScale = 1.6;
  }
  // Limity pĹ™iblĂ­ĹľenĂ­/oddĂˇlenĂ­
  targetCameraScale = Math.min(1.6, Math.max(0.35, targetCameraScale));

  cameraScale = lerp(cameraScale, targetCameraScale, 0.015); // Velmi pomalĂ© a plynulĂ© oddalovĂˇnĂ­
  
  let viewW = W / cameraScale; 
  let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  
  if (!isNaN(viewW) && !isNaN(viewH)) {
      Matter.Body.setPosition(wallTop, { x: cx, y: cy - viewH/2 - wallThick/2 });
      Matter.Body.setPosition(wallBot, { x: cx, y: cy + viewH/2 + wallThick/2 });
      Matter.Body.setPosition(wallLeft, { x: cx - viewW/2 - wallThick/2, y: cy });
      Matter.Body.setPosition(wallRight, { x: cx + viewW/2 + wallThick/2, y: cy });
  }
}

// --- FUNKCE PRO POZADĂŤ ODSTRANÄšNY ---
function handleBossPlanet() {
    if (!showBossPlanet || players.length === 0) return;

    // VytvoĹ™enĂ­ globĂˇlnĂ­ho zĂˇmku (pokud jeĹˇtÄ› neexistuje)
    if (typeof window.bossLockTimer === 'undefined') window.bossLockTimer = 0;

    // 1. VyÄŤistĂ­me frontu od mrtvĂ˝ch hrĂˇÄŤĹŻ nebo tÄ›ch, co uĹľ v arĂ©nÄ› nejsou
    while (egoQueue.length > 0) {
        let name = egoQueue[0];
        let p = players.find(x => x.name === name && x.hp > 0);
        if (p) break;
        egoQueue.shift();
    }

    // 2. PRIORITA: Fronta novĂ˝ch hrĂˇÄŤĹŻ (kaĹľdĂ˝ dostane 3 vteĹ™iny slĂˇvy)
    if (egoQueue.length > 0) {
        let nextInQueue = egoQueue[0];
        if (lastValidBossName === nextInQueue) {
            // AktuĂˇlnĂ­ boss je ten z fronty, zkontrolujeme jestli uĹľ mu vyprĹˇel ÄŤas
            if (millis() > window.bossLockTimer) {
                egoQueue.shift();
                // Shiftem se uvolnĂ­ mĂ­sto pro dalĹˇĂ­ho v Ĺ™adÄ› nebo pro top HP hrĂˇÄŤe v dalĹˇĂ­m kroku
            }
        } else {
            // NOVĂť hrĂˇÄŤ z fronty pĹ™ebĂ­rĂˇ Ego Smash (pĹ™ebije i top HP hrĂˇÄŤe)
            lastValidBossName = nextInQueue;
            window.bossLockTimer = millis() + 3000;
        }
    }

    // 3. POKUD JE FRONTA PRĂZDNĂ: ZobrazĂ­me hrĂˇÄŤe s nejvĂ­ce HP
    if (egoQueue.length === 0) {
        let potentialKing = [...players].filter(p => !p.isZombie && p.hp > 0 && !p.isBot).sort((a, b) => b.hp - a.hp)[0];

        if (potentialKing) {
            if (lastValidBossName !== potentialKing.name) {
                // PĹ™epneme na top HP hrĂˇÄŤe pouze pokud vyprĹˇel pĹ™edchozĂ­ zĂˇmek
                if (millis() > window.bossLockTimer) {
                    lastValidBossName = potentialKing.name;
                    window.bossLockTimer = millis() + 3000;
                }
            }
        } else {
            // Pokud nikdo reĂˇlnĂ˝ nepĹ™eĹľil nebo nenĂ­ v arĂ©nÄ›, Ego Smash se vypne
            lastValidBossName = null;
        }
    }

    // Pokud nenĂ­ ĹľĂˇdnĂ˝ platnĂ˝ krĂˇl, poĹˇleme stĂˇvajĂ­cĂ­ planety pryÄŤ
    if (!lastValidBossName) {
        bossPlanets.forEach(p => { if(!p.isKnockedOut) { p.isKnockedOut = true; p.vx *= 1.5; p.vy *= 1.5; } });
    }

    let activeBossName = lastValidBossName;
    let cx = W/2;
    let cy = (ARENA_TOP+ARENA_BOT)/2;

    // 3. HledĂˇme planetu, kterĂˇ patĹ™Ă­ aktuĂˇlnĂ­mu krĂˇli a jeĹˇtÄ› nenĂ­ zniÄŤenĂˇ
    let mainPlanet = activeBossName ? bossPlanets.find(p => !p.isKnockedOut && p.name === activeBossName) : null;

    if (!mainPlanet && activeBossName) {
        // Najdeme tu nejnovÄ›jĹˇĂ­ existujĂ­cĂ­ planetu v arĂ©nÄ›, kterou pĹŻjdeme nekompromisnÄ› sestĹ™elit
        let previousPlanet = [...bossPlanets].reverse().find(p => !p.isKnockedOut);

        let newPlanet = {
            name: activeBossName,
            x: 0, y: 0, vx: 0, vy: 0, 
            rot: 0, rotSpeed: random(-0.005, 0.005),
            isKnockedOut: false,
            hasSmashed: false,
            targetPlanet: previousPlanet, // Tu budeme lovit (mĹŻĹľe jich bĂ˝t takhle i vĂ­c za sebou jako vlĂˇÄŤek)
            targetPoint: previousPlanet ? null : { x: cx + random(-50, 50), y: cy + random(-50, 50) } // Pokud jsme ĂşplnÄ› prvnĂ­, letĂ­me do stĹ™edu
        };

        // SpawnovĂˇnĂ­ hluboko mimo obrazovku
        let side = floor(random(4));
        let offX = W * 0.7; let offY = H * 0.6;
        if (side === 0) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy - offY; }
        else if (side === 1) { newPlanet.x = cx + offX; newPlanet.y = cy + random(-200, 200); }
        else if (side === 2) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy + offY; }
        else { newPlanet.x = cx - offX; newPlanet.y = cy + random(-200, 200); }

        // NejdĹ™Ă­v natvrdo smazat vĹˇechny existujĂ­cĂ­ fialovĂ© koule, aby tam nezĹŻstĂˇvaly viset
        bossPlanets = []; 
        bossPlanets.push(newPlanet);
    }

    let pSize = W * 0.40; 
    
    let boundLeft = cx - W * 0.30; let boundRight = cx + W * 0.30;
    let boundTop = cy - (ARENA_BOT - ARENA_TOP) * 0.35; let boundBot = cy + (ARENA_BOT - ARENA_TOP) * 0.35;

    for (let i = bossPlanets.length - 1; i >= 0; i--) {
        let bp = bossPlanets[i];

        // --- POHYBOVĂ LOGIKA ---
        if (bp.isKnockedOut) {
            // LetĂ­ pryÄŤ po prohĹ™e
        } else if (!bp.hasSmashed) {
            // A) MĂME CĂŤL -> LETĂŤME ZNIÄŚIT STAROU PLANETU
            if (bp.targetPlanet) {
                let dx = bp.targetPlanet.x - bp.x;
                let dy = bp.targetPlanet.y - bp.y;
                let dist = Math.sqrt(dx*dx + dy*dy) || 1;

                let speed = 16; // AgresivnĂ­ let a pronĂˇsledovĂˇnĂ­
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                // NĂRAZ!
                if (dist < pSize * 0.7) {
                    bp.hasSmashed = true;
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                    bp.smashGreenFlash = 90; // NastavĂ­ plynulĂ˝ zelenĂ˝ pĹ™echod na 1.5 vteĹ™iny

                    bp.targetPlanet.isKnockedOut = true;
                    bp.targetPlanet.vx = (dx / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.vy = (dy / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.rotSpeed = random(-0.1, 0.1);

                    let liveAttacker = players.find(p => p.name === bp.name);
                    let attackerColor = liveAttacker ? liveAttacker.color : color(255);

                    // ZAKĂZĂNO: screenShake, particles, flash
                    safePlaySound(pentatonic('low'), 0.05, 0.8); // JemnĂ˝ basovĂ˝ tĂłn
                }
            } 
            // B) ĂšPLNÄš PRVNĂŤ PLANETA -> MAJESTĂTNÄš PĹILĂ‰TĂ DO STĹEDU
            else if (bp.targetPoint) {
                let dx = bp.targetPoint.x - bp.x;
                let dy = bp.targetPoint.y - bp.y;
                let distSq = dx*dx + dy*dy;
                let dist = Math.sqrt(distSq) || 1;
                
                let speed = 6; // PomalĂ˝ pĹ™Ă­let
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                if (distSq < 225) {
                    bp.hasSmashed = true; // Dorazila na svĂ© mĂ­sto doprostĹ™ed arĂ©ny
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                }
            }
        } else {
            // C) PLANETA VLĂDNE -> ODRĂĹ˝ĂŤ SE OD MANTINELĹ® V ARĂ‰NÄš
            if (bp.x < boundLeft) { bp.x = boundLeft; bp.vx *= -1; }
            if (bp.x > boundRight) { bp.x = boundRight; bp.vx *= -1; }
            if (bp.y < boundTop) { bp.y = boundTop; bp.vy *= -1; }
            if (bp.y > boundBot) { bp.y = boundBot; bp.vy *= -1; }
        }

        // Aplikace pohybu
        bp.x += bp.vx;
        bp.y += bp.vy;
        bp.rot += bp.rotSpeed;

        // SmazĂˇnĂ­ planety ze hry, pokud vyletĂ­ po prohĹ™e ĂşplnÄ› pryÄŤ
        if (bp.isKnockedOut && (bp.x < -W || bp.x > W*2 || bp.y < -H || bp.y > H*2)) {
            bossPlanets.splice(i, 1);
            continue;
        }

        // --- VYKRESLENĂŤ A BARVY ---
        push();
        translate(bp.x, bp.y);
        
        // --- VIDITELNOST: Pokud je nÄ›kdo v arĂ©nÄ› vÄ›tĹˇĂ­ neĹľ tato planeta, zneviditelnit ---
        let isSomeoneLarger = players.some(p => !p.isZombie && p.r > (pSize / 2) * 0.95);
        if (isSomeoneLarger && !bp.isKnockedOut) {
            pop();
            continue;
        }
        
        // 4. SYNCHRONIZACE BARVY S REĂLNOU PILOU HRĂÄŚE V ARĂ‰NÄš
        let livePlayer = players.find(p => p.name === bp.name);
        let outlineColor = color(200); 
        
        if (livePlayer) {
            let danger = constrain(map(Math.max(0, livePlayer.hp), 50, 0, 0, 1), 0, 1);
            outlineColor = lerpColor(livePlayer.color, color(255, 0, 0), danger); // ÄŚervenĂˇ pĹ™i umĂ­rĂˇnĂ­

            // ObnovenĂ˝ duhovĂ˝ efekt
            if (livePlayer.giftSpeedTimer > 0 || livePlayer.immunityTimer > 0 || livePlayer.isGodMode || livePlayer.hasRainbowCrown) {
                colorMode(HSB);
                outlineColor = color(getSafeHue(frameCount * 5), 100, 100);
                colorMode(RGB);
            }
        }

        // PlynulĂ© zezelenĂˇnĂ­ okraje planety po pĹ™evzetĂ­
        if (bp.smashGreenFlash > 0) {
            outlineColor = lerpColor(outlineColor, color(50, 255, 50), bp.smashGreenFlash / 90.0);
            bp.smashGreenFlash--;
        }

        if (!bp.isKnockedOut) {
            // if (players.length < 40) {
            //     drawingContext.shadowBlur = 20 + sin(frameCount * 0.05) * 10;
            //     drawingContext.shadowColor = outlineColor;
            // }
        }

        fill(5, 5, 10, 180);
        stroke(outlineColor);
        strokeWeight(bp.isKnockedOut ? 2 : 5);
        ellipse(0, 0, pSize);
        drawingContext.shadowBlur = 0;


 
        rotate(bp.rot);

        let img = userAvatars[bp.name]; 
        if (img && img !== "loaded") {
            imageMode(CENTER);
            tint(255, bp.isKnockedOut ? 40 : 180); 
            image(img, 0, 0, pSize, pSize);
            noTint();
            
            drawingContext.save();
            let gradient = drawingContext.createRadialGradient(0, 0, pSize * 0.3, 0, 0, pSize * 0.5);
            gradient.addColorStop(0, "rgba(0,0,0,0)");
            gradient.addColorStop(1, "rgba(0,0,0,0.8)");
            drawingContext.fillStyle = gradient;
            drawingContext.fillRect(-pSize/2, -pSize/2, pSize, pSize);
            drawingContext.restore();
        } else {
            fill(outlineColor); noStroke(); ellipse(0, 0, pSize * 0.8);
            fill(255, bp.isKnockedOut ? 30 : 150); 
            textAlign(CENTER, CENTER); textSize(80); text("đź‘‘", 0, 0);
        }
        pop();
    }
}

function drawSpaceBackground() {
  flowTime += 0.003;
  globalFlowAngle = sin(flowTime) * 0.25;
  
  // ANTI-DETECT: Rychlost scrollovĂˇnĂ­ se v ÄŤase neustĂˇle plynule mÄ›nĂ­
  let antiBotShift = sin(frameCount * 0.002) * 0.8; 
  let baseScrollSpeed = 1.2 + antiBotShift; 

  noStroke();
  
  drawingContext.save();
  milkyWay.forEach(mw => {
      fill(mw.color);
      ellipse(mw.x, mw.y, mw.r * 2);
      
      mw.x += sin(globalFlowAngle) * 0.2;
      mw.y += cos(globalFlowAngle) * 0.2 + (baseScrollSpeed * 0.1);
      
      if (mw.y > H * 2 + 500) { mw.y = -H - 500; mw.x = random(-W, W*2); }
      if (mw.x > W * 2 + 500) { mw.x = -W - 500; }
      if (mw.x < -W - 500) { mw.x = W * 2 + 500; }
  });
  drawingContext.restore();

  nebulas.forEach(n => {
     fill(n.color);
     ellipse(n.x, n.y, n.r); 
     n.y += n.speed + (baseScrollSpeed * 0.2);
     if (n.y > H * 2 + 1000) { n.y = -H - 1000; n.x = random(-W, W*2); }
  });

  let isExtremeLoad = players.length > 30;
  let starLimit = isExtremeLoad ? stars.length / 3 : stars.length;
  for(let i=0; i<starLimit; i++) {
    let s = stars[i];
    let currentAlpha = s.baseAlpha;
    if (s.isPulsing && !isExtremeLoad) {
        currentAlpha = (s.baseAlpha * 0.5) + sin(frameCount * s.pulseSpeed + s.pulsePhase) * (s.baseAlpha * 0.5);
    }
    fill(s.rC, s.gC, s.bC, currentAlpha);
    rect(s.x, s.y, s.s, s.s);
    
    s.x += sin(globalFlowAngle) * (s.speed * 0.5);
    s.y += s.speed + baseScrollSpeed * s.layer; 
    
    if (s.y > H * 2) { s.y = -H; s.x = random(-W, W * 2); }
    else if (s.y < -H) { s.y = H * 2; s.x = random(-W, W * 2); }
    if (s.x > W * 2) { s.x = -W; s.y = random(-H, H * 2); }
    else if (s.x < -W) { s.x = W * 2; s.y = random(-H, H * 2); }
  }

  // ZAKĂZĂNO dle poĹľadavku: VesmĂ­r bez planet a objektĹŻ
  // drawingContext.save();
  // handleBackgroundObjects(baseScrollSpeed);
  // drawingContext.restore();

  if (random() < 0.04) { 
      let side = Math.floor(random(4));
      let sx, sy, svx, svy;
      
      if (side === 0) { sx = random(-W, W*2); sy = -H; svx = random(-20, 20); svy = random(20, 50); }
      else if (side === 1) { sx = random(-W, W*2); sy = H*2; svx = random(-20, 20); svy = random(-50, -20); }
      else if (side === 2) { sx = -W; sy = random(-H, H*2); svx = random(20, 50); svy = random(-20, 20); }
      else { sx = W*2; sy = random(-H, H*2); svx = random(-50, -20); svy = random(-20, 20); }
      
      shootingStars.push({
          x: sx, y: sy, 
          vx: svx, vy: svy, 
          life: 255, length: random(40, 150),
          thick: random(1, 4)
      });
  }

  for (let i = shootingStars.length - 1; i >= 0; i--) {
      let s = shootingStars[i];
      stroke(255, 255, 255, s.life); strokeWeight(s.thick);
      line(s.x, s.y, s.x - s.vx * (s.length/20), s.y - s.vy * (s.length/20));
      s.x += s.vx; s.y += s.vy; 
      s.life -= 4; 
      
      // 3. Detekce nĂˇrazu do hrĂˇÄŤĹŻ
      let hit = false;
      for (let p of players) {
          let d = dist(s.x, s.y, p.body.position.x, p.body.position.y);
          
          // OPRAVA 1: VÄ›tĹˇĂ­ hitbox (o 20px), aby rychlĂ© hvÄ›zdy neproletÄ›ly skrz hrĂˇÄŤe bez detekce
          let sSize = s.size || s.thick || 5; 
          if (d < p.r + sSize + 20) { 
              
              let speedMag = dist(0, 0, s.vx, s.vy);
              let dirX = s.vx / speedMag;
              let dirY = s.vy / speedMag;
              
              // ZvĂ˝ĹˇenĂˇ sĂ­la pro vĂ˝raznÄ›jĹˇĂ­ odhozenĂ­ hrĂˇÄŤe (bez exploze)
              let pushForce = 0.006 * p.body.mass; 
              
              Matter.Body.applyForce(p.body, p.body.position, {
                  x: dirX * pushForce,
                  y: dirY * pushForce
              });

              hit = true;
              break; 
          }
      }

      if (hit) {
          shootingStars.splice(i, 1);
          continue;
      }

      if (s.life <= 0 || s.x < -W*1.5 || s.x > W*2.5 || s.y < -H*1.5 || s.y > H*2.5) {
          shootingStars.splice(i, 1);
      }
  }
  noStroke();
}

function drawDeathShockwaves() {
  for (let i = deathShockwaves.length - 1; i >= 0; i--) {
      let sw = deathShockwaves[i];
      noFill();
      stroke(red(sw.color), green(sw.color), blue(sw.color), sw.life);
          strokeWeight(map(sw.life, 255, 0, sw.isNuke ? 50 : 8, 1)); // ZjednoduĹˇenĂˇ tlouĹˇĹĄka
      ellipse(sw.x, sw.y, sw.r * 2);
          sw.r += sw.isNuke ? 25 : 8; // RychlejĹˇĂ­ rozpĂ­nĂˇnĂ­ rĂˇzovĂ© vlny
          sw.life -= sw.isNuke ? 4 : 25; // Mnohem rychlejĹˇĂ­ zmizenĂ­ (ÄŤistĹˇĂ­ animace)
      if (sw.life <= 0) deathShockwaves.splice(i, 1);
  }
}

function drawLightnings() {
  for(let i = lightnings.length - 1; i >= 0; i--) {
    let l = lightnings[i];
    let a = l.life * 25; 
    let segs = 3;
    let pts = [{x: l.x1, y: l.y1}];
    
    for(let j = 1; j < segs; j++) {
        pts.push({
            x: lerp(l.x1, l.x2, j/segs) + random(-15, 15), 
            y: lerp(l.y1, l.y2, j/segs) + random(-15, 15)
        });
    }
    pts.push({x: l.x2, y: l.y2});

    stroke(red(l.c), green(l.c), blue(l.c), a);
    strokeWeight(l.life * 0.8 + 2);
    noFill();
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    stroke(255, a);
    strokeWeight(l.life * 0.3 + 1);
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    l.life--;
    if(l.life <= 0) lightnings.splice(i, 1);
  }
}

function drawPlayer(p) {
  let pos = p.body.position; 
  let safeHp = Math.max(0, p.hp);
  let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
  // p.likeBuffTimer--; // JiĹľ nenĂ­ potĹ™eba, pouĹľĂ­vĂˇme millis()
  
  let isLeader = (currentTop10[0] === p.name && !p.isZombie);
  
  // 1. FIRE TRAIL smazĂˇn

  // 2. GOD MODE KOUZLO
  if (p.isGodMode) {
      p.godModeTimer--;
      if (p.godModeTimer <= 0) p.isGodMode = false;
  }

  // Rotace (Zrychleno 10x pĹ™i lajkovĂˇnĂ­)
  let baseSpin = 0.02 + Math.min(safeHp * 0.000015, 0.2);
  if (safeHp >= 1000) baseSpin = 0.08 + Math.min(safeHp * 0.00002, 0.4);
  if (p.orbSpeedTimer > 0) baseSpin = Math.max(baseSpin, 0.35);
  p.rot += isBuffed ? baseSpin * p.baseRotDir * 10 : baseSpin * p.baseRotDir;
  
  let isHeavyLoad = players.length > 15;
  let isExtremeLoad = players.length > 30;
  let isEpic = safeHp >= 1000;
  let dangerFactor = constrain(map(safeHp, 50, 0, 0, 1), 0, 1);
  if (p.isZombie) dangerFactor = 0;
  
  let actualColor = lerpColor(p.color, color(255, 0, 0), dangerFactor);

  // VykreslenĂ­ stopy (trail) - Vypnuto pro boty pro odstranÄ›nĂ­ "teÄŤky" uprostĹ™ed
  if (!isExtremeLoad && p.trail.length > 1 && !p.isBot) {
      noFill();
      for (let i = 0; i < p.trail.length - 1; i++) {
          stroke(red(actualColor), green(actualColor), blue(actualColor), map(i, 0, p.trail.length, 0, 150));
          strokeWeight(map(i, 0, p.trail.length, p.r * 0.2, p.r * 0.8));
          line(p.trail[i].x, p.trail[i].y, p.trail[i+1].x, p.trail[i+1].y);
      }
  }

  push(); 
  translate(pos.x, pos.y);
  scale(isBuffed ? 1.05 : 1.0);
  rotate(p.rot);

  // 3. BOT FACE (Vypnuto - boti nynĂ­ majĂ­ profilovky jako reĂˇlnĂ­ hrĂˇÄŤi)
  /*
  if (p.isBot) {
      drawBotFace(0, 0, p.r);
  }
  */

  // VarovnĂ© pulzovĂˇnĂ­ pro umĂ­rajĂ­cĂ­ (Vypnuto pro boty)
  if (!p.isBot && (p.auraFlash > 0 || dangerFactor > 0)) {
      let glowAlpha = p.auraFlash > 0 ? p.auraFlash * 15 : 0;
      if(dangerFactor > 0) glowAlpha = max(glowAlpha, dangerFactor * 120 + sin(frameCount*0.3)*80);
      fill(red(actualColor), green(actualColor), blue(actualColor), glowAlpha);
      noStroke();
      ellipse(0, 0, p.r * 1.8);
  }
  if(p.auraFlash > 0) p.auraFlash--;

  // SpeciĂˇlnĂ­ zlatĂˇ pulzujĂ­cĂ­ aura pro vedoucĂ­ho hrĂˇÄŤe (Vypnuto pro boty)
  if (isLeader && !p.isBot) {
      fill(255, 215, 0, 50 + sin(frameCount * 0.15) * 30);
      noStroke();
      ellipse(0, 0, p.r * 2.4 + sin(frameCount * 0.2) * 15);
  }

  // Buff zĂˇĹ™e (Vypnuto pro boty)
      if (isBuffed && !p.isBot) { 
          fill(255, 255, 255, 80 + sin(frameCount * 0.5) * 80); noStroke();
          ellipse(0, 0, p.r * 2.0);
          // OranĹľovĂ© jiskry smazĂˇny
      }

  let outlineColor = actualColor;
  if (p.giftSpeedTimer > 0 || p.immunityTimer > 0 || p.isGodMode || p.hasRainbowCrown) {
      colorMode(HSB);
      outlineColor = color(getSafeHue(frameCount * 8), 100, 100); 
      colorMode(RGB);
  }
  if (p.isZombie) outlineColor = color(50, 255, 50);

  let baseR = red(actualColor);
  let baseG = green(actualColor);
  let baseB = blue(actualColor);

  if (p.sawFade === undefined) p.sawFade = 0;
  if (isBuffed) {
      p.sawFade = Math.min(1.0, p.sawFade + 0.1); 
  } else {
      p.sawFade = Math.max(0.0, p.sawFade - 0.05); 
  }

  if (p.sawFade > 0.01) {
      let teeth = isEpic ? 64 : 48; // Mnohem vĂ­ce zubĹŻ pro industriĂˇlnĂ­ vzhled
      let rOuter = p.r * 1.30; // KratĹˇĂ­, ale o to nebezpeÄŤnÄ›jĹˇĂ­ hroty
      let rInner = p.r * 1.15;
      let sawAlpha = p.sawFade * 255;

      push();
      // RychlĂˇ rotace cirkulĂˇrky (zpomaleno z 0.6 na 0.3 pro lepĹˇĂ­ viditelnost pohybu)
      rotate(frameCount * 0.3 * p.baseRotDir); 

      // INDUSTRIĂLNĂŤ VZHLED: TmavĂ˝ kov s brouĹˇenĂ˝m ostĹ™Ă­m
      noStroke();
      fill(40, sawAlpha); // TmavĂ˝ zĂˇklad disku
      ellipse(0, 0, rOuter * 1.8);

      // 1. ZUBY (BrouĹˇenĂˇ ocel)
      fill(red(actualColor), green(actualColor), blue(actualColor), sawAlpha * 0.8);
      beginShape();
      for(let i = 0; i < teeth; i++) {
          let idx = Math.floor(i * (64 / teeth)); // 64 je velikost cache pole
          let ang = sawAngles[idx];
          
          // AgresivnĂ­, ale krĂˇtkĂ© prĹŻmyslovĂ© zuby - cache optimalizace
          vertex(ang.a1_cos * rInner, ang.a1_sin * rInner); 
          vertex(ang.a2_cos * rOuter, ang.a2_sin * rOuter); 
          vertex(ang.a3_cos * rInner, ang.a3_sin * rInner);
      }
      endShape(CLOSE);

      // 2. VNITĹNĂŤ MECHANIKA (BrouĹˇenĂ˝ kov s odlesky)
      fill(180, sawAlpha * 0.4);
      ellipse(0, 0, p.r * 2.2);
      
      stroke(255, sawAlpha * 0.5);
      strokeWeight(1);
      noFill();
      ellipse(0, 0, p.r * 2.1); // DetailnĂ­ krouĹľek uvnitĹ™
      
      // DynamickĂ© odlesky na ÄŤepeli smazĂˇny
      drawingContext.shadowBlur = 0;
      pop();
  }
  
  if (p.isZombie) {
      push();
      drawingContext.setLineDash([8, 8]);
      strokeWeight(2); noFill();
      stroke(80, 200, 80, 100); // PĹŻvodnÄ› ÄŤervenĂˇ, nynĂ­ zelenĂˇ
      ellipse(0, 0, p.r * 1.6);
      drawingContext.lineDashOffset = 8;
      stroke(100, 255, 100, 100); // SvÄ›tlejĹˇĂ­ zelenĂˇ pro druhĂ˝ pruh
      drawingContext.setLineDash([]); drawingContext.lineDashOffset = 0;
      pop();
  }

  rotate(-p.rot); 
  
  if (p.isBounty) {
      push();
      rotate(frameCount * 0.05);
      let tSize = p.r * 2.8 + sin(frameCount * 0.2) * 10;
      fill(255, 0, 0, 40); stroke(255, 50, 50, 200); strokeWeight(3);
      ellipse(0, 0, tSize);
      let cL = tSize * 0.2;
      line(-tSize/2 - 10, 0, -tSize/2 + cL, 0); line(tSize/2 + 10, 0, tSize/2 - cL, 0);
      line(0, -tSize/2 - 10, 0, -tSize/2 + cL); line(0, tSize/2 + 10, 0, tSize/2 - cL);
      noFill(); stroke(255, 0, 0, 100); strokeWeight(1); ellipse(0, 0, tSize * 0.6);
      pop();
  }

  if (p.immunityTimer > 0) {
      push();
      let pulse = sin(frameCount * 0.1) * 10;
      fill(50, 100, 255, 60 + sin(frameCount * 0.2) * 40);
      stroke(100, 150, 255, 200); strokeWeight(3);
      ellipse(0, 0, p.r * 2.8 + pulse);
      
      rotate(frameCount * 0.05);
      for(let o = 0; o < 3; o++) {
          let a = (o * TWO_PI) / 3;
          let ox = cos(a) * (p.r * 1.4 + pulse/2); let oy = sin(a) * (p.r * 1.4 + pulse/2);
          fill(255); noStroke(); ellipse(ox, oy, 6 + random(-2, 2));
      }
      pop();
  }

  if (p.hasCrown) {
      push();
      translate(0, -p.r * 1.5 - 10);
      fill(255, 215, 0); stroke(255); strokeWeight(2);
      beginShape();
      vertex(-15, 0); vertex(-25, -15); vertex(-8, -8); 
      vertex(0, -25); vertex(8, -8); vertex(25, -15); vertex(15, 0);
      endShape(CLOSE);
      pop();
  }
  
  if (p.isGodMode) {
      push(); noFill();
      strokeWeight(5 + sin(frameCount * 0.2) * 5); stroke(255, 0, 0, 150);
      ellipse(0, 0, p.r * 2 + 20);
      pop();
  }

  if (p.hasRainbowCrown) {
      push();
      translate(0, -p.r - 25);
      colorMode(HSB);
      fill(getSafeHue(frameCount * 6), 100, 100);
      colorMode(RGB);
      stroke(255); strokeWeight(2);
      beginShape();
      vertex(-15, 0); vertex(-25, -20); vertex(-10, -10);
      vertex(0, -25); vertex(10, -10);  vertex(25, -20); vertex(15, 0);
      endShape(CLOSE);
      pop();
  }

  let imgSize = p.r * 1.93;
  let isTop10 = currentTop10.includes(p.name);
  let shouldDrawAvatar = true; 
  // VypnutĂ­ profilovek pro obyÄŤejnĂ© hrĂˇÄŤe pĹ™i zĂˇtÄ›Ĺľi bylo odstranÄ›no na ĹľĂˇdost uĹľivatele (profilovky musĂ­ bĂ˝t vidÄ›t vĹľdy)
  // if (isExtremeLoad && safeHp < 500 && !isLeader) shouldDrawAvatar = false;

  if (p.avatarAlpha === undefined) p.avatarAlpha = shouldDrawAvatar ? 255 : 0;
  if (shouldDrawAvatar) p.avatarAlpha = Math.min(255, p.avatarAlpha + 15);
  else p.avatarAlpha = Math.max(0, p.avatarAlpha - 30);

  if (p.isBot) {
      fill(0, 127); // 50% prĹŻhlednĂˇ ÄŤernĂˇ vĂ˝plĹ pro boty
  } else {
      fill(10, 12, 15, 255); 
  }
  noStroke();
  ellipse(0, 0, imgSize); 

  if (!p.isBot && p.avatarAlpha > 0 && userAvatars[p.name] && userAvatars[p.name] !== "loaded") {
      tint(255, p.avatarAlpha);
      imageMode(CENTER); 
      image(userAvatars[p.name], 0, 0, imgSize, imgSize); 
      noTint(); 
  }

  noFill(); 
  stroke(0, 255); // SolidnĂ­ okraj pro vĹˇechny
  strokeWeight(4); ellipse(0, 0, imgSize);
  let outStroke = p.isZombie ? color(50, 255, 50) : color(255, 200);
  stroke(outStroke);
  strokeWeight(2); ellipse(0, 0, imgSize + 4);

  drawingContext.lineJoin = "round"; textAlign(CENTER, CENTER);
  
  let nameCol = isLeader ? color(255, 215, 0) : color(230); // ZlatĂ© jmĂ©no pro lĂ­dra
  if (p.immunityTimer > 0) {
      colorMode(HSB);
      nameCol = color(getSafeHue(frameCount * 8), 80, 100);
      colorMode(RGB);
  }

  if (p.r > 20) {
      // ZtenÄŤenĂ­ obrysu textu pĹ™i zĂˇtÄ›Ĺľi (v Canvas2D to Ĺľere obrovskĂ© mnoĹľstvĂ­ vĂ˝konu)
      // Korunka pro aktuĂˇlnĂ­ho krĂˇle arĂ©ny (nejvĂ­ce HP) â€” jmĂ©no odstranÄ›no
      if (isLeader) {
          push();
          let bounce = sin(frameCount * 0.1) * 5;
          let crownY = -p.r * 0.45 - 25 - bounce;
          let cs = Math.max(10, p.r * 0.25);
          fill(255, 215, 0); stroke(180, 140, 0); strokeWeight(2);
          beginShape();
          vertex(-cs, crownY); vertex(-cs * 1.3, -cs * 0.8 + crownY);
          vertex(-cs * 0.5, -cs * 0.4 + crownY); vertex(0, -cs * 1.2 + crownY);
          vertex(cs * 0.5, -cs * 0.4 + crownY); vertex(cs * 1.3, -cs * 0.8 + crownY);
          vertex(cs, crownY);
          endShape(CLOSE);
          fill(255, 50, 50); noStroke();
          ellipse(-cs * 0.5, -cs * 0.25 + crownY, cs * 0.25);
          fill(50, 150, 255);
          ellipse(0, -cs * 0.5 + crownY, cs * 0.3);
          fill(255, 50, 50);
          ellipse(cs * 0.5, -cs * 0.25 + crownY, cs * 0.25);
          pop();
      }
      
      if (isBuffed) {
          push();
          let energyPulse = 1.0 + sin(frameCount * 0.3) * 0.2;
          translate(0, -p.r * 0.08); // UmĂ­stÄ›nĂ­ pĹ™esnÄ› mezi jmĂ©no a HP
          scale(energyPulse);
          fill(255, 215, 0); // ZlatĂˇ barva pro energii
          stroke(0);
          strokeWeight(Math.max(1, p.r * 0.04));
          let hs = p.r * 0.35; // MĂ­rnÄ› zvÄ›tĹˇeno pro lepĹˇĂ­ viditelnost
          beginShape();
          vertex(hs * 0.2, -hs * 0.6);
          vertex(-hs * 0.4, hs * 0.1);
          vertex(-hs * 0.1, hs * 0.1);
          vertex(-hs * 0.3, hs * 0.6);
          vertex(hs * 0.4, -hs * 0.1);
          vertex(hs * 0.1, -hs * 0.1);
          endShape(CLOSE);
          pop();
      }
  }

  let txtCol = color(255);
  if (p.hp > 50000) txtCol = color(100, 255, 100);
  else if (p.hp > 10000) txtCol = color(255, 255, 0);

  stroke(0); strokeWeight(isExtremeLoad ? 4 : 10); // MenĹˇĂ­ obrys pĹ™i zĂˇtÄ›Ĺľi
  fill(txtCol); textStyle(BOLD);
  textSize(Math.floor(Math.max(16, p.r * 0.35))); // ZmenĹˇenĂ˝ text HP, aby nezakrĂ˝val celĂ˝ kruh
  text(Math.floor(safeHp).toLocaleString(), 0, p.r > 20 ? p.r * 0.2 : 0); 
  
  if (p.isLegendary) {
      stroke(0); strokeWeight(Math.max(3, p.r * 0.15));
      fill(255, 215, 0);
      textSize(Math.floor(Math.max(10, p.r * 0.22)));
      text("đź‘‘ LEGEND", 0, p.r > 20 ? p.r * 0.65 : 15);
  }

  // --- ĂšSPORNĂ‰ INDIKĂTORY DMG A HEAL (PĹ™Ă­mo nad HP ÄŤĂ­slem) ---
  let hpY = p.r > 20 ? p.r * 0.2 : 0;
  
  if (p.dmgDisplayTimer > 0) {
      let roundedDmg = Math.round(p.dmgDisplayValue);
      if (roundedDmg > 0) {
          let alpha = map(p.dmgDisplayTimer, 0, 15, 0, 100); // SnĂ­ĹľenĂˇ viditelnost (ze 140 na 100)
          fill(255, 50, 50, alpha); stroke(0, alpha * 0.4); strokeWeight(2); // JemnÄ›jĹˇĂ­ obrys
          textSize(Math.floor(Math.max(14, p.r * 0.35)));
          // Vyskakuje nad HP ÄŤĂ­slo
          let yOff = hpY - 20 - map(45 - p.dmgDisplayTimer, 0, 45, 0, 20);
          text("-" + roundedDmg, 0, yOff);
      }
      p.dmgDisplayTimer--;
      if (p.dmgDisplayTimer === 0) p.dmgDisplayValue = 0;
  }
  if (p.healDisplayTimer > 0) {
      let roundedHeal = Math.round(p.healDisplayValue);
      if (roundedHeal > 0) {
          let alpha = map(p.healDisplayTimer, 0, 15, 0, 200); // VyĹˇĹˇĂ­ viditelnost pro zelenĂ© HP
          fill(0, 255, 255, alpha); stroke(0, alpha * 0.4); strokeWeight(2);
          textSize(Math.floor(Math.max(14, p.r * 0.35)));
          // Vyskakuje nad HP ÄŤĂ­slo
          let yOff = hpY - 20 - map(45 - p.healDisplayTimer, 0, 45, 0, 20);
          text("+" + roundedHeal, 0, yOff);
      }
      p.healDisplayTimer--;
      if (p.healDisplayTimer === 0) p.healDisplayValue = 0;
  }

  noStroke(); pop();
}

function createParticles(x, y, c, count, type = 'CIRCLE') {
  if (players.length > 80) return; 
  let actualCount = count;
  if (players.length > 60) {
      actualCount = Math.max(1, Math.floor(count * 0.3));
  } else if (players.length > 40) {
      actualCount = Math.max(1, Math.floor(count / 2));
  }
  for(let i=0; i<actualCount; i++) {
      let pSize = (type === 'HEART' || type === 'ENERGY') ? random(8, 16) : random(4, 10);
      let p = null;
      for (let j = 0; j < particles.length; j++) {
          if (!particles[j].active) { p = particles[j]; break; }
      }
      if (p) {
          p.active = true; p.x = x; p.y = y; p.vx = random(-6,6); p.vy = random(-6,6);
          p.life = 255; p.c = c; p.size = pSize; p.type = type;
      } else if (particles.length < 500) { // Limit bazĂ©nu na 500 ÄŤĂˇstic
          particles.push({active: true, x: x, y: y, vx: random(-6,6), vy: random(-6,6), life: 255, c: c, size: pSize, type: type});
      }
  }
}

function drawParticles() {
  noStroke();
  
  for(let i=0; i<particles.length; i++) {
    let p = particles[i];
    if (!p.active) continue;
    
    // ÄŚĂˇstice se uĹľ nekreslĂ­ s drahĂ˝m neonovĂ˝m stĂ­nem, ale s ÄŤistou barvou
    fill(red(p.c), green(p.c), blue(p.c), p.life);
        
        if (p.type === 'HEART') {
            imageMode(CENTER);
            tint(red(p.c), green(p.c), blue(p.c), p.life);
            image(cachedHeart, p.x, p.y, p.size * 2.5, p.size * 2.5);
            noTint();
        } else if (p.type === 'ENERGY') {
            imageMode(CENTER);
            tint(red(p.c), green(p.c), blue(p.c), p.life);
            image(cachedEnergy, p.x, p.y, p.size * 2.5, p.size * 2.5);
            noTint();
        } else {
            ellipse(p.x, p.y, p.size);
        }
        
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95; 
    p.size *= 0.98; 
    p.life -= 15; 
    
    if(p.life <= 0) p.active = false; // Neodstranit, pouze deaktivovat (Object Pooling)
  }
}

function addPopup(txt, x, y, c, isCrit = false) {
  let f = null;
  for (let i = 0; i < floatingTexts.length; i++) {
      if (!floatingTexts[i].active) { f = floatingTexts[i]; break; }
  }
  if (f) {
      f.active = true; f.txt = txt; f.x = x; f.y = y; f.life = 255; f.c = c; f.vy = -1.5; f.isCrit = isCrit; f.scale = 0.1;
  } else if (floatingTexts.length < 200) { // Limit bazĂ©nu na 200 textĹŻ
      floatingTexts.push({active: true, txt: txt, x: x, y: y, life: 255, c: c, vy: -1.5, isCrit: isCrit, scale: 0.1});
  }
}

function drawPopups() {
  for(let i=0; i<floatingTexts.length; i++) {
    let f = floatingTexts[i];
    if (!f.active) continue;
    
    f.scale = lerp(f.scale, 1.0, 0.2); 
    push(); translate(f.x, f.y); scale(f.scale);
    // Vypnuto stĂ­novĂˇnĂ­ pro obrovskĂ˝ nĂˇrĹŻst FPS
    if (f.isCrit) {
        stroke(0); strokeWeight(4); fill(255, 215, 0, f.life); textSize(22 + sin(f.life * 0.1) * 4); textAlign(CENTER); textStyle(BOLD);
            let critText = f.txt; 
            text(critText, 0, 0); f.y += f.vy - 0.5; f.life -= 8;
    } else {
        stroke(0); strokeWeight(3); fill(red(f.c), green(f.c), blue(f.c), f.life); textSize(16); textAlign(CENTER); textStyle(BOLD);
        text(f.txt, 0, 0); f.y += f.vy; f.life -= 8;
    }
    pop();
    
    if (f.life <= 0) f.active = false; // Deaktivovat mĂ­sto mazĂˇnĂ­ (Object Pooling)
  }
  drawingContext.shadowBlur = 0; textStyle(NORMAL);
}

function triggerRandomEvent() {
  if (random() < 0.5 && players.length > 0) {
      activeEvent = "BOUNTY";
      let p = random(players);
      bountyTarget = p.name;
      p.isBounty = true;
      eventTimer = 1800; // 30 sec (pĹ™i 60 FPS)

      speakTTS(msg, true);

      speakTTS(msg, true);
      addPopup("MAGNET ACTIVATED!", W/2, (ARENA_TOP+ARENA_BOT)/2, color(150, 50, 255), true);

}

function updateTimers() {
  // --- ANTI-DUPLIKĂT SYSTĂ‰M (KaĹľdĂ˝ch 10 vteĹ™in / 600 framĹŻ) ---
  if (frameCount % 600 === 0) {
      let nameGroups = {};
      
      // RoztĹ™Ă­dĂ­me ĹľivĂ© hrĂˇÄŤe podle jmĂ©na
      for (let p of players) {
          if (!p.isZombie) {
              if (!nameGroups[p.name]) nameGroups[p.name] = [];
              nameGroups[p.name].push(p);
          }
      }

      // Projdeme skupiny a smaĹľeme slabĹˇĂ­ duplikĂˇty
      for (let name in nameGroups) {
          let group = nameGroups[name];
          if (group.length > 1) {
              // SeĹ™adĂ­me podle HP sestupnÄ› (nejvÄ›tĹˇĂ­ si nechĂˇme na indexu 0)
              group.sort((a, b) => b.hp - a.hp);
              
              // VĹˇechny ostatnĂ­ tiĹˇe vymaĹľeme
              for (let j = 1; j < group.length; j++) {
                  let dup = group[j];
                  
                  // TichĂ˝ vizuĂˇlnĂ­ fade-out (jen se rozplyne)
                  if (dup.body) {
                      createParticles(dup.body.position.x, dup.body.position.y, dup.color, 10);
                      Matter.World.remove(world, dup.body);
                  }
                  
                  // OdstranÄ›nĂ­ z pole hrĂˇÄŤĹŻ
                  let idx = players.indexOf(dup);
                  if (idx > -1) players.splice(idx, 1);
              }
          }
      }
  }
  // -------------------------------------------------------------

  if (frameCount % 60 === 0) {
      currentTop10 = [...players].sort((a,b) => b.hp - a.hp).slice(0, 10).map(p => p.name);
  }

  for (let p of players) {
      // 1. OdeÄŤet imunity
      if (p.immunityTimer > 0) {
          p.immunityTimer--;
          if (p.immunityTimer <= 0) {
              safePlaySound(pentatonic('mid'), 0.05, 0.4);
              createParticles(p.body.position.x, p.body.position.y, color(0, 255, 255), 40);
              p.hasCrown = false; 
          }
      }
      
  }
  
  if (gameState === "PLAYING") {
      if (activeEvent) {
          eventTimer--;
          if (eventTimer <= 0) {
              if (activeEvent === "BOUNTY" && bountyTarget) {
                  let bp = players.find(p => p.name === bountyTarget);
                  if (bp) bp.isBounty = false;
              }
              activeEvent = null;
              bountyTarget = null;
              nextEventTime = millis() + random(60000, 150000);
          } else if (activeEvent === "BOUNTY" && bountyTarget) {
              let bp = players.find(p => p.name === bountyTarget);
              if (bp && bp.body) {
                  for (let p of players) {
                      if (!p.body || p === bp) continue;
                      let dx = bp.body.position.x - p.body.position.x;
                      let dy = bp.body.position.y - p.body.position.y;
                      let distSq = dx*dx + dy*dy;
                      let dist = Math.sqrt(distSq) || 1;
                      let forceMag = 0.0001 * p.body.mass;
                      Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
                  }
              }
          } else if (activeEvent === "MAGNET") {
              let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
              for (let p of players) {
                  if (!p.body) continue;
                  let dx = cx - p.body.position.x;
                  let dy = cy - p.body.position.y;
                  let distSq = dx*dx + dy*dy;
                  let dist = Math.sqrt(distSq) || 1;
                  
                  // VizuĂˇlnĂ­ vylepĹˇenĂ­ a ochrana: ÄŚernĂˇ dĂ­ra hrĂˇÄŤe roztĂˇÄŤĂ­ do vĂ­ru, ne jen natvrdo do stĹ™edu
                  let pullForce = 0.00012 * p.body.mass; // OslabenĂ˝ tah pĹ™Ă­mo do stĹ™edu
                  let swirlForce = 0.00035 * p.body.mass; // SilnĂˇ rotace kolem dokola tvoĹ™Ă­cĂ­ vĂ­r
                  
                  let fx = (dx/dist)*pullForce - (dy/dist)*swirlForce;
                  let fy = (dy/dist)*pullForce + (dx/dist)*swirlForce;
                  Matter.Body.applyForce(p.body, p.body.position, { x: fx, y: fy });

                  // SMRTĂŤCĂŤ EFEKT PRO GIGANTY V ÄŚERNĂ‰ DĂŤĹE
                  if (frameCount % 30 === 0 && p.hp > 3000 && distSq < 35000) { // ZvÄ›tĹˇen radius, protoĹľe vĂ­r je drĹľĂ­ dĂˇl
                      let shred = Math.floor(p.hp * 0.15); // UstĹ™ihne jim to 15 %!
                      p.hp -= shred;
                      addPopup("SHREDDED!", p.body.position.x, p.body.position.y, color(255, 0, 0), true);
                      createParticles(p.body.position.x, p.body.position.y, color(150, 0, 255), 20);
                      screenShake = 5;
                      safePlaySound(pentatonic('low'), 0.03, 0.6);
                  }
              }
          }
      // ZAKĂZĂNO: NĂˇhodnĂ© udĂˇlosti bez interakce
      // } else if (millis() > nextEventTime && players.length > 2) {
      //     triggerRandomEvent();
      }
  }

  if (gameState === "PLAYING" && roundTimerFrames > 0) {
    if (roundTimerPause > 0) {
        roundTimerPause--; // Pokud se spamuje na startu, odpoÄŤet ÄŤekĂˇ
    } else {
        roundTimerFrames--;
    }
    
    // ZAKĂZĂNO: NĂˇhodnĂ© spawnovĂˇnĂ­ bonusovĂ˝ch orbĹŻ
    // if (bonusFrames.includes(roundTimerFrames)) { shootBonusFromShip(); }
    
    if (frameCount % 60 === 0) roundTimer = Math.ceil(roundTimerFrames / 60);

    if (roundTimerFrames <= 0) {
        gameState = "EXPLODING"; explosionTimer = 90; screenShake = 40; 
        codeActive = false; // ZruĹˇĂ­ probĂ­hajĂ­cĂ­ hĂˇdĂˇnĂ­ kĂłdu
        
        safePlaySound(pentatonic('low'), 0.12, 1.0); setTimeout(() => { safePlaySound(pentatonic('low'), 0.10, 1.2); }, 200);
        
        let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
        deathShockwaves.push({x: cx, y: cy, r: 80, color: color(0, 255, 255), life: 255, isNuke: true});
        deathShockwaves.push({x: cx, y: cy, r: 150, color: color(255, 100, 0), life: 255, isNuke: true});
        createParticles(cx, cy, color(0, 255, 255), 100); 
        createParticles(cx, cy, color(255, 100, 0), 100);

        // EpickĂ˝ zpomalenĂ˝ odhoz vĹˇech hrĂˇÄŤĹŻ do stran
        for (let p of players) {
            if (!p.body) continue;
            let dx = p.body.position.x - cx; let dy = p.body.position.y - cy; let dist = Math.sqrt(dx*dx + dy*dy) || 1;
            let forceMag = 0.2 * p.body.mass; // MasivnĂ­ odhazovacĂ­ sĂ­la
            Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
        }
        
        engine.timing.timeScale = 0.2; // Slow-mo pro epickĂ˝ zĂˇvÄ›r
    }
  } else if (gameState === "EXPLODING") {
      explosionTimer--; screenShake *= 0.95;
      if (explosionTimer <= 0) { 
          gameState = "RESULTS"; 
          let donorCount = Object.keys(roundGifts).length;
          maxResultsTimer = 5;
          resultsTimer = 5; 
          winnerAnnounced = false;
      } 
  }
  
  // ZPRACOVĂNĂŤ NASTĹĂDANĂťCH LAJKĹ® (Ochrana vĂ˝konu)
  let nowTime = millis();
  for (let u in pendingLikes) {
      let data = pendingLikes[u];
      
      // DynamickĂ˝ limit: ÄŤĂ­m vĂ­c lidĂ­, tĂ­m vĂ­c lajkĹŻ je potĹ™eba na efekt
      let reqLikes = players.length > 30 ? 100 : 50; 
      let timeLimit = players.length > 30 ? 2000 : 1000;

      // Odpal aĹľ pĹ™i splnÄ›nĂ­ dynamickĂ©ho limitu
      if (data.count >= reqLikes || (data.count > 0 && nowTime - data.lastUpdate > timeLimit)) {
          let amount = data.count;
          let isMega = amount >= reqLikes;

          let p = players.find(x => x.name === u);
          if (p) {
              p.likeBuffTimer = Math.max(p.likeBuffTimer || 0, millis() + 5000);
              if (players.length < 50) {
                  addPopup("+" + (amount * 2), p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
                  // MĂ©nÄ› ÄŤĂˇstic = mĂ©nÄ› lagĹŻ, typ ENERGY
                  createParticles(p.body.position.x, p.body.position.y, color(255, 215, 0), isMega ? 8 : 3, 'ENERGY');
              }
              
              if (p.hp >= 200) {
                  // Zvuk pily (jemnĂ˝, hlubĹˇĂ­, mechanickĂ˝ rachtavĂ˝ zvuk)
                  safePlaySound(pentatonic('low'), 0.004, 0.1);
              } else {
                  safePlaySound(pentatonic('mid'), 0.008, 0.1);
              }
          }

          if (amount >= 5) {
              let existingNotif = notifications.find(n => n.type === 'LIKE' && n.name === u && (n.state === 'WAITING' || n.state === 'DISPLAY'));
              if (existingNotif) {
                  existingNotif.extra += amount;
                  existingNotif.age = 0; // Reset vÄ›ku pro setrvĂˇnĂ­ na obrazovce
                  if (existingNotif.extra >= 50) existingNotif.isMegaLike = true;
              } else {
                  addNotification('LIKE', u, userAvatars[u], amount, isMega);
              }
          }
          data.count = 0; 
      }
  }

  // ZOMBIE COOLDOWN (VystĹ™elenĂ­ po 20 vteĹ™inĂˇch)
  let alivePlayersCount = players.filter(p => !p.isZombie).length;
  let activeZombiesCount = players.filter(p => p.isZombie).length;

  for (let i = deadPlayersQueue.length - 1; i >= 0; i--) {
      if (millis() - deadPlayersQueue[i].timeOfDeath > deadPlayersQueue[i].respawnDelay) {
          let zName = deadPlayersQueue[i].name;
          // Pokud hrĂˇÄŤ nĂˇhodou uĹľ nehraje (napĹ™. nedal hned !join)
            if (!players.find(x => x.name === zName)) {
              if (alivePlayersCount < 25 && activeZombiesCount < 15) {
                      spawnPlayer(zName, 50, false, 0, true); // true = isZombie, menĹˇĂ­ HP
                  activeZombiesCount++;
                  deadPlayersQueue.splice(i, 1);
                          break; // PĹIDĂNO: ZastavĂ­ cyklus. DalĹˇĂ­ mrtvĂ˝ se spawne aĹľ v dalĹˇĂ­m framu!
              } else {
                  // Pokud je na ploĹˇe uĹľ dost hrĂˇÄŤĹŻ, odloĹľĂ­me spawn tohoto zombĂ­ka o 5 vteĹ™in
                  deadPlayersQueue[i].timeOfDeath += 5000;
              }
          } else {
              // HrĂˇÄŤ se uĹľ pĹ™ipojil jako ĹľivĂ˝, maĹľeme z fronty mrtvĂ˝ch
              deadPlayersQueue.splice(i, 1);
          }
      }
  }
}

function drawResults() {
  push();
  fill(0, 0, 0, 180);
  noStroke(); 
  rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);
  pop();
  
  textAlign(CENTER, CENTER);
  
  // --- TITUL ---
  // drawingContext.shadowBlur = 25;
  drawingContext.shadowColor = 'rgba(0, 255, 255, 0.8)';
  fill(0, 255, 255); textSize(38); textStyle(BOLD);
  stroke(0); strokeWeight(4);
  text(T[currentLang].ROUND_END, W/2, ARENA_TOP + 50);
  drawingContext.shadowBlur = 0;
  noStroke();
  
  let sorted = [...players].sort((a,b) => b.hp - a.hp); let winner = sorted[0];
  
  if(winner && !winnerAnnounced) {
      winnerAnnounced = true;
  }

  let bY = ARENA_TOP + 340; 
  let anim = constrain(map(resultsTimer, maxResultsTimer, maxResultsTimer - 1, 0, 1), 0, 1);

  // --- STUPÍNKY (větší a čitelnější) ---
  for (let i = 0; i < Math.min(3, sorted.length); i++) {
      let p = sorted[i];
      let px, ph, pcol, podW;
      if (i === 0) { px = W/2; ph = 140; pcol = color(255, 215, 0); podW = 130; }
      else if (i === 1) { px = W/2 - 155; ph = 100; pcol = color(192, 192, 192); podW = 120; }
      else { px = W/2 + 155; ph = 70; pcol = color(205, 127, 50); podW = 120; }

      let curH = ph * anim;
      
      push();
      for (let g = 0; g < curH; g++) {
          let alpha = map(g, 0, curH, 120, 220);
          fill(red(pcol), green(pcol), blue(pcol), alpha * 0.3);
          noStroke();
          rect(px - podW/2, bY - g, podW, 1);
      }
      stroke(pcol); strokeWeight(3); noFill();
      rect(px - podW/2, bY - curH, podW, curH, 12, 12, 0, 0);
      
      fill(pcol); noStroke(); textSize(i === 0 ? 42 : 32); textAlign(CENTER, CENTER); textStyle(BOLD);
      drawingContext.shadowBlur = 15;
      drawingContext.shadowColor = `rgba(${red(pcol)}, ${green(pcol)}, ${blue(pcol)}, 0.6)`;
      text(i+1, px, bY - curH/2);
      drawingContext.shadowBlur = 0;
      pop();

      if (anim > 0.8) {
          push();
          let ballR = i === 0 ? 40 : 30;
          let imgY = bY - curH - ballR - 15;
          
          // Záře koule
          let glowAlpha = 60 + sin(frameCount * 0.15) * 30;
          fill(red(p.color), green(p.color), blue(p.color), glowAlpha);
          noStroke();
          ellipse(px, imgY, ballR * 2.6);
          
          // Herní koule s profilovkou
          if (userAvatars[p.name] && userAvatars[p.name] !== "loaded") {
              imageMode(CENTER); image(userAvatars[p.name], px, imgY, ballR*2, ballR*2);
          } else {
              fill(p.color); noStroke(); ellipse(px, imgY, ballR * 2);
          }
          // Barevný obrys koule
          noFill(); stroke(p.color); strokeWeight(3); ellipse(px, imgY, ballR * 2);
          stroke(pcol); strokeWeight(2); ellipse(px, imgY, ballR * 2 + 6);

          // drawingContext.shadowBlur = 10;
          drawingContext.shadowColor = 'rgba(0,0,0,0.9)';
          fill(255); noStroke(); textSize(i===0 ? 18 : 14); textStyle(BOLD); textAlign(CENTER, BOTTOM);
          text(p.name.substring(0,12), px, imgY - ballR - 10);
          fill(pcol); textSize(i===0 ? 15 : 12);
          text(formatK(p.hp) + " HP", px, imgY - ballR - 30);
          drawingContext.shadowBlur = 0;
          pop();
      }
  }

  // --- TOP HÁDANKÁŘI + DÁRCI vedle sebe ---
  let riddleArr = Object.entries(riddleWins).sort((a,b) => b[1] - a[1]).slice(0, 5);
  let mvpArr = Object.entries(roundGifts).sort((a,b)=>b[1].score - a[1].score);
  
  if (anim > 0.8) {
    // HÁDANKÁŘI (levý panel)
    if (riddleArr.length > 0) {
      push();
      let rY = bY + 30;
      let panelW = mvpArr.length > 0 ? W/2 - 50 : W - 60;
      fill(10, 15, 30, 230); stroke(0, 242, 254); strokeWeight(2);
      rect(30, rY, panelW, 38 + riddleArr.length * 32, 12);

      drawingContext.shadowBlur = 15;
      drawingContext.shadowColor = 'rgba(0, 242, 254, 0.6)';
      fill(0, 242, 254); noStroke(); textSize(15); textAlign(CENTER, TOP); textStyle(BOLD);
      text("\uD83E\uDDE0 TOP HÁDANKÁŘI", 30 + panelW/2, rY + 8);
      drawingContext.shadowBlur = 0;

      for (let j = 0; j < riddleArr.length; j++) {
          let rName = riddleArr[j][0];
          let rCount = riddleArr[j][1];
          let ry = rY + 36 + j * 32;
          let rankCol = j === 0 ? color(255, 215, 0) : (j === 1 ? color(192, 192, 192) : (j === 2 ? color(205, 127, 50) : color(180)));
          
          fill(255, 255, 255, 15); noStroke();
          rect(40, ry - 12, panelW - 20, 28, 6);
          
          let ax = 60;
          if (userAvatars[rName] && userAvatars[rName] !== "loaded") {
              imageMode(CENTER); image(userAvatars[rName], ax, ry, 22, 22);
          } else {
              fill(rankCol); noStroke(); ellipse(ax, ry, 22);
          }
          
          fill(rankCol); noStroke(); textAlign(LEFT, CENTER); textSize(13); textStyle(BOLD);
          text((j+1) + ". " + rName.substring(0, 10), 78, ry);
          fill(0, 242, 254); textAlign(RIGHT, CENTER); textSize(13);
          text(rCount + "x \uD83C\uDFAF", 30 + panelW - 15, ry);
      }
      pop();
    }

    // DÁRCI (pravý panel nebo celý pokud nejsou hádankáři)
    if (mvpArr.length > 0) {
      push();
      let donorX = riddleArr.length > 0 ? W/2 + 10 : 30;
      let donorW = riddleArr.length > 0 ? W/2 - 40 : W - 60;
      let donorY = bY + 30;
      let donorItemCount = Math.min(mvpArr.length, 5);
      fill(10, 15, 30, 230); stroke(255, 215, 0); strokeWeight(2);
      rect(donorX, donorY, donorW, 38 + donorItemCount * 32, 12);

      drawingContext.shadowBlur = 15;
      drawingContext.shadowColor = 'rgba(255, 215, 0, 0.6)';
      fill(255, 215, 0); noStroke(); textSize(15); textAlign(CENTER, TOP); textStyle(BOLD);
      text("\uD83D\uDC8E DÁRCI KOLA", donorX + donorW/2, donorY + 8);
      drawingContext.shadowBlur = 0;

      for (let j = 0; j < donorItemCount; j++) {
          let dData = mvpArr[j];
          let dName = dData[0];
          let dScore = dData[1].score;
          let dColor = dData[1].color;
          let dAv = dData[1].avatar;
          let dy = donorY + 36 + j * 32;
          
          fill(255, 255, 255, 15); noStroke();
          rect(donorX + 10, dy - 12, donorW - 20, 28, 6);
          
          let ax = donorX + 30;
          if (dAv && dAv !== "loaded") {
              imageMode(CENTER); image(dAv, ax, dy, 22, 22);
          } else {
              fill(dColor); noStroke(); ellipse(ax, dy, 22);
          }
          
          fill(dColor); noStroke(); textAlign(LEFT, CENTER); textSize(13); textStyle(BOLD);
          text((j+1) + ". " + dName.substring(0, 10), ax + 18, dy);
          fill(255, 215, 0); textAlign(RIGHT, CENTER); textSize(13);
          text(dScore.toLocaleString() + " \uD83D\uDC8E", donorX + donorW - 15, dy);
      }
      pop();
    }
  }

  // --- SEZNAM DALŠÍCH HRÁČŮ ---
  let panelMaxItems = Math.max(riddleArr.length, Math.min(mvpArr.length, 5));
  let panelH = panelMaxItems > 0 ? 38 + panelMaxItems * 32 : 0;
  let listStartY = bY + 30 + panelH + 20;
  textAlign(LEFT, CENTER); 
  let maxListItems = 10;
  let listLimit = Math.min(sorted.length, maxListItems);
  
  if (listLimit > 3 && anim > 0.8) {
      push();
      let listH = (listLimit - 3) * 30 + 10;
      fill(10, 15, 30, 200); stroke(100, 100, 120); strokeWeight(1);
      rect(W/2 - 230, listStartY - 15, 460, listH, 10);
      pop();
  }
  
  for (let i = 3; i < listLimit; i++) {
    let p = sorted[i]; let yPos = listStartY + (i-3) * 30;
    fill(i % 2 === 0 ? color(255, 255, 255, 20) : color(255, 255, 255, 8)); noStroke();
    rect(W/2 - 220, yPos - 13, 440, 28, 6);
    
    fill(200); textSize(14); textStyle(BOLD); text((i + 1) + ".", W/2 - 200, yPos);
    
    if (userAvatars[p.name] && userAvatars[p.name] !== "loaded") {
        drawingContext.save(); drawingContext.beginPath(); drawingContext.arc(W/2 - 165, yPos, 11, 0, TWO_PI); drawingContext.clip();
        image(userAvatars[p.name], W/2 - 165, yPos, 22, 22); drawingContext.restore();
    }
    fill(255); textStyle(NORMAL); textSize(14); text(p.name.substring(0, 14), W/2 - 145, yPos);
    textAlign(RIGHT, CENTER); fill(255); textStyle(BOLD); textSize(14);
    text(Math.floor(Math.max(0, p.hp)).toLocaleString() + " HP", W/2 + 210, yPos);
    textAlign(LEFT, CENTER); 
  }
  
  // --- TIMER ---
  let timerY = ARENA_BOT - 40; 
  fill(0, 0, 0, 230); stroke(255, 50, 50); strokeWeight(2); rect(W/2 - 160, timerY - 22, 320, 44, 12);
  noStroke(); fill(255); textSize(18); textAlign(CENTER, CENTER); textStyle(BOLD);
  text(T[currentLang].NEXT + " " + resultsTimer + "s", W/2, timerY); textStyle(NORMAL);
  
  if (frameCount % 60 === 0) { resultsTimer--; if (resultsTimer <= 0) { maxResultsTimer = 5; resultsTimer = 5; startNewRound(); } } 
}

function draw() {
  // AmbientnĂ­ plynulĂˇ zmÄ›na barvy celĂ© arĂ©ny (za 1 minutu se hue posune o 180 stupĹĹŻ)
  colorMode(HSB, 360, 100, 100, 1);
  let currentHue = (millis() * 0.003) % 360; 
  
  roundThemeColor = color(currentHue, 80, 100);
  roundThemeColorDark = color(currentHue, 80, 40, 0.5);
  
  let dynamicBg = color(currentHue, 45, 8); 
  colorMode(RGB, 255);
  
  // --- SMART BOT FILLER (Boti doplĹujĂ­ arĂ©nu pro "ĹˇĹĄavnatĂ˝" pocit) ---
  let realPlayersCount = players.filter(p => !p.isBot && !p.isZombie).length;
  let botCount = players.filter(p => p.isBot).length;
  let totalAlive = realPlayersCount + botCount;

  // 1. NeustĂˇlĂ© doplĹovĂˇnĂ­: UdrĹľujeme vĹľdy kolem 100 cĂ­lĹŻ
  let targetTotal = 110;
  if (totalAlive < targetTotal) {
      if (millis() > nextBotSpawnTime) {
          spawnIdleBot();
          // Pokud je v arĂ©nÄ› hodnÄ› prĂˇzdno, spawnovat rychleji (kaĹľdĂ˝ch 300-500ms)
          let spawnInterval = totalAlive < 50 ? 400 : 800;
          nextBotSpawnTime = millis() + random(spawnInterval, spawnInterval * 1.5);
      }
  }

  // 2. PostupnĂ© mizenĂ­: Pouze pokud celkovĂ˝ poÄŤet vĂ˝raznÄ› pĹ™ekroÄŤĂ­ limit nebo je v arĂ©nÄ› hromada lidĂ­ (50+)
  if (realPlayersCount > 50 && botCount > 20) {
      if (frameCount % 60 === 0) { // 1x za vteĹ™inu uvolnit mĂ­sto pro reĂˇlnĂ© lidi
          let botToKill = players.find(p => p.isBot);
          if (botToKill) botToKill.hp = 0;
      }
  } else if (totalAlive > targetTotal + 10 && botCount > 0) {
      if (frameCount % 120 === 0) { // PomalejĹˇĂ­ ÄŤistÄ›nĂ­ nadbyteÄŤnĂ˝ch botĹŻ nad limit
          let botToKill = players.find(p => p.isBot);
          if (botToKill) botToKill.hp = 0;
      }
  }
  
  // --- ÄŚISTĂť CHROMA KEY PRO DAYZ POZADĂŤ ---
  background(0, 255, 0); // Dokonale ÄŤistĂˇ zelenĂˇ pro OBS klĂ­ÄŤovĂˇnĂ­

  // --- POZADĂŤ ARĂ‰NY ODSTRANÄšNO PRO CHROMA KEY ---
  handleBossPlanet(); // PĹIDĂNO: ZpracovĂˇnĂ­ a vykreslenĂ­ Ego Smash planet

  // --- GALAXINKO WARS PULSUJĂŤCĂŤ NĂPIS NA POZADĂŤ ARĂ‰NY ---
  // --- TITUL NA POZADĂŤ ODSTRANÄšNO ---

function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data); 
      let evt = d?.event || d?.type || ""; 
      let n = d?.data?.nickname || d?.nickname || d?.data?.uniqueId || d?.uniqueId || "Anonym";
      if (n === "Anonym") return;
      
      // RESET IDLE TIMERU PĹI JAKĂ‰KOLIV AKCI ZE SOCKETU
      lastRealInteractionTime = millis();
      
      let u = n.substring(0, 15);
      
      let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
      if (imgUrl && !userAvatars[u]) {
          userAvatars[u] = "loaded";
          loadImage(imgUrl, img => { 
              let g = createGraphics(100, 100);
              g.clear();
              g.noStroke();
              g.fill(255);
              g.circle(50, 50, 100);
              g.drawingContext.globalCompositeOperation = 'source-in';
              g.image(img, 0, 0, 100, 100);
              userAvatars[u] = g; 
          }, () => { delete userAvatars[u]; });
      }
      
      if (evt === "follow") {
          playFollowSound();
          addNotification('FOLLOW', u, userAvatars[u]);
      }
      
      if (evt === "block" || evt === "ban" || evt === "user_block" || evt === "user_ban") {
          removePlayerCompletely(u);
          return;
      }
      
      if (!players.find(x => x.name === u) && evt !== "gift") {
          spawnPlayer(u, getStartingHp(u));
          addNotification('JOIN', u, userAvatars[u]); // NovĂ˝ ĹˇtĂ­tek pro pĹ™ipojenĂ­
      }

      if (evt === "chat") {
          let msg = (d?.data?.comment || "").trim();
          let msgLower = msg.toLowerCase();
          let p = players.find(x => x.name === u);
          
          // OĹľivenĂ­ zombĂ­ka pĹ™i jakĂ©mkoliv chatu
          if (p && p.isZombie) {
              reviveZombie(p);
          }

          playChatSound();

          if (p && (msgLower.startsWith("!shield") || msgLower.startsWith("shield")) && p.shieldCooldown <= 0) {
              p.shieldCooldown = 60 * 60; // 60 vteĹ™in cooldown
              p.immunityTimer = Math.max(p.immunityTimer, 2.5 * 60); // 2.5 sekundy ĹˇtĂ­t
              addPopup("SHIELD!", p.body.position.x, p.body.position.y - p.r, color(100, 50, 255));
              safePlaySound(pentatonic('high'), 0.05, 0.3);
              addNotification('SHIELD', u, userAvatars[u]);
          }
          else if (p && (msgLower.startsWith("!repost") || msgLower.startsWith("repost")) && !p.hasUsedRepost) {
              p.hasUsedRepost = true; // Lze pouĹľĂ­t jen jednou za Ĺľivot/kolo
              p.hp += 500;
              p.likeBuffTimer = Math.max(p.likeBuffTimer || 0, millis() + 5000); // Nepřepíše delší bonus
              addPopup("REPOST BONUS!", p.body.position.x, p.body.position.y - p.r, color(255, 215, 0));
              createParticles(p.body.position.x, p.body.position.y, color(255, 215, 0), 50);
              safePlaySound(pentatonic('high'), 0.08, 0.4);
              let cleanU = cleanNameForTTS(u);
              speakTTS(currentLang === "CZ" ? `HrĂˇÄŤ ${cleanU} objevil skrytĂ˝ bonus!` : `Player ${cleanU} found a hidden bonus!`);
              addNotification('BOOST', u, userAvatars[u], "REPOST"); 
          }
          else if (!p && (msgLower === "!join" || msgLower === "join")) {
              handleAction(u, 100, false, 0, true);
              addNotification('JOIN', u, userAvatars[u]);
              let cleanU = cleanNameForTTS(u);
              speakTTS(currentLang === "CZ" ? `HrĂˇÄŤ ${cleanU} se pĹ™ipojil s bonusem!` : `Player ${cleanU} joined with a bonus!`);
          }
          else if (p && (msgLower === "!join" || msgLower === "join")) {
              let now = millis();
              if (!p.lastJoinBoost || now - p.lastJoinBoost >= 300000) {
                  p.lastJoinBoost = now;
                  if (!egoQueue.includes(u)) egoQueue.push(u);
                  handleAction(u, 100, false, 0, true);
                  
                  if (p.body) {
                      let boostPower = 12; 
                      let angle = random(TWO_PI);
                      Matter.Body.setVelocity(p.body, { 
                          x: p.body.velocity.x + cos(angle) * boostPower, 
                          y: p.body.velocity.y + sin(angle) * boostPower 
                      });
                  }
                  addPopup("RE-JOIN BOOST!", p.body.position.x, p.body.position.y - p.r, color(255, 215, 0));
              }
          }

          // --- LOGIKA TÄšĹ˝KĂťCH HĂDANEK ---
          let guess = removeDiacritics(msg).toLowerCase().trim();
          if (isRiddleModeActive && activeRiddle.answer && guess === activeRiddle.answer) {
              let winnerP = players.find(x => x.name === u);
              if (winnerP) {
                  winnerP.hp += 500;
                  winnerP.orbSpeedTimer = Math.max(winnerP.orbSpeedTimer, 10 * 60); 
              } else {
                  handleAction(u, 500, false, 0, true);
                  setTimeout(() => {
                      let newP = players.find(x => x.name === u);
                      if (newP) newP.orbSpeedTimer = 10 * 60;
                  }, 500);
              }
              
              clearTimeout(autoSkipRiddleTimer); // Zastavit odpoÄŤet
              clearTimeout(riddleHintTimer);
              addPopup("UHODL!", W/2, (ARENA_TOP+ARENA_BOT)/2, color(255, 215, 0), true);
              createParticles(W/2, (ARENA_TOP+ARENA_BOT)/2, color(255, 215, 0), 100);
              
              let prevDisplayAnswer = activeRiddle.displayAnswer || activeRiddle.answer;
              riddleWins[u] = (riddleWins[u] || 0) + 1; // Počítadlo hádanek
              let cleanU = cleanNameForTTS(u);
              speakTTS(currentLang === "CZ" ? `${cleanU} uhodl, je to ${prevDisplayAnswer}!` : `${cleanU} guessed correctly!`);
              
              // Aktivovat pilu (saw) po celou dobu bonusu
              if (winnerP) {
                  winnerP.likeBuffTimer = Math.max(winnerP.likeBuffTimer, millis() + 10000); // 10s pila
              }
              
              // ZobrazĂ­ vĂ˝herce pĹ™Ă­mo v banneru hĂˇdanky na 5 vteĹ™in
              activeRiddle = { question: "VĂťHERCE", answer: null, winner: u, revealedAnswer: prevDisplayAnswer };
              
              // Za 5 vteĹ™in skrĂ˝t banner, pak nĂˇhodnĂˇ pauza 5-30s pĹ™ed dalĹˇĂ­ hĂˇdankou
              setTimeout(() => {
                  activeRiddle = { question: null, answer: null };
                  setTimeout(generateNewRiddle, random(5000, 30000));
              }, 5000);
          }
            handleAction(u, 10, false, 0, false); 
      }
      else if (evt === "like") {
          let likesCount = d.data?.likeCount || 1;
          sessionLikes[u] = (sessionLikes[u] || 0) + likesCount;
          
          if(!pendingLikes[u]) pendingLikes[u] = { count: 0, lastUpdate: millis() };
          pendingLikes[u].count += likesCount;

      else if (evt === "share") {

              p.likeBuffTimer = millis() + 10000;

          }

      else if (evt === "gift") {

          playWhooshSound();
          
          // --- 1. FOMO PROGRESS (SÄŤĂ­tĂˇnĂ­ pro vĹˇechny) ---
          lastEnergyAddedTime = millis();
          roundTotalCoins += diam;

          // --- PĹIDĂNO: PRODLOUĹ˝ENĂŤ KOLA (1 coin = 1s) ---

          if (roundTimerFrames >= maxRoundTimer * 60) {
              roundTimerFrames = maxRoundTimer * 60; // Zastropuje se, neprodluĹľuje max dĂ©lku kola
              roundTimerPause = 60; // 1 vteĹ™ina ÄŤekĂˇnĂ­ po poslednĂ­m donatu na startovnĂ­ ÄŤĂˇĹ™e
          }
          
          roundTimer = Math.ceil(roundTimerFrames / 60);
          let wPos = screenToWorld(shipX, shipY);
          addPopup("đźŚą +" + diam + "s", wPos.x + random(-20, 20), wPos.y - random(30, 60), color(255, 50, 100), true);

          // Fading logic pro posledniho donatora
          if (currentLastGifter.name === "") {
              currentLastGifter = {name: u, coins: diam, img: userAvatars[u]};
              gifterFadeAlpha = 255;
          } else {
              nextLastGifter = {name: u, coins: diam, img: userAvatars[u]};
          }

          if (roundTotalCoins >= ARMAGEDDON_GOAL && !globalArmageddonActive) {

              screenShake = 50;
              addPopup("đźš¨ GLOBAL ARMAGEDDON UNLOCKED! đźš¨", W/2, H/2, color(255, 0, 0), true);
              safePlaySound(pentatonic('low'), 0.12, 0.8); 
              speakTTS(currentLang === "CZ" ? "KomunitnĂ­ cĂ­l splnÄ›n! GlobĂˇlnĂ­ Armagedon odemÄŤen!" : "Community goal reached! Global Armageddon unlocked!", true);
          }

              topGifterBannerTimer = 600; // 10 vteĹ™in zablokuje bÄ›ĹľnĂ© notifikace!
          } else if (diam >= 100) {

              if (!roundGiftStreaks[u]) roundGiftStreaks[u] = 0;

          }

          // Tohle zajistĂ­ spawn i provedenĂ­ fyzickĂ˝ch efektĹŻ (Armagedon, Nuke, Black Hole...)
          handleAction(u, 0, true, diam, true, comboMult); 
          let p = players.find(x => x.name === u);
          
          if (p) {

              if (comboMult >= 3 && !p.isLegendary) {
