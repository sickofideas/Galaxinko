                  addPopup("đźŚź LEGENDARY SPONSOR! đźŚź", p.body.position.x, p.body.position.y - 60, color(255, 215, 0), true);
              }

              // Aplikace novĂ˝ch speciĂˇlnĂ­ch vlastnostĂ­ z TIER SYSTĂ‰MU
              if (diam >= 10000) {
                  p.isGodMode = true;
                  p.godModeTimer = 60 * 60; // 60 vteĹ™in
                  p.hasRainbowCrown = true;
                  p.hasFireTrail = true;
                  arenaRedTimer = Math.max(arenaRedTimer, 60 * 60); // ArĂ©na zÄŤervenĂˇ na minutu!
              } else if (diam >= 5000) {
                  p.hasRainbowCrown = true;
                  p.hasFireTrail = true; // ZĹŻstane navĹľdy
              }
          }

          let col = p ? p.color : color(255);
          updateGiftLB(u, diam, col);
          
          if (!roundGifts[u]) roundGifts[u] = { score: 0, color: col, avatar: userAvatars[u] || null };
          roundGifts[u].score += diam;
          if (userAvatars[u]) roundGifts[u].avatar = userAvatars[u];

          addNotification('GIFT', u, userAvatars[u], diam);

          let cleanU = cleanNameForTTS(u);
          if (diam >= 100) {
              if (diam >= 1000) {
                  let msg = random(COMMENTARY_GIFT[currentLang]).replace("{p}", cleanU);
                  speakTTS(msg, true);
              } else {
                  let giftMsgsCZ = ["DĂ­ky, " + cleanU + "!", "Super, " + cleanU + "!", "Pecka, " + cleanU + "!", "DĂ­ky za podporu!"];
                  speakTTS(random(giftMsgsCZ), true);
              }
          } else {
              // MalĂ© dĂˇrky (rĹŻĹľe) - dÄ›kujeme jen pĹ™i nĂˇloĹľi (5+)
              if (!giftThrottle[u]) giftThrottle[u] = { count: 0, lastTTS: 0 };
              giftThrottle[u].count += 1;
              
              if (giftThrottle[u].count >= 5 && millis() - giftThrottle[u].lastTTS > 8000) {
                  let comboMsgsCZ = ["DĂ­ky za nĂˇloĹľ, " + cleanU + "!", "PĂˇni, " + cleanU + " to tam sype!", "SkvÄ›lĂˇ sĂ©rie, " + cleanU + "!"];
                  speakTTS(random(comboMsgsCZ), true);
                  giftThrottle[u].count = 0;
                  giftThrottle[u].lastTTS = millis();
              }
          }
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function removeDiacritics(text) {
    return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

let zenskyHlas = null;

function nactiHlasy() {
    if (!('speechSynthesis' in window)) return;
    let voices = window.speechSynthesis.getVoices();
    // Priorita: Vlasta (Windows), pak Google ÄŤeĹˇtina (Chrome), pak jakĂˇkoliv ÄŤeĹˇtina
    zenskyHlas = voices.find(v => v.name.toLowerCase().includes('vlasta')) || 
                 voices.find(v => v.name.includes('Google') && v.lang.includes('cs')) ||
                 voices.find(v => v.lang.includes('cs'));
}

if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = nactiHlasy;
}
nactiHlasy();

function speakTTS(txt, force = false) {
  if (!('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();

  if (!force && millis() - lastSpeakTime < 12000) return;

  // Agresivní odstranění emoji a speciálních znaků
  let cleanTxt = txt
      .replace(/[\u{0080}-\u{00FF}]/gu, '') // Latin extended chars that TTS reads weirdly
      .replace(/[\u{1F000}-\u{1FFFF}]/gu, '') // Emoticons, symbols, flags
      .replace(/[\u{2600}-\u{27BF}]/gu, '') // Misc symbols, dingbats
      .replace(/[\u{FE00}-\u{FEFF}]/gu, '') // Variation selectors
      .replace(/[\u{200B}-\u{200F}\u{2028}-\u{202F}\u{2060}-\u{206F}]/gu, '') // Zero-width, invisible
      .replace(/[\u{E000}-\u{F8FF}]/gu, '') // Private use area
      .replace(/[\u{10000}-\u{10FFFF}]/gu, '') // Supplementary planes (emoji, rare symbols)
      .replace(/[^\p{L}\p{N}\s.,!?:+\-()]/gu, '') // Keep only letters, numbers, basic punctuation
      .replace(/\s+/g, ' ').trim();
  if (cleanTxt.length > 80) cleanTxt = cleanTxt.substring(0, 80);
  
  let checkText = removeDiacritics(cleanTxt.toLowerCase()).replace(/[\s\.\-_]/g, "");
  for (let word of FORBIDDEN_WORDS) {
      if (checkText.includes(word)) return;
  }

  var msg = new SpeechSynthesisUtterance(cleanTxt);
  msg.lang = 'cs-CZ';

  if (zenskyHlas) {
      msg.voice = zenskyHlas;
      msg.pitch = 1.1; 
  } else {
      msg.pitch = 1.4; 
  }
  
  msg.rate = 1.1; 
  
  window.speechSynthesis.speak(msg);
  lastSpeakTime = millis();
}
function mousePressed() {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  // Reset FOMO baru manuĂˇlnÄ› po kliknutĂ­ kamkoli do prostoru liĹˇty
  if (mouseY > ARENA_TOP + 10 && mouseY < ARENA_TOP + 60 && mouseX > W/2 - (W*0.85)/2 && mouseX < W/2 + (W*0.85)/2) {
      roundTotalCoins = 0;
      globalArmageddonActive = false;
      arenaRedTimer = 0;
      currentLastGifter = {name: "", coins: 0, img: null};
      nextLastGifter = null;
      safePlaySound(pentatonic('mid'), 0.04, 0.3);

  }

  if (showLeaderboards) {
      if (mouseX > allTimeLbRect.x && mouseX < allTimeLbRect.x + allTimeLbRect.w && mouseY > allTimeLbRect.y && mouseY < allTimeLbRect.y + allTimeLbRect.h) { 
          allTimeHpLeaderboard = {}; 
          localStorage.removeItem('galaxinko_alltime_hp');
          safePlaySound(pentatonic('mid'), 0.04, 0.3); 
      }
          if (mouseX > giftLbRect.x && mouseX < giftLbRect.x + giftLbRect.w && mouseY > giftLbRect.y && mouseY < giftLbRect.y + giftLbRect.h) { 
              allTimeGifts = {};

              safePlaySound(pentatonic('mid'), 0.04, 0.3); 
          }
          if (mouseX > killsLbRect.x && mouseX < killsLbRect.x + killsLbRect.w && mouseY > killsLbRect.y && mouseY < killsLbRect.y + killsLbRect.h) { 
              allTimeKills = {}; 
              localStorage.removeItem('galaxinko_alltime_kills');
              safePlaySound(pentatonic('mid'), 0.04, 0.3); 
          }
  }
}
