    });
}

function drawNotifications() {
  // CHROMA KEY pozadńā¬≠ - pln√Ą‚Äļ zelenńā¬© pro prńĻŇĽhlednost v OBS
  fill(0, 255, 0);
  noStroke();
  rect(0, ARENA_BOT, W, H - ARENA_BOT);

  if (!showBottomNotifications) return;

  // ZvńāňĚńĻňáńā¬≠me v√Ą‚Äļk aktuńāňáln√Ą‚Äļ zobrazenńāňĚm notifikacńā¬≠m
  for (let n of notifications) {
      if (n.state === 'DISPLAY') n.age++;
  }

  // Logika pro zańĻ‚ĄĘazovńāňánńā¬≠ do fronty zobrazenńā¬≠
  let displayed = notifications.filter(n => n.state === 'DISPLAY');
  let waiting = notifications.filter(n => n.state === 'WAITING');

  // AUTO-DISMISS: Notifikace zmizńā¬≠ po ~4 sekundńāňách neaktivity (ńĻńĺńāňádnńā¬© novńā¬© ve front√Ą‚Äļ)
  if (waiting.length === 0 && displayed.length > 0) {
      for (let n of displayed) {
          let maxAge = n.type === 'GIFT' ? 360 : 240; // Dńāňárky vydrńĻńĺńā¬≠ 6s, ostatnńā¬≠ 4s
          if (n.age >= maxAge) {
              n.state = 'LEAVING';
          }
      }
      // Odstranńā¬≠ opouńĻňát√Ą‚Äļjńā¬≠cńā¬≠ z displayed pole
      displayed = displayed.filter(n => n.state === 'DISPLAY');
  }

  if (waiting.length > 0) {
      // 1. VIP PńĻ¬ėEDNOST: Dńāňárky pńĻ‚ĄĘeskakujńā¬≠ frontu na prvnńā¬≠ mńā¬≠sto
      waiting.sort((a, b) => (a.type === 'GIFT' ? -1 : (b.type === 'GIFT' ? 1 : 0)));

      if (displayed.length >= 4) { // PńĻ¬ėIDńā¬ĀNO: Mńā¬≠sto pro 4 menńĻňáńā¬≠ notifikace
          // 2. √ĄŇöASOVńā¬ĀNńāŇ§: Dńāňárky drńĻńĺńā¬≠ dńā¬©le, ostatnńā¬≠ rychleji mizńā¬≠
          let requiredAge = displayed[0].type === 'GIFT' ? 300 : 120;
          
          // 3. VYHAZOVńā¬ĀK: Pokud √ĄŇĻekńāňá Dńāňárek a zavazńā¬≠ tam oby√ĄŇĻejnńāňá v√Ą‚Äļc
          if (waiting[0].type === 'GIFT' && displayed[0].type !== 'GIFT' && displayed[0].age >= 40) {
              requiredAge = 40; 
          }

          if (displayed[0].age >= requiredAge) {
              displayed[0].state = 'LEAVING';
              displayed.shift(); 
          }
      }
      if (displayed.length < 4) {
          let next = waiting[0];
          next.state = 'DISPLAY';
          next.x = W + 300; // Start zprava
          displayed.push(next);
      }
  }

  // Ur√ĄŇĻńā¬≠me pozice pro aktuńāňáln√Ą‚Äļ zobrazenńā¬© (nejnov√Ą‚ÄļjńĻňáńā¬≠ napravo)
  displayed.reverse();
  for (let i = 0; i < displayed.length; i++) {
      displayed[i].targetX = W - 175 - (i * 180); // UńĻńĺńĻňáńā¬≠ mezery
  }

  for (let n of notifications) {
      if (n.state === 'WAITING') continue;
      
      if (n.state === 'LEAVING') n.targetX = -300;
      
      n.x = lerp(n.x, n.targetX, 0.15);
      
      push();
      translate(n.x, ARENA_BOT + 12);
      
      let actionText, icon;
      colorMode(HSB);
      let hueShift = sin(frameCount * 0.05 + n.age * 0.1) * 25;
      let borderColor;
      
      // ZM√ĄŇ§NA TEXTńĻ¬ģ: Skrytńā¬≠ "Follow", "Like", "Join" za hernńā¬≠ lore (TikTok AI friendly)
      if (n.type === 'JOIN') { borderColor = color((120 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "VńāňĚsadek" : "Deployed"; icon = "√Ą‚ÄėńĻŇüńĻňá√Ę‚Äö¬¨"; }
      else if (n.type === 'FOLLOW') { borderColor = color((300 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "Radar lock" : "Radar lock"; icon = "√Ą‚ÄėńĻŇü√Ę‚ā¨Ňõ√č‚Ä°"; }
      else if (n.type === 'LIKE') { borderColor = color((0 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? `Energie +${n.extra}` : `Energy +${n.extra}`; icon = "ńāňėńĻňá√č‚Ä°"; }
      else if (n.type === 'BOOST') { borderColor = color((180 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "Pohon!" : "Thrusters!"; icon = "ńāňė√ā¬ė√Ę‚ā¨Ňĺ√ĄŇĻ√ā¬łńĻńÖ"; }
      else if (n.type === 'SHIELD') { borderColor = color((270 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "ńĻ¬†tńā¬≠ty!" : "Shields!"; icon = "√Ą‚ÄėńĻŇü√Ę‚ā¨Ňü√č‚Ä°√ĄŇĻ√ā¬łńĻńÖ"; }
      else if (n.type === 'CODE') { borderColor = color((50 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? "Hack" : "Hack"; icon = "√Ą‚ÄėńĻŇü√Ę‚ā¨‚ĄĘ√ā¬Ľ"; }
      else if (n.type === 'GIFT') { 
          colorMode(HSB);
          borderColor = color((frameCount * 5) % 360, 100, 100); 
          colorMode(RGB);
          actionText = currentLang === "CZ" ? `DROP (${n.extra})` : `DROP (${n.extra})`; 
          icon = n.extra >= 1000 ? "√Ą‚ÄėńĻŇü√Ę‚ā¨Ňü√ā¬ł" : (n.extra >= 100 ? "√Ą‚ÄėńĻŇü√Ę‚ā¨Ňõ√ā¬¶" : "√Ą‚ÄėńĻŇü√Ę‚ā¨Ňü√ā¬į√ĄŇĻ√ā¬łńĻńÖ"); 
      }
      else { borderColor = color(0, 0, 100); actionText = "Akce"; icon = "ńāňėńĻ‚Äļ√ā¬®"; }
      colorMode(RGB);
      
      // CHROMA KEY pozadńā¬≠ karet - pln√Ą‚Äļ zelenńā¬© pro prńĻŇĽhlednost v OBS
      if (n.type === 'GIFT' && n.extra >= 100) {
          fill(0, 255, 0); 
          stroke(borderColor); 
          strokeWeight(2 + sin(frameCount * 0.2)); 
          drawingContext.shadowBlur = 0;
      } else {
          fill(0, 255, 0);
          stroke(borderColor); 
          strokeWeight(1.5);
          drawingContext.shadowBlur = 0;
      }
      
      // Vykreslenńā¬≠ zkosenńā¬©ho rńāňáme√ĄŇĻku (Sci-fi panel)
      beginShape();
      vertex(8, 0);
      vertex(170, 0);
      vertex(170, 36);
      vertex(162, 44);
      vertex(0, 44);
      vertex(0, 8);
      endShape(CLOSE);
      drawingContext.shadowBlur = 0; 
      
      let currentAvatar = userAvatars[n.name] || n.img;
      let avSize = 28;
      if (currentAvatar && currentAvatar !== "loaded") {
          imageMode(CENTER);
          image(currentAvatar, 22, 22, avSize, avSize);
      } else {
          fill(80); noStroke(); ellipse(22, 22, avSize, avSize);
      }
      
      textAlign(LEFT, CENTER);
      fill(255); textSize(11); textStyle(BOLD); noStroke();
      text((n.name || "").substring(0, 11), 42, 14);
      
      let actionTextColor = borderColor;
      if (n.type === 'LIKE' && n.extra >= 100) {
          colorMode(HSB); actionTextColor = color((frameCount * 8) % 360, 80, 100); colorMode(RGB);
      } else if (n.type === 'LIKE' && n.isMegaLike) {
          actionTextColor = color(255, 215, 0); 
      } else if (n.type === 'GIFT') {
          colorMode(HSB); actionTextColor = color((frameCount * 5 + 180) % 360, 80, 100); colorMode(RGB);
      }
      
      fill(actionTextColor); noStroke();
      textSize(10);
      text(`${icon} ${actionText}`, 42, 30);
      textStyle(NORMAL); // Reset
      
      pop();
  }
  
  notifications = notifications.filter(n => !(n.state === 'LEAVING' && n.x < -200));
}

function drawChatCommands() {
    // Funkci nechńāňáme prńāňázdnou.
    // Texty "TAP TAP" a "!join" jsme smazali, aby TikTok AI nemohla dńāňát ban za "Engagement Bait".
}

function handleCameraAndPlayers() {
  if (players.length === 0) { cameraScale = lerp(cameraScale, 1.0, 0.05); return; }
  
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let isHeavyLoad = players.length > 80;    // DńĻ‚ĄĘńā¬≠v√Ą‚ÄļjńĻňáńā¬≠ ńāŇüleva pro grafiku
  let isExtremeLoad = players.length > 120;  // DńĻ‚ĄĘńā¬≠v√Ą‚ÄļjńĻňáńā¬≠ ńāŇüleva pro grafiku
  let maxV = 4; // SNńāŇ§ńĻňĚENO (z 5)
  
  for (let i = players.length - 1; i >= 0; i--) {
    let p = players[i];
    
    if (!p.isZombie) updateHpLB(p.name, p.hp, p.color);

    let bx = p.body ? p.body.position.x : 0;
    let by = p.body ? p.body.position.y : 0;
    if (!p.body || isNaN(bx) || isNaN(by) || bx < -10000 || bx > W+10000 || by < -10000 || by > H+10000) {
        p.hp = 0; 
    }
    
    if (p.boostCooldown > 0) p.boostCooldown--;
    if (p.shieldCooldown > 0) p.shieldCooldown--;
    if (p.attackCooldown > 0) p.attackCooldown--;

    let targetR = getRadius(p.hp);
    if (Math.abs(targetR - p.r) > 1.0 && p.body && p.hp > 0) {
        let s = targetR / p.r;
        if (isFinite(s) && s > 0) {
            Matter.Body.scale(p.body, s, s);
            p.r = targetR;
            Matter.Body.setDensity(p.body, 0.001 + (p.r * 0.0001));
            // DynamickńāňĚ odpor: V√Ą‚ÄļtńĻňáńā¬≠ koule majńā¬≠ nińĻńĺńĻňáńā¬≠ frictionAir pro lepńĻňáńā¬≠ "prńĻŇĽraznost"
            p.body.frictionAir = 0.06 - Math.min(0.04, Math.sqrt(p.hp) * 0.0004);
        }
    }
    
    if (!isExtremeLoad && p.hp > 0) {
        p.trail.push({x: p.body.position.x, y: p.body.position.y});
        if (p.trail.length > 8) p.trail.shift();
    } else {
        p.trail = [];
    }
    
    if (p.hp <= 0) {
      // PńĻ¬ėIDńā¬ĀNO: Zapsńāňánńā¬≠ do fronty na ońĻńĺivenńā¬≠ (jen pokud dal hrńāňá√ĄŇĻ alespońĻ¬ą jeden like)
      if (sessionLikes[p.name] > 0) {
          deadPlayersQueue.push({name: p.name, timeOfDeath: millis(), respawnDelay: 20000 + random(500, 20000)}); // 20s cooldown + nńāňáhodnńāňĚ √ĄŇĻas (0.5s - 20s)
      }
      
      if (p.body && !isNaN(p.body.position.x)) {
          let px = p.body.position.x;
          let py = p.body.position.y;

          // EFEKT GRANńā¬ĀTU: Odstr√ĄŇĻenńā¬≠ nejblińĻńĺńĻňáńā¬≠ch hrńāňá√ĄŇĻńĻŇĽ
          for (let other of players) {
              if (other === p || !other.body) continue;
              let dx = other.body.position.x - px;
              let dy = other.body.position.y - py;
              let distSq = dx*dx + dy*dy;
              let effectRadius = p.r + 150; // Dosah exploze zvńāňĚńĻňáen pro v√Ą‚ÄļtńĻňáńā¬≠ dopad
              let effectRadiusSq = effectRadius * effectRadius;
              
              if (distSq < effectRadiusSq && distSq > 0) {
                  let dist = Math.sqrt(distSq); // PotńĻ‚ĄĘebujeme pro vńāňĚpo√ĄŇĻet sńā¬≠ly
                  let forceMag = 0.008 * other.body.mass * (effectRadius / dist); // Snńā¬≠ńĻńĺeno o 1/3
                  forceMag = Math.min(forceMag, 0.08 * other.body.mass); // Max odhoz snńā¬≠ńĻńĺen o 1/3
                  Matter.Body.applyForce(other.body, other.body.position, {
                      x: (dx / dist) * forceMag,
                      y: (dy / dist) * forceMag
                  });

                  // --- ODSTRAN√ĄŇ§NO: POńĻ¬†KOZENńāŇ§ OKOLńāŇ§ (ZpńĻŇĽsobovalo ńĻ‚ĄĘet√Ą‚Äļzovou reakci a "pńāňád" arńā¬©ny) ---
              }
          }

          if (!isHeavyLoad) {
              if (p.isZombie) {
                  createParticles(px, py, color(0, 255, 255), 20); // Zm√Ą‚Äļn√Ą‚Äļno ze zelenńā¬© na azurovou pro Chroma Key
                  safePlaySound(pentatonic('low'), 0.01, 0.2); 
              } else {
                  createParticles(px, py, p.color, 35); // Vńā¬≠ce √ĄŇĻńāňástic pro hrńāňá√ĄŇĻe
                  deathShockwaves.push({x: px, y: py, r: p.r, color: p.color, life: 255});
                  safePlaySound(pentatonic('low'), 0.01, 0.15);
              }
          }
      }
      if (p.body) Matter.World.remove(world, p.body);
      players.splice(i, 1);
      continue;
    }

    // --- BLESKY OD TOP 10 S HP > 1000 (1x za sekundu, -1 HP nejblizsi kouli) ---
    if (currentTop10.includes(p.name) && p.hp >= 1000 && !p.isZombie && frameCount % 60 === (i % 60)) {
        let closest = null;
        let closestDist = Infinity;
        for (let other of players) {
            if (other === p || other.hp <= 0 || other.immunityTimer > 0 || !other.body) continue;
            let ld = dist(p.body.position.x, p.body.position.y, other.body.position.x, other.body.position.y);
            if (ld < closestDist) { closestDist = ld; closest = other; }
        }
        if (closest) {
            closest.hp -= 1;
            if (!isExtremeLoad) {
                lightnings.push({x1: p.body.position.x, y1: p.body.position.y, x2: closest.body.position.x, y2: closest.body.position.y, life: 25, c: p.color});
            }
            if (!isHeavyLoad) createParticles(closest.body.position.x, closest.body.position.y, p.color, 3);
            if (!isHeavyLoad) addPopup("-1", closest.body.position.x, closest.body.position.y, color(255, 100, 100));
            safePlaySound(pentatonic('low'), 0.008, 0.25);
        }
    }
    
    // AFK: zmrazeni po nahodnem casu 45-60s neaktivity, rozmrazeni po nahodnem casu 5-15s √Ę‚Ä†‚Äô cyklus
    // MAX 3 hracu muzou byt zmrazeni najednou (vizual + fyzika), vypocty bezi dal pro vsechny
    if (!p.isBot && !p.isZombie && p.lastActionTime) {
        // Nastavit nahodny prah klidu pri prvnim volani nebo po rozmrazeni
        if (!p.afkDelay) p.afkDelay = 45000 + Math.random() * 15000; // 45-60s
        if (!p.isFrozen && Date.now() - p.lastActionTime > p.afkDelay) {
            // Zmrazit jen pokud neni zadny hrac jiz zmrazeny
            let currentlyFrozen = players.filter(x => x.isFrozen).length;
            if (currentlyFrozen < 1) {
                p.isFrozen = true;
                p.frozenSince = Date.now();
                p.frozenDuration = 5000 + Math.random() * 10000; // 5-15s
                Matter.Body.set(p.body, 'frictionAir', 0.4);
            }
            // Pokud je uz nekdo zmrazeny, timer AFK bezi dal, ale hrace nezmrazujeme
        } else if (p.isFrozen && p.frozenSince && Date.now() - p.frozenSince > (p.frozenDuration || 10000)) {
            // Auto-rozmrazit a dat novy nahodny cas klidu
            p.isFrozen = false;
            p.frozenSince = null;
            p.frozenDuration = null;
            p.afkDelay = 45000 + Math.random() * 15000; // novy nahodny prah 45-60s
            p.lastActionTime = Date.now(); // reset: bude poletovat dalsi cyklus
            Matter.Body.set(p.body, 'frictionAir', 0.08);
        }
    }
    let afkMult = (p.isFrozen) ? 0.02 : 1.0;
    
    // ==========================================
    // N√ĀHODN√Ě CHAOTICK√Ě POHYB (Random drift bez vortexu)
    // ==========================================
    let px = p.body.position.x || W/2;
    let py = p.body.position.y || (ARENA_TOP + ARENA_BOT) / 2;

    // 1. Unik√°tn√≠ n√°hodn√Ĺ smńõr pro kaŇĺdou kulińćku (mńõn√≠ se plynule v ńćase)
    let time = frameCount * 0.015;
    let idOffset = p.body.id * 12.34; 
    
    let dirX = Math.sin(time + idOffset) + Math.cos(time * 0.7 + py * 0.01);
    let dirY = Math.cos(time + idOffset) + Math.sin(time * 0.8 + px * 0.01);

    let len = Math.sqrt(dirX * dirX + dirY * dirY);
    if (len === 0 || isNaN(len)) len = 1; // ANTI-FREEZE

    // Z√°kladn√≠ s√≠la n√°hodn√©ho pohybu
    let forceMag = 0.00018 * p.body.mass * afkMult; 
    let randomFx = (dirX / len) * forceMag;
    let randomFy = (dirY / len) * forceMag;

    // 2. Odtlańćov√°n√≠ od stńõn (Zabr√°n√≠ lepen√≠ do rohŇĮ a na okraje ar√©ny)
    let edgeFx = 0;
    let edgeFy = 0;
    let edgeMargin = 250;
    let pushStrength = 0.00025 * p.body.mass * afkMult;

    if (px < edgeMargin) edgeFx = pushStrength;
    if (px > W - edgeMargin) edgeFx = -pushStrength;
    if (py < ARENA_TOP + edgeMargin) edgeFy = pushStrength;
    if (py > ARENA_BOT - edgeMargin) edgeFy = -pushStrength;

    // 3. Zabr√°n√≠ ucp√°n√≠ √ļpln√©ho stŇôedu (lehk√© odtlańćen√≠, pokud se jich tam potk√° moc)
    let dx = cx - px;
    let dy = cy - py;
    let distToCenter = Math.sqrt(dx * dx + dy * dy);
    if (distToCenter === 0 || isNaN(distToCenter)) distToCenter = 1; // ANTI-FREEZE

    let centerFx = 0;
    let centerFy = 0;
    if (distToCenter < 120) {
        centerFx = -(dx / distToCenter) * 0.00008 * p.body.mass;
        centerFy = -(dy / distToCenter) * 0.00008 * p.body.mass;
    }

    // 4. Fin√°ln√≠ souńćet sil
    let finalFx = randomFx + edgeFx + centerFx;
    let finalFy = randomFy + edgeFy + centerFy;

    // 5. ABSOLUTN√ć ANTI-FREEZE POJISTKA (ochrana proti p√°dŇĮm)
    if (!isFinite(finalFx) || !isFinite(finalFy) || isNaN(finalFx) || isNaN(finalFy)) {
        finalFx = 0; finalFy = 0;
    }
    
    // 6. Aplikace s√≠ly na kulińćku
    Matter.Body.applyForce(p.body, p.body.position, { x: finalFx, y: finalFy });

    let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
    let isTop10 = currentTop10.includes(p.name);
    let tSpd = isTop10 ? 1.6 : 1.3; // SNńāŇ§ńĻňĚENO (z 2.2 / 1.8) pro klidn√Ą‚ÄļjńĻňáńā¬≠ arńā¬©nu
    
    // SńāŇ§LA PODLE HP: √ĄŇöńā¬≠m v√Ą‚ÄļtńĻňáńā¬≠ koule, tńā¬≠m lehce vyńĻňáńĻňáńā¬≠ tah na brńāňánu
    tSpd *= (1.0 + Math.sqrt(p.hp) * 0.0015);
    let currentMaxV = maxV;
    
    // --- POMALńāŇ• Zńā¬ĀKLAD PRO PASIVNńāŇ§ ---
    // Pokud hrńāňá√ĄŇ§/bot nelajkuje, nedal gift v tomto kole nebo neuhodl hńāňádanku, je o 30% pomalejńĻňáńā¬≠
    let hasBonus = isBuffed || (sessionLikes[p.name] > 0) || (roundGifts[p.name] && roundGifts[p.name].score > 0) || (riddleWins[p.name] > 0);
    if (!hasBonus) {
        tSpd *= 0.4;
        currentMaxV *= 0.4;
    }


    // BONUS ZA LIKOVANI: Hracici kteri nekdy lajkli jsou o 25% rychlejsi nez ostatni hrace
    if (!p.isBot && !p.isZombie && sessionLikes[p.name] > 0) {
        tSpd *= 1.25;
        currentMaxV *= 1.25;
    }
    // ZOMBńāŇ§CI SE PLOUńĻňĚńāŇ§ (-60% rychlost)
    if (p.isZombie) {
        tSpd *= 0.4;
        currentMaxV *= 0.4;
    }

    // BOTI JSOU POMALEJńĻ¬†ńāŇ§ (-40% rychlost oproti hrńāňá√ĄŇ§ńĻŇĽm)
    if (p.isBot) {
        tSpd *= 0.3; // Zpomaleno ze 0.6 pro "plouńĻńĺenńā¬≠"
        currentMaxV *= 0.3;
    }

    // --- ZRYCHLENńāŇ§ ZA TAPOVńā¬ĀNńāŇ§ (LIKE BUFF) ---
    // Pokud hrńāňá√ĄŇĻ aktivn√Ą‚Äļ posńā¬≠lńāňá liky, zńā¬≠skńāňá do√ĄŇĻasn√Ą‚Äļ o 100 % vyńĻňáńĻňáńā¬≠ rychlost (kompenzace za pomalejńĻňáńā¬≠ zńāňáklad)
    if (isBuffed) {
        tSpd *= 1.35; 
        currentMaxV *= 2.0;
        
        // Vizuńāňálnńā¬≠ jiskry smazńāňány
    }

    if (p.isBounty) {
        tSpd *= 1.4;
        currentMaxV *= 1.4;
    }
    
    if (p.giftSpeedTimer > 0) {
        p.giftSpeedTimer--;
        let speedMult = map(p.giftSpeedTimer, 0, 300, 1.0, 3.0); // Postupnńā¬© vytrńāňácenńā¬≠ rychlosti
        tSpd *= speedMult;
        currentMaxV *= speedMult;
    }

    if (p.orbSpeedTimer > 0) {
        p.orbSpeedTimer--;
        tSpd *= 5.0;
        currentMaxV *= 5.0;
        // ńĻňĚlutńā¬© jiskry smazńāňány
    }

    if (p.shareCooldown > 0) p.shareCooldown--;

    // --- PLYNULńā‚Äį PńĻ¬ėIDńā¬ĀVńā¬ĀNńāŇ§/UBńāŇ§Rńā¬ĀNńāŇ§ HP (BUFFEROVANńā‚Äį) ---
    if (p.hpBuffer !== 0) {
        // Rychlost zm√Ą‚Äļny: min 1 HP, ale pńĻ‚ĄĘi velkńā¬©m rozdńā¬≠lu zrychlńā¬≠me, aby to netrvalo v√Ą‚Äļ√ĄŇĻnost
        let step = 1;
        if (Math.abs(p.hpBuffer) > 100) step = Math.ceil(Math.abs(p.hpBuffer) / 60);
        
        if (p.hpBuffer > 0) {
            let add = Math.min(step, p.hpBuffer);
            p.hp += add;
            p.hpBuffer -= add;
            // Popupy jen ob√ĄŇĻas pro ńāŇüsporu FPS
            if (frameCount % 10 === 0) {
                addPopup("+1", p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
            }
        } else if (p.hpBuffer < 0) {
            let sub = Math.min(step, Math.abs(p.hpBuffer));
            p.hp -= sub;
            p.hpBuffer += sub;
            if (frameCount % 10 === 0) {
                addPopup("-1", p.body.position.x, p.body.position.y - p.r, color(255, 80, 80));
            }
        }
    }

    let vx = p.body.velocity.x;
    let vy = p.body.velocity.y;
    
    if (isNaN(vx) || isNaN(vy) || !isFinite(vx) || !isFinite(vy)) {
        Matter.Body.setVelocity(p.body, {x: 0, y: 0});
    } else {
        let currentSpeed = Math.sqrt(vx*vx + vy*vy);
        if (currentSpeed > 0.1) {
            let factor = tSpd / currentSpeed;
            Matter.Body.setVelocity(p.body, { x: lerp(vx, vx * factor, 0.1), y: lerp(vy, vy * factor, 0.1) });
        }
        
        vx = p.body.velocity.x; vy = p.body.velocity.y;
        if (Math.abs(vx) > currentMaxV || Math.abs(vy) > currentMaxV) {
            Matter.Body.setVelocity(p.body, {
                x: Math.max(-currentMaxV, Math.min(currentMaxV, vx)),
                y: Math.max(-currentMaxV, Math.min(currentMaxV, vy))
            });
        }
    }
  }

  // DYNAMICKńā¬Ā KAMERA: Oddaluje se podle toho, kolik fyzickńā¬©ho prostoru koule zabńā¬≠rajńā¬≠!
  let totalArea = 0;
  for (let i = 0; i < players.length; i++) {
      totalArea += players[i].r * players[i].r * Math.PI;
  }
  let screenArea = W * (ARENA_BOT - ARENA_TOP);
  let coverageRatio = totalArea / screenArea;
  
  if (coverageRatio > 0) {
      // Koule nechńāňáme nat√Ą‚Äļsnat vńā¬≠ce (ańĻńĺ na 80 % obrazovky) neńĻńĺ oddńāňálńā¬≠me kameru
      targetCameraScale = Math.sqrt(0.85 / coverageRatio);
  } else {
      targetCameraScale = 1.8;
  }
  // Limity pńĻ‚ĄĘiblńā¬≠ńĻńĺenńā¬≠/oddńāňálenńā¬≠
  targetCameraScale = Math.min(2.0, Math.max(0.45, targetCameraScale));

  cameraScale = lerp(cameraScale, targetCameraScale, 0.015); // Velmi pomalńā¬© a plynulńā¬© oddalovńāňánńā¬≠
  
  let viewW = W / cameraScale; 
  let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  
  if (!isNaN(viewW) && !isNaN(viewH)) {
      Matter.Body.setPosition(wallTop, { x: cx, y: cy - viewH/2 - wallThick/2 });
      Matter.Body.setPosition(wallBot, { x: cx, y: cy + viewH/2 + wallThick/2 });
      Matter.Body.setPosition(wallLeft, { x: cx - viewW/2 - wallThick/2, y: cy });
      Matter.Body.setPosition(wallRight, { x: cx + viewW/2 + wallThick/2, y: cy });
  }
}

// --- FUNKCE PRO POZADńāŇ§ ODSTRAN√ĄŇ§NY ---
function handleBossPlanet() {
    if (!showBossPlanet || players.length === 0) return;

    // VytvońĻ‚ĄĘenńā¬≠ globńāňálnńā¬≠ho zńāňámku (pokud jeńĻňát√Ą‚Äļ neexistuje)
    if (typeof window.bossLockTimer === 'undefined') window.bossLockTimer = 0;

    // 1. Vy√ĄŇĻistńā¬≠me frontu od mrtvńāňĚch hrńāňá√ĄŇĻńĻŇĽ nebo t√Ą‚Äļch, co uńĻńĺ v arńā¬©n√Ą‚Äļ nejsou
    while (egoQueue.length > 0) {
        let name = egoQueue[0];
        let p = players.find(x => x.name === name && x.hp > 0);
        if (p) break;
        egoQueue.shift();
    }

    // 2. PRIORITA: Fronta novńāňĚch hrńāňá√ĄŇĻńĻŇĽ (kańĻńĺdńāňĚ dostane 3 vteńĻ‚ĄĘiny slńāňávy)
    if (egoQueue.length > 0) {
        let nextInQueue = egoQueue[0];
        if (lastValidBossName === nextInQueue) {
            // Aktuńāňálnńā¬≠ boss je ten z fronty, zkontrolujeme jestli uńĻńĺ mu vyprńĻňáel √ĄŇĻas
            if (millis() > window.bossLockTimer) {
                egoQueue.shift();
                // Shiftem se uvolnńā¬≠ mńā¬≠sto pro dalńĻňáńā¬≠ho v ńĻ‚ĄĘad√Ą‚Äļ nebo pro top HP hrńāňá√ĄŇĻe v dalńĻňáńā¬≠m kroku
            }
        } else {
            // NOVńāŇ• hrńāňá√ĄŇĻ z fronty pńĻ‚ĄĘebńā¬≠rńāňá Ego Smash (pńĻ‚ĄĘebije i top HP hrńāňá√ĄŇĻe)
            lastValidBossName = nextInQueue;
            window.bossLockTimer = millis() + 3000;
        }
    }

    // 3. POKUD JE FRONTA PRńā¬ĀZDNńā¬Ā: Zobrazńā¬≠me hrńāňá√ĄŇĻe s nejvńā¬≠ce HP
    if (egoQueue.length === 0) {
        let potentialKing = [...players].filter(p => !p.isZombie && p.hp > 0 && !p.isBot).sort((a, b) => b.hp - a.hp)[0];

        if (potentialKing) {
            if (lastValidBossName !== potentialKing.name) {
                // PńĻ‚ĄĘepneme na top HP hrńāňá√ĄŇĻe pouze pokud vyprńĻňáel pńĻ‚ĄĘedchozńā¬≠ zńāňámek
                if (millis() > window.bossLockTimer) {
                    lastValidBossName = potentialKing.name;
                    window.bossLockTimer = millis() + 3000;
                }
            }
        } else {
            // Pokud nikdo reńāňálnńāňĚ nepńĻ‚ĄĘeńĻńĺil nebo nenńā¬≠ v arńā¬©n√Ą‚Äļ, Ego Smash se vypne
            lastValidBossName = null;
        }
    }

    // Pokud nenńā¬≠ ńĻńĺńāňádnńāňĚ platnńāňĚ krńāňál, pońĻňáleme stńāňávajńā¬≠cńā¬≠ planety pry√ĄŇĻ
    if (!lastValidBossName) {
        bossPlanets.forEach(p => { if(!p.isKnockedOut) { p.isKnockedOut = true; p.vx *= 1.5; p.vy *= 1.5; } });
    }

    let activeBossName = lastValidBossName;
    let cx = W/2;
    let cy = (ARENA_TOP+ARENA_BOT)/2;

    // 3. Hledńāňáme planetu, kterńāňá patńĻ‚ĄĘńā¬≠ aktuńāňálnńā¬≠mu krńāňáli a jeńĻňát√Ą‚Äļ nenńā¬≠ zni√ĄŇĻenńāňá
    let mainPlanet = activeBossName ? bossPlanets.find(p => !p.isKnockedOut && p.name === activeBossName) : null;

    if (!mainPlanet && activeBossName) {
        // Najdeme tu nejnov√Ą‚ÄļjńĻňáńā¬≠ existujńā¬≠cńā¬≠ planetu v arńā¬©n√Ą‚Äļ, kterou pńĻŇĽjdeme nekompromisn√Ą‚Äļ sestńĻ‚ĄĘelit
        let previousPlanet = [...bossPlanets].reverse().find(p => !p.isKnockedOut);

        let newPlanet = {
            name: activeBossName,
            x: 0, y: 0, vx: 0, vy: 0, 
            rot: 0, rotSpeed: random(-0.005, 0.005),
            isKnockedOut: false,
            hasSmashed: false,
            targetPlanet: previousPlanet, // Tu budeme lovit (mńĻŇĽńĻńĺe jich bńāňĚt takhle i vńā¬≠c za sebou jako vlńāňá√ĄŇĻek)
            targetPoint: previousPlanet ? null : { x: cx + random(-50, 50), y: cy + random(-50, 50) } // Pokud jsme ńāŇüpln√Ą‚Äļ prvnńā¬≠, letńā¬≠me do stńĻ‚ĄĘedu
        };

        // Spawnovńāňánńā¬≠ hluboko mimo obrazovku
        let side = floor(random(4));
        let offX = W * 0.7; let offY = H * 0.6;
        if (side === 0) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy - offY; }
        else if (side === 1) { newPlanet.x = cx + offX; newPlanet.y = cy + random(-200, 200); }
        else if (side === 2) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy + offY; }
        else { newPlanet.x = cx - offX; newPlanet.y = cy + random(-200, 200); }

        // NejdńĻ‚ĄĘńā¬≠v natvrdo smazat vńĻňáechny existujńā¬≠cńā¬≠ fialovńā¬© koule, aby tam nezńĻŇĽstńāňávaly viset
        bossPlanets = []; 
        bossPlanets.push(newPlanet);
    }

    let pSize = W * 0.40; 
    
    let boundLeft = cx - W * 0.30; let boundRight = cx + W * 0.30;
    let boundTop = cy - (ARENA_BOT - ARENA_TOP) * 0.35; let boundBot = cy + (ARENA_BOT - ARENA_TOP) * 0.35;

    for (let i = bossPlanets.length - 1; i >= 0; i--) {
        let bp = bossPlanets[i];

        // --- POHYBOVńā¬Ā LOGIKA ---
        if (bp.isKnockedOut) {
            // Letńā¬≠ pry√ĄŇĻ po prohńĻ‚ĄĘe
        } else if (!bp.hasSmashed) {
            // A) Mńā¬ĀME CńāŇ§L -> LETńāŇ§ME ZNI√ĄŇöIT STAROU PLANETU
            if (bp.targetPlanet) {
                let dx = bp.targetPlanet.x - bp.x;
                let dy = bp.targetPlanet.y - bp.y;
                let dist = Math.sqrt(dx*dx + dy*dy) || 1;

                let speed = 16; // Agresivnńā¬≠ let a pronńāňásledovńāňánńā¬≠
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                // Nńā¬ĀRAZ!
                if (dist < pSize * 0.7) {
                    bp.hasSmashed = true;
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                    bp.smashGreenFlash = 90; // Nastavńā¬≠ plynulńāňĚ zelenńāňĚ pńĻ‚ĄĘechod na 1.5 vteńĻ‚ĄĘiny

                    bp.targetPlanet.isKnockedOut = true;
                    bp.targetPlanet.vx = (dx / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.vy = (dy / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.rotSpeed = random(-0.1, 0.1);

                    let liveAttacker = players.find(p => p.name === bp.name);
                    let attackerColor = liveAttacker ? liveAttacker.color : color(255);

                    // ZAKńā¬ĀZńā¬ĀNO: screenShake, particles, flash
                    safePlaySound(pentatonic('low'), 0.05, 0.8); // JemnńāňĚ basovńāňĚ tńāŇān
                }
            } 
            // B) ńāŇ°PLN√ĄŇ§ PRVNńāŇ§ PLANETA -> MAJESTńā¬ĀTN√ĄŇ§ PńĻ¬ėILńā‚ÄįTńā¬Ā DO STńĻ¬ėEDU
            else if (bp.targetPoint) {
                let dx = bp.targetPoint.x - bp.x;
                let dy = bp.targetPoint.y - bp.y;
                let distSq = dx*dx + dy*dy;
                let dist = Math.sqrt(distSq) || 1;
                
                let speed = 6; // PomalńāňĚ pńĻ‚ĄĘńā¬≠let
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                if (distSq < 225) {
                    bp.hasSmashed = true; // Dorazila na svńā¬© mńā¬≠sto doprostńĻ‚ĄĘed arńā¬©ny
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                }
            }
        } else {
            // C) PLANETA VLńā¬ĀDNE -> ODRńā¬ĀńĻňĚńāŇ§ SE OD MANTINELńĻ¬ģ V ARńā‚ÄįN√ĄŇ§
            if (bp.x < boundLeft) { bp.x = boundLeft; bp.vx *= -1; }
            if (bp.x > boundRight) { bp.x = boundRight; bp.vx *= -1; }
            if (bp.y < boundTop) { bp.y = boundTop; bp.vy *= -1; }
            if (bp.y > boundBot) { bp.y = boundBot; bp.vy *= -1; }
        }

        // Aplikace pohybu
        bp.x += bp.vx;
        bp.y += bp.vy;
        bp.rot += bp.rotSpeed;

        // Smazńāňánńā¬≠ planety ze hry, pokud vyletńā¬≠ po prohńĻ‚ĄĘe ńāŇüpln√Ą‚Äļ pry√ĄŇĻ
        if (bp.isKnockedOut && (bp.x < -W || bp.x > W*2 || bp.y < -H || bp.y > H*2)) {
            bossPlanets.splice(i, 1);
            continue;
        }

        // --- VYKRESLENńāŇ§ A BARVY ---
        push();
        translate(bp.x, bp.y);
        
        // --- VIDITELNOST: Pokud je n√Ą‚Äļkdo v arńā¬©n√Ą‚Äļ v√Ą‚ÄļtńĻňáńā¬≠ neńĻńĺ tato planeta, zneviditelnit ---
        let isSomeoneLarger = players.some(p => !p.isZombie && p.r > (pSize / 2) * 0.95);
        if (isSomeoneLarger && !bp.isKnockedOut) {
            pop();
            continue;
        }
        
        // 4. SYNCHRONIZACE BARVY S REńā¬ĀLNOU PILOU HRńā¬Ā√ĄŇöE V ARńā‚ÄįN√ĄŇ§
        let livePlayer = players.find(p => p.name === bp.name);
        let outlineColor = color(200); 
        
        if (livePlayer) {
            let danger = constrain(map(Math.max(0, livePlayer.hp), 50, 0, 0, 1), 0, 1);
            outlineColor = lerpColor(livePlayer.color, color(255, 0, 0), danger); // √ĄŇöervenńāňá pńĻ‚ĄĘi umńā¬≠rńāňánńā¬≠

            // ObnovenńāňĚ duhovńāňĚ efekt
            if (livePlayer.giftSpeedTimer > 0 || livePlayer.immunityTimer > 0 || livePlayer.isGodMode || livePlayer.hasRainbowCrown) {
                colorMode(HSB);
                outlineColor = color(getSafeHue(frameCount * 5), 100, 100);
                colorMode(RGB);
            }
        }

        // Plynulńā¬© zezelenńāňánńā¬≠ okraje planety po pńĻ‚ĄĘevzetńā¬≠
        if (bp.smashGreenFlash > 0) {
            outlineColor = lerpColor(outlineColor, color(50, 255, 50), bp.smashGreenFlash / 90.0);
            bp.smashGreenFlash--;
        }

        if (!bp.isKnockedOut) {
            // if (players.length < 40) {
            //     drawingContext.shadowBlur = 20 + sin(frameCount * 0.05) * 10;
            //     drawingContext.shadowColor = outlineColor;
            // }
        }

        fill(5, 5, 10, 180);
        stroke(outlineColor);
        strokeWeight(bp.isKnockedOut ? 2 : 5);
        ellipse(0, 0, pSize);
        drawingContext.shadowBlur = 0;


 
        rotate(bp.rot);

        let img = userAvatars[bp.name]; 
        if (img && img !== "loaded") {
            imageMode(CENTER);
            tint(255, bp.isKnockedOut ? 40 : 180); 
            image(img, 0, 0, pSize, pSize);
            noTint();
            
            drawingContext.save();
            let gradient = drawingContext.createRadialGradient(0, 0, pSize * 0.3, 0, 0, pSize * 0.5);
            gradient.addColorStop(0, "rgba(0,0,0,0)");
            gradient.addColorStop(1, "rgba(0,0,0,0.8)");
            drawingContext.fillStyle = gradient;
            drawingContext.fillRect(-pSize/2, -pSize/2, pSize, pSize);
            drawingContext.restore();
        } else {
            fill(outlineColor); noStroke(); ellipse(0, 0, pSize * 0.8);
            fill(255, bp.isKnockedOut ? 30 : 150); 
            textAlign(CENTER, CENTER); textSize(80); text("√Ą‚ÄėńĻŇü√Ę‚ā¨¬ė√Ę‚ā¨¬ė", 0, 0);
        }
        pop();
    }
}

function drawSpaceBackground() {
  flowTime += 0.003;
  globalFlowAngle = sin(flowTime) * 0.25;
  
  // ANTI-DETECT: Rychlost scrollovńāňánńā¬≠ se v √ĄŇĻase neustńāňále plynule m√Ą‚Äļnńā¬≠
  let antiBotShift = sin(frameCount * 0.002) * 0.8; 
  let baseScrollSpeed = 1.2 + antiBotShift; 

  noStroke();
  
  drawingContext.save();
  milkyWay.forEach(mw => {
      fill(mw.color);
      ellipse(mw.x, mw.y, mw.r * 2);
      
      mw.x += sin(globalFlowAngle) * 0.2;
      mw.y += cos(globalFlowAngle) * 0.2 + (baseScrollSpeed * 0.1);
      
      if (mw.y > H * 2 + 500) { mw.y = -H - 500; mw.x = random(-W, W*2); }
      if (mw.x > W * 2 + 500) { mw.x = -W - 500; }
      if (mw.x < -W - 500) { mw.x = W * 2 + 500; }
  });
  drawingContext.restore();

  nebulas.forEach(n => {
     fill(n.color);
     ellipse(n.x, n.y, n.r); 
     n.y += n.speed + (baseScrollSpeed * 0.2);
     if (n.y > H * 2 + 1000) { n.y = -H - 1000; n.x = random(-W, W*2); }
  });

  let isExtremeLoad = players.length > 30;
  let starLimit = isExtremeLoad ? stars.length / 3 : stars.length;
  for(let i=0; i<starLimit; i++) {
    let s = stars[i];
    let currentAlpha = s.baseAlpha;
    if (s.isPulsing && !isExtremeLoad) {
        currentAlpha = (s.baseAlpha * 0.5) + sin(frameCount * s.pulseSpeed + s.pulsePhase) * (s.baseAlpha * 0.5);
    }
    fill(s.rC, s.gC, s.bC, currentAlpha);
    rect(s.x, s.y, s.s, s.s);
    
    s.x += sin(globalFlowAngle) * (s.speed * 0.5);
    s.y += s.speed + baseScrollSpeed * s.layer; 
    
    if (s.y > H * 2) { s.y = -H; s.x = random(-W, W * 2); }
    else if (s.y < -H) { s.y = H * 2; s.x = random(-W, W * 2); }
    if (s.x > W * 2) { s.x = -W; s.y = random(-H, H * 2); }
    else if (s.x < -W) { s.x = W * 2; s.y = random(-H, H * 2); }
  }

  // ZAKńā¬ĀZńā¬ĀNO dle pońĻńĺadavku: Vesmńā¬≠r bez planet a objektńĻŇĽ
  // drawingContext.save();
  // handleBackgroundObjects(baseScrollSpeed);
  // drawingContext.restore();

  if (random() < 0.04) { 
      let side = Math.floor(random(4));
      let sx, sy, svx, svy;
      
      if (side === 0) { sx = random(-W, W*2); sy = -H; svx = random(-20, 20); svy = random(20, 50); }
      else if (side === 1) { sx = random(-W, W*2); sy = H*2; svx = random(-20, 20); svy = random(-50, -20); }
      else if (side === 2) { sx = -W; sy = random(-H, H*2); svx = random(20, 50); svy = random(-20, 20); }
      else { sx = W*2; sy = random(-H, H*2); svx = random(-50, -20); svy = random(-20, 20); }
      
      shootingStars.push({
          x: sx, y: sy, 
          vx: svx, vy: svy, 
          life: 255, length: random(40, 150),
          thick: random(1, 4)
      });
  }

  for (let i = shootingStars.length - 1; i >= 0; i--) {
      let s = shootingStars[i];
      stroke(255, 255, 255, s.life); strokeWeight(s.thick);
      line(s.x, s.y, s.x - s.vx * (s.length/20), s.y - s.vy * (s.length/20));
      s.x += s.vx; s.y += s.vy; 
      s.life -= 4; 
      
      // 3. Detekce nńāňárazu do hrńāňá√ĄŇĻńĻŇĽ
      let hit = false;
      for (let p of players) {
          let d = dist(s.x, s.y, p.body.position.x, p.body.position.y);
          
          // OPRAVA 1: V√Ą‚ÄļtńĻňáńā¬≠ hitbox (o 20px), aby rychlńā¬© hv√Ą‚Äļzdy neprolet√Ą‚Äļly skrz hrńāňá√ĄŇĻe bez detekce
          let sSize = s.size || s.thick || 5; 
          if (d < p.r + sSize + 20) { 
              
              let speedMag = dist(0, 0, s.vx, s.vy);
              let dirX = s.vx / speedMag;
              let dirY = s.vy / speedMag;
              
              // ZvńāňĚńĻňáenńāňá sńā¬≠la pro vńāňĚrazn√Ą‚ÄļjńĻňáńā¬≠ odhozenńā¬≠ hrńāňá√ĄŇĻe (bez exploze)
              let pushForce = 0.006 * p.body.mass; 
              
              Matter.Body.applyForce(p.body, p.body.position, {
                  x: dirX * pushForce,
                  y: dirY * pushForce
              });

              hit = true;
              break; 
          }
      }

      if (hit) {
          shootingStars.splice(i, 1);
          continue;
      }

      if (s.life <= 0 || s.x < -W*1.5 || s.x > W*2.5 || s.y < -H*1.5 || s.y > H*2.5) {
          shootingStars.splice(i, 1);
      }
  }
  noStroke();
}

function drawDeathShockwaves() {
  for (let i = deathShockwaves.length - 1; i >= 0; i--) {
      let sw = deathShockwaves[i];
      noFill();
      stroke(red(sw.color), green(sw.color), blue(sw.color), sw.life);
          strokeWeight(map(sw.life, 255, 0, sw.isNuke ? 50 : 8, 1)); // ZjednoduńĻňáenńāňá tlouńĻňáńĻńĄka
      ellipse(sw.x, sw.y, sw.r); // VńāňĚslednńāňá exploze je nynńā¬≠ polovi√ĄŇ§nńā¬≠ (sw.r mńā¬≠sto sw.r * 2)
          sw.r += sw.isNuke ? 25 : 8; // RychlejńĻňáńā¬≠ rozpńā¬≠nńāňánńā¬≠ rńāňázovńā¬© vlny
          sw.life -= sw.isNuke ? 4 : 25; // Mnohem rychlejńĻňáńā¬≠ zmizenńā¬≠ (√ĄŇĻistńĻňáńā¬≠ animace)
      if (sw.life <= 0) deathShockwaves.splice(i, 1);
  }
}

function drawLightnings() {
  for(let i = lightnings.length - 1; i >= 0; i--) {
    let l = lightnings[i];
    let a = Math.min(255, l.life * 20); 
    let segs = 4; // Vńā¬≠ce segmentńĻŇĽ pro rozeklan√Ą‚ÄļjńĻňáńā¬≠ vzhled
    let pts = [{x: l.x1, y: l.y1}];
    
    for(let j = 1; j < segs; j++) {
        pts.push({
            x: lerp(l.x1, l.x2, j/segs) + random(-20, 20), 
            y: lerp(l.y1, l.y2, j/segs) + random(-20, 20)
        });
    }
    pts.push({x: l.x2, y: l.y2});

    // ZvńāňĚrazn√Ą‚Äļnńāňá vn√Ą‚ÄļjńĻňáńā¬≠ zńāňáńĻ‚ĄĘe
    stroke(red(l.c), green(l.c), blue(l.c), a);
    strokeWeight(l.life * 1.2 + 4);
    noFill();
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    // Siln√Ą‚ÄļjńĻňáńā¬≠ sv√Ą‚Äļtlńā¬© jńāňádro
    stroke(255, a + 50);
    strokeWeight(l.life * 0.5 + 2);
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    l.life--;
    if(l.life <= 0) lightnings.splice(i, 1);
  }
}

function drawPlayer(p) {
  let pos = p.body.position; 
  let safeHp = Math.max(0, p.hp);
  let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
  // p.likeBuffTimer--; // JińĻńĺ nenńā¬≠ potńĻ‚ĄĘeba, pouńĻńĺńā¬≠vńāňáme millis()
  
  let isLeader = (currentTop10[0] === p.name && !p.isZombie);
  let isSecond = (currentTop10[1] === p.name && !p.isZombie);
  let isThird = (currentTop10[2] === p.name && !p.isZombie);
  
  // 1. FIRE TRAIL smazńāňán

  // 2. GOD MODE KOUZLO
  if (p.isGodMode) {
      p.godModeTimer--;
      if (p.godModeTimer <= 0) p.isGodMode = false;
  }

  // Rotace (Zrychleno 10x pńĻ‚ĄĘi lajkovńāňánńā¬≠)
  let baseSpin = 0.02 + Math.min(safeHp * 0.000015, 0.2);
  if (safeHp >= 1000) baseSpin = 0.08 + Math.min(safeHp * 0.00002, 0.4);
  if (p.orbSpeedTimer > 0) baseSpin = Math.max(baseSpin, 0.35);
  p.rot += isBuffed ? baseSpin * p.baseRotDir * 10 : baseSpin * p.baseRotDir;
  
  let isHeavyLoad = players.length > 15;
  let isExtremeLoad = players.length > 30;
  let isEpic = safeHp >= 1000;
  let dangerFactor = constrain(map(safeHp, 50, 0, 0, 1), 0, 1);
  if (p.isZombie) dangerFactor = 0;
  
  let actualColor = lerpColor(p.color, color(255, 0, 0), dangerFactor);

  // Vykreslenńā¬≠ stopy (trail) - Vypnuto pro boty pro odstran√Ą‚Äļnńā¬≠ "te√ĄŇĻky" uprostńĻ‚ĄĘed
  if (!isExtremeLoad && p.trail.length > 1 && !p.isBot) {
      noFill();
      for (let i = 0; i < p.trail.length - 1; i++) {
          stroke(red(actualColor), green(actualColor), blue(actualColor), map(i, 0, p.trail.length, 0, 150));
          strokeWeight(map(i, 0, p.trail.length, p.r * 0.2, p.r * 0.8));
          line(p.trail[i].x, p.trail[i].y, p.trail[i+1].x, p.trail[i+1].y);
      }
  }

  push(); 
  translate(pos.x, pos.y);

  // === ELASTICKńāŇ• ńĻňĚELATINOVńāŇ• EFEKT (POUZE PRO BOTY) ===
  if (p.isBot) {
      // Inicializace prom√Ą‚ÄļnnńāňĚch pro plynulńāňĚ dojezd (pokud jeńĻňát√Ą‚Äļ neexistujńā¬≠)
      if (typeof p.visualStretch === 'undefined') {
          p.visualStretch = 0;
          p.stretchAngle = 0;
      }

      let vel = p.body.velocity;
      let speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y); // Aktuńāňálnńā¬≠ rychlost
      
      // Vypo√ĄŇ§ńā¬≠tńāňáme, jak moc by se m√Ą‚Äļla kuli√ĄŇ§ka natńāňáhnout (max o 35 %)
      let targetStretch = Math.min(speed * 0.015, 0.35); 
      
      // ńāŇ°hel letu m√Ą‚Äļnńā¬≠me, jen kdyńĻńĺ se reńāňáln√Ą‚Äļ hńāňĚbe (aby se guma nekroutila pńĻ‚ĄĘi zastavenńā¬≠)
      if (speed > 0.5) {
          p.stretchAngle = Math.atan2(vel.y, vel.x);
      }

      // Plynulńāňá interpolace - tohle vytvońĻ‚ĄĘńā¬≠ ten gumovńāňĚ dojezd po nńāňárazu
      p.visualStretch = lerp(p.visualStretch, targetStretch, 0.2);

      // Aplikace gumovńā¬©ho efektu na plńāňátno
      if (p.visualStretch > 0.01) {
          rotate(p.stretchAngle); // Nato√ĄŇ§ńā¬≠me plńāňátno po sm√Ą‚Äļru letu
          scale(1 + p.visualStretch, 1 - p.visualStretch); // Natńāňáhneme do dńā¬©lky a splńāňácneme do ńĻňáńā¬≠ńĻ‚ĄĘky
          rotate(-p.stretchAngle); // Vrńāňátńā¬≠me rotaci zp√Ą‚Äļt, aby se profilovka neprotńāňá√ĄŇ§ela vzhńĻŇĽru nohama
      }
  }
  // ==================================================

  scale(isBuffed ? 1.05 : 1.0);
  rotate(p.rot);


  let r = p.r; // PouńĻńĺijeme vizuńāňálnńā¬≠ rńāňádius (100 %) mńā¬≠sto fyzickńā¬©ho hitboxu (80 %)
  let visualR = r;

  if (p.hp >= 2000 && p.hp < 5000) {
      visualR = r + sin(frameCount * 0.1 + p.body.id) * (r * 0.1);
      noStroke();
      fill(255, 50, 0, 80);
      circle(0, 0, visualR * 2.8 + random(-2, 2));
      fill(255, 150, 0, 120);
      circle(0, 0, visualR * 2.3);
  }
  else if (p.hp >= 5000 && p.hp < 10000) {
      let t = frameCount * 0.08 + p.body.id;
      for(let i = 0; i < 3; i++) {
          let angle = t + (i * TWO_PI / 3);
          let orbX = cos(angle) * (r * 1.8);
          let orbY = sin(angle) * (r * 1.8);
          noStroke();
          fill(0, 242, 254, 200);
          circle(orbX, orbY, r * 0.5);
          fill(255);
          circle(orbX, orbY, r * 0.2);
      }
  }
  else if (p.hp >= 10000) {
      noStroke();
      fill(50, 0, 80, 150);
      circle(0, 0, r * 3.5);
      stroke(200, 50, 255, 200);
      strokeWeight(2);
      for(let i = 0; i < 3; i++) {
          if (random() > 0.4) {
              let angle = random(TWO_PI);
              let l1 = r * random(1.2, 1.8);
              let l2 = r * random(2.0, 3.5);
              let a2 = angle + random(-0.3, 0.3);
              let x1 = cos(angle) * l1, y1 = sin(angle) * l1;
              let x2 = cos(a2) * l2, y2 = sin(a2) * l2;
              line(0, 0, x1, y1);
              line(x1, y1, x2, y2);
          }
      }
  }

  // 3. BOT FACE (Vypnuto - boti nynńā¬≠ majńā¬≠ profilovky jako reńāňálnńā¬≠ hrńāňá√ĄŇĻi)
  /*
  if (p.isBot) {
      drawBotFace(0, 0, p.r);
  }
  */

  // Varovnńā¬© pulzovńāňánńā¬≠ pro umńā¬≠rajńā¬≠cńā¬≠ (Vypnuto pro boty)
  if (!p.isBot && (p.auraFlash > 0 || dangerFactor > 0)) {
      let glowAlpha = p.auraFlash > 0 ? p.auraFlash * 15 : 0;
      if(dangerFactor > 0) glowAlpha = max(glowAlpha, dangerFactor * 120 + sin(frameCount*0.3)*80);
      fill(red(actualColor), green(actualColor), blue(actualColor), glowAlpha);
      noStroke();
      ellipse(0, 0, p.r * 1.8);
  }
  if(p.auraFlash > 0) p.auraFlash--;

  // Specińāňálnńā¬≠ zlatńāňá pulzujńā¬≠cńā¬≠ aura pro vedoucńā¬≠ho hrńāňá√ĄŇĻe (Vypnuto pro boty)
  if (isLeader && !p.isBot) {
      fill(255, 215, 0, 50 + sin(frameCount * 0.15) * 30);
      noStroke();
      ellipse(0, 0, p.r * 2.4 + sin(frameCount * 0.2) * 15);
  }

  // Buff zńāňáńĻ‚ĄĘe (Duhovńāňá pro korunku, bńā¬≠lńāňá pro b√Ą‚ÄļńĻńĺnńāňĚ buff)
  if (isBuffed && !p.isBot) { 
      if (p.hasCrown || p.immunityTimer > 0) {
          colorMode(HSB);
          fill(getSafeHue(frameCount * 5), 70, 100, 100 + sin(frameCount * 0.4) * 60);
          colorMode(RGB);
      } else {
          fill(255, 255, 255, 80 + sin(frameCount * 0.5) * 80); 
      }
      noStroke();
      ellipse(0, 0, p.r * 2.0);
  }

  let outlineColor = actualColor;
  if (p.giftSpeedTimer > 0 || p.immunityTimer > 0 || p.isGodMode || p.hasRainbowCrown) {
      colorMode(HSB);
      outlineColor = color(getSafeHue(frameCount * 8), 100, 100); 
      colorMode(RGB);
  }
  if (p.isZombie) outlineColor = color(50, 255, 255); // Tyrkysovńāňá pro zombńā¬≠ky (vńā¬≠c sci-fi)

  // 4. BOT CRUSHER AURA (ńĻňĚlutńā¬© blesky / zńāňáńĻ‚ĄĘe)
  if (p.botDmgTimer > 0) {
      push();
      stroke(255, 255, 0, 150 + sin(frameCount * 0.5) * 100);
      strokeWeight(4);
      noFill();
      let auraR = p.r * 1.4 + sin(frameCount * 0.3) * 5;
      ellipse(0, 0, auraR);
      
      // Ob√ĄŇ§asnńā¬© jiskry
      if (frameCount % 6 === 0) {
          createParticles(pos.x + random(-p.r, p.r), pos.y + random(-p.r, p.r), color(255, 255, 0), 2);
      }
      pop();
  }

  let baseR = red(actualColor);
  let baseG = green(actualColor);
  let baseB = blue(actualColor);

  if (p.sawFade === undefined) p.sawFade = 0;
  if (isBuffed) {
      p.sawFade = Math.min(1.0, p.sawFade + 0.1); 
  } else {
      p.sawFade = Math.max(0.0, p.sawFade - 0.05); 
  }

  if (p.sawFade > 0.01) {
      let teeth = isEpic ? 32 : 24; // Snńā¬≠ńĻńĺeno pro vńāňĚkon
      let rOuter = p.r * 1.45; // Vetsi hroty pro lepsi viditelnost
      let rInner = p.r * 1.25;
      let sawAlpha = p.sawFade * 255;

      push();
      // Rychlńāňá rotace cirkulńāňárky (zpomaleno z 0.6 na 0.3 pro lepńĻňáńā¬≠ viditelnost pohybu)
      rotate(frameCount * 0.3 * p.baseRotDir); 

      // INDUSTRIńā¬ĀLNńāŇ§ VZHLED: TmavńāňĚ kov s brouńĻňáenńāňĚm ostńĻ‚ĄĘńā¬≠m
      noStroke();
      fill(40, sawAlpha); // TmavńāňĚ zńāňáklad disku
      ellipse(0, 0, rOuter * 1.8);

      // 1. ZUBY (BrouńĻňáenńāňá ocel)
      fill(red(actualColor), green(actualColor), blue(actualColor), sawAlpha * 0.8);
      beginShape();
      for(let i = 0; i < teeth; i++) {
          let idx = Math.floor(i * (64 / teeth)); // 64 je velikost cache pole
          let ang = sawAngles[idx];
          
          // Agresivnńā¬≠, ale krńāňátkńā¬© prńĻŇĽmyslovńā¬© zuby - cache optimalizace
          vertex(ang.a1_cos * rInner, ang.a1_sin * rInner); 
          vertex(ang.a2_cos * rOuter, ang.a2_sin * rOuter); 
          vertex(ang.a3_cos * rInner, ang.a3_sin * rInner);
      }
      endShape(CLOSE);

      // 2. VNITńĻ¬ėNńāŇ§ MECHANIKA (BrouńĻňáenńāňĚ kov s odlesky)
      fill(180, sawAlpha * 0.4);
      ellipse(0, 0, p.r * 2.4);
      
      stroke(255, sawAlpha * 0.5);
      strokeWeight(1);
      noFill();
      ellipse(0, 0, p.r * 2.3); // Detailnńā¬≠ krouńĻńĺek uvnitńĻ‚ĄĘ
      
      // Dynamickńā¬© odlesky na √ĄŇĻepeli smazńāňány
      drawingContext.shadowBlur = 0;
      pop();
  }
  
  if (p.isZombie) {
      push();
      drawingContext.setLineDash([8, 8]);
      strokeWeight(2); noFill();
      stroke(80, 200, 80, 100); // PńĻŇĽvodn√Ą‚Äļ √ĄŇĻervenńāňá, nynńā¬≠ zelenńāňá
      ellipse(0, 0, p.r * 1.6);
      drawingContext.lineDashOffset = 8;
      stroke(100, 255, 100, 100); // Sv√Ą‚ÄļtlejńĻňáńā¬≠ zelenńāňá pro druhńāňĚ pruh
      drawingContext.setLineDash([]); drawingContext.lineDashOffset = 0;
      pop();
  }

  rotate(-p.rot); 
  
  if (p.isBounty) {
      push();
      rotate(frameCount * 0.05);
      let tSize = p.r * 2.8 + sin(frameCount * 0.2) * 10;
      fill(255, 0, 0, 40); stroke(255, 50, 50, 200); strokeWeight(3);
      ellipse(0, 0, tSize);
      let cL = tSize * 0.2;
      line(-tSize/2 - 10, 0, -tSize/2 + cL, 0); line(tSize/2 + 10, 0, tSize/2 - cL, 0);
      line(0, -tSize/2 - 10, 0, -tSize/2 + cL); line(0, tSize/2 + 10, 0, tSize/2 - cL);
      noFill(); stroke(255, 0, 0, 100); strokeWeight(1); ellipse(0, 0, tSize * 0.6);
      pop();
  }

  if (p.immunityTimer > 0) {
      push();
      let pulse = sin(frameCount * 0.1) * 10;
      fill(50, 100, 255, 60 + sin(frameCount * 0.2) * 40);
      stroke(100, 150, 255, 200); strokeWeight(3);
      ellipse(0, 0, p.r * 2.8 + pulse);
      
      rotate(frameCount * 0.05);
      for(let o = 0; o < 3; o++) {
          let a = (o * TWO_PI) / 3;
          let ox = cos(a) * (p.r * 1.4 + pulse/2); let oy = sin(a) * (p.r * 1.4 + pulse/2);
          fill(255); noStroke(); ellipse(ox, oy, 6 + random(-2, 2));
      }
      pop();
  }

  if (p.hasCrown) {
      push();
      translate(0, -p.r * 1.5 - 10);
      fill(255, 215, 0); stroke(255); strokeWeight(2);
      beginShape();
      vertex(-15, 0); vertex(-25, -15); vertex(-8, -8); 
      vertex(0, -25); vertex(8, -8); vertex(25, -15); vertex(15, 0);
      endShape(CLOSE);
      pop();
  }
  
  if (p.isGodMode) {
      push(); noFill();
      strokeWeight(5 + sin(frameCount * 0.2) * 5); stroke(255, 0, 0, 150);
      ellipse(0, 0, p.r * 2 + 20);
      pop();
  }

  if (p.hasRainbowCrown) {
      push();
      translate(0, -p.r - 25);
      colorMode(HSB);
      fill(getSafeHue(frameCount * 6), 100, 100);
      colorMode(RGB);
      stroke(255); strokeWeight(2);
      beginShape();
      vertex(-15, 0); vertex(-25, -20); vertex(-10, -10);
      vertex(0, -25); vertex(10, -10);  vertex(25, -20); vertex(15, 0);
      endShape(CLOSE);
      pop();
  }

  let imgSize = visualR * 1.93;
  let isTop10 = currentTop10.includes(p.name);
  let shouldDrawAvatar = true; 
  // Vypnutńā¬≠ profilovek pro oby√ĄŇĻejnńā¬© hrńāňá√ĄŇĻe pńĻ‚ĄĘi zńāňát√Ą‚ÄļńĻńĺi bylo odstran√Ą‚Äļno na ńĻńĺńāňádost uńĻńĺivatele (profilovky musńā¬≠ bńāňĚt vid√Ą‚Äļt vńĻńĺdy)
  // if (isExtremeLoad && safeHp < 500 && !isLeader) shouldDrawAvatar = false;

  if (p.avatarAlpha === undefined) p.avatarAlpha = shouldDrawAvatar ? 255 : 0;
  if (shouldDrawAvatar) p.avatarAlpha = Math.min(255, p.avatarAlpha + 15);
  else p.avatarAlpha = Math.max(0, p.avatarAlpha - 30);

  if (p.isBot) {
      fill(0, 127); // 50% prńĻŇĽhlednńāňá √ĄŇĻernńāňá vńāňĚplńĻ¬ą pro boty
  } else {
      fill(10, 12, 15, 255); 
  }
  noStroke();
  ellipse(0, 0, imgSize); 

  if (!p.isBot && p.avatarAlpha > 0 && userAvatars[p.name] && userAvatars[p.name] !== "loaded") { 
      tint(255, p.avatarAlpha); 
      imageMode(CENTER);
      
      // --- ROTACE PROFILOVKY JEN PńĻ¬ėI ZMRAZENńāŇ§ ---
      push();
      if (p.isFrozen) {
          rotate(frameCount * 0.10); // Plynul√© tońćen√≠ fotky dokola (2x zrychleno)
      }
      image(userAvatars[p.name], 0, 0, imgSize, imgSize); 
      pop();
      // -----------------------------------------
      
      noTint(); 
  }
  if (p.hp >= 10000) {
      noStroke();
      fill(20, 0, 40, 180);
      circle(0, 0, visualR * 2);
  }


  noFill(); 
  stroke(0, 255); // Solidnńā¬≠ okraj pro vńĻňáechny
  strokeWeight(4); ellipse(0, 0, imgSize);
  let outStroke = p.isZombie ? color(50, 255, 50) : color(255, 200);
  stroke(outStroke);
  strokeWeight(2); ellipse(0, 0, imgSize + 4);

  drawingContext.lineJoin = "round"; textAlign(CENTER, CENTER);
  
  let nameCol = isLeader ? color(255, 215, 0) : color(230); // Zlatńā¬© jmńā¬©no pro lńā¬≠dra
  if (p.immunityTimer > 0) {
      colorMode(HSB);
      nameCol = color(getSafeHue(frameCount * 8), 80, 100);
      colorMode(RGB);
  }

  if (p.r > 20) {
      // Zten√ĄŇĻenńā¬≠ obrysu textu pńĻ‚ĄĘi zńāňát√Ą‚ÄļńĻńĺi (v Canvas2D to ńĻńĺere obrovskńā¬© mnońĻńĺstvńā¬≠ vńāňĚkonu)
      // Korunka pro aktuńāňálnńā¬≠ho krńāňále arńā¬©ny (nejvńā¬≠ce HP) ńāňė√Ę‚Äö¬¨√Ę‚ā¨Ň• jmńā¬©no odstran√Ą‚Äļno
      if (isLeader) {
          push();
          let bounce = sin(frameCount * 0.1) * 5;
          let crownY = -p.r * 0.45 - 25 - bounce;
          let cs = Math.max(10, p.r * 0.25);
          fill(255, 215, 0); stroke(180, 140, 0); strokeWeight(2);
          beginShape();
          vertex(-cs, crownY); vertex(-cs * 1.3, -cs * 0.8 + crownY);
          vertex(-cs * 0.5, -cs * 0.4 + crownY); vertex(0, -cs * 1.2 + crownY);
          vertex(cs * 0.5, -cs * 0.4 + crownY); vertex(cs * 1.3, -cs * 0.8 + crownY);
          vertex(cs, crownY);
          endShape(CLOSE);
          fill(255, 50, 50); noStroke();
          ellipse(-cs * 0.5, -cs * 0.25 + crownY, cs * 0.25);
          fill(50, 150, 255);
          ellipse(0, -cs * 0.5 + crownY, cs * 0.3);
          fill(255, 50, 50);
          ellipse(cs * 0.5, -cs * 0.25 + crownY, cs * 0.25);
          pop();
      }
      
      if (isBuffed) {
          push();
          let energyPulse = 1.0 + sin(frameCount * 0.3) * 0.2;
          translate(0, -p.r * 0.08); // Umńā¬≠st√Ą‚Äļnńā¬≠ pńĻ‚ĄĘesn√Ą‚Äļ mezi jmńā¬©no a HP
          scale(energyPulse);
          fill(255, 215, 0); // Zlatńāňá barva pro energii
          stroke(0);
          strokeWeight(Math.max(1, p.r * 0.04));
          let hs = p.r * 0.35; // Mńā¬≠rn√Ą‚Äļ zv√Ą‚ÄļtńĻňáeno pro lepńĻňáńā¬≠ viditelnost
          beginShape();
          vertex(hs * 0.2, -hs * 0.6);
          vertex(-hs * 0.4, hs * 0.1);
          vertex(-hs * 0.1, hs * 0.1);
          vertex(-hs * 0.3, hs * 0.6);
          vertex(hs * 0.4, -hs * 0.1);
          vertex(hs * 0.1, -hs * 0.1);
          endShape(CLOSE);
          pop();
      }
  }

  let txtCol = color(255);
  if (p.hp > 50000) txtCol = color(100, 255, 100);
  else if (p.hp > 10000) txtCol = color(255, 255, 0);

  if (p.nameAlpha === undefined) p.nameAlpha = 0;
  if (isBuffed) p.nameAlpha = Math.min(255, p.nameAlpha + 15);
  else p.nameAlpha = Math.max(0, p.nameAlpha - 10);

  // --- JMńā‚ÄįNA NA KOULI PńĻ¬ėI LAJKOVńā¬ĀNńāŇ§ ---
  if (!p.isZombie && p.nameAlpha > 0) {
      fill(255, 255, 255, p.nameAlpha); 
      stroke(0, 0, 0, p.nameAlpha); 
      strokeWeight(isExtremeLoad ? 2 : 4);
      textSize(Math.floor(Math.max(12, p.r * 0.22)));
      text(p.name, 0, p.r > 20 ? -p.r * 0.25 : -12);
  }

  stroke(0); strokeWeight(isExtremeLoad ? 4 : 10); // MenńĻňáńā¬≠ obrys pńĻ‚ĄĘi zńāňát√Ą‚ÄļńĻńĺi
  fill(txtCol); textStyle(BOLD);
  textSize(Math.floor(Math.max(16, p.r * 0.35))); // ZmenńĻňáenńāňĚ text HP, aby nezakrńāňĚval celńāňĚ kruh
  text(Math.floor(safeHp).toLocaleString(), 0, p.r > 20 ? p.r * 0.2 : 0); 
  
  if (p.isLegendary) {
      stroke(0); strokeWeight(Math.max(3, p.r * 0.15));
      fill(255, 215, 0);
      textSize(Math.floor(Math.max(10, p.r * 0.22)));
      text("√Ą‚ÄėńĻŇü√Ę‚ā¨¬ė√Ę‚ā¨¬ė LEGEND", 0, p.r > 20 ? p.r * 0.65 : 15);
  }

  // --- ńāŇ°SPORNńā‚Äį INDIKńā¬ĀTORY DMG A HEAL (PńĻ‚ĄĘńā¬≠mo nad HP √ĄŇĻńā¬≠slem) ---
  let hpY = p.r > 20 ? p.r * 0.2 : 0;
  
  if (p.dmgDisplayTimer > 0) {
      let roundedDmg = Math.round(p.dmgDisplayValue);
      if (roundedDmg > 0) {
          let alpha = map(p.dmgDisplayTimer, 0, 15, 0, 100); // Snńā¬≠ńĻńĺenńāňá viditelnost (ze 140 na 100)
          fill(255, 50, 50, alpha); stroke(0, alpha * 0.4); strokeWeight(2); // Jemn√Ą‚ÄļjńĻňáńā¬≠ obrys
          textSize(Math.floor(Math.max(14, p.r * 0.35)));
          // Vyskakuje nad HP √ĄŇĻńā¬≠slo
          let yOff = hpY - 20 - map(45 - p.dmgDisplayTimer, 0, 45, 0, 20);
          text("-" + roundedDmg, 0, yOff);
      }
      p.dmgDisplayTimer--;
      if (p.dmgDisplayTimer === 0) p.dmgDisplayValue = 0;
  }
  if (p.healDisplayTimer > 0) {
      let roundedHeal = Math.round(p.healDisplayValue);
      if (roundedHeal > 0) {
          let alpha = map(p.healDisplayTimer, 0, 15, 0, 200); // VyńĻňáńĻňáńā¬≠ viditelnost pro zelenńā¬© HP
          fill(0, 255, 255, alpha); stroke(0, alpha * 0.4); strokeWeight(2);
          textSize(Math.floor(Math.max(14, p.r * 0.35)));
          // Vyskakuje nad HP √ĄŇĻńā¬≠slo
          let yOff = hpY - 20 - map(45 - p.healDisplayTimer, 0, 45, 0, 20);
          text("+" + roundedHeal, 0, yOff);
      }
      p.healDisplayTimer--;
      if (p.healDisplayTimer === 0) p.healDisplayValue = 0;
  }

  // AFK vizual: led/mraz dovnitr - jen vnitrni bodaky, profilovka zustava cira
  if (p.isFrozen) {
      push();

      // Pouze vnitrni ledove hroty (bodaky) z obvodu DOVNITR
      // Avatar a barva koule zustavaji viditelne (zadny overlay)
      let edgeR = visualR * 0.98; // zacatek hrotńĻŇĽ tńā¬©sn√Ą‚Äļ uvnitr obvodu
      let numSpikes = 18;
      colorMode(HSB, 360, 100, 100, 255);
      noStroke();
      for (let i = 0; i < numSpikes; i++) {
          let angle = (TWO_PI / numSpikes) * i + frameCount * 0.003;
          // ruzne delky - deterministicke pres index
          let lenMult = 0.15 + 0.18 * abs(sin(i * 1.9 + 0.8));
          let spikeLen = visualR * lenMult; // hroty smeruji DOVNITR

          let innerX = cos(angle) * (edgeR - spikeLen);
          let innerY = sin(angle) * (edgeR - spikeLen);
          let lX = cos(angle + 0.15) * (edgeR - spikeLen * 0.1);
          let lY = sin(angle + 0.15) * (edgeR - spikeLen * 0.1);
          let rX = cos(angle - 0.15) * (edgeR - spikeLen * 0.1);
          let rY = sin(angle - 0.15) * (edgeR - spikeLen * 0.1);

          let alpha = 180 + sin(frameCount * 0.06 + i * 0.7) * 60;
          fill(200, 55, 100, alpha);
          beginShape();
          vertex(lX, lY);
          vertex(innerX, innerY); // spicka DOVNITR
          vertex(rX, rY);
          endShape(CLOSE);
      }
      colorMode(RGB, 255);

      // Tenky ledovy obrys (ciry, jen jemna linka)
      noFill();
      stroke(190, 235, 255, 120 + sin(frameCount * 0.1) * 30);
      strokeWeight(Math.max(1.5, visualR * 0.04));
      circle(0, 0, visualR * 2.0);

      pop();
  }

  // --- STRIBRNY OBRYS TOP 2 ---
  if (isSecond && !p.isBot) {
      push();
      noFill();
      let silverR = visualR * 1.15 + sin(frameCount * 0.15) * (visualR * 0.04);
      let silverThick = Math.max(2.5, visualR * 0.1);
      strokeWeight(silverThick);
      stroke(200, 200, 220, 200 + sin(frameCount * 0.1) * 55); 
      circle(0, 0, silverR * 2);
      pop();
  }

  // --- BRONZOVY OBRYS TOP 3 ---
  if (isThird && !p.isBot) {
      push();
      noFill();
      let bronzeR = visualR * 1.12 + sin(frameCount * 0.12) * (visualR * 0.03);
      let bronzeThick = Math.max(2, visualR * 0.08);
      strokeWeight(bronzeThick);
      stroke(205, 127, 50, 180 + sin(frameCount * 0.08) * 40);
      circle(0, 0, bronzeR * 2);
      pop();
  }

  // --- DUHOVY OBRYS TOP 1 (vzdy posledni, vzdy viditelny) - BEZ ZELENE ---
  if (isLeader && !p.isBot) {
      push();
      noFill();
      let rainbowR = visualR * 1.18 + sin(frameCount * 0.18) * (visualR * 0.05);
      let rainbowSegs = 36;
      let rainbowThick = Math.max(3, visualR * 0.12);
      strokeWeight(rainbowThick);
      colorMode(HSB, 360, 100, 100, 255);
      for (let i = 0; i < rainbowSegs; i++) {
          let a1 = (TWO_PI / rainbowSegs) * i;
          let a2 = (TWO_PI / rainbowSegs) * (i + 1.3);
          let rawHue = (frameCount * 1.5 + i * (360 / rainbowSegs)) % 360;
          // Preskocit zelene odstiny (hue 70-165 = zelena/zlutozele/tyrkysove)
          let hue = rawHue;
          if (hue >= 70 && hue < 165) {
              hue = (hue + 100) % 360; // Posun mimo zelenou oblast
          }
          stroke(hue, 90, 100, 240);
          arc(0, 0, rainbowR * 2, rainbowR * 2, a1, a2);
      }
      colorMode(RGB, 255);
      pop();
  }

    // ==========================================
    // VIZU√ĀLN√ć EFEKTY AKC√ć (D√°rky a H√°danky)
    // ==========================================
    // 1. EFEKT UHODNUT√Č H√ĀDANKY (200 IQ ŇĹ√°rovka)
    if (p.riddleVisualTimer > 0) {
        push();
        let popScale = map(p.riddleVisualTimer, 180, 0, 1.5, 0); // ZmenŇ°ov√°n√≠ v ńćase
        let bounceY = sin(frameCount * 0.2) * 15; // Sk√°k√°n√≠ nahoru a dolŇĮ
        translate(0, -visualR * 1.8 + bounceY); // Um√≠stńõn√≠ NAD kulińćku
        scale(popScale);

        // Z√°Ňôiv√° aura pod emoji
        drawingContext.shadowColor = 'rgba(255, 255, 0, 1)';
        drawingContext.shadowBlur = 20;
        textAlign(CENTER, CENTER);
        textSize(visualR * 1.2);
        
        // OPRAVA TADY: Bezpeńćn√Ĺ k√≥d pro emoji Ňĺ√°rovky (ūüí°)
        text('\uD83D\uDCA1', 0, 0); 
        
        drawingContext.shadowBlur = 0;
        
        // Text 200 IQ
        fill(255, 255, 0);
        stroke(0);
        strokeWeight(3);
        textSize(visualR * 0.5);
        text('200 IQ!', 0, -visualR * 0.8);
        pop();
        
        p.riddleVisualTimer--;
    }

    // 2. EFEKT D√ĀRKU / RŇģŇĹE (Rotuj√≠c√≠ exploze ikony)
    if (p.giftVisualTimer > 0) {
        push();
        let pulseScale = 1 + sin(frameCount * 0.3) * 0.5;
        let rot = frameCount * 0.1;
        rotate(rot);
        scale(pulseScale);
        let alpha = map(p.giftVisualTimer, 120, 0, 255, 0);
        textAlign(CENTER, CENTER);
        textSize(visualR * 1.8);
        drawingContext.globalAlpha = alpha / 255;
        
        // OPRAVA TADY: Bezpeńćn√Ĺ k√≥d pro emoji d√°rku (ūüéĀ)
        text(p.giftVisualEmoji || '\uD83C\uDF81', 0, 0); 
        
        drawingContext.globalAlpha = 1.0;
        pop();
        
        p.giftVisualTimer--;
    }
  // ==========================================

  noStroke(); pop();
}

function createParticles(x, y, c, count, type = 'CIRCLE') {
  if (players.length > 80) return; 
  let actualCount = count;
  if (players.length > 60) {
      actualCount = Math.max(1, Math.floor(count * 0.3));
  } else if (players.length > 40) {
      actualCount = Math.max(1, Math.floor(count / 2));
  }
  for(let i=0; i<actualCount; i++) {
      let pSize = (type === 'HEART' || type === 'ENERGY') ? random(8, 16) : random(4, 10);
      let p = null;
      for (let j = 0; j < particles.length; j++) {
          if (!particles[j].active) { p = particles[j]; break; }
      }
      if (p) {
          p.active = true; p.x = x; p.y = y; p.vx = random(-6,6); p.vy = random(-6,6);
          p.life = 255; p.c = c; p.size = pSize; p.type = type;
      } else if (particles.length < 500) { // Limit bazńā¬©nu na 500 √ĄŇĻńāňástic
          particles.push({active: true, x: x, y: y, vx: random(-6,6), vy: random(-6,6), life: 255, c: c, size: pSize, type: type});
      }
  }
}

function drawParticles() {
  noStroke();
  
  for(let i=0; i<particles.length; i++) {
    let p = particles[i];
    if (!p.active) continue;
    
    // √ĄŇöńāňástice se uńĻńĺ nekreslńā¬≠ s drahńāňĚm neonovńāňĚm stńā¬≠nem, ale s √ĄŇĻistou barvou
    fill(red(p.c), green(p.c), blue(p.c), p.life);
        
        if (p.type === 'HEART') {
            imageMode(CENTER);
            tint(red(p.c), green(p.c), blue(p.c), p.life);
            image(cachedHeart, p.x, p.y, p.size * 2.5, p.size * 2.5);
            noTint();
        } else if (p.type === 'ENERGY') {
            imageMode(CENTER);
            tint(red(p.c), green(p.c), blue(p.c), p.life);
            image(cachedEnergy, p.x, p.y, p.size * 2.5, p.size * 2.5);
            noTint();
        } else {
            ellipse(p.x, p.y, p.size);
        }
        
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95; 
    p.size *= 0.98; 
    p.life -= 15; 
    
    if(p.life <= 0) p.active = false; // Neodstranit, pouze deaktivovat (Object Pooling)
  }
}

function addPopup(txt, x, y, c, isCrit = false) {
  let f = null;
  for (let i = 0; i < floatingTexts.length; i++) {
      if (!floatingTexts[i].active) { f = floatingTexts[i]; break; }
  }
  if (f) {
      f.active = true; f.txt = txt; f.x = x; f.y = y; f.life = 255; f.c = c; f.vy = -1.5; f.isCrit = isCrit; f.scale = 0.1;
  } else if (floatingTexts.length < 200) { // Limit bazńā¬©nu na 200 textńĻŇĽ
      floatingTexts.push({active: true, txt: txt, x: x, y: y, life: 255, c: c, vy: -1.5, isCrit: isCrit, scale: 0.1});
  }
}

function drawPopups() {
  for(let i=0; i<floatingTexts.length; i++) {
    let f = floatingTexts[i];
    if (!f.active) continue;
    
    f.scale = lerp(f.scale, 1.0, 0.2); 
    push(); translate(f.x, f.y); scale(f.scale);
    // Vypnuto stńā¬≠novńāňánńā¬≠ pro obrovskńāňĚ nńāňárńĻŇĽst FPS
    if (f.isCrit) {
        stroke(0); strokeWeight(4); fill(255, 215, 0, f.life); textSize(22 + sin(f.life * 0.1) * 4); textAlign(CENTER); textStyle(BOLD);
            let critText = f.txt; 
            text(critText, 0, 0); f.y += f.vy - 0.5; f.life -= 8;
    } else {
        stroke(0); strokeWeight(3); fill(red(f.c), green(f.c), blue(f.c), f.life); textSize(16); textAlign(CENTER); textStyle(BOLD);
        text(f.txt, 0, 0); f.y += f.vy; f.life -= 8;
    }
    pop();
    
    if (f.life <= 0) f.active = false; // Deaktivovat mńā¬≠sto mazńāňánńā¬≠ (Object Pooling)
  }
  drawingContext.shadowBlur = 0; textStyle(NORMAL);
}

      let p = random(players);
      bountyTarget = p.name;

      speakTTS(msg, true);

}

function updateTimers() {
  if (frameCount % 300 === 0) {
      saveLeaderboards();
  }
  // --- ANTI-DUPLIKńā¬ĀT SYSTńā‚ÄįM (KańĻńĺdńāňĚch 10 vteńĻ‚ĄĘin / 600 framńĻŇĽ) ---
  if (frameCount % 600 === 0) {
      let nameGroups = {};
      
      // RoztńĻ‚ĄĘńā¬≠dńā¬≠me ńĻńĺivńā¬© hrńāňá√ĄŇĻe podle jmńā¬©na
      for (let p of players) {
          if (!p.isZombie) {
              if (!nameGroups[p.name]) nameGroups[p.name] = [];
              nameGroups[p.name].push(p);
          }
      }

      // Projdeme skupiny a smańĻńĺeme slabńĻňáńā¬≠ duplikńāňáty
      for (let name in nameGroups) {
          let group = nameGroups[name];
          if (group.length > 1) {
              // SeńĻ‚ĄĘadńā¬≠me podle HP sestupn√Ą‚Äļ (nejv√Ą‚ÄļtńĻňáńā¬≠ si nechńāňáme na indexu 0)
              group.sort((a, b) => b.hp - a.hp);
              
              // VńĻňáechny ostatnńā¬≠ tińĻňáe vymańĻńĺeme
              for (let j = 1; j < group.length; j++) {
                  let dup = group[j];
                  
                  // TichńāňĚ vizuńāňálnńā¬≠ fade-out (jen se rozplyne)
                  if (dup.body) {
                      createParticles(dup.body.position.x, dup.body.position.y, dup.color, 10);
                      Matter.World.remove(world, dup.body);
                  }
                  
                  // Odstran√Ą‚Äļnńā¬≠ z pole hrńāňá√ĄŇĻńĻŇĽ
                  let idx = players.indexOf(dup);
                  if (idx > -1) players.splice(idx, 1);
              }
          }
      }
  }
  // -------------------------------------------------------------

  if (frameCount % 60 === 0) {
      currentTop10 = [...players].sort((a,b) => b.hp - a.hp).slice(0, 10).map(p => p.name);
  }

  for (let p of players) {
      // 1. Ode√ĄŇĻet imunity
      if (p.immunityTimer > 0) {
          p.immunityTimer--;
          if (p.immunityTimer <= 0) {
              safePlaySound(pentatonic('mid'), 0.05, 0.4);
              createParticles(p.body.position.x, p.body.position.y, color(0, 255, 255), 40);
              p.hasCrown = false; 
          }
      }
      
      // 2. Ode√ĄŇ§et Bot Crusher bonusu
      if (p.botDmgTimer > 0) p.botDmgTimer--;
      
      // --- EFEKT √ĄŇöERNńā‚Äį DńāŇ§RY PRO Hńā DANKY ---
      if (p.blackHoleTimer && p.blackHoleTimer > 0) {
          p.blackHoleTimer--;
          
          for (let other of players) {
              if (other !== p) {
                  let diff = Matter.Vector.sub(p.body.position, other.body.position);
                  let dist = Matter.Vector.magnitude(diff);
                  
                  // Dosah √ĄŇ§ernńā¬© dńā¬≠ry je 500 pixelńĻŇĽ
                  if (dist < 500 && dist > 10) { 
                      let dir = Matter.Vector.normalise(diff);
                      
                      if (p.blackHoleTimer > 5) {
                          // Fńā ZE 1: Agresivnńā¬≠ vcucnutńā¬≠ sm√Ą‚Äļrem k vńāňĚherci
                          let pull = 0.0003 * other.body.mass;
                          Matter.Body.applyForce(other.body, other.body.position, {
                              x: dir.x * pull,
                              y: dir.y * pull
                          });
                      } else if (p.blackHoleTimer === 1) {
                          // Fńā ZE 2: Jemn√Ą‚ÄļjńĻňáńā¬≠ exploze (odhozenńā¬≠ ven) t√Ą‚Äļsn√Ą‚Äļ pńĻ‚ĄĘed koncem
                          let push = 0.0006 * other.body.mass;
                          Matter.Body.applyForce(other.body, other.body.position, {
                              x: -dir.x * push,
                              y: -dir.y * push
                          });
                      }
                  }
              }
          }
      }
      // -------------------------------------
  }
  
  if (gameState === "PLAYING") {
      if (activeEvent) {
          eventTimer--;
          if (eventTimer <= 0) {
              if (activeEvent === "BOUNTY" && bountyTarget) {
                  let bp = players.find(p => p.name === bountyTarget);
                  if (bp) bp.isBounty = false;
              }
              activeEvent = null;
              bountyTarget = null;
              nextEventTime = millis() + random(60000, 150000);
          } else if (activeEvent === "BOUNTY" && bountyTarget) {
              let bp = players.find(p => p.name === bountyTarget);
              if (bp && bp.body) {
                  for (let p of players) {
                      if (!p.body || p === bp) continue;
                      let dx = bp.body.position.x - p.body.position.x;
                      let dy = bp.body.position.y - p.body.position.y;
                      let distSq = dx*dx + dy*dy;
                      let dist = Math.sqrt(distSq) || 1;
                      let forceMag = 0.0001 * p.body.mass;
                      Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
                  }
              }
          } else if (activeEvent === "MAGNET") {
              let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
              for (let p of players) {
                  if (!p.body) continue;
                  let dx = cx - p.body.position.x;
                  let dy = cy - p.body.position.y;
                  let distSq = dx*dx + dy*dy;
                  let dist = Math.sqrt(distSq) || 1;
                  
                  // Vizuńāňálnńā¬≠ vylepńĻňáenńā¬≠ a ochrana: √ĄŇöernńāňá dńā¬≠ra hrńāňá√ĄŇĻe roztńāňá√ĄŇĻńā¬≠ do vńā¬≠ru, ne jen natvrdo do stńĻ‚ĄĘedu
                  let pullForce = 0.00012 * p.body.mass; // OslabenńāňĚ tah pńĻ‚ĄĘńā¬≠mo do stńĻ‚ĄĘedu
                  let swirlForce = 0.00035 * p.body.mass; // Silnńāňá rotace kolem dokola tvońĻ‚ĄĘńā¬≠cńā¬≠ vńā¬≠r
                  
                  let fx = (dx/dist)*pullForce - (dy/dist)*swirlForce;
                  let fy = (dy/dist)*pullForce + (dx/dist)*swirlForce;
                  Matter.Body.applyForce(p.body, p.body.position, { x: fx, y: fy });

                  // SMRTńāŇ§CńāŇ§ EFEKT PRO GIGANTY V √ĄŇöERNńā‚Äį DńāŇ§ńĻ¬ėE
                  if (frameCount % 30 === 0 && p.hp > 3000 && distSq < 35000) { // Zv√Ą‚ÄļtńĻňáen radius, protońĻńĺe vńā¬≠r je drńĻńĺńā¬≠ dńāňál
                      let shred = Math.floor(p.hp * 0.15); // UstńĻ‚ĄĘihne jim to 15 %!
                      p.hp -= shred;
                      addPopup("SHREDDED!", p.body.position.x, p.body.position.y, color(255, 0, 0), true);
                      createParticles(p.body.position.x, p.body.position.y, color(150, 0, 255), 20);
                      screenShake = 5;
                      safePlaySound(pentatonic('low'), 0.03, 0.6);
                  }
              }
          }
      // ZAKńā¬ĀZńā¬ĀNO: Nńāňáhodnńā¬© udńāňálosti bez interakce
      // } else if (millis() > nextEventTime && players.length > 2) {
      //     triggerRandomEvent();
      }
  }

  if (gameState === "PLAYING" && roundTimerFrames > 0) {
    if (roundTimerPause > 0) {
        roundTimerPause--; // Pokud se spamuje na startu, odpo√ĄŇĻet √ĄŇĻekńāňá
    } else {
        roundTimerFrames--;
    }
    
    // ZAKńā¬ĀZńā¬ĀNO: Nńāňáhodnńā¬© spawnovńāňánńā¬≠ bonusovńāňĚch orbńĻŇĽ
    // if (bonusFrames.includes(roundTimerFrames)) { shootBonusFromShip(); }
    
    if (frameCount % 60 === 0) roundTimer = Math.ceil(roundTimerFrames / 60);

    if (roundTimerFrames <= 0) {
        gameState = "EXPLODING"; explosionTimer = 90; screenShake = 40; 
        codeActive = false; // ZruńĻňáńā¬≠ probńā¬≠hajńā¬≠cńā¬≠ hńāňádńāňánńā¬≠ kńāŇādu
        
        safePlaySound(pentatonic('low'), 0.12, 1.0); setTimeout(() => { safePlaySound(pentatonic('low'), 0.10, 1.2); }, 200);
        
        let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
        deathShockwaves.push({x: cx, y: cy, r: 80, color: color(0, 255, 255), life: 255, isNuke: true});
        deathShockwaves.push({x: cx, y: cy, r: 150, color: color(255, 100, 0), life: 255, isNuke: true});
        createParticles(cx, cy, color(0, 255, 255), 100); 
        createParticles(cx, cy, color(255, 100, 0), 100);

        // EpickńāňĚ zpomalenńāňĚ odhoz vńĻňáech hrńāňá√ĄŇĻńĻŇĽ do stran
        for (let p of players) {
            if (!p.body) continue;
            let dx = p.body.position.x - cx; let dy = p.body.position.y - cy; let dist = Math.sqrt(dx*dx + dy*dy) || 1;
            let forceMag = 0.2 * p.body.mass; // Masivnńā¬≠ odhazovacńā¬≠ sńā¬≠la
            Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
        }
        
        engine.timing.timeScale = 0.2; // Slow-mo pro epickńāňĚ zńāňáv√Ą‚Äļr
    }
  } else if (gameState === "EXPLODING") {
      explosionTimer--; screenShake *= 0.95;
      if (explosionTimer <= 0) { 
          gameState = "RESULTS"; 
          let donorCount = Object.keys(roundGifts).length;
          maxResultsTimer = 10;
          resultsTimer = 10; 
          winnerAnnounced = false;
      } 
  }
  
  // ZPRACOVńā¬ĀNńāŇ§ NASTńĻ¬ėńā¬ĀDANńāŇ•CH LAJKńĻ¬ģ (Ochrana vńāňĚkonu)
  let nowTime = millis();
  for (let u in pendingLikes) {
      let data = pendingLikes[u];
      
      // DynamickńāňĚ limit: √ĄŇĻńā¬≠m vńā¬≠c lidńā¬≠, tńā¬≠m vńā¬≠c lajkńĻŇĽ je potńĻ‚ĄĘeba na efekt
      let reqLikes = players.length > 30 ? 100 : 50; 
      let timeLimit = players.length > 30 ? 2000 : 1000;

      // Odpal ańĻńĺ pńĻ‚ĄĘi spln√Ą‚Äļnńā¬≠ dynamickńā¬©ho limitu
      if (data.count >= reqLikes || (data.count > 0 && nowTime - data.lastUpdate > timeLimit)) {
          let amount = data.count;
          let isMega = amount >= reqLikes;

          let p = players.find(x => x.name === u);
          if (p) {
              p.likeBuffTimer = Math.max(p.likeBuffTimer || 0, millis() + 5000);
              if (players.length < 50) {
                  addPopup("+" + (amount * 2), p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
                  // Mńā¬©n√Ą‚Äļ √ĄŇĻńāňástic = mńā¬©n√Ą‚Äļ lagńĻŇĽ, typ ENERGY
                  createParticles(p.body.position.x, p.body.position.y, color(255, 215, 0), isMega ? 8 : 3, 'ENERGY');
              }
              
              let activeLikers = players.filter(pl => pl.likeBuffTimer && pl.likeBuffTimer > millis());
              let myIdx = activeLikers.findIndex(pl => pl.name === u);
              let harmonyShift = Math.max(0, myIdx); // KańĻńĺdńāňĚ hrńāňá√ĄŇ§ dostane svńĻŇĽj vlastnńā¬≠ tńāŇān v harmonii!
              
              let baseIdx = (p.hp >= 200) ? floor(random(0, 5)) : floor(random(3, 10));
              let vol = (p.hp >= 200) ? 0.004 : 0.008;
              
              let newIdx = baseIdx + harmonyShift;
              let octaves = Math.floor(newIdx / 5);
              let noteInOctave = newIdx % 5;
              let baseNotes = [261.63, 293.66, 329.63, 392.00, 440.00];
              let finalFreq = baseNotes[noteInOctave] * Math.pow(2, octaves);
              
              safePlaySound(finalFreq, vol, 0.1);
          }

          if (amount >= 5) {
              let existingNotif = notifications.find(n => n.type === 'LIKE' && n.name === u && (n.state === 'WAITING' || n.state === 'DISPLAY'));
              if (existingNotif) {
                  existingNotif.extra += amount;
                  existingNotif.age = 0; // Reset v√Ą‚Äļku pro setrvńāňánńā¬≠ na obrazovce
                  if (existingNotif.extra >= 50) existingNotif.isMegaLike = true;
              } else {
                  addNotification('LIKE', u, userAvatars[u], amount, isMega);
              }
          }
          data.count = 0; 
      }
  }

  // ZOMBIE COOLDOWN (VystńĻ‚ĄĘelenńā¬≠ po 20 vteńĻ‚ĄĘinńāňách)
  let alivePlayersCount = players.filter(p => !p.isZombie).length;
  let activeZombiesCount = players.filter(p => p.isZombie).length;

  for (let i = deadPlayersQueue.length - 1; i >= 0; i--) {
      if (millis() - deadPlayersQueue[i].timeOfDeath > deadPlayersQueue[i].respawnDelay) {
          let zName = deadPlayersQueue[i].name;
          // Pokud hrńāňá√ĄŇĻ nńāňáhodou uńĻńĺ nehraje (napńĻ‚ĄĘ. nedal hned !join)
            if (!players.find(x => x.name === zName)) {
              if (alivePlayersCount < 25 && activeZombiesCount < 15) {
                      spawnPlayer(zName, 50, false, 0, true); // true = isZombie, menńĻňáńā¬≠ HP
                  activeZombiesCount++;
                  deadPlayersQueue.splice(i, 1);
                          break; // PńĻ¬ėIDńā¬ĀNO: Zastavńā¬≠ cyklus. DalńĻňáńā¬≠ mrtvńāňĚ se spawne ańĻńĺ v dalńĻňáńā¬≠m framu!
              } else {
                  // Pokud je na plońĻňáe uńĻńĺ dost hrńāňá√ĄŇĻńĻŇĽ, odlońĻńĺńā¬≠me spawn tohoto zombńā¬≠ka o 5 vteńĻ‚ĄĘin
                  deadPlayersQueue[i].timeOfDeath += 5000;
              }
          } else {
              // Hrńāňá√ĄŇĻ se uńĻńĺ pńĻ‚ĄĘipojil jako ńĻńĺivńāňĚ, mańĻńĺeme z fronty mrtvńāňĚch
              deadPlayersQueue.splice(i, 1);
          }
      }
  }
}

function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data); 
      let evt = d?.event || d?.type || ""; 
      let n = d?.data?.nickname || d?.nickname || d?.data?.uniqueId || d?.uniqueId || "Anonym";
      if (n === "Anonym") return;
      
      // RESET IDLE TIMERU PńĻ¬ėI JAKńā‚ÄįKOLIV AKCI ZE SOCKETU
      lastRealInteractionTime = millis();
      
      let u = n.substring(0, 15);
      
      let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
      if (imgUrl && !userAvatars[u]) {
          userAvatars[u] = "loaded";
          loadImage(imgUrl, img => { 
              let g = createGraphics(100, 100);
              g.clear();
              g.noStroke();
              g.fill(255);
              g.circle(50, 50, 100);
              g.drawingContext.globalCompositeOperation = 'source-in';
              g.image(img, 0, 0, 100, 100);
              userAvatars[u] = g; 
          }, () => { delete userAvatars[u]; });
      }
      
      if (evt === "follow") {
          playFollowSound();
          addNotification('FOLLOW', u, userAvatars[u]);
      }
      
      if (evt === "block" || evt === "ban" || evt === "user_block" || evt === "user_ban") {
          removePlayerCompletely(u);
          return;
      }
      
      if (!players.find(x => x.name === u) && evt !== "gift") {
          spawnPlayer(u, getStartingHp(u));
          addNotification('JOIN', u, userAvatars[u]); // NovńāňĚ ńĻňátńā¬≠tek pro pńĻ‚ĄĘipojenńā¬≠
      }

      if (evt === "chat") {
          let msg = (d?.data?.comment || "").trim();
          let msgLower = msg.toLowerCase();
          let p = players.find(x => x.name === u);
          
          // OńĻńĺivenńā¬≠ zombńā¬≠ka pńĻ‚ĄĘi jakńā¬©mkoliv chatu
          if (p && p.isZombie) {
              reviveZombie(p);

function removeDiacritics(text) {
    return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

let zenskyHlas = null;

function nactiHlasy() {
    if (!('speechSynthesis' in window)) return;
    let voices = window.speechSynthesis.getVoices();
    // Priorita: Vlasta (Windows), pak Google √ĄŇĻeńĻňátina (Chrome), pak jakńāňákoliv √ĄŇĻeńĻňátina
    zenskyHlas = voices.find(v => v.name.toLowerCase().includes('vlasta')) || 
                 voices.find(v => v.name.includes('Google') && v.lang.includes('cs')) ||
                 voices.find(v => v.lang.includes('cs'));
}

if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = nactiHlasy;
}
nactiHlasy();

function speakTTS(txt, force = false) {
  if (!('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();

  if (!force && millis() - lastSpeakTime < 12000) return;

  // Agresivnńā¬≠ odstran√Ą‚Äļnńā¬≠ emoji a specińāňálnńā¬≠ch znakńĻŇĽ
  let cleanTxt = txt
      .replace(/[\u{0080}-\u{00FF}]/gu, '') // Latin extended chars that TTS reads weirdly
      .replace(/[\u{1F000}-\u{1FFFF}]/gu, '') // Emoticons, symbols, flags
      .replace(/[\u{2600}-\u{27BF}]/gu, '') // Misc symbols, dingbats
      .replace(/[\u{FE00}-\u{FEFF}]/gu, '') // Variation selectors
      .replace(/[\u{200B}-\u{200F}\u{2028}-\u{202F}\u{2060}-\u{206F}]/gu, '') // Zero-width, invisible
      .replace(/[\u{E000}-\u{F8FF}]/gu, '') // Private use area
      .replace(/[\u{10000}-\u{10FFFF}]/gu, '') // Supplementary planes (emoji, rare symbols)
      .replace(/[^\p{L}\p{N}\s.,!?:+\-()]/gu, '') // Keep only letters, numbers, basic punctuation
      .replace(/\s+/g, ' ').trim();
  if (cleanTxt.length > 80) cleanTxt = cleanTxt.substring(0, 80);
  
  let checkText = removeDiacritics(cleanTxt.toLowerCase()).replace(/[\s\.\-_]/g, "");
  for (let word of FORBIDDEN_WORDS) {
      if (checkText.includes(word)) return;
  }

  var msg = new SpeechSynthesisUtterance(cleanTxt);
  msg.lang = 'cs-CZ';

  if (zenskyHlas) {
      msg.voice = zenskyHlas;
      msg.pitch = 1.1; 
  } else {
      msg.pitch = 1.4; 
  }
  
  msg.rate = 1.1; 
  
  window.speechSynthesis.speak(msg);
  lastSpeakTime = millis();
}

  }
