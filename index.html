let engine, world;
let players = [];
let particles = [];
let floatingTexts = [];
let lightnings = [];
let deathShockwaves = [];
let userAvatars = {};
let orbs = []; 

let wallTop, wallBot, wallLeft, wallRight;
const wallThick = 2000;

// Systém poškození (Pouze All-Time žebříček)
let allTimeDamageLeaderboard = {};
let allTimeLbRect = {x: 10, y: HUD_TOP + 10, w: 200, h: 15}; 

// Vesmírné efekty
let stars = [];
let nebulas = [];
let shootingStars = [];
let planets = [];
let milkyWay = [];
let flowTime = 0;
let globalFlowAngle = 0;

let roundTimer = 0;
let maxRoundTimer = 0; 
let explosionTimer = 0;
let gameState = "PLAYING"; 
let resultsTimer = 10;
let cameraScale = 1.0;
let audioStarted = false;
let synth;

let nextCommentTime = 0;
let lastHitSound = 0;
let lastCommentString = "";
let screenShake = 0;
let shipX = 0, shipY = 0;

const TIKFINITY_URL = "ws://localhost:21213/";
let socket;
const TEST_NAMES = ["PixelKing", "RetroZ", "Void", "Nebula", "StarLord", "Glitch", "Cosmos", "Apollo"];

function setup() {
  let cvs = createCanvas(W, H);
  cvs.parent('game-container');
  smooth();
  noCursor();
  
  synth = new p5.PolySynth();
  synth.setADSR(0.01, 0.1, 0.2, 0.1);
  
  engine = Matter.Engine.create({ enableSleeping: false });
  world = engine.world;
  world.gravity.y = 0; 
  world.gravity.x = 0;
  
  let cx = W/2;
  let cy = (ARENA_TOP+ARENA_BOT)/2;
  let wallOpts = { isStatic: true, restitution: 1.0, friction: 0 };
  
  wallTop = Matter.Bodies.rectangle(cx, cy - 1000, 20000, wallThick, wallOpts);
  wallBot = Matter.Bodies.rectangle(cx, cy + 1000, 20000, wallThick, wallOpts);
  wallLeft = Matter.Bodies.rectangle(cx - 1000, cy, wallThick, 20000, wallOpts);
  wallRight = Matter.Bodies.rectangle(cx + 1000, cy, wallThick, 20000, wallOpts);
  Matter.World.add(world, [wallTop, wallBot, wallLeft, wallRight]);

  generateSpaceBackground();
  
  setupEvents();
  startNewRound();
  connectTikfinity();
}

function generateSpaceBackground() {
  stars = [];
  nebulas = [];
  shootingStars = [];
  planets = [];
  milkyWay = [];
  
  let mwPoints = 40;
  for (let i = 0; i < mwPoints; i++) {
      let t = i / mwPoints;
      let baseX = lerp(-100, W + 100, t) + random(-150, 150);
      let baseY = lerp(ARENA_TOP - 100, ARENA_BOT + 100, t) + random(-200, 200);
      milkyWay.push({
          x: baseX,
          y: baseY,
          r: random(80, 250),
          color: color(random(50, 120), random(20, 80), random(100, 200), random(2, 8))
      });
  }

  for(let i=0; i<200; i++) {
    let isPulse = random() < 0.25; 
    stars.push({
        x: random(W), y: random(ARENA_TOP, ARENA_BOT), 
        s: random(1, 3.5), speed: random(0.1, 1.2),
        rC: random(150, 255), gC: random(200, 255), bC: 255,
        baseAlpha: random(15, 80),
        isPulsing: isPulse,
        pulseSpeed: random(0.02, 0.06),
        pulsePhase: random(TWO_PI)
    });
  }
  
  for(let i=0; i<6; i++) {
    nebulas.push({
        x: random(W), y: random(ARENA_TOP, ARENA_BOT),
        r: random(200, 600),
        color: color(random(50, 150), random(0, 100), random(150, 255), random(2, 10))
    });
  }

  for(let i=0; i<4; i++) {
    planets.push({
        x: random(W), y: random(ARENA_TOP, ARENA_BOT),
        r: random(15, 45),
        col: color(random(20, 70), random(20, 70), random(20, 70), 80),
        ringCol: color(random(50, 150), random(50, 150), random(50, 150), 30),
        vx: random(-0.15, 0.15), vy: random(-0.15, 0.15),
        hasRing: random() > 0.5,
        angle: random(TWO_PI),
        rotSpeed: random(-0.01, 0.01)
    });
  }
}

function startNewRound() {
  players.forEach(p => Matter.World.remove(world, p.body));
  
  let oldPlayers = players.map(p => p.name);
  players = [];
  orbs = [];
  screenShake = 0;
  
  oldPlayers.forEach(name => spawnPlayer(name, 500)); 

  roundTimer = floor(random(180, 900)); 
  maxRoundTimer = roundTimer;
  gameState = "PLAYING";
  cameraScale = 1.0;
  particles = [];
  floatingTexts = [];
  lightnings = [];
  deathShockwaves = [];
  nextCommentTime = millis() + random(3000, 6000);
  generateSpaceBackground();
}

function setupEvents() {
  document.getElementById('langBtn').onclick = (e) => {
    currentLang = currentLang === "CZ" ? "EN" : "CZ";
    e.target.innerText = "LANG: " + currentLang;
  };
  document.getElementById('tJoin').onclick = () => {
    handleAction(random(TEST_NAMES) + floor(random(99)), 500); 
  };
  document.getElementById('tLike').onclick = () => {
    if(players.length > 0) handleAction(random(players).name, floor(random(50, 150)));
    else document.getElementById('tJoin').click();
  };
  document.getElementById('tGift').onclick = () => {
    if(players.length > 0) handleAction(random(players).name, 5000);
  };
  document.getElementById('tChat').onclick = () => {
    if(!audioStarted) { audioStarted = true; userStartAudio(); }
    speakTTS(currentLang === "CZ" ? "Sputnik: Zpráva přijata!" : "Sputnik: Message received!");
  };
  document.getElementById('resetBtn').onclick = () => startNewRound();

  Matter.Events.on(engine, 'collisionStart', (event) => {
    let playedSoundThisFrame = false;
    event.pairs.forEach(pair => {
      let p1 = players.find(p => p.body === pair.bodyA);
      let p2 = players.find(p => p.body === pair.bodyB);
      if(p1 && p2) {
          handleCombat(p1, p2);
          if (!playedSoundThisFrame && audioStarted && millis() - lastHitSound > 100) {
              try { synth.play(random([800, 1000, 1200]), 0.02, 0, 0.1); } catch(e){} 
              lastHitSound = millis();
              playedSoundThisFrame = true;
          }
      }
    });
  });
}

function formatK(num) {
  let safeNum = Math.max(0, num || 0);
  if (safeNum >= 1000000) return (safeNum / 1000000).toFixed(1) + 'M';
  if (safeNum >= 1000) return (safeNum / 1000).toFixed(1) + 'K';
  return Math.floor(safeNum).toString();
}

function getRadius(hp) {
    let safeHp = Math.max(0, hp || 0); 
    return Math.min(32 + Math.sqrt(safeHp) * 0.5, 110); 
}

function spawnPlayer(name, hp) {
  let safeHp = Math.max(0, hp || 500); 
  let r = getRadius(safeHp);
  
  let cx = W/2;
  let cy = (ARENA_TOP+ARENA_BOT)/2;
  let viewW = W / cameraScale;
  let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  let spawnX = cx + random(-viewW/2 + r*2, viewW/2 - r*2);
  let spawnY = cy + random(-viewH/2 + r*2, viewH/2 - r*2);

  let body = Matter.Bodies.circle(spawnX, spawnY, r, {
    restitution: 0.95, frictionAir: 0.0, friction: 0, density: 0.001
  });
  
  Matter.Body.setVelocity(body, { x: random(-3.5, 3.5), y: random(-3.5, 3.5) });
  
  let player = {
    name: name, hp: safeHp, body: body, r: r,
    color: color(random(100,255), random(100,255), random(100,255)),
    rot: 0, auraFlash: 0,
    baseRotDir: random() < 0.5 ? 1 : -1, 
    noiseOffsetX: random(1000), noiseOffsetY: random(2000),
    damageDealt: 0,
    sawType: Math.floor(random(30)),
    likeBuffTimer: 0,
    trail: [] 
  };
  
  players.push(player);
  Matter.World.add(world, body);
  speakTTS(T[currentLang].NEW + name);
  createParticles(body.position.x, body.position.y, player.color, 10);
  
  if(audioStarted) {
      try { 
          synth.play(600, 0.1, 0, 0.05); 
          setTimeout(() => { if(synth) synth.play(900, 0.1, 0, 0.1); }, 50);
      } catch(e){}
  }
}

function handleAction(name, amount) {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  let p = players.find(x => x.name === name);
  if(p) {
    p.hp += amount;
    p.auraFlash = 15; 
    p.likeBuffTimer = 90; 
    let newR = getRadius(p.hp);
    if (newR > p.r + 0.5) {
        let scale = newR / p.r;
        Matter.Body.scale(p.body, scale, scale);
        p.r = newR;
        Matter.Body.setDensity(p.body, 0.001 + (newR * 0.0001));
    }
    addPopup("+" + amount, p.body.position.x, p.body.position.y - p.r, color(50, 255, 100));
  } else {
    spawnPlayer(name, 500 + amount); 
  }
}

function updateDamageLB(name, dmg, col) {
    let ava = userAvatars[name];
    if (!allTimeDamageLeaderboard[name] || dmg > allTimeDamageLeaderboard[name].score) {
        allTimeDamageLeaderboard[name] = { score: dmg, color: col, avatar: ava };
    }
}

function handleCombat(p1, p2) {
  let speed = Matter.Vector.magnitude(Matter.Vector.sub(p1.body.velocity, p2.body.velocity));
  if (speed < 1.0) return; 

  let safeHp1 = Math.max(1, p1.hp);
  let safeHp2 = Math.max(1, p2.hp);

  let speed1 = Matter.Vector.magnitude(p1.body.velocity);
  let speed2 = Matter.Vector.magnitude(p2.body.velocity);

  let massAdvantage1 = Math.min(1.5, Math.max(1, Math.sqrt(safeHp1 / safeHp2)));
  let massAdvantage2 = Math.min(1.5, Math.max(1, Math.sqrt(safeHp2 / safeHp1)));

  let momentum1 = speed1 / (speed1 + speed2 + 0.1);
  let momentum2 = speed2 / (speed1 + speed2 + 0.1);
  
  let buffMult1 = p1.likeBuffTimer > 0 ? 1.5 : 1.0;
  let buffMult2 = p2.likeBuffTimer > 0 ? 1.5 : 1.0;

  let baseDmgFrom1 = (Math.log10(safeHp1) * 0.35 + speed * 0.2) * massAdvantage1 * (0.5 + momentum1) * buffMult1;
  let baseDmgFrom2 = (Math.log10(safeHp2) * 0.35 + speed * 0.2) * massAdvantage2 * (0.5 + momentum2) * buffMult2;

  baseDmgFrom1 *= random(0.8, 1.2);
  baseDmgFrom2 *= random(0.8, 1.2);

  let isCrit1 = random() < 0.04;
  let isCrit2 = random() < 0.04;

  if (isCrit1) baseDmgFrom1 *= 1.3;
  if (isCrit2) baseDmgFrom2 *= 1.3;

  let finalDmgTo2 = Math.max(1, Math.floor(baseDmgFrom1)); 
  let finalDmgTo1 = Math.max(1, Math.floor(baseDmgFrom2)); 

  let hp1Before = p1.hp;
  let hp2Before = p2.hp;

  p1.hp -= finalDmgTo1;
  p2.hp -= finalDmgTo2;

  if (p1.hp <= 0 && hp1Before > 0) {
      let heal = Math.floor(hp1Before * 0.3 + 50); 
      p2.hp += heal;
      addPopup("+" + heal + " TAKEDOWN!", p2.body.position.x, p2.body.position.y - p2.r - 20, color(50, 255, 100));
      p2.auraFlash = 20;
      let newR = getRadius(p2.hp);
      if (newR > p2.r + 0.5) {
          let scale = newR / p2.r;
          Matter.Body.scale(p2.body, scale, scale);
          p2.r = newR;
          Matter.Body.setDensity(p2.body, 0.001 + (newR * 0.0001));
      }
  }
  
  if (p2.hp <= 0 && hp2Before > 0) {
      let heal = Math.floor(hp2Before * 0.3 + 50);
      p1.hp += heal;
      addPopup("+" + heal + " TAKEDOWN!", p1.body.position.x, p1.body.position.y - p1.r - 20, color(50, 255, 100));
      p1.auraFlash = 20;
      let newR = getRadius(p1.hp);
      if (newR > p1.r + 0.5) {
          let scale = newR / p1.r;
          Matter.Body.scale(p1.body, scale, scale);
          p1.r = newR;
          Matter.Body.setDensity(p1.body, 0.001 + (newR * 0.0001));
      }
  }

  p1.damageDealt += finalDmgTo2;
  p2.damageDealt += finalDmgTo1;

  updateDamageLB(p1.name, p1.damageDealt, p1.color);
  updateDamageLB(p2.name, p2.damageDealt, p2.color);
  
  let cx = (p1.body.position.x + p2.body.position.x)/2;
  let cy = (p1.body.position.y + p2.body.position.y)/2;

  let forceDir = Matter.Vector.normalise(Matter.Vector.sub(p2.body.position, p1.body.position));
  let forceMag = 0.02 + speed * 0.004;
  Matter.Body.applyForce(p1.body, p1.body.position, Matter.Vector.mult(forceDir, -forceMag * p1.body.mass));
  Matter.Body.applyForce(p2.body, p2.body.position, Matter.Vector.mult(forceDir, forceMag * p2.body.mass));
  
  // Zamezení přehlcení vizuálu
  if (players.length < 50) {
      lightnings.push({x1: p1.body.position.x, y1: p1.body.position.y, x2: p2.body.position.x, y2: p2.body.position.y, life: 10, c: color(255, 255, 0)});
      createParticles(cx, cy, color(255, 200, 50), 8); 
  }
  
  let col1 = isCrit2 ? color(255, 215, 0) : color(255, 80, 80);
  let col2 = isCrit1 ? color(255, 215, 0) : color(255, 80, 80);
  
  addPopup("-" + finalDmgTo1, p1.body.position.x, p1.body.position.y, col1, isCrit2);
  addPopup("-" + finalDmgTo2, p2.body.position.x, p2.body.position.y, col2, isCrit1);

  if ((isCrit1 || isCrit2) && audioStarted) {
      try { synth.play(1500, 0.05, 0, 0.2); } catch(e){} 
  }
}

function handleOrbs() {
  for (let i = orbs.length - 1; i >= 0; i--) {
      let o = orbs[i];
      
      push();
      translate(o.x, o.y);
      rotate(frameCount * 0.02);
      
      drawingContext.shadowBlur = 20;
      drawingContext.shadowColor = color(255, 215, 0);
      fill(255, 200, 0, 180 + sin(frameCount * 0.1) * 75);
      stroke(255); strokeWeight(2);
      
      // Tvar hvězdy místo kuličky
      beginShape();
      for(let j=0; j<10; j++) {
         let a = j * TWO_PI / 10;
         let r = j % 2 === 0 ? o.r * 1.5 : o.r * 0.7;
         vertex(cos(a)*r, sin(a)*r);
      }
      endShape(CLOSE);
      drawingContext.shadowBlur = 0;
      pop();

      fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER);
      text("BONUS\n+1000", o.x, o.y - 25);

      let collected = false;
      for (let p of players) {
          if (p.hp > 0 && dist(p.body.position.x, p.body.position.y, o.x, o.y) < p.r + o.r) {
              p.hp += o.value;
              addPopup("+" + o.value + " BONUS!", p.body.position.x, p.body.position.y - p.r, color(255, 215, 0));
              
              let newR = getRadius(p.hp);
              if (newR > p.r + 0.5) {
                  let scale = newR / p.r;
                  Matter.Body.scale(p.body, scale, scale);
                  p.r = newR;
                  Matter.Body.setDensity(p.body, 0.001 + (newR * 0.0001));
              }
              
              if(audioStarted) { try { synth.play(1200, 0.1, 0, 0.2); } catch(e){} }
              collected = true;
              break;
          }
      }
      if (collected) orbs.splice(i, 1);
  }
}

function screenToWorld(sx, sy) {
    let cx = W/2;
    let cy = (ARENA_TOP + ARENA_BOT) / 2;
    return {
        x: (sx - cx) / cameraScale + cx,
        y: (sy - cy) / cameraScale + cy
    };
}

function drawSpaceshipTimer() {
    if (maxRoundTimer <= 0) return;
    let p = 1.0 - (roundTimer / maxRoundTimer); 
    let aH = ARENA_BOT - ARENA_TOP;
    let perim = 2 * W + 2 * aH;
    let currentDist = p * perim;
    
    stroke(0, 255, 255);
    strokeWeight(3);
    drawingContext.shadowBlur = 10;
    drawingContext.shadowColor = 'cyan';
    
    let points = [
        {x: 0, y: ARENA_TOP},
        {x: W, y: ARENA_TOP},
        {x: W, y: ARENA_BOT},
        {x: 0, y: ARENA_BOT},
        {x: 0, y: ARENA_TOP}
    ];

    let d = 0;
    let shipAngle = 0;
    shipX = points[0].x;
    shipY = points[0].y;

    for (let i = 0; i < points.length - 1; i++) {
        let p1 = points[i];
        let p2 = points[i+1];
        let segLen = dist(p1.x, p1.y, p2.x, p2.y);

        if (currentDist > d + segLen) {
            line(p1.x, p1.y, p2.x, p2.y);
            d += segLen;
        } else {
            let remaining = currentDist - d;
            let t = remaining / segLen;
            shipX = lerp(p1.x, p2.x, t);
            shipY = lerp(p1.y, p2.y, t);
            line(p1.x, p1.y, shipX, shipY);
            shipAngle = atan2(p2.y - p1.y, p2.x - p1.x);
            break;
        }
    }
    drawingContext.shadowBlur = 0;

    push();
    translate(shipX, shipY);
    rotate(shipAngle);
    
    fill(255, 100, 0);
    noStroke();
    triangle(-15, -5, -15, 5, -25 - sin(frameCount * 0.5) * 5, 0);

    fill(200, 200, 255);
    stroke(0, 255, 255);
    strokeWeight(2);
    triangle(20, 0, -15, -10, -15, 10);
    
    fill(0, 255, 255);
    noStroke();
    ellipse(5, 0, 10, 6);
    
    pop();

    // Stopy za lodí - sníženo pro výkon
    if (frameCount % 3 === 0 && roundTimer > 0) {
        let wPos = screenToWorld(shipX, shipY);
        let vx = -cos(shipAngle) * random(2, 4) + random(-1, 1);
        let vy = -sin(shipAngle) * random(2, 4) + random(-1, 1);
        particles.push({x: wPos.x, y: wPos.y, vx: vx, vy: vy, life: 255, c: color(150, 200, 255), size: random(4, 8)});
    }
}

function handleCameraAndPlayers() {
  if (players.length === 0) { cameraScale = lerp(cameraScale, 1.0, 0.05); return; }
  
  let targetSpeed = 2.5;
  let cx = W/2; 
  let cy = (ARENA_TOP+ARENA_BOT)/2;
  
  for (let i = players.length - 1; i >= 0; i--) {
    let p = players[i];
    
    p.trail.push({x: p.body.position.x, y: p.body.position.y});
    if (p.trail.length > 12) p.trail.shift();
    
    if (p.hp <= 0) {
      createParticles(p.body.position.x, p.body.position.y, p.color, 40);
      deathShockwaves.push({x: p.body.position.x, y: p.body.position.y, r: p.r, color: p.color, life: 255});
      screenShake = 12;
      
      if(audioStarted) {
          try{ 
              synth.play(150, 0.1, 0, 0.1); 
              setTimeout(() => { if(synth) synth.play(80, 0.2, 0, 0.3); }, 100);
          }catch(e){}
      }
      Matter.World.remove(world, p.body);
      players.splice(i, 1);
      continue;
    }
    
    p.noiseOffsetX += 0.02; p.noiseOffsetY += 0.02;
    let wanderX = (noise(p.noiseOffsetX) - 0.5) * 0.0001 * p.body.mass;
    let wanderY = (noise(p.noiseOffsetY) - 0.5) * 0.0001 * p.body.mass;
    Matter.Body.applyForce(p.body, p.body.position, { x: wanderX, y: wanderY });

    // Rychlá a levná gravitace do středu (místo náročného hledání nejbližšího přes O(N^2))
    let toCenter = Matter.Vector.sub({x: cx, y: cy}, p.body.position);
    let distC = Matter.Vector.magnitude(toCenter);
    if (distC > 200 / cameraScale) {
        let pull = Matter.Vector.normalise(toCenter);
        Matter.Body.applyForce(p.body, p.body.position, Matter.Vector.mult(pull, 0.000008 * p.body.mass));
    }

    let currentSpeed = Matter.Vector.magnitude(p.body.velocity);
    if (currentSpeed > 0.1) {
        let factor = targetSpeed / currentSpeed;
        Matter.Body.setVelocity(p.body, { 
            x: lerp(p.body.velocity.x, p.body.velocity.x * factor, 0.1), 
            y: lerp(p.body.velocity.y, p.body.velocity.y * factor, 0.1) 
        });
    }
  }

  // Pevné a agresivnější zoom úrovně podle počtu hráčů
  let targetScale = 1.0;
  let len = players.length;
  
  if (len >= 250) targetScale = 0.30;
  else if (len >= 150) targetScale = 0.40;
  else if (len >= 100) targetScale = 0.55;
  else if (len >= 60) targetScale = 0.65;
  else if (len >= 40) targetScale = 0.75;
  else if (len >= 20) targetScale = 0.85;

  cameraScale = lerp(cameraScale, targetScale, 0.02); 
  
  // Přesný posun mantinelů podle okraje kamery, aby se hráči nikdy neztratili
  let viewW = W / cameraScale;
  let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  
  Matter.Body.setPosition(wallTop, { x: cx, y: cy - viewH/2 - wallThick/2 });
  Matter.Body.setPosition(wallBot, { x: cx, y: cy + viewH/2 + wallThick/2 });
  Matter.Body.setPosition(wallLeft, { x: cx - viewW/2 - wallThick/2, y: cy });
  Matter.Body.setPosition(wallRight, { x: cx + viewW/2 + wallThick/2, y: cy });
}

function draw() {
  background(3, 4, 8); 
  
  drawTopHUD();

  fill(10, 12, 15); noStroke();
  rect(0, ARENA_BOT, W, H - ARENA_BOT);
  fill(50); textAlign(CENTER, CENTER); textSize(16);
  text(T[currentLang].DAYZ_SPACE, W/2, ARENA_BOT + (H - ARENA_BOT)/2);

  stroke(0, 150, 255, 100); strokeWeight(2); noFill();
  rect(2, ARENA_TOP, W-4, ARENA_BOT - ARENA_TOP);

  if (gameState === "PLAYING") {
      drawSpaceshipTimer();
  }

  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);
  drawingContext.clip();

  drawSpaceBackground();
  Matter.Engine.update(engine, 1000/60);

  if (gameState === "PLAYING" || gameState === "EXPLODING") {
    if (gameState === "PLAYING") {
        handleCameraAndPlayers();
    } else {
        screenShake *= 0.95; 
    }
    
    push();
    translate(W/2, (ARENA_TOP + ARENA_BOT)/2);
    scale(cameraScale);
    
    if (screenShake > 0) {
        translate(random(-screenShake, screenShake), random(-screenShake, screenShake));
    }
    
    translate(-W/2, -(ARENA_TOP + ARENA_BOT)/2);
    
    drawDeathShockwaves();
    drawLightnings();
    
    if (gameState === "PLAYING") {
        handleOrbs();
        let sortedToDraw = [...players].sort((a,b) => a.r - b.r);
        sortedToDraw.forEach(p => drawPlayer(p));
    }
    
    // Omezení částic a textů pro lepší výkon
    if (particles.length > 200) particles.splice(0, particles.length - 200);
    if (floatingTexts.length > 50) floatingTexts.splice(0, floatingTexts.length - 50);
    
    drawParticles();
    drawPopups();
    pop();

    updateTimers();
    if (gameState === "PLAYING") handleTTSCommentary();
  } else if (gameState === "RESULTS") {
    drawResults();
  }
  
  drawingContext.restore(); 
}

function handleTTSCommentary() {
  if (millis() > nextCommentTime && (!('speechSynthesis' in window) || !window.speechSynthesis.speaking)) {
      let txt = "";
      let arr = [];
      
      if (players.length === 0) {
          arr = COMMENTARY_EMPTY[currentLang];
      } else if (players.length === 1) {
          arr = COMMENTARY_SOLO[currentLang];
      } else {
          arr = COMMENTARY[currentLang];
          if (random() < 0.25) {
              let top = [...players].sort((a,b) => b.hp - a.hp)[0];
              if (top) {
                  txt = currentLang === "CZ" ? 
                      `${top.name} dominuje aréně s ${formatK(Math.max(0, top.hp))} body! Jděte po něm!` : 
                      `${top.name} dominates the arena with ${formatK(Math.max(0, top.hp))} points! Go after them!`;
              }
          }
      }
      
      if (txt === "") {
          let attempts = 0;
          do {
             txt = random(arr);
             attempts++;
          } while (txt === lastCommentString && attempts < 5);
          
          if (players.length === 1) {
              txt = txt.replace("{p}", players[0].name);
          }
      }
      
      lastCommentString = txt;
      speakTTS(txt);
      nextCommentTime = millis() + random(5000, 10000); 
  }
}

function drawPlayer(p) {
  let pos = p.body.position;
  let safeHp = Math.max(0, p.hp);
  
  let isBuffed = p.likeBuffTimer > 0;
  if (isBuffed) p.likeBuffTimer--;

  let baseRotSpd = (0.01 + Math.min(safeHp * 0.00001, 0.3)) * p.baseRotDir;
  let rotSpd = isBuffed ? baseRotSpd * 4 : baseRotSpd;
  p.rot += rotSpd;

  if (p.trail.length > 1) {
      noFill();
      for (let i = 0; i < p.trail.length - 1; i++) {
          let alpha = map(i, 0, p.trail.length, 0, 150);
          let tr = map(i, 0, p.trail.length, p.r * 0.2, p.r * 0.8);
          stroke(red(p.color), green(p.color), blue(p.color), alpha);
          strokeWeight(tr);
          line(p.trail[i].x, p.trail[i].y, p.trail[i+1].x, p.trail[i+1].y);
      }
  }

  push();
  translate(pos.x, pos.y);
  
  let currentScale = isBuffed ? 1.2 : 1.0;
  scale(currentScale);
  
  rotate(p.rot);
  
  let glowAlpha = p.auraFlash > 0 ? p.auraFlash * 15 : 40;
  fill(red(p.color), green(p.color), blue(p.color), glowAlpha);
  noStroke();
  ellipse(0, 0, p.r * 2.4);
  if(p.auraFlash > 0) p.auraFlash--;

  if (isBuffed) {
      fill(255, 255, 255, 100 + sin(frameCount * 0.5) * 100);
      noStroke();
      ellipse(0, 0, p.r * 2.5);
  }

  let tType = p.sawType % 3; 
  let coreType = Math.floor(p.sawType / 3) % 4; 
  let isEpic = safeHp >= 3000;
  
  let useGlow = players.length < 40; // Optimalizace: Glow jen pokud není plno
  if (useGlow) {
      drawingContext.shadowBlur = isEpic ? 25 : 15;
      drawingContext.shadowColor = p.color;
  }

  let grad = drawingContext.createRadialGradient(0, 0, 0, 0, 0, p.r);
  grad.addColorStop(0, "rgba(10, 15, 20, 1)");
  if (isBuffed) {
      grad.addColorStop(1, "rgba(" + red(p.color) + "," + green(p.color) + "," + blue(p.color) + ", 0.8)");
  } else {
      grad.addColorStop(1, "rgba(30, 35, 45, 0.9)");
  }

  drawingContext.fillStyle = grad;
  stroke(p.color); 
  strokeWeight(isEpic ? 3 : 2);

  let teeth = 0;
  let rOuter = 0;
  let rInner = 0;

  if (isEpic) {
      teeth = 16 + Math.floor(safeHp / 2000);
      rOuter = p.r * 1.15; 
      rInner = p.r * 0.9;
  } else {
      teeth = 10 + Math.floor(safeHp / 1000) + (p.sawType % 4) * 2; 
      rOuter = p.r * 1.1; 
      rInner = p.r * 0.95;
  }

  beginShape();
  for(let i=0; i<teeth; i++) {
      let a1 = i * TWO_PI / teeth;
      let a2 = (i + 1) * TWO_PI / teeth;
      
      if (isEpic) {
          let aTip = a1 + TWO_PI/teeth * 0.85; 
          vertex(cos(a1)*rInner, sin(a1)*rInner);
          vertex(cos(aTip)*rOuter, sin(aTip)*rOuter);
          vertex(cos(a2)*rInner, sin(a2)*rInner);
      } else {
          if (tType === 0) { 
              let aTip = a1 + TWO_PI/teeth * 0.8;
              vertex(cos(a1)*rInner, sin(a1)*rInner);
              vertex(cos(aTip)*rOuter, sin(aTip)*rOuter);
              vertex(cos(a2)*rInner, sin(a2)*rInner);
          } else if (tType === 1) { 
              let a3 = a1 + TWO_PI/teeth * 0.25;
              let a4 = a1 + TWO_PI/teeth * 0.75;
              vertex(cos(a1)*rInner, sin(a1)*rInner);
              vertex(cos(a3)*rOuter, sin(a3)*rOuter);
              vertex(cos(a4)*rOuter, sin(a4)*rOuter);
              vertex(cos(a2)*rInner, sin(a2)*rInner);
          } else if (tType === 2) { 
              let mid = (a1 + a2) / 2;
              vertex(cos(a1)*rInner, sin(a1)*rInner);
              vertex(cos(mid)*rOuter, sin(mid)*rOuter);
              vertex(cos(a2)*rInner, sin(a2)*rInner);
          }
      }
  }
  endShape(CLOSE);

  drawingContext.shadowBlur = 0;

  if (isEpic) {
      noFill(); stroke(255, 200, 0, 150); strokeWeight(2); ellipse(0, 0, p.r * 1.3);
      stroke(255, 100, 0); strokeWeight(3); fill(40, 0, 0);
      ellipse(0, 0, p.r*1.05);
      noStroke(); fill(255, 255, 0);
      ellipse(-p.r*0.3, 0, 5); ellipse(p.r*0.3, 0, 5);
      ellipse(0, -p.r*0.3, 5); ellipse(0, p.r*0.3, 5);
  } 
  else {
      if (coreType === 0) {
          noFill(); stroke(p.color); strokeWeight(1); ellipse(0,0,p.r*0.7);
      } else if (coreType === 1) {
          fill(p.color); noStroke(); ellipse(0,0,p.r*0.3);
      } else if (coreType === 2) {
          noFill(); stroke(p.color); strokeWeight(2); 
          rectMode(CENTER); rect(0, 0, p.r*0.5, p.r*0.5, 3); rectMode(CORNER);
      } else if (coreType === 3) {
          fill(p.color); noStroke();
          for(let i=0; i<3; i++) { let a = i*TWO_PI/3; ellipse(cos(a)*p.r*0.4, sin(a)*p.r*0.4, p.r*0.2); }
      }
  }

  rotate(-p.rot); 
  
  let imgSize = p.r * 1.6;
  if (userAvatars[p.name] && userAvatars[p.name] !== "loaded") {
      drawingContext.save(); drawingContext.beginPath();
      drawingContext.arc(0, 0, imgSize / 2, 0, TWO_PI); 
      drawingContext.clip();
      imageMode(CENTER); image(userAvatars[p.name], 0, 0, imgSize, imgSize);
      drawingContext.restore();
  } else {
      fill(35); noStroke(); ellipse(0, 0, imgSize);
  }

  noFill(); stroke(0, 150); strokeWeight(3); ellipse(0, 0, imgSize);

  let txtCol = color(255);
  if (p.hp > 50000) txtCol = color(100, 255, 100);
  else if (p.hp > 10000) txtCol = color(255, 255, 0);

  drawingContext.lineJoin = "round"; 
  textAlign(CENTER, CENTER);

  if (useGlow) {
      drawingContext.shadowBlur = 5; 
      drawingContext.shadowColor = 'black';
  }
  
  stroke(0); strokeWeight(Math.max(4, p.r * 0.15)); 
  fill(txtCol); textStyle(BOLD);
  let finalHpTxtSize = Math.max(11, p.r * 0.35);
  textSize(finalHpTxtSize);
  text(formatK(Math.floor(safeHp)), 0, 0); 

  drawingContext.shadowBlur = 0; 
  noStroke(); 
  pop();
}

function updateTimers() {
  if (gameState === "PLAYING" && frameCount % 60 === 0 && roundTimer > 0) {
    roundTimer--;
    if (roundTimer <= 0) {
        gameState = "EXPLODING";
        explosionTimer = 90; 
        screenShake = 35; 
        
        if(audioStarted) {
            try { 
                synth.play(80, 0.5, 0, 0.8); 
                setTimeout(() => { if(synth) synth.play(60, 0.8, 0, 1.0); }, 200);
            } catch(e){}
        }

        let wPos = screenToWorld(shipX, shipY);
        deathShockwaves.push({x: wPos.x, y: wPos.y, r: 80, color: color(0, 255, 255), life: 255});
        createParticles(wPos.x, wPos.y, color(0, 255, 255), 80);
        createParticles(wPos.x, wPos.y, color(255, 100, 0), 80);
    }
  } else if (gameState === "EXPLODING") {
      explosionTimer--;
      screenShake *= 0.95;
      if (explosionTimer <= 0) {
          gameState = "RESULTS";
          resultsTimer = 10;
      }
  }

  // Drasticky snížena šance na bonus (např. cca každých 10 vteřin šance)
  if (gameState === "PLAYING" && frameCount % 600 === 0 && random() < 0.4 && orbs.length < 2) {
      let cx = W/2;
      let cy = (ARENA_TOP+ARENA_BOT)/2;
      let viewW = W / cameraScale;
      let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
      
      orbs.push({
          x: cx + random(-viewW/2.5, viewW/2.5),
          y: cy + random(-viewH/2.5, viewH/2.5),
          r: 20,
          value: 1000
      });
  }
}

    }
    
    noStroke();
    fill(winner.color); textSize(18); textStyle(BOLD);
    text(winner.name, W/2, ARENA_TOP + 175);
    fill(255); textSize(16);
    text(formatK(floor(Math.max(0, winner.hp))) + " HP", W/2, ARENA_TOP + 200);
  }
  
  textAlign(LEFT, CENTER);
  let listStartY = ARENA_TOP + 240; 
  let listLimit = Math.min(sorted.length, 15);

  for (let i = 0; i < listLimit; i++) {
    let p = sorted[i];
    let yPos = listStartY + i * 28;

    fill(i % 2 === 0 ? color(255, 255, 255, 20) : color(255, 255, 255, 5));
    noStroke();
    rect(W/2 - 200, yPos - 12, 400, 24, 5);

    fill(p.color); textSize(12); textStyle(BOLD);
    text((i + 1) + ".", W/2 - 180, yPos);

    if (userAvatars[p.name] && userAvatars[p.name] !== "loaded") {
        drawingContext.save(); drawingContext.beginPath();
        drawingContext.arc(W/2 - 140, yPos, 9, 0, TWO_PI); drawingContext.clip();
        image(userAvatars[p.name], W/2 - 140, yPos, 18, 18);
        drawingContext.restore();
    }

    fill(220); textStyle(NORMAL); textSize(11);
    text(p.name.substring(0, 12), W/2 - 120, yPos);

    textAlign(RIGHT, CENTER);
    fill(255); textStyle(BOLD);
    text(formatK(floor(Math.max(0, p.hp))), W/2 + 180, yPos);
    textAlign(LEFT, CENTER); 
  }
  
  let timerY = ARENA_BOT - 50; 
  fill(0, 0, 0, 220); stroke(255, 50, 50); strokeWeight(2);
  rect(W/2 - 150, timerY - 20, 300, 40, 10);
  noStroke(); fill(255); textSize(14); textAlign(CENTER, CENTER); textStyle(BOLD);
  text(T[currentLang].NEXT + " " + resultsTimer + "s", W/2, timerY);
  textStyle(NORMAL);
  
  if (frameCount % 60 === 0) {
    resultsTimer--;
    if (resultsTimer <= 0) {
      resultsTimer = 10;
      startNewRound();
    }
  }
}

function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data);
      let evt = d?.event || d?.type || "";
      let u = (d?.data?.nickname || d?.data?.uniqueId || "Anonym").substring(0, 15).trim();
      if (u === "Anonym") return;

      let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
      if (imgUrl && !userAvatars[u]) loadImage(imgUrl, img => { userAvatars[u] = img; }, () => {});

      if (!players.find(x => x.name === u)) {
          spawnPlayer(u, 500);
      }

      if (evt === "chat") {
          handleAction(u, 10);
      } else if (evt === "like") {
          handleAction(u, (d.data?.likeCount || 1) * 2);
      } else if (evt === "gift") {
          handleAction(u, (d?.data?.diamonds || 1) * 500);
          speakTTS("Díky " + u + " za dárek!");
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function speakTTS(txt) {
  if (!audioStarted || !('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking) return; 
  let msg = new SpeechSynthesisUtterance(txt);
  msg.lang = currentLang === "CZ" ? "cs-CZ" : "en-US";
  msg.rate = 1.15; 
  msg.pitch = 1.2; 
  window.speechSynthesis.speak(msg);
}

function mousePressed() {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  if (mouseX > allTimeLbRect.x && mouseX < allTimeLbRect.x + allTimeLbRect.w && 
      mouseY > allTimeLbRect.y && mouseY < allTimeLbRect.y + allTimeLbRect.h) {
      allTimeDamageLeaderboard = {};
      if(audioStarted) try{ synth.play(200, 0.1, 0, 0.5); }catch(e){}
  }
}
