<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxinko Snake - Epic Space Arena</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; background-color: #00FF00; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Press Start 2P', cursive; }
    #game-container { position: relative; width: 1080px; height: 1920px; transform-origin: top left; transform: scale(min(window.innerHeight / 1920, window.innerWidth / 1080)); background: #00FF00; }
    canvas { display: block; }
    #admin-bar { position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.9); display: flex; align-items: center; gap: 8px; padding: 0 10px; box-sizing: border-box; z-index: 100; border-bottom: 2px solid #00ffff; }
    #admin-bar button { background: #2196F3; color: white; border: 2px solid #fff; padding: 5px 8px; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 9px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="admin-bar">
      <button id="tGift">TEST DONATE (Jablko)</button>
      <button id="tChat">AKTIVOVAT AUDIO</button>
      <button id="toggleRiddleBtn" style="background: #4caf50; color: #fff;">HADANKY: ZAP</button>
    </div>
  </div>

<script>
// ==========================================
// GALAXINKO SNAKE - PLNA VERZE
// ==========================================
p5.disableFriendlyErrors = true;
var W = 1080;
var H = 1920;
var HUD_TOP = 75;  
var ARENA_TOP = 270; 
var ARENA_BOT = 1600; 

var currentLang = "CZ";
var audioStarted = false; 
var synth;

// Snake Variables
let snake = [];
let snakeDir = { x: 1, y: 0 };
let nextSnakeDir = { x: 1, y: 0 };
let apples = [];
let gridSize = 40; 
let cols, rows;
let gridOffsetY;
let snakeSpeed = 2; // Zrychleno (aktualizace kazdy 2. frame)
let mistakeChance = 0.001; 
let score = 0;
let roundComplete = false;
let gameOver = false;
let deathTimer = 0;

// Efekty
let particles = [];

// TTS Ochrana a nastaveni
const FORBIDDEN_WORDS = ["niger", "nigger", "nigga", "hitler", "nazi", "jew", "zid", "cikan", "mord", "rape", "znasil", "kkk", "pica", "kurv", "kurwa", "zmrd", "jeban", "kokot", "debil", "curak", "mrd", "prdel", "hovn", "buzna", "buzerant", "teplous", "kripl", "srac", "fuck", "bitch", "asshole", "shit", "cunt", "slut", "whore", "dick", "cock", "pussy", "fag", "faggot", "kys", "suicide", "retard", "pedofil", "pedo"];

function cleanNameForTTS(name) {
    if (!name) return "Hrac";
    let cleaned = name.replace(/[_\.]/g, ' ');
    if (cleaned.toLowerCase().startsWith("user")) cleaned = cleaned.replace(/^user\s*[0-9]+/i, '').trim();
    cleaned = cleaned.replace(/[0-9]+$/, '').trim();
    cleaned = cleaned.replace(/[^\p{L}\p{N}\s]/gu, '').trim(); 
    if (cleaned.length === 0) return "Hrac";
    return cleaned.split(/\s+/).slice(0, 2).join(" ");
}

function speakTTS(text, force = false) {
    if (!audioStarted) return;
    let lowerText = text.toLowerCase();
    for (let fw of FORBIDDEN_WORDS) {
        if (lowerText.includes(fw)) return;
    }
    let msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = 'cs-CZ';
    window.speechSynthesis.speak(msg);
}

// ==========================
// HADANKY - SYSTEM
// ==========================
let isRiddleModeActive = true;
let activeRiddle = { question: null, answer: null };
let autoSkipRiddleTimer; 
let riddleRevealedLetters = [];

const vsechnyHadanky = [
    { q: "Pada to, ale nikdy se to nerozbije. Co je to?", a: "noc" },
    { q: "Ma to zuby, ale nekouse to.", a: "hreben" },
    { q: "Ma to krk, ale nema hlavu.", a: "lahev" },
    { q: "Mluvi bez ust a slysi bez usi.", a: "ozvena" },
    { q: "Co se da chytit, ale neda se to hodit?", a: "ryma" }
];

let dostupneHadanky = [];
function dejDalsiHadanku() {
    if (dostupneHadanky.length === 0) {
        dostupneHadanky = [...vsechnyHadanky];
        for (let i = dostupneHadanky.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            let temp = dostupneHadanky[i];
            dostupneHadanky[i] = dostupneHadanky[j];
            dostupneHadanky[j] = temp;
        }
    }
    return dostupneHadanky.pop();
}

function zkontrolujOdpoved(hracovaZprava, spravnaOdpoved) {
    let upravenaZprava = hracovaZprava.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    let upravenaOdpoved = spravnaOdpoved.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    return upravenaZprava === upravenaOdpoved;
}

function generateNewRiddle() {
    if (!isRiddleModeActive) return;
    clearTimeout(autoSkipRiddleTimer);
    riddleRevealedLetters = [];
    let picked = dostupneHadanky.length > 0 ? dostupneHadanky.pop() : dejDalsiHadanku();
    activeRiddle = { question: picked.q, answer: picked.a, displayAnswer: picked.a, startTime: Date.now() };

    autoSkipRiddleTimer = setTimeout(() => {
        if (isRiddleModeActive && activeRiddle.answer) {
            activeRiddle = { question: null, answer: null }; 
            setTimeout(generateNewRiddle, Math.floor(Math.random() * 25000) + 5000);
        }
    }, 240000);
}

// ==========================
// HLAVNI P5.JS FUNKCE
// ==========================
function setup() {
    let cvs = createCanvas(W, H);
    cvs.parent('game-container');
    pixelDensity(1);
    smooth();
    noCursor();
    
    synth = new p5.PolySynth();
    synth.setADSR(0.08, 0.3, 0.15, 0.4); 

    setupEvents();
    generateNewRiddle();
    
    cols = Math.floor(W / gridSize);
    rows = Math.floor((ARENA_BOT - ARENA_TOP) / gridSize);
    gridOffsetY = ARENA_TOP;

    resetSnake();
}

function setupEvents() {
    document.getElementById('tChat').onclick = () => { 
        if(!audioStarted) { audioStarted = true; userStartAudio(); } 
        speakTTS("Audio system aktivovan.");
    };
    document.getElementById('tGift').onclick = () => {
        handleAction("TestUser", 100, true);
    };
    document.getElementById('toggleRiddleBtn').onclick = (e) => {
        isRiddleModeActive = !isRiddleModeActive;
        e.target.innerText = isRiddleModeActive ? "HADANKY: ZAP" : "HADANKY: VYP";
        e.target.style.background = isRiddleModeActive ? "#4caf50" : "#ff9800";
        if (isRiddleModeActive) generateNewRiddle();
        else { activeRiddle = { question: null, answer: null }; clearTimeout(autoSkipRiddleTimer); }
    };
}

function handleAction(name, amount, isGift = false) {
    if(!audioStarted) { audioStarted = true; userStartAudio(); }
    if (isGift) {
        spawnApple('donate', name);
        let cName = cleanNameForTTS(name);
        speakTTS("Dekujeme za darek " + cName);
    }
}

function draw() {
    background(0, 255, 0); 

    // Arena je nyni take zelena pro Chromakey
    fill(0, 255, 0);
    noStroke();
    rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);

    // Vykresleni okraju areny pro lepsi orientaci
    stroke(255, 255, 255, 50);
    strokeWeight(2);
    noFill();
    rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);

    updateSnake();
    drawSnake();
    drawApples();
    
    updateParticles();
    drawParticles();

    drawSecretCodeUI();
    drawGamepad();

    fill(255);
    textSize(20);
    textAlign(LEFT, TOP);
    text("DELKA: " + snake.length + " / " + (cols * rows), 20, HUD_TOP);

    if (gameOver) {
        fill(255, 0, 0, 150);
        rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);
        fill(255);
        textSize(50);
        textAlign(CENTER, CENTER);
        text("NABOURAL JSI!\nRESTART ZA " + Math.ceil(deathTimer / 60), W/2, (ARENA_TOP + ARENA_BOT)/2);
    }
}

function drawSecretCodeUI() {
    if (!isRiddleModeActive || !activeRiddle.question) return;
    push();
    let bannerH = ARENA_TOP - HUD_TOP + 2;
    let bannerCenterY = HUD_TOP + bannerH / 2; 
    rectMode(CENTER);
    fill(0, 255, 0); 
    noStroke();
    rect(W/2, bannerCenterY, W, bannerH);

    let textPulse = 1.0 + Math.sin(frameCount * 0.06) * 0.04;
    translate(W/2, bannerCenterY);
    scale(textPulse);
    translate(-W/2, -bannerCenterY);
    textAlign(CENTER, CENTER);
    
    let riddleText = activeRiddle.question.toUpperCase();
    textSize(24);
    fill(255); stroke(0); strokeWeight(5);
    text(riddleText, W/2, bannerCenterY - 18);
    
    if (activeRiddle.answer) {
        let ansLen = activeRiddle.answer.length;
        let blanks = "";
        for (let i = 0; i < ansLen; i++) blanks += "_ ";
        blanks += "(" + ansLen + ")";
        fill(0, 242, 254); stroke(0); strokeWeight(3);
        text(blanks, W/2, bannerCenterY + 32);
    }
    pop();
}

function drawGamepad() {
    push();
    translate(W/2, 1750); 
    
    // Shoulder buttons
    fill(80);
    stroke(50);
    strokeWeight(2);
    rectMode(CENTER);
    rect(-100, -70, 60, 20, 5); // L
    rect(100, -70, 60, 20, 5);  // R
    
    // Zakladni telo gamepadu
    fill(40);
    stroke(80);
    strokeWeight(4);
    rect(0, -10, 320, 120, 40); 
    
    // Rukojeti
    ellipse(-130, 20, 90, 130);
    ellipse(130, 20, 90, 130);
    
    // Analogove packy
    fill(20);
    ellipse(-40, 20, 50, 50);
    ellipse(40, 20, 50, 50);
    fill(60);
    let stickX = 0, stickY = 0;
    if (snakeDir.x === -1) stickX = -5;
    if (snakeDir.x === 1) stickX = 5;
    if (snakeDir.y === -1) stickY = -5;
    if (snakeDir.y === 1) stickY = 5;
    ellipse(-40 + stickX, 20 + stickY, 30, 30);
    ellipse(40 + stickX, 20 + stickY, 30, 30);
    
    // D-Pad zakladna
    fill(20);
    rect(-90, -20, 60, 60, 10);
    
    // D-Pad tlacitka
    noStroke();
    // Nahoru
    if (snakeDir.x === 0 && snakeDir.y === -1) fill(0, 255, 255); else fill(70);
    rect(-90, -35, 15, 20, 2);
    // Dolu
    if (snakeDir.x === 0 && snakeDir.y === 1) fill(0, 255, 255); else fill(70);
    rect(-90, -5, 15, 20, 2);
    // Doleva
    if (snakeDir.x === -1 && snakeDir.y === 0) fill(0, 255, 255); else fill(70);
    rect(-105, -20, 20, 15, 2);
    // Doprava
    if (snakeDir.x === 1 && snakeDir.y === 0) fill(0, 255, 255); else fill(70);
    rect(-75, -20, 20, 15, 2);
    
    // Akcni tlacitka
    fill(20);
    ellipse(90, -20, 60, 60);
    fill(255, 0, 128); 
    ellipse(90, -35, 15, 15);
    fill(0, 255, 128); 
    ellipse(90, -5, 15, 15);
    fill(0, 128, 255); 
    ellipse(75, -20, 15, 15);
    fill(255, 255, 0); 
    ellipse(105, -20, 15, 15);
    
    // Stredove svetlo
    fill(0, 255, 255, 150);
    ellipse(0, -30, 20, 10);
    
    pop();
}

// ==========================================
// SNAKE SYSTEM FUNCTIONS
// ==========================================

function resetSnake() {
    snake = [];
    let startX = Math.floor(cols / 2);
    let startY = Math.floor(rows / 2);
    snake.push({ x: startX, y: startY });
    snake.push({ x: startX - 1, y: startY });
    snake.push({ x: startX - 2, y: startY });
    snakeDir = { x: 1, y: 0 };
    nextSnakeDir = { x: 1, y: 0 };
    apples = [];
    score = 0;
    roundComplete = false;
    gameOver = false;
    deathTimer = 0;
    particles = [];
    spawnApple('normal');
}

function spawnApple(type = 'normal', donor = null) {
    let emptySpots = [];
    for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
            let occupied = false;
            for (let part of snake) {
                if (part.x === x && part.y === y) { occupied = true; break; }
            }
            if (!occupied) {
                for (let apple of apples) {
                    if (apple.x === x && apple.y === y) { occupied = true; break; }
                }
            }
            if (!occupied) emptySpots.push({ x: x, y: y });
        }
    }
    if (emptySpots.length > 0) {
        let spot = emptySpots[Math.floor(random(emptySpots.length))];
        apples.push({ x: spot.x, y: spot.y, type: type, donor: donor });
    }
}

// BFS Pathfinding
function findShortestPath(startX, startY, targetX, targetY) {
    let queue = [[startX, startY, []]];
    let visited = new Set();
    visited.add(startX + "," + startY);
    
    while (queue.length > 0) {
        let [cx, cy, path] = queue.shift();
        if (cx === targetX && cy === targetY) return path;
        
        let dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}];
        for (let dir of dirs) {
            let nx = cx + dir.x;
            let ny = cy + dir.y;
            let key = nx + "," + ny;
            
            if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited.has(key)) {
                let occupied = false;
                for (let part of snake) {
                    if (part.x === nx && part.y === ny) { occupied = true; break; }
                }
                if (!occupied) {
                    visited.add(key);
                    queue.push([nx, ny, [...path, dir]]);
                }
            }
        }
    }
    return null; 
}

function updateSnake() {
    if (roundComplete) return;

    if (gameOver) {
        deathTimer--;
        if (deathTimer <= 0) {
            resetSnake();
        }
        return;
    }

    if (frameCount % snakeSpeed !== 0) return; 

    let head = snake[0];
    let bestDir = null;

    if (apples.length > 0) {
        let nearestApple = apples[0];
        let minDist = dist(head.x, head.y, nearestApple.x, nearestApple.y);
        for (let apple of apples) {
            let d = dist(head.x, head.y, apple.x, apple.y);
            if (d < minDist) { minDist = d; nearestApple = apple; }
        }

        let path = findShortestPath(head.x, head.y, nearestApple.x, nearestApple.y);
        if (path && path.length > 0) {
            bestDir = path[0];
        } else {
            let tail = snake[snake.length - 1];
            let pathToTail = findShortestPath(head.x, head.y, tail.x, tail.y);
            if (pathToTail && pathToTail.length > 0) {
                bestDir = pathToTail[0];
            }
        }
    }

    if (!bestDir) {
        let dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
        for (let dir of dirs) {
            let nx = head.x + dir.x;
            let ny = head.y + dir.y;
            let occupied = false;
            if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) occupied = true;
            for (let part of snake) {
                if (part.x === nx && part.y === ny) { occupied = true; break; }
            }
            if (!occupied) { bestDir = dir; break; }
        }
    }

    if (random() < mistakeChance) {
        let dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
        bestDir = dirs[Math.floor(random(dirs.length))];
    }

    if (bestDir && (bestDir.x !== -snakeDir.x || bestDir.y !== -snakeDir.y)) {
        nextSnakeDir = bestDir;
    }

    snakeDir = nextSnakeDir;
    let nextX = head.x + snakeDir.x;
    let nextY = head.y + snakeDir.y;

    if (nextX < 0 || nextX >= cols || nextY < 0 || nextY >= rows) {
        snakeDie();
        return;
    }

    for (let part of snake) {
        if (part.x === nextX && part.y === nextY) {
            snakeDie();
            return;
        }
    }

    let newHead = { x: nextX, y: nextY };
    snake.unshift(newHead);

    let ateApple = false;
    for (let i = apples.length - 1; i >= 0; i--) {
        let apple = apples[i];
        if (apple.x === nextX && apple.y === nextY) {
            ateApple = true;
            apples.splice(i, 1);
            
            // Efekt jidla
            createParticles(nextX * gridSize + gridSize/2, gridOffsetY + nextY * gridSize + gridSize/2, apple.type === 'donate' ? {r:0, g:255, b:255} : {r:255, g:0, b:0});
            
            if (apple.type === 'donate' && apple.donor) {
                let cleanDonor = cleanNameForTTS(apple.donor);
                speakTTS("Had sezral darek od " + cleanDonor);
            } else {
                speakTTS("Mnam");
            }
            break;
        }
    }

    if (!ateApple) {
        snake.pop();
    } else {
        spawnApple('normal');
    }

    if (snake.length === cols * rows) {
        roundComplete = true;
        speakTTS("Hra dokoncena! Arena je plna.");
        setTimeout(() => { resetSnake(); }, 5000);
    }
}

function drawSnake() {
    let head = snake[0];
    let isNearApple = false;
    
    if (apples.length > 0) {
        let nearestApple = apples[0];
        let minDist = dist(head.x, head.y, nearestApple.x, nearestApple.y);
        for (let apple of apples) {
            let d = dist(head.x, head.y, apple.x, apple.y);
            if (d < minDist) { minDist = d; nearestApple = apple; }
        }
        if (minDist <= 2) isNearApple = true;
    }

    // Vykresleni tela (Neonove ruzova s bilym okrajem pro kontrast na zelene)
    fill(255, 0, 128); 
    stroke(255);
    strokeWeight(2);
    for (let i = 1; i < snake.length; i++) {
        let part = snake[i];
        rect(part.x * gridSize, gridOffsetY + part.y * gridSize, gridSize - 2, gridSize - 2, 8);
    }
    
    // Vykresleni hlavy
    let hx = head.x * gridSize + gridSize/2;
    let hy = gridOffsetY + head.y * gridSize + gridSize/2;
    
    // Aura kolem hlavy
    noStroke();
    fill(255, 0, 128, 50);
    ellipse(hx, hy, gridSize * 1.5, gridSize * 1.5);
    
    fill(255, 0, 100);
    stroke(255);
    strokeWeight(3);
    ellipse(hx, hy, gridSize + 5, gridSize + 5);
    
    // Oci
    fill(255);
    noStroke();
    let eyeOffsetX = snakeDir.x * 10;
    let eyeOffsetY = snakeDir.y * 10;
    ellipse(hx - 10 + eyeOffsetX, hy - 10 + eyeOffsetY, 12, 12);
    ellipse(hx + 10 + eyeOffsetX, hy - 10 + eyeOffsetY, 12, 12);
    
    fill(0);
    ellipse(hx - 10 + eyeOffsetX * 1.5, hy - 10 + eyeOffsetY * 1.5, 6, 6);
    ellipse(hx + 10 + eyeOffsetX * 1.5, hy - 10 + eyeOffsetY * 1.5, 6, 6);
    
    // Pusa (animace otevreni pred jablkem)
    if (isNearApple) {
        fill(0);
        ellipse(hx + snakeDir.x * 15, hy + snakeDir.y * 15, 20, 20); // Otevrena pusa
        fill(255, 0, 0);
        ellipse(hx + snakeDir.x * 15, hy + snakeDir.y * 15, 10, 10); // Jazyk
    } else {
        fill(0);
        rectMode(CENTER);
        rect(hx + snakeDir.x * 12, hy + snakeDir.y * 12, 12, 4, 2); // Zavrena pusa
        rectMode(CORNER);
    }
}

function drawApples() {
    for (let apple of apples) {
        let appleEmoji = "\uD83C\uDF4E"; // Cervene jablko
        if (apple.type === 'donate') {
            appleEmoji = "\uD83D\uDC8E"; // Diamant pro dary
        }
        fill(255);
        textSize(gridSize);
        textAlign(CENTER, CENTER);
        text(appleEmoji, apple.x * gridSize + gridSize/2, gridOffsetY + apple.y * gridSize + gridSize/2);
    }
}

function snakeDie() {
    speakTTS("Had narazil a zemrel!");
    gameOver = true;
    deathTimer = 180; 
}

function createParticles(x, y, colorObj) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x,
            y: y,
            vx: random(-5, 5),
            vy: random(-5, 5),
            life: 30,
            color: colorObj
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function drawParticles() {
    for (let p of particles) {
        fill(p.color.r, p.color.g, p.color.b, p.life * 8);
        noStroke();
        ellipse(p.x, p.y, 6, 6);
    }
}
</script>
</body>
