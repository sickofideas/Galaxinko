function zkontrolujOdpoved(hracovaZprava, spravnaOdpoved) {
    let upravenaZprava = hracovaZprava.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    let upravenaOdpoved = spravnaOdpoved.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    return upravenaZprava === upravenaOdpoved;
}

function generateNewRiddle() {
    if (!isRiddleModeActive) return;
    clearTimeout(autoSkipRiddleTimer);
    clearTimeout(riddleHintTimer1);
    clearTimeout(riddleHintTimer2);
    clearTimeout(riddleHintTimer3);
    riddleRevealedLetters = [];

    let picked = dejDalsiHadanku();
    activeRiddle = { question: picked.q, answer: picked.a, displayAnswer: picked.a, startTime: Date.now() };

    function revealLetter() {
        if (isRiddleModeActive && activeRiddle.answer && activeRiddle.answer.length > 1) {
            let unrevealed = [];
            for (let i = 0; i < activeRiddle.answer.length; i++) {
                if (!riddleRevealedLetters.includes(i)) unrevealed.push(i);
            }
            if (unrevealed.length > 0) {
                let idx = unrevealed[Math.floor(Math.random() * unrevealed.length)];
                riddleRevealedLetters.push(idx);
            }
        }
    }

    riddleHintTimer1 = setTimeout(revealLetter, 60000);
    riddleHintTimer2 = setTimeout(revealLetter, 120000);
    if (activeRiddle.answer && activeRiddle.answer.length > 6) {
        riddleHintTimer3 = setTimeout(revealLetter, 180000);
    }

    autoSkipRiddleTimer = setTimeout(() => {
        if (isRiddleModeActive && activeRiddle.answer) {
            activeRiddle = { question: null, answer: null }; 
            setTimeout(generateNewRiddle, random(5000, 30000));
        }
    }, 240000);
}

// ==========================================
// SNAKE SYSTEM FUNCTIONS
// ==========================================

function resetSnake() {
    snake = [];
    let startX = Math.floor(cols / 2);
    let startY = Math.floor(rows / 2);
    snake.push({ x: startX, y: startY });
    snake.push({ x: startX - 1, y: startY });
    snake.push({ x: startX - 2, y: startY });
    snakeDir = { x: 1, y: 0 };
    nextSnakeDir = { x: 1, y: 0 };
    apples = [];
    score = 0;
    roundComplete = false;
    gameOver = false;
    deathTimer = 0;
    particles = [];
    spawnApple('normal');
}

function spawnApple(type = 'normal', donor = null) {
    let emptySpots = [];
    for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
            let occupied = false;
            for (let part of snake) {
                if (part.x === x && part.y === y) { occupied = true; break; }
            }
            if (!occupied) {
                for (let apple of apples) {
                    if (apple.x === x && apple.y === y) { occupied = true; break; }
                }
            }
            if (!occupied) emptySpots.push({ x: x, y: y });
        }
    }
    if (emptySpots.length > 0) {
        let spot = emptySpots[Math.floor(random(emptySpots.length))];
        apples.push({ x: spot.x, y: spot.y, type: type, donor: donor });
    }
}

// BFS Pathfinding
function findShortestPath(startX, startY, targetX, targetY) {
    let queue = [[startX, startY, []]];
    let visited = new Set();
    visited.add(startX + "," + startY);
    
    while (queue.length > 0) {
        let [cx, cy, path] = queue.shift();
        if (cx === targetX && cy === targetY) return path;
        
        let dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}];
        for (let dir of dirs) {
            let nx = cx + dir.x;
            let ny = cy + dir.y;
            let key = nx + "," + ny;
            
            if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited.has(key)) {
                let occupied = false;
                for (let part of snake) {
                    if (part.x === nx && part.y === ny) { occupied = true; break; }
                }
                if (!occupied) {
                    visited.add(key);
                    queue.push([nx, ny, [...path, dir]]);
                }
            }
        }
    }
    return null; 
}

function updateSnake() {
    if (roundComplete) return;

    if (gameOver) {
        deathTimer--;
        if (deathTimer <= 0) {
            resetSnake();
        }
        return;
    }

    if (frameCount % snakeSpeed !== 0) return; 

    let head = snake[0];
    let bestDir = null;

    if (apples.length > 0) {
        let nearestApple = apples[0];
        let minDist = dist(head.x, head.y, nearestApple.x, nearestApple.y);
        for (let apple of apples) {
            let d = dist(head.x, head.y, apple.x, apple.y);
            if (d < minDist) { minDist = d; nearestApple = apple; }
        }

        let path = findShortestPath(head.x, head.y, nearestApple.x, nearestApple.y);
        if (path && path.length > 0) {
            bestDir = path[0];
        } else {
            let tail = snake[snake.length - 1];
            let pathToTail = findShortestPath(head.x, head.y, tail.x, tail.y);
            if (pathToTail && pathToTail.length > 0) {
                bestDir = pathToTail[0];
            }
        }
    }

    if (!bestDir) {
        let dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
        for (let dir of dirs) {
            let nx = head.x + dir.x;
            let ny = head.y + dir.y;
            let occupied = false;
            if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) occupied = true;
            for (let part of snake) {
                if (part.x === nx && part.y === ny) { occupied = true; break; }
            }
            if (!occupied) { bestDir = dir; break; }
        }
    }

    if (random() < mistakeChance) {
        let dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
        bestDir = dirs[Math.floor(random(dirs.length))];
    }

    if (bestDir && (bestDir.x !== -snakeDir.x || bestDir.y !== -snakeDir.y)) {
        nextSnakeDir = bestDir;
    }

    snakeDir = nextSnakeDir;
    let nextX = head.x + snakeDir.x;
    let nextY = head.y + snakeDir.y;

    if (nextX < 0 || nextX >= cols || nextY < 0 || nextY >= rows) {
        snakeDie();
        return;
    }

    for (let part of snake) {
        if (part.x === nextX && part.y === nextY) {
            snakeDie();
            return;
        }
    }

    let newHead = { x: nextX, y: nextY };
    snake.unshift(newHead);

    let ateApple = false;
    for (let i = apples.length - 1; i >= 0; i--) {
        let apple = apples[i];
        if (apple.x === nextX && apple.y === nextY) {
            ateApple = true;
            apples.splice(i, 1);
            
            createParticles(nextX * gridSize + gridSize/2, gridOffsetY + nextY * gridSize + gridSize/2, apple.type === 'donate' ? {r:0, g:255, b:255} : {r:255, g:0, b:0});
            
            if (audioStarted && synth) {
                if (apple.type === 'donate') {
                    synth.play('G5', 0.3, 0, 0.05); 
                } else {
                    synth.play('E5', 0.2, 0, 0.05); 
                }
            }
            
            if (apple.type === 'donate' && apple.donor) {
                let cleanDonor = cleanNameForTTS(apple.donor);
                speakTTS("Had sezral darek od " + cleanDonor);
            } else {
                speakTTS("Mnam");
            }
            break;
        }
    }

    if (!ateApple) {
        snake.pop();
    } else {
        spawnApple('normal');
    }

    if (snake.length === cols * rows) {
        roundComplete = true;
        speakTTS("Kolo dokonceno!");
        setTimeout(() => { resetSnake(); }, 5000);
    }
}

function drawSnake() {
    let head = snake[0];
    let isNearApple = false;
    
    if (apples.length > 0) {
        let nearestApple = apples[0];
        let minDist = dist(head.x, head.y, nearestApple.x, nearestApple.y);
        for (let apple of apples) {
            let d = dist(head.x, head.y, apple.x, apple.y);
            if (d < minDist) { minDist = d; nearestApple = apple; }
        }
        if (minDist <= 2) isNearApple = true;
    }

    fill(255, 0, 128); 
    stroke(255);
    strokeWeight(2);
    for (let i = 1; i < snake.length; i++) {
        let part = snake[i];
        rect(part.x * gridSize, gridOffsetY + part.y * gridSize, gridSize - 2, gridSize - 2, 8);
    }
    
    let hx = head.x * gridSize + gridSize/2;
    let hy = gridOffsetY + head.y * gridSize + gridSize/2;
    
    noStroke();
    fill(255, 0, 128, 50);
    ellipse(hx, hy, gridSize * 1.5, gridSize * 1.5);
    
    fill(255, 0, 100);
    stroke(255);
    strokeWeight(3);
    ellipse(hx, hy, gridSize + 5, gridSize + 5);
    
    fill(255);
    noStroke();
    let eyeOffsetX = snakeDir.x * 10;
    let eyeOffsetY = snakeDir.y * 10;
    ellipse(hx - 10 + eyeOffsetX, hy - 10 + eyeOffsetY, 12, 12);
    ellipse(hx + 10 + eyeOffsetX, hy - 10 + eyeOffsetY, 12, 12);
    
    fill(0);
    ellipse(hx - 10 + eyeOffsetX * 1.5, hy - 10 + eyeOffsetY * 1.5, 6, 6);
    ellipse(hx + 10 + eyeOffsetX * 1.5, hy - 10 + eyeOffsetY * 1.5, 6, 6);
    
    if (isNearApple) {
        fill(0);
        ellipse(hx + snakeDir.x * 15, hy + snakeDir.y * 15, 20, 20); 
        fill(255, 0, 0);
        ellipse(hx + snakeDir.x * 15, hy + snakeDir.y * 15, 10, 10); 
    } else {
        fill(0);
        rectMode(CENTER);
        rect(hx + snakeDir.x * 12, hy + snakeDir.y * 12, 12, 4, 2); 
        rectMode(CORNER);
    }
}

function drawApples() {
    for (let apple of apples) {
        let appleEmoji = "\uD83C\uDF4E"; 
        if (apple.type === 'donate') {
            appleEmoji = "\uD83D\uDC8E"; 
        }
        fill(255);
        textSize(gridSize);
        textAlign(CENTER, CENTER);
        text(appleEmoji, apple.x * gridSize + gridSize/2, gridOffsetY + apple.y * gridSize + gridSize/2);
    }
}

function snakeDie() {
    speakTTS("Had narazil a zemrel!");
    gameOver = true;
    deathTimer = 180; 
}

function createParticles(x, y, colorObj) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x,
            y: y,
            vx: random(-5, 5),
            vy: random(-5, 5),
            life: 30,
            color: colorObj
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function drawParticles() {
    for (let p of particles) {
        fill(p.color.r, p.color.g, p.color.b, p.life * 8);
        noStroke();
        ellipse(p.x, p.y, 6, 6);
    }
}
function drawGamepad() {
    push();
    translate(W/2, 1750); 
    
    fill(80);
    stroke(50);
    strokeWeight(2);
    rectMode(CENTER);
    rect(-100, -70, 60, 20, 5); 
    rect(100, -70, 60, 20, 5);  
    
    fill(40);
    stroke(80);
    strokeWeight(4);
    rect(0, -10, 320, 120, 40); 
    
    ellipse(-130, 20, 90, 130);
    ellipse(130, 20, 90, 130);
    
    fill(20);
    ellipse(-40, 20, 50, 50);
    ellipse(40, 20, 50, 50);
    fill(60);
    let stickX = 0, stickY = 0;
    if (snakeDir.x === -1) stickX = -5;
    if (snakeDir.x === 1) stickX = 5;
    if (snakeDir.y === -1) stickY = -5;
    if (snakeDir.y === 1) stickY = 5;
    ellipse(-40 + stickX, 20 + stickY, 30, 30);
    ellipse(40 + stickX, 20 + stickY, 30, 30);
    
    fill(20);
    rect(-90, -20, 60, 60, 10);
    
    noStroke();
    if (snakeDir.x === 0 && snakeDir.y === -1) fill(0, 255, 255); else fill(70);
    rect(-90, -35, 15, 20, 2);
    if (snakeDir.x === 0 && snakeDir.y === 1) fill(0, 255, 255); else fill(70);
    rect(-90, -5, 15, 20, 2);
    if (snakeDir.x === -1 && snakeDir.y === 0) fill(0, 255, 255); else fill(70);
    rect(-105, -20, 20, 15, 2);
    if (snakeDir.x === 1 && snakeDir.y === 0) fill(0, 255, 255); else fill(70);
    rect(-75, -20, 20, 15, 2);
    
    fill(20);
    ellipse(90, -20, 60, 60);
    fill(255, 0, 128); 
    ellipse(90, -35, 15, 15);
    fill(0, 255, 128); 
    ellipse(90, -5, 15, 15);
    fill(0, 128, 255); 
    ellipse(75, -20, 15, 15);
    fill(255, 255, 0); 
    ellipse(105, -20, 15, 15);
    
    fill(0, 255, 255, 150);
    ellipse(0, -30, 20, 10);
    
    pop();
}
