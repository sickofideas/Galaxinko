function handleCameraAndPlayers() {
  if (players.length === 0) { cameraScale = lerp(cameraScale, 1.0, 0.05); return; }
  
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let isHeavyLoad = players.length > 80;    // Dřívější úleva pro grafiku
  let isExtremeLoad = players.length > 120;  // Dřívější úleva pro grafiku
  let maxV = 4; // SNÍŽENO (z 5)
  
  for (let i = players.length - 1; i >= 0; i--) {
    let p = players[i];
    
    if (!p.isZombie) updateHpLB(p.name, p.hp, p.color);

    let bx = p.body ? p.body.position.x : 0;
    let by = p.body ? p.body.position.y : 0;
    if (!p.body || isNaN(bx) || isNaN(by) || bx < -10000 || bx > W+10000 || by < -10000 || by > H+10000) {
        p.hp = 0; 
    }
    
    if (p.boostCooldown > 0) p.boostCooldown--;
    if (p.shieldCooldown > 0) p.shieldCooldown--;
    if (p.attackCooldown > 0) p.attackCooldown--;

    let targetR = getRadius(p.hp);
    if (Math.abs(targetR - p.r) > 1.0 && p.body && p.hp > 0) {
        let s = targetR / p.r;
        if (isFinite(s) && s > 0) {
            Matter.Body.scale(p.body, s, s);
            p.r = targetR;
            Matter.Body.setDensity(p.body, 0.001 + (p.r * 0.0001));
            // Dynamický odpor: Větší koule mají nižší frictionAir pro lepší "průraznost"
            p.body.frictionAir = 0.06 - Math.min(0.04, Math.sqrt(p.hp) * 0.0004);
        }
    }
    
    if (!isExtremeLoad && p.hp > 0) {
        p.trail.push({x: p.body.position.x, y: p.body.position.y});
        if (p.trail.length > 8) p.trail.shift();
    } else {
        p.trail = [];
    }
    
    if (p.hp <= 0) {
      // PŘIDÁNO: Zapsání do fronty na oživení (jen pokud dal hráď alespoň jeden like)
      if (sessionLikes[p.name] > 0) {
          deadPlayersQueue.push({name: p.name, timeOfDeath: millis(), respawnDelay: 20000 + random(500, 20000)}); // 20s cooldown + náhodný ďas (0.5s - 20s)
      }
      
      if (p.body && !isNaN(p.body.position.x)) {
          let px = p.body.position.x;
          let py = p.body.position.y;

          // EFEKT GRANÁTU: Odstrďení nejbližších hráďů
          for (let other of players) {
              if (other === p || !other.body) continue;
              let dx = other.body.position.x - px;
              let dy = other.body.position.y - py;
              let distSq = dx*dx + dy*dy;
              let effectRadius = p.r + 150; // Dosah exploze zvýšen pro větší dopad
              let effectRadiusSq = effectRadius * effectRadius;
              
              if (distSq < effectRadiusSq && distSq > 0) {
                  let dist = Math.sqrt(distSq); // Potřebujeme pro výpoďet síly
                  let forceMag = 0.008 * other.body.mass * (effectRadius / dist); // Sníženo o 1/3
                  forceMag = Math.min(forceMag, 0.08 * other.body.mass); // Max odhoz snížen o 1/3
                  Matter.Body.applyForce(other.body, other.body.position, {
                      x: (dx / dist) * forceMag,
                      y: (dy / dist) * forceMag
                  });

                  // --- ODSTRANčNO: POŠKOZENÍ OKOLÍ (Způsobovalo řetězovou reakci a "pád" arény) ---
              }
          }

          if (!isHeavyLoad) {
              if (p.isZombie) {
                  createParticles(px, py, color(0, 255, 255), 20); // Změněno ze zelené na azurovou pro Chroma Key
                  safePlaySound(pentatonic('low'), 0.01, 0.2); 
              } else {
                  createParticles(px, py, p.color, 35); // Více ďástic pro hráďe
                  deathShockwaves.push({x: px, y: py, r: p.r, color: p.color, life: 255});
                  safePlaySound(pentatonic('low'), 0.01, 0.15);
              }
          }
      }
      if (p.body) Matter.World.remove(world, p.body);
      players.splice(i, 1);
      continue;
    }

    // --- BLESKY OD TOP 10 S HP > 1000 (1x za sekundu, -1 HP nejblizsi kouli) ---
    if (currentTop10.includes(p.name) && p.hp >= 1000 && !p.isZombie && frameCount % 60 === (i % 60)) {
        let closest = null;
        let closestDist = Infinity;
        for (let other of players) {
            if (other === p || other.hp <= 0 || other.immunityTimer > 0 || !other.body) continue;
            let ld = dist(p.body.position.x, p.body.position.y, other.body.position.x, other.body.position.y);
            if (ld < closestDist) { closestDist = ld; closest = other; }
        }
        if (closest) {
            closest.hp -= 1;
            if (!isExtremeLoad) {
                lightnings.push({x1: p.body.position.x, y1: p.body.position.y, x2: closest.body.position.x, y2: closest.body.position.y, life: 25, c: p.color});
            }
            if (!isHeavyLoad) createParticles(closest.body.position.x, closest.body.position.y, p.color, 3);
            if (!isHeavyLoad) addPopup("-1", closest.body.position.x, closest.body.position.y, color(255, 100, 100));
            safePlaySound(pentatonic('low'), 0.008, 0.25);
        }
    }
    
    // GALAKTICKÝ VORTEX (Pohyblivý střed, aby nevznikla statická zácpa)
    // Střed gravitace nyní neustále pomalu cestuje po aréně
    let cx = W/2 + Math.sin(frameCount * 0.005) * (W * 0.40); 
    let cy = (ARENA_TOP+ARENA_BOT)/2 + Math.cos(frameCount * 0.007) * ((ARENA_BOT-ARENA_TOP) * 0.40);
    
    // AFK: zmrazeni po nahodnem casu 45-60s neaktivity, rozmrazeni po nahodnem casu 5-15s → cyklus
    // MAX 3 hracu muzou byt zmrazeni najednou (vizual + fyzika), vypocty bezi dal pro vsechny
    if (!p.isBot && !p.isZombie && p.lastActionTime) {
        // Nastavit nahodny prah klidu pri prvnim volani nebo po rozmrazeni
        if (!p.afkDelay) p.afkDelay = 45000 + Math.random() * 15000; // 45-60s
        if (!p.isFrozen && Date.now() - p.lastActionTime > p.afkDelay) {
            // Zmrazit jen pokud neni zadny hrac jiz zmrazeny
            let currentlyFrozen = players.filter(x => x.isFrozen).length;
            if (currentlyFrozen < 1) {
                p.isFrozen = true;
                p.frozenSince = Date.now();
                p.frozenDuration = 5000 + Math.random() * 10000; // 5-15s
                Matter.Body.set(p.body, 'frictionAir', 0.4);
            }
            // Pokud je uz nekdo zmrazeny, timer AFK bezi dal, ale hrace nezmrazujeme
        } else if (p.isFrozen && p.frozenSince && Date.now() - p.frozenSince > (p.frozenDuration || 10000)) {
            // Auto-rozmrazit a dat novy nahodny cas klidu
            p.isFrozen = false;
            p.frozenSince = null;
            p.frozenDuration = null;
            p.afkDelay = 45000 + Math.random() * 15000; // novy nahodny prah 45-60s
            p.lastActionTime = Date.now(); // reset: bude poletovat dalsi cyklus
            Matter.Body.set(p.body, 'frictionAir', 0.08);
        }
    }
    let afkMult = (p.isFrozen) ? 0.02 : 1.0;
    
    let dx = cx - p.body.position.x;
    let dy = cy - p.body.position.y;
    let distToCenter = Math.sqrt(dx*dx + dy*dy) || 1;

    let dirX = dx / distToCenter;
    let dirY = dy / distToCenter;
    
    // --- VÝPOČET SIL (Sníženo o 15% pro pomalejší tempo + posílení rotace) ---
    let pullForce = 0.00002 * p.body.mass * afkMult;  // Sníženo pro více "dokola" efekt
    let vortexForce = 0.00009 * p.body.mass * p.baseRotDir * afkMult; // Posíleno relativně k tahu do středu

    let finalFx = (dirX * pullForce) + (-dirY * vortexForce);
    let finalFy = (dirY * pullForce) + (dirX * vortexForce);

    // OPTIMALIZACE: Noise poďítáme jen každý 3. frame při zátěži
    if (!p.lastNoiseX || frameCount % (players.length > 60 ? 3 : 1) === 0) {
        p.lastNoiseX = noise(p.noiseOffsetX) - 0.5;
        p.lastNoiseY = noise(p.noiseOffsetY) - 0.5;
    }
    let noiseValX = p.lastNoiseX;
    let noiseValY = p.lastNoiseY;

    finalFx += noiseValX * 0.00012 * p.body.mass; // Snížený šum o 15%
    finalFy += noiseValY * 0.00012 * p.body.mass;

    // Hracu maji o 45% vetsi silu, aby snaze proplouvali a odtlacili boty
    if (!p.isBot) {
        finalFx *= 1.45;
        finalFy *= 1.45;
    }

    // Pomalejší posun šumu = plynulejší změny pohybu
    // POMALEJŠÍ ZMĚNA: Pohyb bude plynulejší a táhlejší
    p.noiseOffsetX += 0.005; 
    p.noiseOffsetY += 0.005;

    // Občasné silnější pošťouchnutí (ponecháno, ale mírně oslabeno)
    if (Math.random() < 0.02) { // Méně často
        finalFx += (Math.random() - 0.5) * 0.0005 * p.body.mass;
        finalFy += (Math.random() - 0.5) * 0.0005 * p.body.mass;
    }

    // --- BOT BEHAVIOR (Chaos movement) ---
    if (p.isBot && frameCount % 60 === (i % 60)) {
        let chaosForce = 0.0002 * p.body.mass; // Sníženo pro pomalé ploužení
        Matter.Body.applyForce(p.body, p.body.position, {
            x: (random() - 0.5) * chaosForce,
            y: (random() - 0.5) * chaosForce
        });
    }

    // Žádná ochranná zóna - všichni se rurou do jednoho bodu!
    Matter.Body.applyForce(p.body, p.body.position, { x: finalFx, y: finalFy });

    let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
    let isTop10 = currentTop10.includes(p.name);
    let tSpd = isTop10 ? 1.6 : 1.3; // SNÍŽENO (z 2.2 / 1.8) pro klidnější arénu
    
    // SÍLA PODLE HP: Čím větší koule, tím lehce vyšší tah na bránu
    tSpd *= (1.0 + Math.sqrt(p.hp) * 0.0015);
    let currentMaxV = maxV;
    
    // --- POMALÝ ZÁKLAD PRO PASIVNÍ ---
    // Pokud hráč/bot nelajkuje, nedal gift v tomto kole nebo neuhodl hádanku, je o 30% pomalejší
    let hasBonus = isBuffed || (sessionLikes[p.name] > 0) || (roundGifts[p.name] && roundGifts[p.name].score > 0) || (riddleWins[p.name] > 0);
    if (!hasBonus) {
        tSpd *= 0.4;
        currentMaxV *= 0.4;
    }


    // BONUS ZA LIKOVANI: Hracici kteri nekdy lajkli jsou o 25% rychlejsi nez ostatni hrace
    if (!p.isBot && !p.isZombie && sessionLikes[p.name] > 0) {
        tSpd *= 1.25;
        currentMaxV *= 1.25;
    }
    // ZOMBÍCI SE PLOUŽÍ (-60% rychlost)
    if (p.isZombie) {
        tSpd *= 0.4;
        currentMaxV *= 0.4;
    }

    // BOTI JSOU POMALEJŠÍ (-40% rychlost oproti hráčům)
    if (p.isBot) {
        tSpd *= 0.3; // Zpomaleno ze 0.6 pro "ploužení"
        currentMaxV *= 0.3;
    }

    // --- ZRYCHLENÍ ZA TAPOVÁNÍ (LIKE BUFF) ---
    // Pokud hráď aktivně posílá liky, získá doďasně o 100 % vyšší rychlost (kompenzace za pomalejší základ)
    if (isBuffed) {
        tSpd *= 1.35; 
        currentMaxV *= 2.0;
        
        // Vizuální jiskry smazány
    }

    if (p.isBounty) {
        tSpd *= 1.4;
        currentMaxV *= 1.4;
    }
    
    if (p.giftSpeedTimer > 0) {
        p.giftSpeedTimer--;
        let speedMult = map(p.giftSpeedTimer, 0, 300, 1.0, 3.0); // Postupné vytrácení rychlosti
        tSpd *= speedMult;
        currentMaxV *= speedMult;
    }

    if (p.orbSpeedTimer > 0) {
        p.orbSpeedTimer--;
        tSpd *= 5.0;
        currentMaxV *= 5.0;
        // Žluté jiskry smazány
    }

    if (p.shareCooldown > 0) p.shareCooldown--;

    // --- PLYNULÉ PŘIDÁVÁNÍ/UBÍRÁNÍ HP (BUFFEROVANÉ) ---
    if (p.hpBuffer !== 0) {
        // Rychlost změny: min 1 HP, ale při velkém rozdílu zrychlíme, aby to netrvalo věďnost
        let step = 1;
        if (Math.abs(p.hpBuffer) > 100) step = Math.ceil(Math.abs(p.hpBuffer) / 60);
        
        if (p.hpBuffer > 0) {
            let add = Math.min(step, p.hpBuffer);
            p.hp += add;
            p.hpBuffer -= add;
            // Popupy jen obďas pro úsporu FPS
            if (frameCount % 10 === 0) {
                addPopup("+1", p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
            }
        } else if (p.hpBuffer < 0) {
            let sub = Math.min(step, Math.abs(p.hpBuffer));
            p.hp -= sub;
            p.hpBuffer += sub;
            if (frameCount % 10 === 0) {
                addPopup("-1", p.body.position.x, p.body.position.y - p.r, color(255, 80, 80));
            }
        }
    }

    let vx = p.body.velocity.x;
    let vy = p.body.velocity.y;
    
    if (isNaN(vx) || isNaN(vy) || !isFinite(vx) || !isFinite(vy)) {
        Matter.Body.setVelocity(p.body, {x: 0, y: 0});
    } else {
        let currentSpeed = Math.sqrt(vx*vx + vy*vy);
        if (currentSpeed > 0.1) {
            let factor = tSpd / currentSpeed;
            Matter.Body.setVelocity(p.body, { x: lerp(vx, vx * factor, 0.1), y: lerp(vy, vy * factor, 0.1) });
        }
        
        vx = p.body.velocity.x; vy = p.body.velocity.y;
        if (Math.abs(vx) > currentMaxV || Math.abs(vy) > currentMaxV) {
            Matter.Body.setVelocity(p.body, {
                x: Math.max(-currentMaxV, Math.min(currentMaxV, vx)),
                y: Math.max(-currentMaxV, Math.min(currentMaxV, vy))
            });
        }
    }
  }

  // DYNAMICKÁ KAMERA: Oddaluje se podle toho, kolik fyzického prostoru koule zabírají!
  let totalArea = 0;
  for (let i = 0; i < players.length; i++) {
      totalArea += players[i].r * players[i].r * Math.PI;
  }
  let screenArea = W * (ARENA_BOT - ARENA_TOP);
  let coverageRatio = totalArea / screenArea;
  
  if (coverageRatio > 0) {
      // Koule necháme natěsnat více (až na 80 % obrazovky) než oddálíme kameru
      targetCameraScale = Math.sqrt(0.85 / coverageRatio);
  } else {
      targetCameraScale = 1.8;
  }
  // Limity přiblížení/oddálení
  targetCameraScale = Math.min(2.0, Math.max(0.45, targetCameraScale));

  cameraScale = lerp(cameraScale, targetCameraScale, 0.015); // Velmi pomalé a plynulé oddalování
  
  let viewW = W / cameraScale; 
  let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  
  if (!isNaN(viewW) && !isNaN(viewH)) {
      Matter.Body.setPosition(wallTop, { x: cx, y: cy - viewH/2 - wallThick/2 });
      Matter.Body.setPosition(wallBot, { x: cx, y: cy + viewH/2 + wallThick/2 });
      Matter.Body.setPosition(wallLeft, { x: cx - viewW/2 - wallThick/2, y: cy });
      Matter.Body.setPosition(wallRight, { x: cx + viewW/2 + wallThick/2, y: cy });
  }
}

// --- FUNKCE PRO POZADÍ ODSTRANčNY ---
function handleBossPlanet() {
    if (!showBossPlanet || players.length === 0) return;

    // Vytvoření globálního zámku (pokud ještě neexistuje)
    if (typeof window.bossLockTimer === 'undefined') window.bossLockTimer = 0;

    // 1. Vyďistíme frontu od mrtvých hráďů nebo těch, co už v aréně nejsou
    while (egoQueue.length > 0) {
        let name = egoQueue[0];
        let p = players.find(x => x.name === name && x.hp > 0);
        if (p) break;
        egoQueue.shift();
    }

    // 2. PRIORITA: Fronta nových hráďů (každý dostane 3 vteřiny slávy)
    if (egoQueue.length > 0) {
        let nextInQueue = egoQueue[0];
        if (lastValidBossName === nextInQueue) {
            // Aktuální boss je ten z fronty, zkontrolujeme jestli už mu vypršel ďas
            if (millis() > window.bossLockTimer) {
                egoQueue.shift();
                // Shiftem se uvolní místo pro dalšího v řadě nebo pro top HP hráďe v dalším kroku
            }
        } else {
            // NOVÝ hráď z fronty přebírá Ego Smash (přebije i top HP hráďe)
            lastValidBossName = nextInQueue;
            window.bossLockTimer = millis() + 3000;
        }
    }

    // 3. POKUD JE FRONTA PRÁZDNÁ: Zobrazíme hráďe s nejvíce HP
    if (egoQueue.length === 0) {
        let potentialKing = [...players].filter(p => !p.isZombie && p.hp > 0 && !p.isBot).sort((a, b) => b.hp - a.hp)[0];

        if (potentialKing) {
            if (lastValidBossName !== potentialKing.name) {
                // Přepneme na top HP hráďe pouze pokud vypršel předchozí zámek
                if (millis() > window.bossLockTimer) {
                    lastValidBossName = potentialKing.name;
                    window.bossLockTimer = millis() + 3000;
                }
            }
        } else {
            // Pokud nikdo reálný nepřežil nebo není v aréně, Ego Smash se vypne
            lastValidBossName = null;
        }
    }

    // Pokud není žádný platný král, pošleme stávající planety pryď
    if (!lastValidBossName) {
        bossPlanets.forEach(p => { if(!p.isKnockedOut) { p.isKnockedOut = true; p.vx *= 1.5; p.vy *= 1.5; } });
    }

    let activeBossName = lastValidBossName;
    let cx = W/2;
    let cy = (ARENA_TOP+ARENA_BOT)/2;

    // 3. Hledáme planetu, která patří aktuálnímu králi a ještě není zniďená
    let mainPlanet = activeBossName ? bossPlanets.find(p => !p.isKnockedOut && p.name === activeBossName) : null;

    if (!mainPlanet && activeBossName) {
        // Najdeme tu nejnovější existující planetu v aréně, kterou půjdeme nekompromisně sestřelit
        let previousPlanet = [...bossPlanets].reverse().find(p => !p.isKnockedOut);

        let newPlanet = {
            name: activeBossName,
            x: 0, y: 0, vx: 0, vy: 0, 
            rot: 0, rotSpeed: random(-0.005, 0.005),
            isKnockedOut: false,
            hasSmashed: false,
            targetPlanet: previousPlanet, // Tu budeme lovit (může jich být takhle i víc za sebou jako vláďek)
            targetPoint: previousPlanet ? null : { x: cx + random(-50, 50), y: cy + random(-50, 50) } // Pokud jsme úplně první, letíme do středu
        };

        // Spawnování hluboko mimo obrazovku
        let side = floor(random(4));
        let offX = W * 0.7; let offY = H * 0.6;
        if (side === 0) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy - offY; }
        else if (side === 1) { newPlanet.x = cx + offX; newPlanet.y = cy + random(-200, 200); }
        else if (side === 2) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy + offY; }
        else { newPlanet.x = cx - offX; newPlanet.y = cy + random(-200, 200); }

        // Nejdřív natvrdo smazat všechny existující fialové koule, aby tam nezůstávaly viset
        bossPlanets = []; 
        bossPlanets.push(newPlanet);
    }

    let pSize = W * 0.40; 
    
    let boundLeft = cx - W * 0.30; let boundRight = cx + W * 0.30;
    let boundTop = cy - (ARENA_BOT - ARENA_TOP) * 0.35; let boundBot = cy + (ARENA_BOT - ARENA_TOP) * 0.35;

    for (let i = bossPlanets.length - 1; i >= 0; i--) {
        let bp = bossPlanets[i];

        // --- POHYBOVÁ LOGIKA ---
        if (bp.isKnockedOut) {
            // Letí pryď po prohře
        } else if (!bp.hasSmashed) {
            // A) MÁME CÍL -> LETÍME ZNIČIT STAROU PLANETU
            if (bp.targetPlanet) {
                let dx = bp.targetPlanet.x - bp.x;
                let dy = bp.targetPlanet.y - bp.y;
                let dist = Math.sqrt(dx*dx + dy*dy) || 1;

                let speed = 16; // Agresivní let a pronásledování
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                // NÁRAZ!
                if (dist < pSize * 0.7) {
                    bp.hasSmashed = true;
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                    bp.smashGreenFlash = 90; // Nastaví plynulý zelený přechod na 1.5 vteřiny

                    bp.targetPlanet.isKnockedOut = true;
                    bp.targetPlanet.vx = (dx / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.vy = (dy / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.rotSpeed = random(-0.1, 0.1);

                    let liveAttacker = players.find(p => p.name === bp.name);
                    let attackerColor = liveAttacker ? liveAttacker.color : color(255);

                    // ZAKÁZÁNO: screenShake, particles, flash
                    safePlaySound(pentatonic('low'), 0.05, 0.8); // Jemný basový tón
                }
            } 
            // B) ÚPLNč PRVNÍ PLANETA -> MAJESTÁTNč PŘILÉTÁ DO STŘEDU
            else if (bp.targetPoint) {
                let dx = bp.targetPoint.x - bp.x;
                let dy = bp.targetPoint.y - bp.y;
                let distSq = dx*dx + dy*dy;
                let dist = Math.sqrt(distSq) || 1;
                
                let speed = 6; // Pomalý přílet
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                if (distSq < 225) {
                    bp.hasSmashed = true; // Dorazila na své místo doprostřed arény
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                }
            }
        } else {
            // C) PLANETA VLÁDNE -> ODRÁŽÍ SE OD MANTINELŮ V ARÉNč
            if (bp.x < boundLeft) { bp.x = boundLeft; bp.vx *= -1; }
            if (bp.x > boundRight) { bp.x = boundRight; bp.vx *= -1; }
            if (bp.y < boundTop) { bp.y = boundTop; bp.vy *= -1; }
            if (bp.y > boundBot) { bp.y = boundBot; bp.vy *= -1; }
        }

        // Aplikace pohybu
        bp.x += bp.vx;
        bp.y += bp.vy;
        bp.rot += bp.rotSpeed;

        // Smazání planety ze hry, pokud vyletí po prohře úplně pryď
        if (bp.isKnockedOut && (bp.x < -W || bp.x > W*2 || bp.y < -H || bp.y > H*2)) {
            bossPlanets.splice(i, 1);
            continue;
        }

        // --- VYKRESLENÍ A BARVY ---
        push();
        translate(bp.x, bp.y);
        
        // --- VIDITELNOST: Pokud je někdo v aréně větší než tato planeta, zneviditelnit ---
        let isSomeoneLarger = players.some(p => !p.isZombie && p.r > (pSize / 2) * 0.95);
        if (isSomeoneLarger && !bp.isKnockedOut) {
            pop();
            continue;
        }
        
        // 4. SYNCHRONIZACE BARVY S REÁLNOU PILOU HRÁČE V ARÉNč
        let livePlayer = players.find(p => p.name === bp.name);
        let outlineColor = color(200); 
        
        if (livePlayer) {
            let danger = constrain(map(Math.max(0, livePlayer.hp), 50, 0, 0, 1), 0, 1);
            outlineColor = lerpColor(livePlayer.color, color(255, 0, 0), danger); // Červená při umírání

            // Obnovený duhový efekt
            if (livePlayer.giftSpeedTimer > 0 || livePlayer.immunityTimer > 0 || livePlayer.isGodMode || livePlayer.hasRainbowCrown) {
                colorMode(HSB);
                outlineColor = color(getSafeHue(frameCount * 5), 100, 100);
                colorMode(RGB);
            }
        }

        // Plynulé zezelenání okraje planety po převzetí
        if (bp.smashGreenFlash > 0) {
            outlineColor = lerpColor(outlineColor, color(50, 255, 50), bp.smashGreenFlash / 90.0);
            bp.smashGreenFlash--;
        }

        if (!bp.isKnockedOut) {
            // if (players.length < 40) {
            //     drawingContext.shadowBlur = 20 + sin(frameCount * 0.05) * 10;
            //     drawingContext.shadowColor = outlineColor;
            // }
        }

        fill(5, 5, 10, 180);
        stroke(outlineColor);
        strokeWeight(bp.isKnockedOut ? 2 : 5);
        ellipse(0, 0, pSize);
        drawingContext.shadowBlur = 0;


 
        rotate(bp.rot);

        let img = userAvatars[bp.name]; 
        if (img && img !== "loaded") {
            imageMode(CENTER);
            tint(255, bp.isKnockedOut ? 40 : 180); 
            image(img, 0, 0, pSize, pSize);
            noTint();
            
            drawingContext.save();
            let gradient = drawingContext.createRadialGradient(0, 0, pSize * 0.3, 0, 0, pSize * 0.5);
            gradient.addColorStop(0, "rgba(0,0,0,0)");
            gradient.addColorStop(1, "rgba(0,0,0,0.8)");
            drawingContext.fillStyle = gradient;
            drawingContext.fillRect(-pSize/2, -pSize/2, pSize, pSize);
            drawingContext.restore();
        } else {
            fill(outlineColor); noStroke(); ellipse(0, 0, pSize * 0.8);
            fill(255, bp.isKnockedOut ? 30 : 150); 
            textAlign(CENTER, CENTER); textSize(80); text("đź‘‘", 0, 0);
        }
        pop();
    }
}

function drawSpaceBackground() {
  flowTime += 0.003;
  globalFlowAngle = sin(flowTime) * 0.25;
  
  // ANTI-DETECT: Rychlost scrollování se v ďase neustále plynule mění
  let antiBotShift = sin(frameCount * 0.002) * 0.8; 
  let baseScrollSpeed = 1.2 + antiBotShift; 

  noStroke();
  
  drawingContext.save();
  milkyWay.forEach(mw => {
      fill(mw.color);
      ellipse(mw.x, mw.y, mw.r * 2);
      
      mw.x += sin(globalFlowAngle) * 0.2;
      mw.y += cos(globalFlowAngle) * 0.2 + (baseScrollSpeed * 0.1);
      
      if (mw.y > H * 2 + 500) { mw.y = -H - 500; mw.x = random(-W, W*2); }
      if (mw.x > W * 2 + 500) { mw.x = -W - 500; }
      if (mw.x < -W - 500) { mw.x = W * 2 + 500; }
  });
  drawingContext.restore();

  nebulas.forEach(n => {
     fill(n.color);
     ellipse(n.x, n.y, n.r); 
     n.y += n.speed + (baseScrollSpeed * 0.2);
     if (n.y > H * 2 + 1000) { n.y = -H - 1000; n.x = random(-W, W*2); }
  });

  let isExtremeLoad = players.length > 30;
  let starLimit = isExtremeLoad ? stars.length / 3 : stars.length;
  for(let i=0; i<starLimit; i++) {
    let s = stars[i];
    let currentAlpha = s.baseAlpha;
    if (s.isPulsing && !isExtremeLoad) {
        currentAlpha = (s.baseAlpha * 0.5) + sin(frameCount * s.pulseSpeed + s.pulsePhase) * (s.baseAlpha * 0.5);
    }
    fill(s.rC, s.gC, s.bC, currentAlpha);
    rect(s.x, s.y, s.s, s.s);
    
    s.x += sin(globalFlowAngle) * (s.speed * 0.5);
    s.y += s.speed + baseScrollSpeed * s.layer; 
    
    if (s.y > H * 2) { s.y = -H; s.x = random(-W, W * 2); }
    else if (s.y < -H) { s.y = H * 2; s.x = random(-W, W * 2); }
    if (s.x > W * 2) { s.x = -W; s.y = random(-H, H * 2); }
    else if (s.x < -W) { s.x = W * 2; s.y = random(-H, H * 2); }
  }

  // ZAKÁZÁNO dle požadavku: Vesmír bez planet a objektů
  // drawingContext.save();
  // handleBackgroundObjects(baseScrollSpeed);
  // drawingContext.restore();

  if (random() < 0.04) { 
      let side = Math.floor(random(4));
      let sx, sy, svx, svy;
      
      if (side === 0) { sx = random(-W, W*2); sy = -H; svx = random(-20, 20); svy = random(20, 50); }
      else if (side === 1) { sx = random(-W, W*2); sy = H*2; svx = random(-20, 20); svy = random(-50, -20); }
      else if (side === 2) { sx = -W; sy = random(-H, H*2); svx = random(20, 50); svy = random(-20, 20); }
      else { sx = W*2; sy = random(-H, H*2); svx = random(-50, -20); svy = random(-20, 20); }
      
      shootingStars.push({
          x: sx, y: sy, 
          vx: svx, vy: svy, 
          life: 255, length: random(40, 150),
          thick: random(1, 4)
      });
  }

  for (let i = shootingStars.length - 1; i >= 0; i--) {
      let s = shootingStars[i];
      stroke(255, 255, 255, s.life); strokeWeight(s.thick);
      line(s.x, s.y, s.x - s.vx * (s.length/20), s.y - s.vy * (s.length/20));
      s.x += s.vx; s.y += s.vy; 
      s.life -= 4; 
      
      // 3. Detekce nárazu do hráďů
      let hit = false;
      for (let p of players) {
          let d = dist(s.x, s.y, p.body.position.x, p.body.position.y);
          
          // OPRAVA 1: Větší hitbox (o 20px), aby rychlé hvězdy neproletěly skrz hráďe bez detekce
          let sSize = s.size || s.thick || 5; 
          if (d < p.r + sSize + 20) { 
              
              let speedMag = dist(0, 0, s.vx, s.vy);
              let dirX = s.vx / speedMag;
              let dirY = s.vy / speedMag;
              
              // Zvýšená síla pro výraznější odhození hráďe (bez exploze)
              let pushForce = 0.006 * p.body.mass; 
              
              Matter.Body.applyForce(p.body, p.body.position, {
                  x: dirX * pushForce,
                  y: dirY * pushForce
              });

              hit = true;
              break; 
          }
      }

      if (hit) {
          shootingStars.splice(i, 1);
          continue;
      }

      if (s.life <= 0 || s.x < -W*1.5 || s.x > W*2.5 || s.y < -H*1.5 || s.y > H*2.5) {
          shootingStars.splice(i, 1);
      }
  }
  noStroke();
}

function drawDeathShockwaves() {
  for (let i = deathShockwaves.length - 1; i >= 0; i--) {
      let sw = deathShockwaves[i];
      noFill();
      stroke(red(sw.color), green(sw.color), blue(sw.color), sw.life);
          strokeWeight(map(sw.life, 255, 0, sw.isNuke ? 50 : 8, 1)); // Zjednodušená tloušťka
      ellipse(sw.x, sw.y, sw.r); // Výsledná exploze je nyní poloviční (sw.r místo sw.r * 2)
          sw.r += sw.isNuke ? 25 : 8; // Rychlejší rozpínání rázové vlny
          sw.life -= sw.isNuke ? 4 : 25; // Mnohem rychlejší zmizení (ďistší animace)
      if (sw.life <= 0) deathShockwaves.splice(i, 1);
  }
}

function drawLightnings() {
  for(let i = lightnings.length - 1; i >= 0; i--) {
    let l = lightnings[i];
    let a = Math.min(255, l.life * 20); 
    let segs = 4; // Více segmentů pro rozeklanější vzhled
    let pts = [{x: l.x1, y: l.y1}];
    
    for(let j = 1; j < segs; j++) {
        pts.push({
            x: lerp(l.x1, l.x2, j/segs) + random(-20, 20), 
            y: lerp(l.y1, l.y2, j/segs) + random(-20, 20)
        });
    }
    pts.push({x: l.x2, y: l.y2});

    // Zvýrazněná vnější záře
    stroke(red(l.c), green(l.c), blue(l.c), a);
    strokeWeight(l.life * 1.2 + 4);
    noFill();
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    // Silnější světlé jádro
    stroke(255, a + 50);
    strokeWeight(l.life * 0.5 + 2);
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    l.life--;
    if(l.life <= 0) lightnings.splice(i, 1);
  }
}

function drawPlayer(p) {
  let pos = p.body.position; 
  let safeHp = Math.max(0, p.hp);
  let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
  // p.likeBuffTimer--; // Již není potřeba, používáme millis()
  
  let isLeader = (currentTop10[0] === p.name && !p.isZombie);
  let isSecond = (currentTop10[1] === p.name && !p.isZombie);
  let isThird = (currentTop10[2] === p.name && !p.isZombie);
  
  // 1. FIRE TRAIL smazán

  // 2. GOD MODE KOUZLO
  if (p.isGodMode) {
      p.godModeTimer--;
      if (p.godModeTimer <= 0) p.isGodMode = false;
  }

  // Rotace (Zrychleno 10x při lajkování)
  let baseSpin = 0.02 + Math.min(safeHp * 0.000015, 0.2);
  if (safeHp >= 1000) baseSpin = 0.08 + Math.min(safeHp * 0.00002, 0.4);
  if (p.orbSpeedTimer > 0) baseSpin = Math.max(baseSpin, 0.35);
  p.rot += isBuffed ? baseSpin * p.baseRotDir * 10 : baseSpin * p.baseRotDir;
  
  let isHeavyLoad = players.length > 15;
  let isExtremeLoad = players.length > 30;
  let isEpic = safeHp >= 1000;
  let dangerFactor = constrain(map(safeHp, 50, 0, 0, 1), 0, 1);
  if (p.isZombie) dangerFactor = 0;
  
  let actualColor = lerpColor(p.color, color(255, 0, 0), dangerFactor);

  // Vykreslení stopy (trail) - Vypnuto pro boty pro odstranění "teďky" uprostřed
  if (!isExtremeLoad && p.trail.length > 1 && !p.isBot) {
      noFill();
      for (let i = 0; i < p.trail.length - 1; i++) {
          stroke(red(actualColor), green(actualColor), blue(actualColor), map(i, 0, p.trail.length, 0, 150));
          strokeWeight(map(i, 0, p.trail.length, p.r * 0.2, p.r * 0.8));
          line(p.trail[i].x, p.trail[i].y, p.trail[i+1].x, p.trail[i+1].y);
      }
  }

  push(); 
  translate(pos.x, pos.y);
  scale(isBuffed ? 1.05 : 1.0);
  rotate(p.rot);


  let r = p.body.circleRadius;
  let visualR = r;

  if (p.hp >= 2000 && p.hp < 5000) {
      visualR = r + sin(frameCount * 0.1 + p.body.id) * (r * 0.1);
      noStroke();
      fill(255, 50, 0, 80);
      circle(0, 0, visualR * 2.8 + random(-2, 2));
      fill(255, 150, 0, 120);
      circle(0, 0, visualR * 2.3);
  }
  else if (p.hp >= 5000 && p.hp < 10000) {
      let t = frameCount * 0.08 + p.body.id;
      for(let i = 0; i < 3; i++) {
          let angle = t + (i * TWO_PI / 3);
          let orbX = cos(angle) * (r * 1.8);
          let orbY = sin(angle) * (r * 1.8);
          noStroke();
          fill(0, 242, 254, 200);
          circle(orbX, orbY, r * 0.5);
          fill(255);
          circle(orbX, orbY, r * 0.2);
      }
  }
  else if (p.hp >= 10000) {
      noStroke();
      fill(50, 0, 80, 150);
      circle(0, 0, r * 3.5);
      stroke(200, 50, 255, 200);
      strokeWeight(2);
      for(let i = 0; i < 3; i++) {
          if (random() > 0.4) {
              let angle = random(TWO_PI);
              let l1 = r * random(1.2, 1.8);
              let l2 = r * random(2.0, 3.5);
              let a2 = angle + random(-0.3, 0.3);
              let x1 = cos(angle) * l1, y1 = sin(angle) * l1;
              let x2 = cos(a2) * l2, y2 = sin(a2) * l2;
              line(0, 0, x1, y1);
              line(x1, y1, x2, y2);
          }
      }
  }

  // 3. BOT FACE (Vypnuto - boti nyní mají profilovky jako reální hráďi)
  /*
  if (p.isBot) {
      drawBotFace(0, 0, p.r);
  }
  */

  // Varovné pulzování pro umírající (Vypnuto pro boty)
  if (!p.isBot && (p.auraFlash > 0 || dangerFactor > 0)) {
      let glowAlpha = p.auraFlash > 0 ? p.auraFlash * 15 : 0;
      if(dangerFactor > 0) glowAlpha = max(glowAlpha, dangerFactor * 120 + sin(frameCount*0.3)*80);
      fill(red(actualColor), green(actualColor), blue(actualColor), glowAlpha);
      noStroke();
      ellipse(0, 0, p.r * 1.8);
  }
  if(p.auraFlash > 0) p.auraFlash--;

  // Speciální zlatá pulzující aura pro vedoucího hráďe (Vypnuto pro boty)
  if (isLeader && !p.isBot) {
      fill(255, 215, 0, 50 + sin(frameCount * 0.15) * 30);
      noStroke();
      ellipse(0, 0, p.r * 2.4 + sin(frameCount * 0.2) * 15);
  }

  // Buff záře (Duhová pro korunku, bílá pro běžný buff)
  if (isBuffed && !p.isBot) { 
      if (p.hasCrown || p.immunityTimer > 0) {
          colorMode(HSB);
          fill(getSafeHue(frameCount * 5), 70, 100, 100 + sin(frameCount * 0.4) * 60);
          colorMode(RGB);
      } else {
          fill(255, 255, 255, 80 + sin(frameCount * 0.5) * 80); 
      }
      noStroke();
      ellipse(0, 0, p.r * 2.0);
  }

  let outlineColor = actualColor;
  if (p.giftSpeedTimer > 0 || p.immunityTimer > 0 || p.isGodMode || p.hasRainbowCrown) {
      colorMode(HSB);
      outlineColor = color(getSafeHue(frameCount * 8), 100, 100); 
      colorMode(RGB);
  }
  if (p.isZombie) outlineColor = color(50, 255, 255); // Tyrkysová pro zombíky (víc sci-fi)

  // 4. BOT CRUSHER AURA (Žluté blesky / záře)
  if (p.botDmgTimer > 0) {
      push();
      stroke(255, 255, 0, 150 + sin(frameCount * 0.5) * 100);
      strokeWeight(4);
      noFill();
      let auraR = p.r * 1.4 + sin(frameCount * 0.3) * 5;
      ellipse(0, 0, auraR);
      
      // Občasné jiskry
      if (frameCount % 6 === 0) {
          createParticles(pos.x + random(-p.r, p.r), pos.y + random(-p.r, p.r), color(255, 255, 0), 2);
      }
      pop();
  }

  let baseR = red(actualColor);
  let baseG = green(actualColor);
  let baseB = blue(actualColor);

  if (p.sawFade === undefined) p.sawFade = 0;
  if (isBuffed) {
      p.sawFade = Math.min(1.0, p.sawFade + 0.1); 
  } else {
      p.sawFade = Math.max(0.0, p.sawFade - 0.05); 
  }

  if (p.sawFade > 0.01) {
      let teeth = isEpic ? 32 : 24; // Sníženo pro výkon
      let rOuter = p.r * 1.45; // Vetsi hroty pro lepsi viditelnost
      let rInner = p.r * 1.25;
      let sawAlpha = p.sawFade * 255;

      push();
      // Rychlá rotace cirkulárky (zpomaleno z 0.6 na 0.3 pro lepší viditelnost pohybu)
      rotate(frameCount * 0.3 * p.baseRotDir); 

      // INDUSTRIÁLNÍ VZHLED: Tmavý kov s broušeným ostřím
      noStroke();
      fill(40, sawAlpha); // Tmavý základ disku
      ellipse(0, 0, rOuter * 1.8);

      // 1. ZUBY (Broušená ocel)
      fill(red(actualColor), green(actualColor), blue(actualColor), sawAlpha * 0.8);
      beginShape();
      for(let i = 0; i < teeth; i++) {
          let idx = Math.floor(i * (64 / teeth)); // 64 je velikost cache pole
          let ang = sawAngles[idx];
          
          // Agresivní, ale krátké průmyslové zuby - cache optimalizace
          vertex(ang.a1_cos * rInner, ang.a1_sin * rInner); 
          vertex(ang.a2_cos * rOuter, ang.a2_sin * rOuter); 
          vertex(ang.a3_cos * rInner, ang.a3_sin * rInner);
      }
      endShape(CLOSE);

      // 2. VNITŘNÍ MECHANIKA (Broušený kov s odlesky)
      fill(180, sawAlpha * 0.4);
      ellipse(0, 0, p.r * 2.4);
      
      stroke(255, sawAlpha * 0.5);
      strokeWeight(1);
      noFill();
      ellipse(0, 0, p.r * 2.3); // Detailní kroužek uvnitř
      
      // Dynamické odlesky na ďepeli smazány
      drawingContext.shadowBlur = 0;
      pop();
  }
  
  if (p.isZombie) {
      push();
      drawingContext.setLineDash([8, 8]);
      strokeWeight(2); noFill();
      stroke(80, 200, 80, 100); // Původně ďervená, nyní zelená
      ellipse(0, 0, p.r * 1.6);
      drawingContext.lineDashOffset = 8;
      stroke(100, 255, 100, 100); // Světlejší zelená pro druhý pruh
      drawingContext.setLineDash([]); drawingContext.lineDashOffset = 0;
      pop();
  }

  rotate(-p.rot); 
  
  if (p.isBounty) {
      push();
      rotate(frameCount * 0.05);
      let tSize = p.r * 2.8 + sin(frameCount * 0.2) * 10;
      fill(255, 0, 0, 40); stroke(255, 50, 50, 200); strokeWeight(3);
      ellipse(0, 0, tSize);
      let cL = tSize * 0.2;
      line(-tSize/2 - 10, 0, -tSize/2 + cL, 0); line(tSize/2 + 10, 0, tSize/2 - cL, 0);
      line(0, -tSize/2 - 10, 0, -tSize/2 + cL); line(0, tSize/2 + 10, 0, tSize/2 - cL);
      noFill(); stroke(255, 0, 0, 100); strokeWeight(1); ellipse(0, 0, tSize * 0.6);
      pop();
  }

  if (p.immunityTimer > 0) {
      push();
      let pulse = sin(frameCount * 0.1) * 10;
      fill(50, 100, 255, 60 + sin(frameCount * 0.2) * 40);
      stroke(100, 150, 255, 200); strokeWeight(3);
      ellipse(0, 0, p.r * 2.8 + pulse);
      
      rotate(frameCount * 0.05);
      for(let o = 0; o < 3; o++) {
          let a = (o * TWO_PI) / 3;
          let ox = cos(a) * (p.r * 1.4 + pulse/2); let oy = sin(a) * (p.r * 1.4 + pulse/2);
          fill(255); noStroke(); ellipse(ox, oy, 6 + random(-2, 2));
      }
      pop();
  }

  if (p.hasCrown) {
      push();
      translate(0, -p.r * 1.5 - 10);
      fill(255, 215, 0); stroke(255); strokeWeight(2);
      beginShape();
      vertex(-15, 0); vertex(-25, -15); vertex(-8, -8); 
      vertex(0, -25); vertex(8, -8); vertex(25, -15); vertex(15, 0);
      endShape(CLOSE);
      pop();
  }
  
  if (p.isGodMode) {
      push(); noFill();
      strokeWeight(5 + sin(frameCount * 0.2) * 5); stroke(255, 0, 0, 150);
      ellipse(0, 0, p.r * 2 + 20);
      pop();
  }

  if (p.hasRainbowCrown) {
      push();
      translate(0, -p.r - 25);
      colorMode(HSB);
      fill(getSafeHue(frameCount * 6), 100, 100);
      colorMode(RGB);
      stroke(255); strokeWeight(2);
      beginShape();
      vertex(-15, 0); vertex(-25, -20); vertex(-10, -10);
      vertex(0, -25); vertex(10, -10);  vertex(25, -20); vertex(15, 0);
      endShape(CLOSE);
      pop();
  }

  let imgSize = visualR * 1.93;
  let isTop10 = currentTop10.includes(p.name);
  let shouldDrawAvatar = true; 
  // Vypnutí profilovek pro obyďejné hráďe při zátěži bylo odstraněno na žádost uživatele (profilovky musí být vidět vždy)
  // if (isExtremeLoad && safeHp < 500 && !isLeader) shouldDrawAvatar = false;

  if (p.avatarAlpha === undefined) p.avatarAlpha = shouldDrawAvatar ? 255 : 0;
  if (shouldDrawAvatar) p.avatarAlpha = Math.min(255, p.avatarAlpha + 15);
  else p.avatarAlpha = Math.max(0, p.avatarAlpha - 30);

  if (p.isBot) {
      fill(0, 127); // 50% průhledná ďerná výplň pro boty
  } else {
      fill(10, 12, 15, 255); 
  }
  noStroke();
  ellipse(0, 0, imgSize); 

  if (!p.isBot && p.avatarAlpha > 0 && userAvatars[p.name] && userAvatars[p.name] !== "loaded") {
      tint(255, p.avatarAlpha);
      imageMode(CENTER); 
      image(userAvatars[p.name], 0, 0, imgSize, imgSize); 
      noTint(); 
  }
  if (p.hp >= 10000) {
      noStroke();
      fill(20, 0, 40, 180);
      circle(0, 0, visualR * 2);
  }


  noFill(); 
  stroke(0, 255); // Solidní okraj pro všechny
  strokeWeight(4); ellipse(0, 0, imgSize);
  let outStroke = p.isZombie ? color(50, 255, 50) : color(255, 200);
  stroke(outStroke);
  strokeWeight(2); ellipse(0, 0, imgSize + 4);

  drawingContext.lineJoin = "round"; textAlign(CENTER, CENTER);
  
  let nameCol = isLeader ? color(255, 215, 0) : color(230); // Zlaté jméno pro lídra
  if (p.immunityTimer > 0) {
      colorMode(HSB);
      nameCol = color(getSafeHue(frameCount * 8), 80, 100);
      colorMode(RGB);
  }

  if (p.r > 20) {
      // Ztenďení obrysu textu při zátěži (v Canvas2D to žere obrovské množství výkonu)
      // Korunka pro aktuálního krále arény (nejvíce HP) â€” jméno odstraněno
      if (isLeader) {
          push();
          let bounce = sin(frameCount * 0.1) * 5;
          let crownY = -p.r * 0.45 - 25 - bounce;
          let cs = Math.max(10, p.r * 0.25);
          fill(255, 215, 0); stroke(180, 140, 0); strokeWeight(2);
          beginShape();
          vertex(-cs, crownY); vertex(-cs * 1.3, -cs * 0.8 + crownY);
          vertex(-cs * 0.5, -cs * 0.4 + crownY); vertex(0, -cs * 1.2 + crownY);
          vertex(cs * 0.5, -cs * 0.4 + crownY); vertex(cs * 1.3, -cs * 0.8 + crownY);
          vertex(cs, crownY);
          endShape(CLOSE);
          fill(255, 50, 50); noStroke();
          ellipse(-cs * 0.5, -cs * 0.25 + crownY, cs * 0.25);
          fill(50, 150, 255);
          ellipse(0, -cs * 0.5 + crownY, cs * 0.3);
          fill(255, 50, 50);
          ellipse(cs * 0.5, -cs * 0.25 + crownY, cs * 0.25);
          pop();
      }
      
      if (isBuffed) {
          push();
          let energyPulse = 1.0 + sin(frameCount * 0.3) * 0.2;
          translate(0, -p.r * 0.08); // Umístění přesně mezi jméno a HP
          scale(energyPulse);
          fill(255, 215, 0); // Zlatá barva pro energii
          stroke(0);
          strokeWeight(Math.max(1, p.r * 0.04));
          let hs = p.r * 0.35; // Mírně zvětšeno pro lepší viditelnost
          beginShape();
          vertex(hs * 0.2, -hs * 0.6);
          vertex(-hs * 0.4, hs * 0.1);
          vertex(-hs * 0.1, hs * 0.1);
          vertex(-hs * 0.3, hs * 0.6);
          vertex(hs * 0.4, -hs * 0.1);
          vertex(hs * 0.1, -hs * 0.1);
          endShape(CLOSE);
          pop();
      }
  }

  let txtCol = color(255);
  if (p.hp > 50000) txtCol = color(100, 255, 100);
  else if (p.hp > 10000) txtCol = color(255, 255, 0);

  if (p.nameAlpha === undefined) p.nameAlpha = 0;
  if (isBuffed) p.nameAlpha = Math.min(255, p.nameAlpha + 15);
  else p.nameAlpha = Math.max(0, p.nameAlpha - 10);

  // --- JMÉNA NA KOULI PŘI LAJKOVÁNÍ ---
  if (!p.isZombie && p.nameAlpha > 0) {
      fill(255, 255, 255, p.nameAlpha); 
      stroke(0, 0, 0, p.nameAlpha); 
      strokeWeight(isExtremeLoad ? 2 : 4);
      textSize(Math.floor(Math.max(12, p.r * 0.22)));
      text(p.name, 0, p.r > 20 ? -p.r * 0.25 : -12);
  }

  stroke(0); strokeWeight(isExtremeLoad ? 4 : 10); // Menší obrys při zátěži
  fill(txtCol); textStyle(BOLD);
  textSize(Math.floor(Math.max(16, p.r * 0.35))); // Zmenšený text HP, aby nezakrýval celý kruh
  text(Math.floor(safeHp).toLocaleString(), 0, p.r > 20 ? p.r * 0.2 : 0); 
  
  if (p.isLegendary) {
      stroke(0); strokeWeight(Math.max(3, p.r * 0.15));
      fill(255, 215, 0);
      textSize(Math.floor(Math.max(10, p.r * 0.22)));
      text("đź‘‘ LEGEND", 0, p.r > 20 ? p.r * 0.65 : 15);
  }

  // --- ÚSPORNÉ INDIKÁTORY DMG A HEAL (Přímo nad HP ďíslem) ---
  let hpY = p.r > 20 ? p.r * 0.2 : 0;
  
  if (p.dmgDisplayTimer > 0) {
      let roundedDmg = Math.round(p.dmgDisplayValue);
      if (roundedDmg > 0) {
          let alpha = map(p.dmgDisplayTimer, 0, 15, 0, 100); // Snížená viditelnost (ze 140 na 100)
          fill(255, 50, 50, alpha); stroke(0, alpha * 0.4); strokeWeight(2); // Jemnější obrys
          textSize(Math.floor(Math.max(14, p.r * 0.35)));
          // Vyskakuje nad HP ďíslo
          let yOff = hpY - 20 - map(45 - p.dmgDisplayTimer, 0, 45, 0, 20);
          text("-" + roundedDmg, 0, yOff);
      }
      p.dmgDisplayTimer--;
      if (p.dmgDisplayTimer === 0) p.dmgDisplayValue = 0;
  }
  if (p.healDisplayTimer > 0) {
      let roundedHeal = Math.round(p.healDisplayValue);
      if (roundedHeal > 0) {
          let alpha = map(p.healDisplayTimer, 0, 15, 0, 200); // Vyšší viditelnost pro zelené HP
          fill(0, 255, 255, alpha); stroke(0, alpha * 0.4); strokeWeight(2);
          textSize(Math.floor(Math.max(14, p.r * 0.35)));
          // Vyskakuje nad HP ďíslo
          let yOff = hpY - 20 - map(45 - p.healDisplayTimer, 0, 45, 0, 20);
          text("+" + roundedHeal, 0, yOff);
      }
      p.healDisplayTimer--;
      if (p.healDisplayTimer === 0) p.healDisplayValue = 0;
  }

  // AFK vizual: led/mraz dovnitr - jen vnitrni bodaky, profilovka zustava cira
  if (p.isFrozen) {
      push();

      // Pouze vnitrni ledove hroty (bodaky) z obvodu DOVNITR
      // Avatar a barva koule zustavaji viditelne (zadny overlay)
      let edgeR = visualR * 0.98; // zacatek hrotů tésně uvnitr obvodu
      let numSpikes = 18;
      colorMode(HSB, 360, 100, 100, 255);
      noStroke();
      for (let i = 0; i < numSpikes; i++) {
          let angle = (TWO_PI / numSpikes) * i + frameCount * 0.003;
          // ruzne delky - deterministicke pres index
          let lenMult = 0.15 + 0.18 * abs(sin(i * 1.9 + 0.8));
          let spikeLen = visualR * lenMult; // hroty smeruji DOVNITR

          let innerX = cos(angle) * (edgeR - spikeLen);
          let innerY = sin(angle) * (edgeR - spikeLen);
          let lX = cos(angle + 0.15) * (edgeR - spikeLen * 0.1);
          let lY = sin(angle + 0.15) * (edgeR - spikeLen * 0.1);
          let rX = cos(angle - 0.15) * (edgeR - spikeLen * 0.1);
          let rY = sin(angle - 0.15) * (edgeR - spikeLen * 0.1);

          let alpha = 180 + sin(frameCount * 0.06 + i * 0.7) * 60;
          fill(200, 55, 100, alpha);
          beginShape();
          vertex(lX, lY);
          vertex(innerX, innerY); // spicka DOVNITR
          vertex(rX, rY);
          endShape(CLOSE);
      }
      colorMode(RGB, 255);

      // Tenky ledovy obrys (ciry, jen jemna linka)
      noFill();
      stroke(190, 235, 255, 120 + sin(frameCount * 0.1) * 30);
      strokeWeight(Math.max(1.5, visualR * 0.04));
      circle(0, 0, visualR * 2.0);

      pop();
  }

  // --- STRIBRNY OBRYS TOP 2 ---
  if (isSecond && !p.isBot) {
      push();
      noFill();
      let silverR = visualR * 1.15 + sin(frameCount * 0.15) * (visualR * 0.04);
      let silverThick = Math.max(2.5, visualR * 0.1);
      strokeWeight(silverThick);
      stroke(200, 200, 220, 200 + sin(frameCount * 0.1) * 55); 
      circle(0, 0, silverR * 2);
      pop();
  }

  // --- BRONZOVY OBRYS TOP 3 ---
  if (isThird && !p.isBot) {
      push();
      noFill();
      let bronzeR = visualR * 1.12 + sin(frameCount * 0.12) * (visualR * 0.03);
      let bronzeThick = Math.max(2, visualR * 0.08);
      strokeWeight(bronzeThick);
      stroke(205, 127, 50, 180 + sin(frameCount * 0.08) * 40);
      circle(0, 0, bronzeR * 2);
      pop();
  }

  // --- DUHOVY OBRYS TOP 1 (vzdy posledni, vzdy viditelny) - BEZ ZELENE ---
  if (isLeader && !p.isBot) {
      push();
      noFill();
      let rainbowR = visualR * 1.18 + sin(frameCount * 0.18) * (visualR * 0.05);
      let rainbowSegs = 36;
      let rainbowThick = Math.max(3, visualR * 0.12);
      strokeWeight(rainbowThick);
      colorMode(HSB, 360, 100, 100, 255);
      for (let i = 0; i < rainbowSegs; i++) {
          let a1 = (TWO_PI / rainbowSegs) * i;
          let a2 = (TWO_PI / rainbowSegs) * (i + 1.3);
          let rawHue = (frameCount * 1.5 + i * (360 / rainbowSegs)) % 360;
          // Preskocit zelene odstiny (hue 70-165 = zelena/zlutozele/tyrkysove)
          let hue = rawHue;
          if (hue >= 70 && hue < 165) {
              hue = (hue + 100) % 360; // Posun mimo zelenou oblast
          }
          stroke(hue, 90, 100, 240);
          arc(0, 0, rainbowR * 2, rainbowR * 2, a1, a2);
      }
      colorMode(RGB, 255);
      pop();
  }

  // ==========================================
  // VIZUÁLNÍ EFEKTY AKCÍ (Dárky a Hádanky)
  // ==========================================

  // 1. EFEKT UHODNUTÉ HÁDANKY (200 IQ Žárovka)
  if (p.riddleVisualTimer > 0) {
      push();
      let popScale = map(p.riddleVisualTimer, 180, 0, 1.5, 0); // Zmenšování v čase
      let bounceY = sin(frameCount * 0.2) * 15; // Skákání nahoru a dolů
      
      translate(0, -visualR * 1.8 + bounceY); // Umístění NAD kuličku
      scale(popScale);
      
      // Zářivá aura pod emoji
      drawingContext.shadowColor = 'rgba(255, 255, 0, 1)';
      drawingContext.shadowBlur = 20;
      
      textAlign(CENTER, CENTER);
      textSize(visualR * 1.2); 
      text('💡', 0, 0); 
      
      drawingContext.shadowBlur = 0;
      
      // Text 200 IQ
      fill(255, 255, 0);
      stroke(0);
      strokeWeight(3);
      textSize(visualR * 0.5);
      text('200 IQ!', 0, -visualR * 0.8);
      
      pop();
      p.riddleVisualTimer--;
  }

  // 2. EFEKT DÁRKU / RŮŽE (Rotující exploze ikony)
  if (p.giftVisualTimer > 0) {
      push();
      let pulseScale = 1 + sin(frameCount * 0.3) * 0.5;
      let rot = frameCount * 0.1;
      
      rotate(rot);
      scale(pulseScale);
      
      let alpha = map(p.giftVisualTimer, 120, 0, 255, 0);
      
      textAlign(CENTER, CENTER);
      textSize(visualR * 1.8);
      
      drawingContext.globalAlpha = alpha / 255;
      text(p.giftVisualEmoji || '🎁', 0, 0);
      drawingContext.globalAlpha = 1.0; 
      
      pop();
      p.giftVisualTimer--;
  }
  // ==========================================

  noStroke(); pop();
}

function createParticles(x, y, c, count, type = 'CIRCLE') {
  if (players.length > 80) return; 
  let actualCount = count;
  if (players.length > 60) {
      actualCount = Math.max(1, Math.floor(count * 0.3));
  } else if (players.length > 40) {
      actualCount = Math.max(1, Math.floor(count / 2));
  }
  for(let i=0; i<actualCount; i++) {
      let pSize = (type === 'HEART' || type === 'ENERGY') ? random(8, 16) : random(4, 10);
      let p = null;
      for (let j = 0; j < particles.length; j++) {
          if (!particles[j].active) { p = particles[j]; break; }
      }
      if (p) {
          p.active = true; p.x = x; p.y = y; p.vx = random(-6,6); p.vy = random(-6,6);
          p.life = 255; p.c = c; p.size = pSize; p.type = type;
      } else if (particles.length < 500) { // Limit bazénu na 500 ďástic
          particles.push({active: true, x: x, y: y, vx: random(-6,6), vy: random(-6,6), life: 255, c: c, size: pSize, type: type});
      }
  }
}

function drawParticles() {
  noStroke();
  
  for(let i=0; i<particles.length; i++) {
    let p = particles[i];
    if (!p.active) continue;
    
    // Částice se už nekreslí s drahým neonovým stínem, ale s ďistou barvou
    fill(red(p.c), green(p.c), blue(p.c), p.life);
        
        if (p.type === 'HEART') {
            imageMode(CENTER);
            tint(red(p.c), green(p.c), blue(p.c), p.life);
            image(cachedHeart, p.x, p.y, p.size * 2.5, p.size * 2.5);
            noTint();
        } else if (p.type === 'ENERGY') {
            imageMode(CENTER);
            tint(red(p.c), green(p.c), blue(p.c), p.life);
            image(cachedEnergy, p.x, p.y, p.size * 2.5, p.size * 2.5);
            noTint();
        } else {
            ellipse(p.x, p.y, p.size);
        }
        
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95; 
    p.size *= 0.98; 
    p.life -= 15; 
    
    if(p.life <= 0) p.active = false; // Neodstranit, pouze deaktivovat (Object Pooling)
  }
}

function addPopup(txt, x, y, c, isCrit = false) {
  let f = null;
  for (let i = 0; i < floatingTexts.length; i++) {
      if (!floatingTexts[i].active) { f = floatingTexts[i]; break; }
  }
  if (f) {
      f.active = true; f.txt = txt; f.x = x; f.y = y; f.life = 255; f.c = c; f.vy = -1.5; f.isCrit = isCrit; f.scale = 0.1;
  } else if (floatingTexts.length < 200) { // Limit bazénu na 200 textů
      floatingTexts.push({active: true, txt: txt, x: x, y: y, life: 255, c: c, vy: -1.5, isCrit: isCrit, scale: 0.1});
  }
}

function drawPopups() {
  for(let i=0; i<floatingTexts.length; i++) {
    let f = floatingTexts[i];
    if (!f.active) continue;
    
    f.scale = lerp(f.scale, 1.0, 0.2); 
    push(); translate(f.x, f.y); scale(f.scale);
    // Vypnuto stínování pro obrovský nárůst FPS
    if (f.isCrit) {
        stroke(0); strokeWeight(4); fill(255, 215, 0, f.life); textSize(22 + sin(f.life * 0.1) * 4); textAlign(CENTER); textStyle(BOLD);
            let critText = f.txt; 
            text(critText, 0, 0); f.y += f.vy - 0.5; f.life -= 8;
    } else {
        stroke(0); strokeWeight(3); fill(red(f.c), green(f.c), blue(f.c), f.life); textSize(16); textAlign(CENTER); textStyle(BOLD);
        text(f.txt, 0, 0); f.y += f.vy; f.life -= 8;
    }
    pop();
    
    if (f.life <= 0) f.active = false; // Deaktivovat místo mazání (Object Pooling)
  }
  drawingContext.shadowBlur = 0; textStyle(NORMAL);
}

function triggerRandomEvent() {
  if (random() < 0.5 && players.length > 0) {
      activeEvent = "BOUNTY";
      let p = random(players);
      bountyTarget = p.name;
      p.isBounty = true;
      eventTimer = 1800; // 30 sec (při 60 FPS)
      let msg = currentLang === "CZ" ? `Vypsána odměna na hráďe ${bountyTarget}! Zniďte ho!` : `Bounty placed on ${bountyTarget}! Destroy them!`;
      speakTTS(msg, true);
      addPopup("BOUNTY TARGET!", p.body.position.x, p.body.position.y - p.r - 20, color(255, 50, 50), true);

  } else {
      activeEvent = "MAGNET";
      eventTimer = 900; // 15 sec (při 60 FPS)

      speakTTS(msg, true);
      addPopup("MAGNET ACTIVATED!", W/2, (ARENA_TOP+ARENA_BOT)/2, color(150, 50, 255), true);

}

function updateTimers() {
  if (frameCount % 300 === 0) {
      saveLeaderboards();
  }
  // --- ANTI-DUPLIKÁT SYSTÉM (Každých 10 vteřin / 600 framů) ---
  if (frameCount % 600 === 0) {
      let nameGroups = {};
      
      // Roztřídíme živé hráďe podle jména
      for (let p of players) {
          if (!p.isZombie) {
              if (!nameGroups[p.name]) nameGroups[p.name] = [];
              nameGroups[p.name].push(p);
          }
      }

      // Projdeme skupiny a smažeme slabší duplikáty
      for (let name in nameGroups) {
          let group = nameGroups[name];
          if (group.length > 1) {
              // Seřadíme podle HP sestupně (největší si necháme na indexu 0)
              group.sort((a, b) => b.hp - a.hp);
              
              // Všechny ostatní tiše vymažeme
              for (let j = 1; j < group.length; j++) {
                  let dup = group[j];
                  
                  // Tichý vizuální fade-out (jen se rozplyne)
                  if (dup.body) {
                      createParticles(dup.body.position.x, dup.body.position.y, dup.color, 10);
                      Matter.World.remove(world, dup.body);
                  }
                  
                  // Odstranění z pole hráďů
                  let idx = players.indexOf(dup);
                  if (idx > -1) players.splice(idx, 1);
              }
          }
      }
  }
  // -------------------------------------------------------------

  if (frameCount % 60 === 0) {
      currentTop10 = [...players].sort((a,b) => b.hp - a.hp).slice(0, 10).map(p => p.name);
  }

  for (let p of players) {
      // 1. Odeďet imunity
      if (p.immunityTimer > 0) {
          p.immunityTimer--;
          if (p.immunityTimer <= 0) {
              safePlaySound(pentatonic('mid'), 0.05, 0.4);
              createParticles(p.body.position.x, p.body.position.y, color(0, 255, 255), 40);
              p.hasCrown = false; 
          }
      }
      
      // 2. Odečet Bot Crusher bonusu
      if (p.botDmgTimer > 0) p.botDmgTimer--;
      
  }
  
  if (gameState === "PLAYING") {
      if (activeEvent) {
          eventTimer--;
          if (eventTimer <= 0) {
              if (activeEvent === "BOUNTY" && bountyTarget) {
                  let bp = players.find(p => p.name === bountyTarget);
                  if (bp) bp.isBounty = false;
              }
              activeEvent = null;
              bountyTarget = null;
              nextEventTime = millis() + random(60000, 150000);
          } else if (activeEvent === "BOUNTY" && bountyTarget) {
              let bp = players.find(p => p.name === bountyTarget);
              if (bp && bp.body) {
                  for (let p of players) {
                      if (!p.body || p === bp) continue;
                      let dx = bp.body.position.x - p.body.position.x;
                      let dy = bp.body.position.y - p.body.position.y;
                      let distSq = dx*dx + dy*dy;
                      let dist = Math.sqrt(distSq) || 1;
                      let forceMag = 0.0001 * p.body.mass;
                      Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
                  }
              }
          } else if (activeEvent === "MAGNET") {
              let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
              for (let p of players) {
                  if (!p.body) continue;
                  let dx = cx - p.body.position.x;
                  let dy = cy - p.body.position.y;
                  let distSq = dx*dx + dy*dy;
                  let dist = Math.sqrt(distSq) || 1;
                  
                  // Vizuální vylepšení a ochrana: Černá díra hráďe roztáďí do víru, ne jen natvrdo do středu
                  let pullForce = 0.00012 * p.body.mass; // Oslabený tah přímo do středu
                  let swirlForce = 0.00035 * p.body.mass; // Silná rotace kolem dokola tvořící vír
                  
                  let fx = (dx/dist)*pullForce - (dy/dist)*swirlForce;
                  let fy = (dy/dist)*pullForce + (dx/dist)*swirlForce;
                  Matter.Body.applyForce(p.body, p.body.position, { x: fx, y: fy });

                  // SMRTÍCÍ EFEKT PRO GIGANTY V ČERNÉ DÍŘE
                  if (frameCount % 30 === 0 && p.hp > 3000 && distSq < 35000) { // Zvětšen radius, protože vír je drží dál
                      let shred = Math.floor(p.hp * 0.15); // Ustřihne jim to 15 %!
                      p.hp -= shred;
                      addPopup("SHREDDED!", p.body.position.x, p.body.position.y, color(255, 0, 0), true);
                      createParticles(p.body.position.x, p.body.position.y, color(150, 0, 255), 20);
                      screenShake = 5;
                      safePlaySound(pentatonic('low'), 0.03, 0.6);
                  }
              }
          }
      // ZAKÁZÁNO: Náhodné události bez interakce
      // } else if (millis() > nextEventTime && players.length > 2) {
      //     triggerRandomEvent();
      }
  }

  if (gameState === "PLAYING" && roundTimerFrames > 0) {
    if (roundTimerPause > 0) {
        roundTimerPause--; // Pokud se spamuje na startu, odpoďet ďeká
    } else {
        roundTimerFrames--;
    }
    
    // ZAKÁZÁNO: Náhodné spawnování bonusových orbů
    // if (bonusFrames.includes(roundTimerFrames)) { shootBonusFromShip(); }
    
    if (frameCount % 60 === 0) roundTimer = Math.ceil(roundTimerFrames / 60);

    if (roundTimerFrames <= 0) {
        gameState = "EXPLODING"; explosionTimer = 90; screenShake = 40; 
        codeActive = false; // Zruší probíhající hádání kódu
        
        safePlaySound(pentatonic('low'), 0.12, 1.0); setTimeout(() => { safePlaySound(pentatonic('low'), 0.10, 1.2); }, 200);
        
        let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
        deathShockwaves.push({x: cx, y: cy, r: 80, color: color(0, 255, 255), life: 255, isNuke: true});
        deathShockwaves.push({x: cx, y: cy, r: 150, color: color(255, 100, 0), life: 255, isNuke: true});
        createParticles(cx, cy, color(0, 255, 255), 100); 
        createParticles(cx, cy, color(255, 100, 0), 100);

        // Epický zpomalený odhoz všech hráďů do stran
        for (let p of players) {
            if (!p.body) continue;
            let dx = p.body.position.x - cx; let dy = p.body.position.y - cy; let dist = Math.sqrt(dx*dx + dy*dy) || 1;
            let forceMag = 0.2 * p.body.mass; // Masivní odhazovací síla
            Matter.Body.applyForce(p.body, p.body.position, { x: (dx/dist)*forceMag, y: (dy/dist)*forceMag });
        }
        
        engine.timing.timeScale = 0.2; // Slow-mo pro epický závěr
    }
  } else if (gameState === "EXPLODING") {
      explosionTimer--; screenShake *= 0.95;
      if (explosionTimer <= 0) { 
          gameState = "RESULTS"; 
          let donorCount = Object.keys(roundGifts).length;
          maxResultsTimer = 5;
          resultsTimer = 5; 
          winnerAnnounced = false;
      } 
  }
  
  // ZPRACOVÁNÍ NASTŘÁDANÝCH LAJKŮ (Ochrana výkonu)
  let nowTime = millis();
  for (let u in pendingLikes) {
      let data = pendingLikes[u];
      
      // Dynamický limit: ďím víc lidí, tím víc lajků je potřeba na efekt
      let reqLikes = players.length > 30 ? 100 : 50; 
      let timeLimit = players.length > 30 ? 2000 : 1000;

      // Odpal až při splnění dynamického limitu
      if (data.count >= reqLikes || (data.count > 0 && nowTime - data.lastUpdate > timeLimit)) {
          let amount = data.count;
          let isMega = amount >= reqLikes;

          let p = players.find(x => x.name === u);
          if (p) {
              p.likeBuffTimer = Math.max(p.likeBuffTimer || 0, millis() + 5000);
              if (players.length < 50) {
                  addPopup("+" + (amount * 2), p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
                  // Méně ďástic = méně lagů, typ ENERGY
                  createParticles(p.body.position.x, p.body.position.y, color(255, 215, 0), isMega ? 8 : 3, 'ENERGY');
              }
              
              let activeLikers = players.filter(pl => pl.likeBuffTimer && pl.likeBuffTimer > millis());
              let myIdx = activeLikers.findIndex(pl => pl.name === u);
              let harmonyShift = Math.max(0, myIdx); // Každý hráč dostane svůj vlastní tón v harmonii!
              
              let baseIdx = (p.hp >= 200) ? floor(random(0, 5)) : floor(random(3, 10));
              let vol = (p.hp >= 200) ? 0.004 : 0.008;
              
              let newIdx = baseIdx + harmonyShift;
              let octaves = Math.floor(newIdx / 5);
              let noteInOctave = newIdx % 5;
              let baseNotes = [261.63, 293.66, 329.63, 392.00, 440.00];
              let finalFreq = baseNotes[noteInOctave] * Math.pow(2, octaves);
              
              safePlaySound(finalFreq, vol, 0.1);
          }

          if (amount >= 5) {
              let existingNotif = notifications.find(n => n.type === 'LIKE' && n.name === u && (n.state === 'WAITING' || n.state === 'DISPLAY'));
              if (existingNotif) {
                  existingNotif.extra += amount;
                  existingNotif.age = 0; // Reset věku pro setrvání na obrazovce
                  if (existingNotif.extra >= 50) existingNotif.isMegaLike = true;
              } else {
                  addNotification('LIKE', u, userAvatars[u], amount, isMega);
              }
          }
          data.count = 0; 
      }
  }

  // ZOMBIE COOLDOWN (Vystřelení po 20 vteřinách)
  let alivePlayersCount = players.filter(p => !p.isZombie).length;
  let activeZombiesCount = players.filter(p => p.isZombie).length;

  for (let i = deadPlayersQueue.length - 1; i >= 0; i--) {
      if (millis() - deadPlayersQueue[i].timeOfDeath > deadPlayersQueue[i].respawnDelay) {
          let zName = deadPlayersQueue[i].name;
          // Pokud hráď náhodou už nehraje (např. nedal hned !join)
            if (!players.find(x => x.name === zName)) {
              if (alivePlayersCount < 25 && activeZombiesCount < 15) {
                      spawnPlayer(zName, 50, false, 0, true); // true = isZombie, menší HP
                  activeZombiesCount++;
                  deadPlayersQueue.splice(i, 1);
                          break; // PŘIDÁNO: Zastaví cyklus. Další mrtvý se spawne až v dalším framu!
              } else {
                  // Pokud je na ploše už dost hráďů, odložíme spawn tohoto zombíka o 5 vteřin
                  deadPlayersQueue[i].timeOfDeath += 5000;
              }
          } else {
              // Hráď se už připojil jako živý, mažeme z fronty mrtvých
              deadPlayersQueue.splice(i, 1);
          }
      }
  }
}

  pop();
  
  textAlign(CENTER, CENTER);
  
  // --- TITUL ---
  // drawingContext.shadowBlur = 25;

  text(T[currentLang].ROUND_END, W/2, ARENA_TOP + 50);

              fill(rankCol); noStroke(); ellipse(ax, ry, 28);

      pop();

function draw() {
  // Ambientní plynulá změna barvy celé arény (za 1 minutu se hue posune o 180 stupňů)
  colorMode(HSB, 360, 100, 100, 1);
  let currentHue = (millis() * 0.003) % 360; 
  
  roundThemeColor = color(currentHue, 80, 100);
  roundThemeColorDark = color(currentHue, 80, 40, 0.5);
  
  let dynamicBg = color(currentHue, 45, 8); 
  colorMode(RGB, 255);
  
  // --- SMART BOT FILLER (Boti doplňují arénu pro "šťavnatý" pocit) ---
  let realPlayersCount = players.filter(p => !p.isBot && !p.isZombie).length;
  let botCount = players.filter(p => p.isBot).length;
  let totalAlive = realPlayersCount + botCount;

  // 1. Neustálé doplňování: Udržujeme vždy kolem 100 cílů
  let targetTotal = MAX_IDLE_BOTS;
  let isAnyBotCrusherActive = players.some(p => p.botDmgTimer > 0);

  if (totalAlive < targetTotal) {
      if (millis() > nextBotSpawnTime) {
          spawnIdleBot();
          // Pokud je aktivní Bot Crusher bonus, boti se spawnují výrazně pomaleji (3.5 - 5.2s)
          let minInt = isAnyBotCrusherActive ? 3500 : 1000;
          let maxInt = isAnyBotCrusherActive ? 5250 : (totalAlive < 50 ? 2000 : 3000);
          nextBotSpawnTime = millis() + random(minInt, maxInt);
      }
  }

  // 2. Postupné mizení: Pouze pokud celkový poďet výrazně překroďí limit nebo je v aréně hromada lidí (50+)
  if (realPlayersCount > 50 && botCount > 20) {
      if (frameCount % 60 === 0) { // 1x za vteřinu uvolnit místo pro reálné lidi
          let botToKill = players.find(p => p.isBot);
          if (botToKill) botToKill.hp = 0;
      }
  } else if (totalAlive > targetTotal + 10 && botCount > 0) {
      if (frameCount % 120 === 0) { // Pomalejší ďistění nadbyteďných botů nad limit
          let botToKill = players.find(p => p.isBot);
          if (botToKill) botToKill.hp = 0;
      }
  }
  
  // --- ČISTÝ CHROMA KEY PRO DAYZ POZADÍ ---
  background(0, 255, 0); // Dokonale ďistá zelená pro OBS klíďování

  // --- POZADÍ ARÉNY ODSTRANčNO PRO CHROMA KEY ---
  handleBossPlanet(); // PŘIDÁNO: Zpracování a vykreslení Ego Smash planet

  // --- GALAXINKO WARS PULSUJÍCÍ NÁPIS NA POZADÍ ARÉNY ---
  // --- TITUL NA POZADÍ ODSTRANčNO ---

  // --- PRSTENEC ARÉNY ODSTRANčNO ---

  drawTopHUD();

  // --- TOP GIFTER DOČASNÁ LIŠTA ---
  if (topGifterBannerTimer > 0) {
      topGifterBannerTimer--;
      
      push();
      // CHROMA KEY pozadí - plně zelené pro průhlednost v OBS
      fill(0, 255, 0);
      noStroke();
      rect(0, ARENA_BOT, W, H - ARENA_BOT);

      let barH = 44;
      let barX = 40; 
      let barY = ARENA_BOT + 12; 

      // Vizuál luxusní lišty (nenápadnější, cyberpunk styl)
      fill(15, 10, 5, 200); 
      stroke(255, 215, 0, 180); 
      strokeWeight(2);
      
      beginShape();
      vertex(barX + 15, barY);
      vertex(barX + barW, barY);
      vertex(barX + barW - 15, barY + barH);
      vertex(barX, barY + barH);
      endShape(CLOSE);

      textAlign(LEFT, CENTER); textSize(16); textStyle(BOLD);
      
      // Pulzující nápis
      if (frameCount % 30 < 15) fill(255, 100, 100); else fill(255, 215, 0);
      text("đź‘‘ TOP SPONSOR:", barX + 30, barY + barH / 2);
      
      fill(255); textAlign(RIGHT, CENTER);
      text(topGifter.name + " (" + topGifter.coins + " đź’Ž)", barX + barW - 30, barY + barH / 2);
      pop();
  } else {
      drawNotifications(); 
  }

  drawChatCommands();

  if (gameState === "PLAYING") drawSpaceshipTimer();

  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.rect(0, ARENA_TOP, W, ARENA_BOT - ARENA_TOP);
  drawingContext.clip();

  // Temné pozadí při Slow-mo Nuke efektu
  if (nukeEffectTimer > 0) {
      nukeEffectTimer--;
      let alpha = constrain(map(nukeEffectTimer, 120, 0, 220, 0), 0, 220);
      fill(0, 0, 0, alpha);
      rect(-W, -H, W * 3, H * 3);
      if (nukeEffectTimer <= 0) engine.timing.timeScale = 1.0;
  }

  // ARMAGEDDON EFEKT (Červená Aréna)
  if (arenaRedTimer > 0) {
      arenaRedTimer--;
      push();
      fill(255, 0, 0, 80);
      rect(-W, -H, W * 3, H * 3); 
      pop();
  }

  // Ztemnění arény na konci kola (posledních 10 vteřin)
  if (gameState === "PLAYING" && roundTimerFrames <= 600 && roundTimerFrames > 0) {
      let darkenAlpha = map(roundTimerFrames, 600, 0, 0, 180);
      push();
      fill(0, 0, 5, darkenAlpha);
      rect(-W, -H, W * 3, H * 3);
      pop();
  }

  // FYZIKA JE NYNÍ žÍZENA EXTERNÍM MATTER.RUNNEREM (Konec cukaní)
  
  processCombatQueue();

  if (gameState === "PLAYING" || gameState === "EXPLODING" || gameState === "RESULTS") {
        handleSecretCode();
        handleRoundStartQueue(); // PžIDÁNO: Postupné spawnování na startu
        handleCameraAndPlayers(); 
        handleSpawnModules();
    
    // Plynulé doznívání třesu obrazovky
    if (screenShake > 0) {
        screenShake *= 0.9;
        if (screenShake < 0.5) screenShake = 0;
    }
    
    push();
    translate(W/2, (ARENA_TOP + ARENA_BOT)/2);
    scale(cameraScale);
    if (screenShake > 0) {
        translate(random(-screenShake, screenShake), random(-screenShake, screenShake));
    }
    translate(-W/2, -(ARENA_TOP + ARENA_BOT)/2);
    
    if(players.length < 150) { drawDeathShockwaves(); }
    if(players.length < 150) { drawLightnings(); }
    
    if (gameState === "PLAYING" && activeEvent === "MAGNET") {
        let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
        push(); translate(cx, cy); rotate(frameCount * 0.1); noStroke();
        let pulse = sin(frameCount * 0.2) * 20;
        fill(20, 0, 40, 150); ellipse(0, 0, 200 + pulse);
        fill(10, 0, 20, 200); ellipse(0, 0, 120 + pulse);
        fill(0); ellipse(0, 0, 60);
        stroke(100, 50, 255, 150); strokeWeight(4);
        for(let i=0; i<4; i++) {
            let a = i * HALF_PI;
            arc(0, 0, 100 + pulse, 100 + pulse, a, a + QUARTER_PI);
        }
        pop();
    }

    if (gameState === "PLAYING") {
        handleOrbs();
    }
    
    let sortedToDraw = [...players].sort((a, b) => {
        let aActive = ((a.likeBuffTimer && millis() < a.likeBuffTimer) || a.giftSpeedTimer > 0) ? 1 : 0;
        let bActive = ((b.likeBuffTimer && millis() < b.likeBuffTimer) || b.giftSpeedTimer > 0) ? 1 : 0;
        if (aActive !== bActive) return aActive - bActive;
        return a.r - b.r;
    });
    // ==========================================
    // 5. VYKRESLENÍ HRÁČŮ A VIP SPOTLIGHT EFEKT
    // ==========================================
    let vips = [];
    let others = [];

    // Rozdělení hráčů (zachováme pořadí vykreslování pro obyčejné hráče)
    for (let p of sortedToDraw) {
        if (p.vipTimer > 0) {
            vips.push(p);
            p.vipTimer--; // Odpočet slávy
        } else {
            others.push(p);
        }
    }

    // 1. Vykreslíme obyčejné hráče a AFK kostky (budou v pozadí)
    for (let p of others) {
        drawPlayer(p);
    }

    // 2. Pokud je někdo VIP, zatmíme arénu a nasvítíme ho
    if (vips.length > 0) {
        // Zjistíme, kdo má nejdelší čas, abychom udělali plynulý fade
        let maxTimer = Math.max(...vips.map(p => p.vipTimer));
        
        let darkAlpha = 0;
        // Plynulý náběh tmy (zabrání bliknutí jako stroboskop)
        if (maxTimer > 270) darkAlpha = map(maxTimer, 300, 270, 0, 180, true); 
        // Plynulý odjezd tmy
        else if (maxTimer < 30) darkAlpha = map(maxTimer, 30, 0, 180, 0, true); 
        // Plná tma
        else darkAlpha = 180; 

        // Zatáhneme oponu přes celou herní plochu (ale pod UIčkem)
        push();
        rectMode(CORNER);
        fill(0, 0, 15, darkAlpha); // Temně modro-černá
        noStroke();
        rect(0, 0, W, H); 
        pop();

        // 3. Vykreslíme VIP hráče na úplný vršek (Main Character Mode)
        for (let p of vips) {
            let pos = p.body.position;
            let r = p.body.circleRadius;

            push();
            translate(pos.x, pos.y);
            
            // Zlatá "Božská" záře rozrážející tmu
            drawingContext.shadowColor = `rgba(255, 215, 0, ${darkAlpha / 255})`;
            drawingContext.shadowBlur = 50;
            fill(255, 215, 0, darkAlpha * 0.15);
            noStroke();
            circle(0, 0, r * 7); // Velký osvětlený flek pod hráčem
            
            // Bílý střed záře
            drawingContext.shadowBlur = 20;
            fill(255, 255, 255, darkAlpha * 0.3);
            circle(0, 0, r * 4);
            
            drawingContext.shadowBlur = 0;
            pop();

            // A konečně nakreslíme samotného hráče hezky ostře a jasně
            drawPlayer(p);
        }
    }
    
    // Aktualizace zvuku cirkulárky (jemný hukot při lajkování a cinkání)
    let activeLikersCount = players.filter(p => p.likeBuffTimer && millis() < p.likeBuffTimer).length;
    updateSawHum(activeLikersCount);
    
    if (particles.length > 80) particles.splice(0, particles.length - 80);
    if (floatingTexts.length > 25) floatingTexts.splice(0, floatingTexts.length - 25);
    
    drawParticles();
    drawPopups();
    pop();

    if (gameState !== "RESULTS") {
        updateTimers();
        if (gameState === "PLAYING") handleTTSCommentary();
    }
  } 
  
  if (gameState === "RESULTS") {
    drawResults();
  }
  
  drawingContext.restore(); 

  if (gameState === "PLAYING") {
      if (showFomoBar) {
        // --- FOMO PROGRESS BAR (Ukazatel cíle nahoře v aréně) ---
        push();
        let progress = constrain(roundTotalCoins / ARMAGEDDON_GOAL, 0, 1);
        let minPbW = 350;
        let maxPbW = W * 0.85;
        let pbW = lerp(minPbW, maxPbW, progress); // Šířka postupně roste
        let pbH = 36; // Trochu vyšší pro profilovku
        let pbX = W / 2 - pbW / 2;
        let pbY = ARENA_TOP + 15; // Umístění těsně pod horní okraj arény

        // Pulzování lišty, pokud se dlouho nic nestalo
        let pbAlpha = 255;
        if (millis() - lastEnergyAddedTime > 5000) {
            pbAlpha = map(sin(frameCount * 0.03), -1, 1, 100, 255);
        }

        // Temné pozadí baru
        fill(0, pbAlpha * 0.6);
        stroke(red(roundThemeColor), green(roundThemeColor), blue(roundThemeColor), pbAlpha); // Rámeďek podle barvy arény
        strokeWeight(2);
        rect(pbX, pbY, pbW, pbH, 18);

        // Výplň baru (Zlatá barva místo blikající duhové)
        let goldCol = color(255, 215, 0, pbAlpha * 0.8);
        fill(goldCol);
        noStroke();
        rect(pbX + 2, pbY + 2, (pbW - 4) * progress, pbH - 4, 16);

        // Řízení fade efektu pro posledního donátora
        if (nextLastGifter) {
            gifterFadeAlpha -= 15;
            if (gifterFadeAlpha <= 0) {
                currentLastGifter = nextLastGifter;
                nextLastGifter = null;
            }
        } else if (gifterFadeAlpha < 255) {
            gifterFadeAlpha += 15;
        }
        gifterFadeAlpha = constrain(gifterFadeAlpha, 0, 255);

        // Vykreslení posledního donátora (ikona a jméno)
        if (currentLastGifter.name !== "") {
            let avatarPulse = sin(frameCount * 0.1) * 3;
            let avSize = 24 + avatarPulse;
            let avX = pbX + 25;
            let avY = pbY + pbH / 2;

            push();
            tint(255, (gifterFadeAlpha / 255) * pbAlpha);
            if (currentLastGifter.img && currentLastGifter.img !== "loaded") {
                imageMode(CENTER);
                image(currentLastGifter.img, avX, avY, avSize, avSize);
            } else {
                fill(100, (gifterFadeAlpha / 255) * pbAlpha);
                ellipse(avX, avY, avSize, avSize);
            }
            noFill();
            stroke(255, 215, 0, (gifterFadeAlpha / 255) * pbAlpha);
            strokeWeight(2);
            ellipse(avX, avY, avSize, avSize);
            
            noStroke();
            fill(255, 255, 255, (gifterFadeAlpha / 255) * pbAlpha);
            textAlign(LEFT, CENTER);
            textSize(10);
            let shortName = currentLastGifter.name.length > 8 ? currentLastGifter.name.substring(0, 8) + "." : currentLastGifter.name;
            text(`${shortName} +${currentLastGifter.coins}`, avX + 15 + avatarPulse/2, avY);
            pop();
        }

        // Animovaný text uvnitř (uprostřed)
        fill(255, 255, 255, pbAlpha);
        textAlign(CENTER, CENTER);
        textSize(12);
        textStyle(BOLD);
        
        let coinsLeft = ARMAGEDDON_GOAL - roundTotalCoins;
        if (coinsLeft > 0) {
            // Zvýraznění, když zbývá málo (pod 20%)
            if (progress > 0.8 && frameCount % 20 < 10) {
                fill(255, 255, 0, pbAlpha); // Bliká žlutě!
                textSize(14);
            }
        let txt = currentLang === "CZ" ? `đźŚą KAPACITA JÁDRA: ${roundTotalCoins} / ${ARMAGEDDON_GOAL} đźŚą` : `đźŚą CORE CAPACITY: ${roundTotalCoins} / ${ARMAGEDDON_GOAL} đźŚą`;
            text(txt, W / 2, pbY + pbH / 2);
        } else {
            // Armageddon je plný
            if (frameCount % 10 < 5) fill(255, 0, 0, pbAlpha); // Agresivní blikání
            textSize(15);
            let txt2 = currentLang === "CZ" ? "đźš¨ ARMAGEDON AKTIVNÍ! đźš¨" : "đźš¨ ARMAGEDDON ACTIVE! đźš¨";
            text(txt2, W / 2, pbY + pbH / 2);
        }
        pop();
      }
  }

  if (megaAnnouncement && megaAnnouncement.life > 0) {
      push();
      translate(W/2, (ARENA_TOP + ARENA_BOT)/2);
      megaAnnouncement.scale = lerp(megaAnnouncement.scale, 1.2, 0.05);
      scale(megaAnnouncement.scale);
      textAlign(CENTER, CENTER);
      textStyle(BOLD);
      // drawingContext.shadowBlur = 30;
      drawingContext.shadowColor = megaAnnouncement.color;
      stroke(0);
      strokeWeight(6);
      fill(red(megaAnnouncement.color), green(megaAnnouncement.color), blue(megaAnnouncement.color), megaAnnouncement.life);
      textSize(40);
      text(megaAnnouncement.text, 0, 0);
      pop();
      megaAnnouncement.life -= 2.5;
  }

  if (gameState === "PLAYING") {
      drawSecretCodeUI();
  }
  
  // SKRYTÁ ANTI-BAN "MOUCHA" (Létající pixel rozbíjející statické zóny na celé ploše)
  fill((frameCount * 5) % 255, (frameCount * 7) % 255, (frameCount * 11) % 255);
  noStroke();
  let flyX = (noise(frameCount * 0.03) * W * 2) % W;
  let flyY = (noise(frameCount * 0.03 + 1000) * H * 2) % H;
  rect(flyX, flyY, 2, 2);
}

    try {

      let n = d?.data?.nickname || d?.nickname || d?.data?.uniqueId || d?.uniqueId || "Anonym";

              g.clear();
              g.noStroke();
              g.fill(255);
              g.circle(50, 50, 100);
              g.drawingContext.globalCompositeOperation = 'source-in';
              g.image(img, 0, 0, 100, 100);
              userAvatars[u] = g;

      if (evt === "follow") {
          playFollowSound();
          addNotification('FOLLOW', u, userAvatars[u]);

          removePlayerCompletely(u);
          return;
      }
      
      if (!players.find(x => x.name === u) && evt !== "gift") {
          spawnPlayer(u, getStartingHp(u));

      if (evt === "chat") {

              addNotification('BOOST', u, userAvatars[u], "REPOST"); 
          }
          else if (!p && (msgLower === "!join" || msgLower === "join")) {
              handleAction(u, 100, false, 0, true);

              let cleanU = cleanNameForTTS(u);

          }
          else if (p && (msgLower === "!join" || msgLower === "join")) {

          roundGifts[u].score += diam;

              if (giftThrottle[u].count >= 5 && millis() - giftThrottle[u].lastTTS > 8000) {
                  let comboMsgsCZ = ["Díky za nálož, " + cleanU + "!", "Páni, " + cleanU + " to tam sype!", "Skvělá série, " + cleanU + "!"];

              }
          }
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function removeDiacritics(text) {
    return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

let zenskyHlas = null;

function nactiHlasy() {
    if (!('speechSynthesis' in window)) return;
    let voices = window.speechSynthesis.getVoices();
    // Priorita: Vlasta (Windows), pak Google ďeština (Chrome), pak jakákoliv ďeština
    zenskyHlas = voices.find(v => v.name.toLowerCase().includes('vlasta')) || 
                 voices.find(v => v.name.includes('Google') && v.lang.includes('cs')) ||
                 voices.find(v => v.lang.includes('cs'));
}

if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = nactiHlasy;
}
nactiHlasy();

function speakTTS(txt, force = false) {
  if (!('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();

  if (!force && millis() - lastSpeakTime < 12000) return;

  // Agresivní odstranění emoji a speciálních znaků
  let cleanTxt = txt
      .replace(/[\u{0080}-\u{00FF}]/gu, '') // Latin extended chars that TTS reads weirdly
      .replace(/[\u{1F000}-\u{1FFFF}]/gu, '') // Emoticons, symbols, flags
      .replace(/[\u{2600}-\u{27BF}]/gu, '') // Misc symbols, dingbats
      .replace(/[\u{FE00}-\u{FEFF}]/gu, '') // Variation selectors
      .replace(/[\u{200B}-\u{200F}\u{2028}-\u{202F}\u{2060}-\u{206F}]/gu, '') // Zero-width, invisible
      .replace(/[\u{E000}-\u{F8FF}]/gu, '') // Private use area
      .replace(/[\u{10000}-\u{10FFFF}]/gu, '') // Supplementary planes (emoji, rare symbols)
      .replace(/[^\p{L}\p{N}\s.,!?:+\-()]/gu, '') // Keep only letters, numbers, basic punctuation
      .replace(/\s+/g, ' ').trim();
  if (cleanTxt.length > 80) cleanTxt = cleanTxt.substring(0, 80);
  
  let checkText = removeDiacritics(cleanTxt.toLowerCase()).replace(/[\s\.\-_]/g, "");
  for (let word of FORBIDDEN_WORDS) {
      if (checkText.includes(word)) return;
  }

  var msg = new SpeechSynthesisUtterance(cleanTxt);
  msg.lang = 'cs-CZ';

  if (zenskyHlas) {
      msg.voice = zenskyHlas;
      msg.pitch = 1.1; 
  } else {
      msg.pitch = 1.4; 
  }
  
  msg.rate = 1.1; 
  
  window.speechSynthesis.speak(msg);
  lastSpeakTime = millis();
}

      currentLastGifter = {name: "", coins: 0, img: null};
      nextLastGifter = null;
      safePlaySound(pentatonic('mid'), 0.04, 0.3);
      return;
  }

  if (showLeaderboards) {
      if (mouseX > allTimeLbRect.x && mouseX < allTimeLbRect.x + allTimeLbRect.w && mouseY > allTimeLbRect.y && mouseY < allTimeLbRect.y + allTimeLbRect.h) { 
          allTimeHpLeaderboard = {}; 
          localStorage.removeItem('galaxinko_alltime_hp');
          safePlaySound(pentatonic('mid'), 0.04, 0.3); 
      }
          if (mouseX > giftLbRect.x && mouseX < giftLbRect.x + giftLbRect.w && mouseY > giftLbRect.y && mouseY < giftLbRect.y + giftLbRect.h) { 
              allTimeGifts = {}; 
              localStorage.removeItem('galaxinko_alltime_gifts');
              safePlaySound(pentatonic('mid'), 0.04, 0.3); 
          }
          if (mouseX > killsLbRect.x && mouseX < killsLbRect.x + killsLbRect.w && mouseY > killsLbRect.y && mouseY < killsLbRect.y + killsLbRect.h) { 
              allTimeKills = {}; 
              localStorage.removeItem('galaxinko_alltime_kills');
              safePlaySound(pentatonic('mid'), 0.04, 0.3); 
          }
  }
}
</script>
