function updateSawHum(likersCount) {
    if (!audioStarted) return;
    
    let targetClinkers = Math.min(10, likersCount);
    
    if (targetClinkers > 0 && !sawHumActive) {
        try {
            if (!sawHumCtx) sawHumCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (sawHumCtx.state === 'suspended') sawHumCtx.resume();

            sawHumOsc = sawHumCtx.createOscillator();
            sawHumGain = sawHumCtx.createGain();
            sawHumOsc.type = 'sine';
            sawHumOsc.frequency.setValueAtTime(180, sawHumCtx.currentTime);
            sawHumGain.gain.setValueAtTime(0, sawHumCtx.currentTime);
            sawHumGain.gain.linearRampToValueAtTime(0.01875, sawHumCtx.currentTime + 0.5);
            sawHumOsc.connect(sawHumGain);
            sawHumGain.connect(sawHumCtx.destination);
            sawHumOsc.start();

            let clinkRate = 10; 
            let bufferLen = Math.floor(sawHumCtx.sampleRate / clinkRate); 
            
            if (!sawBellBuffer) {
                sawBellBuffer = sawHumCtx.createBuffer(1, bufferLen, sawHumCtx.sampleRate);
                let data = sawBellBuffer.getChannelData(0);
                let freqs = [1500, 2500, 3500];
                
                for (let i = 0; i < bufferLen; i++) {
                    let t = i / sawHumCtx.sampleRate;
                    let envelope = Math.exp(-t * 15);
                    let sample = 0;
                    for (let f of freqs) {
                        sample += Math.sin(Math.PI * 2 * f * t) * (f === freqs[0] ? 0.5 : 0.25);
                    }
                    data[i] = sample * envelope * 0.275; 
                }
            }

            sawHumActive = true;
        } catch(e) {}
    } else if (targetClinkers === 0 && sawHumActive) {
        try {
            if (sawHumCtx) {
                if (sawHumGain) sawHumGain.gain.linearRampToValueAtTime(0, sawHumCtx.currentTime + 0.5);
                
                let oRef = sawHumOsc;
                setTimeout(() => { try { if(oRef) oRef.stop(); } catch(e){} }, 600);
                
                if (sawBellGains) {
                    for (let i = 0; i < sawBellGains.length; i++) {
                        let g = sawBellGains[i];
                        let s = sawBellSources[i];
                        if (g) g.gain.linearRampToValueAtTime(0, sawHumCtx.currentTime + 0.5);
                        setTimeout(() => { try { if(s) s.stop(); } catch(e){} }, 600);
                    }
                }
            }
            sawHumActive = false;
            sawHumOsc = null;
            sawHumGain = null;
            sawBellSources = [];
            sawBellGains = [];
        } catch(e) { sawHumActive = false; }
    }
    
    if (sawHumActive && sawHumCtx) {
        if (!sawBellSources) sawBellSources = [];
        if (!sawBellGains) sawBellGains = [];
        
        while (sawBellSources.length < targetClinkers) {
            let idx = sawBellSources.length;
            let newSource = sawHumCtx.createBufferSource();
            newSource.buffer = sawBellBuffer;
            newSource.loop = true;
            
            let ratios = [1.0, 1.125, 1.25, 1.5, 1.666, 2.0, 2.25, 2.5, 3.0, 4.0];
            newSource.playbackRate.value = ratios[idx];
            
            let newGain = sawHumCtx.createGain();
            newGain.gain.setValueAtTime(0, sawHumCtx.currentTime);
            newGain.gain.linearRampToValueAtTime(0.025, sawHumCtx.currentTime + 0.2); 
            
            newSource.connect(newGain);
            newGain.connect(sawHumCtx.destination);
            newSource.start();
            
            sawBellSources.push(newSource);
            sawBellGains.push(newGain);
        }
        
        while (sawBellSources.length > targetClinkers) {
            let lastSource = sawBellSources.pop();
            let lastGain = sawBellGains.pop();
            if (lastGain) lastGain.gain.linearRampToValueAtTime(0, sawHumCtx.currentTime + 0.5);
            setTimeout(() => { try { if(lastSource) lastSource.stop(); } catch(e){} }, 600);
        }
    }
}

// --- PENTATONICKؤ‚آپ STUPNICE (Vؤ¹ؤ¾dy znؤ‚آ­ pؤ¹â„¢ؤ‚آ­jemnأ„â€؛ a harmonicky) ---
var PENTA_NOTES = [
    261.63, 293.66, 329.63, 392.00, 440.00,  // C4, D4, E4, G4, A4
    523.25, 587.33, 659.25, 783.99, 880.00,  // C5, D5, E5, G5, A5
    1046.50, 1174.66, 1318.51                 // C6, D6, E6
];
function pentatonic(octaveRange) {
    // octaveRange: 'low' (0-4), 'mid' (3-9), 'high' (7-12)
    if (octaveRange === 'low') return PENTA_NOTES[floor(random(0, 5))];
    if (octaveRange === 'high') return PENTA_NOTES[floor(random(7, 13))];
    return PENTA_NOTES[floor(random(3, 10))]; // 'mid' default
}

function safePlaySound(f, v, d) {
    if (!audioStarted || !synth) return;
    
    // ZTLUMENؤ‚إ¤ Pؤ¹آکI Zؤ‚آپTأ„إ¤ؤ¹ث‌I: أ„إڑؤ‚آ­m vؤ‚آ­c hrؤ‚ث‡أ„إ¹ؤ¹إ», tؤ‚آ­m menؤ¹ث‡ؤ‚آ­ ؤ¹ث‡ance na pؤ¹â„¢ehrؤ‚ث‡nؤ‚آ­ bأ„â€؛ؤ¹ؤ¾nؤ‚آ©ho zvuku
    let loadFactor = players.length;
    if (loadFactor > 30 && random() < (loadFactor / 100)) return; 

    if (millis() - lastGlobalSound < 50) return; // Mؤ‚آ­rnأ„â€؛ delؤ¹ث‡ؤ‚آ­ cooldown pro mؤ‚آ©nأ„â€؛ kakofonie
    try { 
        synth.play(f, Math.min(v, 0.25), 0, d); // Globؤ‚ث‡lnؤ‚آ­ strop hlasitosti
        lastGlobalSound = millis(); 
    } catch(e) {}
}

function playDonateSound() {
    if (!audioStarted || !synth) return;
    // Stoupajؤ‚آ­cؤ‚آ­ akord z pentatonickؤ‚آ© stupnice - vؤ¹ؤ¾dy znؤ‚آ­ krؤ‚ث‡snأ„â€؛
    let base = pentatonic('mid');
    let idx = PENTA_NOTES.indexOf(base);
    let n2 = PENTA_NOTES[Math.min(idx + 2, PENTA_NOTES.length - 1)];
    let n3 = PENTA_NOTES[Math.min(idx + 4, PENTA_NOTES.length - 1)];
    
    safePlaySound(base, 0.015, 0.3);
    setTimeout(() => safePlaySound(n2, 0.015, 0.4), 120);
    setTimeout(() => safePlaySound(n3, 0.012, 0.5), 250);
}

function playWhooshSound() {
    // Jemnؤ‚ث‌ svistivؤ‚ث‌ zvuk - rؤ¹إ»ؤ¹ؤ¾nؤ‚آ© hlasitosti jako zvuk pily, ale jinؤ‚ث‌ charakter
    if (!audioStarted) return;
    try {
        let ctx = getAudioContext(); // p5.sound internؤ‚آ­ kontext
        if (!ctx) return;
        
        // Bؤ‚آ­lؤ‚ث‌ ؤ¹ث‡um -> bandpass filtr = svistivؤ‚ث‌ vzduchovؤ‚ث‌ zvuk
        let bufSize = ctx.sampleRate * 0.22; // 220ms
        let buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        let data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
        
        let src = ctx.createBufferSource();
        src.buffer = buf;
        
        // Bandpass: stؤ¹â„¢ed 1200Hz, klesؤ‚ث‡ na 400Hz -> whoosh charakter
        let bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.setValueAtTime(1200, ctx.currentTime);
        bp.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.18);
        bp.Q.value = 3.5;
        
        // Gain obؤ‚ث‡lka: rychlؤ‚ث‌ nؤ‚ث‡bأ„â€؛h, plynulؤ‚ث‌ fade-out
        let gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.13, ctx.currentTime + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
        
        src.connect(bp);
        bp.connect(gain);
        gain.connect(ctx.destination);
        src.start(ctx.currentTime);
        src.stop(ctx.currentTime + 0.23);
    } catch(e) {}
}

function triggerGiftEffect(p, diam, comboMult = 1) {
    if (diam >= 1000) {
        let tts = currentLang === "CZ" ? `Mega dؤ‚ث‡rek od ${p.name}! Rؤ‚ث‡zovؤ‚ث‡ vlna!` : `Mega gift incoming from ${p.name}! Shockwave!`;
        let txt = currentLang === "CZ" ? "MEGA Dؤ‚آپREK!" : "MEGA GIFT INCOMING!";
        if (diam >= 10000) { tts = currentLang === "CZ" ? `Bؤ¹آ®H VSTOUPIL DO ARؤ‚â€°NY! ${p.name} NIأ„إڑؤ‚إ¤ Vؤ¹آ E ؤ¹ث‌IVؤ‚â€°!` : `A GOD HAS ENTERED! ${p.name} DESTROYS EVERYTHING!`; txt = "ARMAGEDON!"; }
        else if (diam >= 5000) { tts = currentLang === "CZ" ? `GALAXY GIFT! ${p.name} VYSؤ‚آپVؤ‚آپ ARؤ‚â€°NU!` : `GALAXY GIFT! ${p.name} IS SUCKING THE ARENA!`; txt = "GALAXY GIFT!"; }
        triggerMegaAnnouncement(p.name, diam, tts, txt);
    }

    // TIER 5: Pؤ‚ث‡n Vesmؤ‚آ­ru (Armagedon - 10000+ mincؤ‚آ­)
    if (diam >= 10000) {
        p.immunityTimer += 50 * 60; // 50 sekund God Mode
        p.hasCrown = true;
        p.auraFlash = 120;
        nukeEffectTimer = 180; // 3 vteؤ¹â„¢iny slow-mo a temnoty
        engine.timing.timeScale = 0.2;
        
        // Zniأ„إ¹enؤ‚آ­ vؤ¹ث‡ech malؤ‚ث‌ch a stؤ¹â„¢ednؤ‚آ­ch hrؤ‚ث‡أ„إ¹ؤ¹إ» (Armagedon)
        for (let other of players) {
            if (other === p || other.hp <= 0 || other.immunityTimer > 0) continue;
            let dx = other.body.position.x - p.body.position.x;
            let dy = other.body.position.y - p.body.position.y;
            let distSq = dx * dx + dy * dy;
            let dist = Math.sqrt(distSq) || 1;

function handleAction(name, amount, isGift = false, diam = 0, allowSpawn = true, comboMult = 1) {
  if(!audioStarted) { audioStarted = true; userStartAudio(); }
  
  // RESET IDLE TIMERU Pؤ¹ؤ¾I REؤ‚آپLNؤ‚â€° AKCI
  lastRealInteractionTime = millis();
  
  let finalAmount = amount || 0;
  if (isGift) {
      if (diam >= 5000) finalAmount = diam * 2000 * comboMult;
      else if (diam >= 1000) finalAmount = diam * 1500 * comboMult;
      else if (diam >= 100) finalAmount = diam * 1000 * comboMult;
      else finalAmount = diam * 100 * comboMult;
  }

  let p = players.find(x => x.name === name);

  if (p) {
    if (p.isZombie) reviveZombie(p); // Okamؤ¹ؤ¾itؤ‚آ© oؤ¹ؤ¾ivenؤ‚آ­!
    p.lastActionTime = Date.now();
    if (p.isFrozen) { p.isFrozen = false; Matter.Body.set(p.body, 'frictionAir', 0.08); }
    if (finalAmount !== 0) {
        p.hp += finalAmount;
        p.auraFlash = 30; // Zؤ‚ث‡blesk pؤ¹â„¢i zmأ„â€؛nأ„â€؛ HP
        
        // AKUMULACE PRO ؤ‚إ،SPORNؤ‚â€° ZOBRAZENؤ‚إ¤
        if (finalAmount > 0) {
            p.healDisplayValue += finalAmount;
            p.healDisplayTimer = 45; // Zobrazit na 45 framؤ¹إ» (~0.7s)
        } else {
            p.dmgDisplayValue += Math.abs(finalAmount);
            p.dmgDisplayTimer = 45;
        }
    }
    
    // AKTUALIZOVANؤ‚آپ LOGIKA TRVؤ‚آپNؤ‚إ¤ PILY: Kaؤ¹ؤ¾dؤ‚ث‌ like resetuje pilu na 5 sekund
    p.likeBuffTimer = Math.max(p.likeBuffTimer || 0, millis() + 5000); 
    if (isGift) {
        triggerGiftEffect(p, diam, comboMult);
        p.botDmgTimer = Math.max(p.botDmgTimer, 600); // 10 sekund Bot Crusher bonus
    }
  } else {
        if (allowSpawn) {
            let baseHp = getStartingHp(name);
            spawnPlayer(name, baseHp + finalAmount, isGift, diam, false, comboMult, false, true); 
        }
  }
}

function spawnPlayer(name, hp, isGift = false, diam = 0, isZombie = false, comboMult = 1, isBot = false, shouldQueue = true) {
  let safeHp = Math.max(0, hp || 500); 
  let r = getRadius(safeHp);
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let viewW = W / cameraScale; let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  let bestX = cx; let bestY = cy; let maxMinDist = -1;
  
  for (let i = 0; i < 20; i++) {
      let testX = cx + random(-viewW/2 + r*2, viewW/2 - r*2);
      let testY = cy + random(-viewH/2 + r*2, viewH/2 - r*2);
      let minDist = Infinity;
      for (let p of players) {
          if (!p.body) continue;
          let d = dist(testX, testY, p.body.position.x, p.body.position.y);
          if (d < minDist) minDist = d;
      }
      if (players.length === 0) { bestX = testX; bestY = testY; break; }
      if (minDist > maxMinDist) { maxMinDist = minDist; bestX = testX; bestY = testY; }
  }

  let sx = shipX === 0 ? W/2 : shipX; let sy = shipY === 0 ? ARENA_TOP : shipY;
  let wPos = screenToWorld(sx, sy);
  let dx = bestX - wPos.x; let dy = bestY - wPos.y;
  let distToTarget = Math.sqrt(dx*dx + dy*dy); let spd = distToTarget / 45; 
  
  colorMode(HSB, 360, 100, 100);
  let hueVal = random(360);
  if (hueVal > 70 && hueVal < 170) hueVal = (hueVal + 100) % 360; // Zpؤ¹â„¢ؤ‚آ­snأ„â€؛nؤ‚ث‡ ochrana proti zelenؤ‚آ© (chroma key)
  let pColor = isZombie ? color(0, 0, 40) : color(hueVal, random(80, 100), random(90, 100));
  colorMode(RGB, 255);
  
  spawnModules.push({
      name: name, hp: safeHp, x: wPos.x, y: wPos.y, targetX: bestX, targetY: bestY,
      vx: (dx/distToTarget)*spd, vy: (dy/distToTarget)*spd,
      life: 45, trail: [], color: pColor, isGift: isGift, diam: diam, isZombie: isZombie, comboMult: comboMult,
      isBot: isBot, shouldQueue: shouldQueue
  });
      safePlaySound(pentatonic('high'), 0.008, 0.15);
}

function handleRoundStartQueue() {
    if (roundStartQueue.length === 0) return;
    
    // Postupnؤ‚آ© spawnovؤ‚ث‡nؤ‚آ­ bأ„â€؛hem 10 sekund (600 framؤ¹إ»)
    let interval = Math.max(1, Math.floor(600 / Math.max(1, initialQueueLength)));
    if (frameCount % interval === 0) {
        let p = roundStartQueue.shift();
        spawnPlayer(p.name, p.hp, p.isGift, p.diam, p.isZombie, p.comboMult, p.isBot, p.shouldQueue);
    }
}

function handleSpawnModules() {
    for (let i = spawnModules.length - 1; i >= 0; i--) {
        let m = spawnModules[i];
        // ODSTRANأ„إ¤N KOUؤ¹آک (trail) PRO ZVؤ‚إ¥ؤ¹آ ENؤ‚إ¤ FPS
        m.x += m.vx; m.y += m.vy; m.life--;
        
        push(); translate(m.x, m.y); rotate(atan2(m.vy, m.vx));
        // Raketka a plamؤ‚آ­nek smazؤ‚ث‡ny - jen أ„إ¹istؤ‚ث‡ kuliأ„إ¹ka letؤ‚آ­cؤ‚آ­ do arؤ‚آ©ny
        fill(m.color); stroke(255); strokeWeight(1); ellipse(0, 0, 16, 16); 
        pop();
        
        if (m.life <= 0 || dist(m.x, m.y, m.targetX, m.targetY) < 10) {
            finalizeSpawnPlayer(m.name, m.hp, m.targetX, m.targetY, m.color, m.isGift, m.diam, m.isZombie, m.comboMult, m.isBot, m.shouldQueue);
            spawnModules.splice(i, 1);
        }
    }
}

      if (isGift) {

              let newPlayerMsg = random(COMMENTARY_NEW_PLAYER[currentLang]).replace("{p}", name);

function removePlayerCompletely(name) {
    // 1. Matter.js body removal
    for (let i = players.length - 1; i >= 0; i--) {
        if (players[i].name === name) {
            if (players[i].body) Matter.World.remove(world, players[i].body);
            players.splice(i, 1);
        }
    }
    
    // 2. Queue removal
    egoQueue = egoQueue.filter(n => n !== name);
    previousTop10 = previousTop10.filter(n => n !== name);
    
    // 3. Boss Planet removal
    for (let i = bossPlanets.length - 1; i >= 0; i--) {
        if (bossPlanets[i].name === name) {
            bossPlanets.splice(i, 1);
        }
    }
    if (lastValidBossName === name) {
        lastValidBossName = null;
    }
    
    // 4. Persistence removal (Permanentnؤ‚آ­ smazؤ‚ث‡nؤ‚آ­ ze vؤ¹ث‡ech statistik)
    delete allTimeHpLeaderboard[name];
    delete allTimeGifts[name];
    delete allTimeKills[name];
    delete sessionLikes[name];
    delete roundGifts[name];
    delete roundGiftStreaks[name];
    
    // 5. Avatar cache
    delete userAvatars[name];
    
    // 6. Force save leaderboards
    saveLeaderboards();
}

function saveLeaderboards() {
    try {
        // 1. HP LEADERBOARD - Prune to top 100
        let hpArr = Object.entries(allTimeHpLeaderboard)
            .sort((a, b) => b[1].score - a[1].score)
            .slice(0, 100);
        let hpToSave = {};
        hpArr.forEach(([name, data]) => {
            hpToSave[name] = { score: data.score, color: data.color.toString('#rrggbb') };
        });
        localStorage.setItem('galaxinko_alltime_hp', JSON.stringify(hpToSave));

        // 2. GIFT LEADERBOARD - Prune to top 100
        let giftArr = Object.entries(allTimeGifts)
            .sort((a, b) => b[1].score - a[1].score)
            .slice(0, 100);
        let giftToSave = {};
        giftArr.forEach(([name, data]) => {
            giftToSave[name] = { score: data.score, lastGiftDiam: data.lastGiftDiam, color: data.color.toString('#rrggbb') };
        });
        localStorage.setItem('galaxinko_alltime_gifts', JSON.stringify(giftToSave));

        // 3. KILLS LEADERBOARD - Prune to top 100
        let killArr = Object.entries(allTimeKills)
            .sort((a, b) => b[1].score - a[1].score)
            .slice(0, 100);
        let killToSave = {};
        killArr.forEach(([name, data]) => {
            killToSave[name] = { score: data.score, color: data.color.toString('#rrggbb') };
        });
        localStorage.setItem('galaxinko_alltime_kills', JSON.stringify(killToSave));
    } catch (e) {
        console.warn("Leaderboard save failed (Quota likely exceeded):", e);
    }
}

function updateHpLB(name, hp, col) {
    if (!allTimeHpLeaderboard[name] || hp > allTimeHpLeaderboard[name].score) {
        allTimeHpLeaderboard[name] = { score: hp, color: col, avatar: userAvatars[name] || allTimeHpLeaderboard[name]?.avatar };
    }
}

function updateGiftLB(name, diam, col) {
    if (!allTimeGifts[name]) {
        allTimeGifts[name] = { score: 0, color: col, lastGiftDiam: diam, avatar: userAvatars[name] || allTimeGifts[name]?.avatar };
    } else {
        allTimeGifts[name].lastGiftDiam = diam;
    }
    allTimeGifts[name].score += diam;
    if (userAvatars[name]) allTimeGifts[name].avatar = userAvatars[name];
}

function addKill(name, col) {
    if (!allTimeKills[name]) {
        allTimeKills[name] = { score: 0, color: col, avatar: userAvatars[name] || null };
    }
    allTimeKills[name].score += 1;
    if (userAvatars[name]) allTimeKills[name].avatar = userAvatars[name];
}

function processCombatQueue() {
  for (let pair of combatQueue) {
      let p1 = pair[0];
      let p2 = pair[1];
      if (p1.hp <= 0 || p2.hp <= 0) continue;
      handleCombat(p1, p2);
  }
  combatQueue = []; 
}

function handleCombat(p1, p2) {
  if (!p1.body || !p2.body) return;

  // --- I-FRAMES (Ochrana proti spamu damage v chumlu) ---
  // Hrؤ‚ث‡أ„إ¹ mؤ¹إ»ؤ¹ؤ¾e bojovat maximؤ‚ث‡lnأ„â€؛ 1x za 0.2 sekundy (12 framؤ¹إ»).
  if (p1.attackCooldown > 0 || p2.attackCooldown > 0) return;
  
  p1.attackCooldown = 12;
  p2.attackCooldown = 12;

  // --- BOOST OD LEDU (Odrؤ‚ث‡ؤ¹ؤ¾enؤ‚آ­ od zmrazenؤ‚ث‌ch hrؤ‚ث‡أ„إ¤ؤ¹إ») ---
  if (p1.isFrozen && !p2.isBot && !p2.isFrozen) {
      p2.orbSpeedTimer = Math.max(p2.orbSpeedTimer, 60); // 1 vteؤ¹â„¢ina (60 FPS)
  }
  if (p2.isFrozen && !p1.isBot && !p1.isFrozen) {
      p1.orbSpeedTimer = Math.max(p1.orbSpeedTimer, 60); // 1 vteؤ¹â„¢ina (60 FPS)
  }
  // ----------------------------------------------------

  let distVec = Matter.Vector.sub(p2.body.position, p1.body.position);
  if (distVec.x === 0 && distVec.y === 0) distVec.x = 1;
  let distVal = Matter.Vector.magnitude(distVec);

  let speed = Matter.Vector.magnitude(Matter.Vector.sub(p1.body.velocity, p2.body.velocity));
  // Odstranأ„â€؛no blokovؤ‚ث‡nؤ‚آ­ malؤ‚آ© rychlosti, aby se dؤ‚ث‡val damage i pؤ¹â„¢i mletؤ‚آ­ v chumlu
  if (isNaN(speed) || !isFinite(speed)) return; 
  if (speed > 100) speed = 100; 

  // --- HP DRAIN MECHANIKA (Hrؤ‚ث‡أ„إ¹ vysؤ‚ث‡vؤ‚ث‡ 1 HP/s z bota pؤ¹â„¢i dotyku) ---
  if (p1.isBot !== p2.isBot) {
      let bot = p1.isBot ? p1 : p2;
      let player = p1.isBot ? p2 : p1;
      
      // BONUS: Bot Crusher (30 dmg za vteؤ¹â„¢inu)
      if (player.botDmgTimer > 0) {
          bot.hp -= 30; // 30 dmg na jeden hit (collisionActive se pouؤ¹ث‡tؤ‚آ­ 1x za vteؤ¹â„¢inu pro konkrؤ‚آ©tnؤ‚آ­ dvojici)
          createParticles(bot.body.position.x, bot.body.position.y, color(255, 255, 0), 10);
      }

      let drain = 0.2; // Snؤ‚آ­ؤ¹ؤ¾eno z 1.0 na 0.2 HP/s
      bot.hp -= drain;
      player.hp += drain;
      // Akumulace: أ„إڑؤ‚آ­slo se zobrazؤ‚آ­ aؤ¹ؤ¾ ve chvؤ‚آ­li, kdy nasbؤ‚آ­rؤ‚ث‡ alespoؤ¹آˆ +1 HP
      player.healDisplayValue += drain;
      if (player.healDisplayValue >= 1) {
          player.healDisplayTimer = 45;
      }
  }

  let safeHp1 = Math.max(1, p1.hp); let safeHp2 = Math.max(1, p2.hp);
  let massAdvantage1 = Math.min(1.5, Math.max(1, Math.sqrt(safeHp1 / safeHp2)));
  let massAdvantage2 = Math.min(1.5, Math.max(1, Math.sqrt(safeHp2 / safeHp1)));
  
  // OCHRANA: Snؤ‚آ­ؤ¹ؤ¾ena minimؤ‚ث‡lnؤ‚آ­ rychlost pro vؤ‚ث‌poأ„إ¹et damage z 2.0 na 1.0
  let effectiveSpeed = Math.max(speed, 1.0);
  
  // NOVؤ‚آپ LOGIKA: Snؤ‚آ­ؤ¹ؤ¾eno na polovinu pro delؤ¹ث‡ؤ‚آ­ hru
  let calcDmg = (p, spd) => {
      let d = random(0.5, 1.0); // Zؤ‚ث‡klad 0.5-1.0
      if (spd > 5) d = random(0.5, 1.5); // Rychlؤ‚ث‌ 0.5-1.5
      if (p.likeBuffTimer > millis()) d = random(0.5, 2.0); // Pila 0.5-2.0
      if (p.giftSpeedTimer > 0) d *= 2; // Gift bonus zdvojnؤ‚ث‡sobؤ‚آ­ dmg
      return d;
  };

  let finalDmgTo2 = (p1.isZombie || (p1.isBot && !p2.isBot)) ? 0 : calcDmg(p1, speed);
  let finalDmgTo1 = (p2.isZombie || (p2.isBot && !p1.isBot)) ? 0 : calcDmg(p2, speed);

  // IMMUNITY CHECK (Novؤ‚آ© pravidlo pro prevenci damage)
  if (p1.immunityTimer > 0) finalDmgTo1 = 0;
  if (p2.immunityTimer > 0) finalDmgTo2 = 0;

  let hp1Before = p1.hp; let hp2Before = p2.hp;
  if (finalDmgTo1 > 0) {
      p1.hp -= finalDmgTo1;
      if (!p1.isBot || !p2.isBot) {
          p1.dmgDisplayValue += finalDmgTo1;
          p1.dmgDisplayTimer = 45;
      }
  }

  if (finalDmgTo2 > 0) {
      p2.hp -= finalDmgTo2;
      if (!p1.isBot || !p2.isBot) {
          p2.dmgDisplayValue += finalDmgTo2;
          p2.dmgDisplayTimer = 45;
      }
  }

  let healLogic = (winner, loserData) => {
      let mult = loserData.isBounty ? 5 : 1;
      let heal = Math.floor(loserData.hpBeforeDead * 0.3 + 10) * mult; 
      winner.hp += heal;
      winner.healDisplayValue += heal;
      winner.healDisplayTimer = 45;
      winner.auraFlash = 20;
      
      if (loserData.isBounty) {
          activeEvent = null;
          bountyTarget = null;
          nextEventTime = millis() + random(60000, 150000);
          let cleanWinner = cleanNameForTTS(winner.name);
          speakTTS(currentLang === "CZ" ? `Odmأ„â€؛na vybrؤ‚ث‡na! ${cleanWinner} zniأ„إ¹il cؤ‚آ­l!` : `Bounty claimed! ${cleanWinner} destroyed the target!`, true);
          safePlaySound(pentatonic('high'), 0.08, 0.5); 
      }
  };

  if (p1.hp <= 0 && hp1Before > 0) { healLogic(p2, {hpBeforeDead: hp1Before, isBounty: p1.isBounty}); addKill(p2.name, p2.color); }
  if (p2.hp <= 0 && hp2Before > 0) { healLogic(p1, {hpBeforeDead: hp2Before, isBounty: p2.isBounty}); addKill(p1.name, p1.color); }
  
  let forceDir = { x: distVec.x / distVal, y: distVec.y / distVal };
  // Zmenؤ¹ث‡enؤ‚ث‌ odraz, aby se v chumlu nerozstؤ¹â„¢elili pؤ¹â„¢ؤ‚آ­liؤ¹ث‡ agresivnأ„â€؛, ale poؤ¹â„¢ؤ‚ث‡d se hؤ‚ث‌bali
  let forceMag = 0.0003 + speed * 0.0003; 
  
  if(isFinite(forceDir.x) && isFinite(forceDir.y)) {
      Matter.Body.applyForce(p1.body, p1.body.position, { x: -forceDir.x * forceMag * p1.body.mass, y: -forceDir.y * forceMag * p1.body.mass });
      Matter.Body.applyForce(p2.body, p2.body.position, { x: forceDir.x * forceMag * p2.body.mass, y: forceDir.y * forceMag * p2.body.mass });
  }
  
  let isHeavyLoad = players.length > 80;
  let isExtremeLoad = players.length > 120;
  
  if (!isExtremeLoad && ((currentTop10.includes(p1.name) && p1.hp >= 1000) || (currentTop10.includes(p2.name) && p2.hp >= 1000))) {
      let cx = (p1.body.position.x + p2.body.position.x)/2;
      let cy = (p1.body.position.y + p2.body.position.y)/2;
      let dominantColor = finalDmgTo2 > finalDmgTo1 ? p1.color : p2.color;
      lightnings.push({x1: p1.body.position.x, y1: p1.body.position.y, x2: p2.body.position.x, y2: p2.body.position.y, life: 25, c: dominantColor});
      createParticles(cx, cy, dominantColor, 6); 
      safePlaySound(pentatonic('low'), 0.008, 0.3); // Jemnؤ‚ث‌ basovؤ‚ث‌ tؤ‚إ‚n pؤ¹â„¢i nؤ‚ث‡razu
  }
  
  // Pؤ¹â„¢ؤ‚آ­mؤ‚آ© popupy pro damage a zvuky critu smazؤ‚ث‡ny (nynؤ‚آ­ bأ„â€؛ؤ¹ؤ¾ؤ‚آ­ plynule po -1)
}

function shootBonusFromShip() {
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let viewW = W / cameraScale; let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  
  let bestX = cx; let bestY = cy;
  let maxMinDist = -1;
  for (let i = 0; i < 20; i++) {
      let testX = cx + random(-viewW/3, viewW/3);
      let testY = cy + random(-viewH/3, viewH/3);
      let minDist = Infinity;
      for (let p of players) {
          if (!p.body) continue;
          let d = dist(testX, testY, p.body.position.x, p.body.position.y);
          if (d < minDist) minDist = d;
      }
      if (players.length === 0) { bestX = testX; bestY = testY; break; }
      if (minDist > maxMinDist) { maxMinDist = minDist; bestX = testX; bestY = testY; }
  }

  let wPos = screenToWorld(shipX, shipY);
  let dx = bestX - wPos.x;
  let dy = bestY - wPos.y;
  let distToTarget = Math.sqrt(dx*dx + dy*dy);
  let spd = 12; 
  
  let isSpeedOrb = random() < 0.35; // 35% ؤ¹ث‡ance na speed orb
  orbs.push({ 
      x: wPos.x, y: wPos.y, 
      targetX: bestX, targetY: bestY,
      vx: (dx/distToTarget)*spd, vy: (dy/distToTarget)*spd,
      r: 15, value: 1000, 
      isFlying: true,
      type: isSpeedOrb ? 'SPEED' : 'HP'
  });
  safePlaySound(pentatonic('mid'), 0.01, 0.25);
}

function handleOrbs() {
  let isHeavyLoad = players.length > 40;
  for (let i = orbs.length - 1; i >= 0; i--) {
      let o = orbs[i];
      
      let orbColor = o.type === 'SPEED' ? color(255, 255, 0) : color(0, 255, 255);
      
      if (o.isFlying) {
          o.x += o.vx; o.y += o.vy;
          let d = dist(o.x, o.y, o.targetX, o.targetY);
          
          if (d < 20) {
              o.isFlying = false;
              o.x = o.targetX; o.y = o.targetY;
              createParticles(o.x, o.y, color(0, 255, 255), 20);
              safePlaySound(pentatonic('high'), 0.015, 0.25);
          }
          
          push();
          translate(o.x, o.y);
          let angle = atan2(o.vy, o.vx);
          rotate(angle);
          fill(20, 30, 50); stroke(orbColor); strokeWeight(2);
          rectMode(CENTER);
          rect(0, 0, 30, 15, 5);
          fill(orbColor); noStroke();
          triangle(-15, -5, -15, 5, -25 - random(5), 0);
          fill(255); textSize(6); textAlign(CENTER, CENTER); textStyle(BOLD);
          text(o.type === 'SPEED' ? "SPEED" : "BONUS", 0, 0);
          pop();
          
          if (frameCount % 3 === 0 && !isHeavyLoad) createParticles(o.x, o.y, orbColor, 2);
          continue; 
      }
      
      push();
      translate(o.x, o.y);
      rotate(frameCount * 0.02);
      
      if (false) { // Shadow disabled for performance
          drawingContext.shadowBlur = 15;
          drawingContext.shadowColor = orbColor;
      }
      
      fill(20, 30, 50, 200);
      stroke(red(orbColor), green(orbColor), blue(orbColor), 180 + sin(frameCount * 0.1) * 75);
      strokeWeight(2);
      rectMode(CENTER);
      rect(0, 0, o.r * 2.2, o.r * 2.2, 5); 
      
      noStroke();
      fill(red(orbColor), green(orbColor), blue(orbColor), 150 + sin(frameCount * 0.2) * 100);
      ellipse(0, 0, o.r * 1.2);
      fill(255);
      if (o.type === 'SPEED') {
          beginShape();
          vertex(2, -8); vertex(-4, 0); vertex(1, 0);
          vertex(-2, 8); vertex(4, 0); vertex(-1, 0);
          endShape(CLOSE);
      } else {
          rect(-o.r * 0.2, -o.r * 0.6, o.r * 0.4, o.r * 1.2);
          rect(-o.r * 0.6, -o.r * 0.2, o.r * 1.2, o.r * 0.4);
      }
      rectMode(CORNER);
      
      if (!isHeavyLoad) drawingContext.shadowBlur = 0;
      pop();

      fill(255); textSize(10); textStyle(BOLD); textAlign(CENTER);
      text(o.type === 'SPEED' ? "5x SPEED" : "+" + o.value, o.x, o.y - 20);

      let collected = false;
      for (let p of players) {
          if (p.hp > 0 && !p.isZombie && dist(p.body.position.x, p.body.position.y, o.x, o.y) < p.r + o.r) {
              if (o.type === 'SPEED') {
                  p.orbSpeedTimer = 10 * 60; // 10 sekund pؤ¹â„¢i 60 FPS
                  if (!isHeavyLoad) addPopup("5x SPEED BOOST!", p.body.position.x, p.body.position.y - p.r, color(255, 255, 0));
                  safePlaySound(pentatonic('high'), 0.01, 0.25);
              } else {
                  p.hp += o.value;
                  safePlaySound(pentatonic('mid'), 0.01, 0.2);
              }
              createParticles(o.x, o.y, orbColor, 15);
              collected = true; break;
          }
      }
      if (collected) orbs.splice(i, 1);
  }
}

            shadowColor = `rgba(255, ${255 * (1-t)}, 0, 1)`; // Mأ„â€؛nؤ‚آ­ se i stؤ‚آ­n
        }
        
        drawingContext.shadowColor = shadowColor;
        
        fill(textColor);
        stroke(0);
        strokeWeight(5);
        text(riddleText, W/2, bannerCenterY - 18);
        
        if (activeRiddle.answer) {
            let dispAns = activeRiddle.displayAnswer || activeRiddle.answer;
            let ansLen = dispAns.length;
            let chars = [];
            for (let i = 0; i < ansLen; i++) {
                if (riddleRevealedLetters.includes(i)) {
                    chars.push(dispAns[i].toUpperCase());
                } else {
                    chars.push("_");
                }
            }
            let blanks = chars.join("  ") + "  (" + ansLen + ")";
            
            drawingContext.shadowColor = 'rgba(0, 242, 254, 0.8)';
            // drawingContext.shadowBlur = 20;
            fill(0, 242, 254);
            textSize(34);
            stroke(0);
            strokeWeight(3);
            text(blanks, W/2, bannerCenterY + 32);
        }
    }
    
    pop(); // ukonأ„إ¹enؤ‚آ­ scale transformace
    
    drawingContext.shadowBlur = 0;
    pop();
}

function screenToWorld(sx, sy) {
    let cx = W/2; let cy = (ARENA_TOP + ARENA_BOT) / 2;
    return { x: (sx - cx) / cameraScale + cx, y: (sy - cy) / cameraScale + cy };
}

function drawSpaceshipTimer() {
    if (maxRoundTimer <= 0) return;
    let isHeavyLoad = players.length > 40;
    
    let p = 1.0 - (roundTimerFrames / (maxRoundTimer * 60)); 
    p = constrain(p, 0, 1.0); // Ochrana proti couvnuti za start pؤ¹â„¢i extrؤ‚آ©mnؤ‚آ­m prodlouؤ¹ؤ¾enؤ‚آ­ kola
    let aH = ARENA_BOT - ARENA_TOP;
    let perim = 2 * W + 2 * aH;
    let currentDist = p * perim;
    
    stroke(roundThemeColor); strokeWeight(3);
    // if(!isHeavyLoad) { drawingContext.shadowBlur = 10; drawingContext.shadowColor = roundThemeColor; }
    
    let points = [ 
        {x: W/2, y: ARENA_TOP}, 
        {x: W, y: ARENA_TOP}, 
        {x: W, y: ARENA_BOT}, 
        {x: 0, y: ARENA_BOT}, 
        {x: 0, y: ARENA_TOP},
        {x: W/2, y: ARENA_TOP} 
    ];
    
    let d = 0; let shipAngle = 0; shipX = points[0].x; shipY = points[0].y;

    for (let i = 0; i < points.length - 1; i++) {
        let p1 = points[i]; let p2 = points[i+1]; let segLen = dist(p1.x, p1.y, p2.x, p2.y);
        if (currentDist > d + segLen) {
            line(p1.x, p1.y, p2.x, p2.y); d += segLen;
        } else {
            let t = (currentDist - d) / segLen;
            shipX = lerp(p1.x, p2.x, t); shipY = lerp(p1.y, p2.y, t);
            line(p1.x, p1.y, shipX, shipY);
            shipAngle = atan2(p2.y - p1.y, p2.x - p1.x);
            break;
        }
    }
    if(!isHeavyLoad) drawingContext.shadowBlur = 0;

    push(); translate(shipX, shipY); rotate(shipAngle);
    
    fill(255, 100, 0, 150 + sin(frameCount * 0.5) * 100);
    noStroke();
    triangle(-20, -6, -20, 6, -35 - random(10), 0);
    fill(255, 200, 0);
    triangle(-20, -3, -20, 3, -28 - random(5), 0);
    
    fill(100, 150, 255); stroke(0, 255, 255); strokeWeight(1);
    triangle(-10, 10, -20, 20, 5, 10);
    triangle(-10, -10, -20, -20, 5, -10);
    
    fill(220, 220, 255); stroke(0, 255, 255); strokeWeight(2);
    beginShape();
    vertex(20, 0); vertex(5, 10); vertex(-20, 8); vertex(-20, -8); vertex(5, -10);
    endShape(CLOSE);
    
    fill(0, 200, 255); noStroke(); ellipse(5, 0, 10, 6);
    fill(255); ellipse(7, -1, 3, 2);
    
    pop();

    if (frameCount % 4 === 0 && roundTimerFrames > 0 && !isHeavyLoad) {
        let wPos = screenToWorld(shipX, shipY);
        particles.push({x: wPos.x, y: wPos.y, vx: -cos(shipAngle)*3 + random(-1,1), vy: -sin(shipAngle)*3 + random(-1,1), life: 200, c: roundThemeColor, size: random(4, 8)});
    }
    
    // أ„إڑasomؤ‚آ­ra vedle raketky
    let timeStr = nf(floor(roundTimer/60),2) + ":" + nf(roundTimer%60,2);
    push();
    translate(shipX, shipY);
    let dirX = (W/2) - shipX;
    let dirY = ((ARENA_TOP+ARENA_BOT)/2) - shipY;
    let len = dist(0, 0, dirX, dirY);
    if (len > 0) {
        dirX = (dirX / len) * 35;
        dirY = (dirY / len) * 35;
    }
    
    // Pozadؤ‚آ­ pro lepؤ¹ث‡ؤ‚آ­ أ„إ¹itelnost na chromأ„â€؛
    rectMode(CENTER);
    fill(0, 180); noStroke();
    rect(dirX, dirY, 58, 24, 5);
    
    fill(255); // Bؤ‚آ­lؤ‚ث‡, aby ji chroma key nesmazal
    if (roundTimer <= 30 && roundTimer % 2 === 0) fill(255, 50, 50);
    textSize(18); textStyle(BOLD); textAlign(CENTER, CENTER);
    stroke(0); strokeWeight(3);
    text(timeStr, dirX, dirY);
    pop();
}

  for (let n of notifications) {

  let displayed = notifications.filter(n => n.state === 'DISPLAY');

  if (waiting.length === 0 && displayed.length > 0) {

      displayed = displayed.filter(n => n.state === 'DISPLAY');
  }

  if (waiting.length > 0) {
      // 1. VIP Pؤ¹آکEDNOST: Dؤ‚ث‡rky pؤ¹â„¢eskakujؤ‚آ­ frontu na prvnؤ‚آ­ mؤ‚آ­sto
      waiting.sort((a, b) => (a.type === 'GIFT' ? -1 : (b.type === 'GIFT' ? 1 : 0)));

          let requiredAge = displayed[0].type === 'GIFT' ? 300 : 120;

          if (waiting[0].type === 'GIFT' && displayed[0].type !== 'GIFT' && displayed[0].age >= 40) {

          }

      else if (n.type === 'LIKE') { borderColor = color((0 + hueShift + 360) % 360, 80, 100); actionText = currentLang === "CZ" ? `Energie +${n.extra}` : `Energy +${n.extra}`; icon = "ؤ‚ثکؤ¹ث‡أ‹â€،"; }

function handleCameraAndPlayers() {
  if (players.length === 0) { cameraScale = lerp(cameraScale, 1.0, 0.05); return; }
  
  let cx = W/2; let cy = (ARENA_TOP+ARENA_BOT)/2;
  let isHeavyLoad = players.length > 80;    // Dؤ¹â„¢ؤ‚آ­vأ„â€؛jؤ¹ث‡ؤ‚آ­ ؤ‚إںleva pro grafiku
  let isExtremeLoad = players.length > 120;  // Dؤ¹â„¢ؤ‚آ­vأ„â€؛jؤ¹ث‡ؤ‚آ­ ؤ‚إںleva pro grafiku
  let maxV = 4; // SNؤ‚إ¤ؤ¹ث‌ENO (z 5)
  
  for (let i = players.length - 1; i >= 0; i--) {
    let p = players[i];
    
    if (!p.isZombie) updateHpLB(p.name, p.hp, p.color);

    let bx = p.body ? p.body.position.x : 0;
    let by = p.body ? p.body.position.y : 0;
    if (!p.body || isNaN(bx) || isNaN(by) || bx < -10000 || bx > W+10000 || by < -10000 || by > H+10000) {
        p.hp = 0; 
    }
    
    if (p.boostCooldown > 0) p.boostCooldown--;
    if (p.shieldCooldown > 0) p.shieldCooldown--;
    if (p.attackCooldown > 0) p.attackCooldown--;

    let targetR = getRadius(p.hp);
    if (Math.abs(targetR - p.r) > 1.0 && p.body && p.hp > 0) {
        let s = targetR / p.r;
        if (isFinite(s) && s > 0) {
            Matter.Body.scale(p.body, s, s);
            p.r = targetR;
            Matter.Body.setDensity(p.body, 0.001 + (p.r * 0.0001));
            // Dynamickؤ‚ث‌ odpor: Vأ„â€؛tؤ¹ث‡ؤ‚آ­ koule majؤ‚آ­ niؤ¹ؤ¾ؤ¹ث‡ؤ‚آ­ frictionAir pro lepؤ¹ث‡ؤ‚آ­ "prؤ¹إ»raznost"
            p.body.frictionAir = 0.06 - Math.min(0.04, Math.sqrt(p.hp) * 0.0004);
        }
    }
    
    if (!isExtremeLoad && p.hp > 0) {
        p.trail.push({x: p.body.position.x, y: p.body.position.y});
        if (p.trail.length > 8) p.trail.shift();
    } else {
        p.trail = [];
    }
    
    if (p.hp <= 0) {
      // Pؤ¹آکIDؤ‚آپNO: Zapsؤ‚ث‡nؤ‚آ­ do fronty na oؤ¹ؤ¾ivenؤ‚آ­ (jen pokud dal hrؤ‚ث‡أ„إ¹ alespoؤ¹آˆ jeden like)
      if (sessionLikes[p.name] > 0) {
          deadPlayersQueue.push({name: p.name, timeOfDeath: millis(), respawnDelay: 20000 + random(500, 20000)}); // 20s cooldown + nؤ‚ث‡hodnؤ‚ث‌ أ„إ¹as (0.5s - 20s)
      }
      
      if (p.body && !isNaN(p.body.position.x)) {
          let px = p.body.position.x;
          let py = p.body.position.y;

          // EFEKT GRANؤ‚آپTU: Odstrأ„إ¹enؤ‚آ­ nejbliؤ¹ؤ¾ؤ¹ث‡ؤ‚آ­ch hrؤ‚ث‡أ„إ¹ؤ¹إ»
          for (let other of players) {
              if (other === p || !other.body) continue;
              let dx = other.body.position.x - px;
              let dy = other.body.position.y - py;
              let distSq = dx*dx + dy*dy;
              let effectRadius = p.r + 150; // Dosah exploze zvؤ‚ث‌ؤ¹ث‡en pro vأ„â€؛tؤ¹ث‡ؤ‚آ­ dopad
              let effectRadiusSq = effectRadius * effectRadius;
              
              if (distSq < effectRadiusSq && distSq > 0) {
                  let dist = Math.sqrt(distSq); // Potؤ¹â„¢ebujeme pro vؤ‚ث‌poأ„إ¹et sؤ‚آ­ly
                  let forceMag = 0.008 * other.body.mass * (effectRadius / dist); // Snؤ‚آ­ؤ¹ؤ¾eno o 1/3
                  forceMag = Math.min(forceMag, 0.08 * other.body.mass); // Max odhoz snؤ‚آ­ؤ¹ؤ¾en o 1/3
                  Matter.Body.applyForce(other.body, other.body.position, {
                      x: (dx / dist) * forceMag,
                      y: (dy / dist) * forceMag
                  });

                  // --- ODSTRANأ„إ¤NO: POؤ¹آ KOZENؤ‚إ¤ OKOLؤ‚إ¤ (Zpؤ¹إ»sobovalo ؤ¹â„¢etأ„â€؛zovou reakci a "pؤ‚ث‡d" arؤ‚آ©ny) ---
              }
          }

          if (!isHeavyLoad) {
              if (p.isZombie) {
                  createParticles(px, py, color(0, 255, 255), 20); // Zmأ„â€؛nأ„â€؛no ze zelenؤ‚آ© na azurovou pro Chroma Key
                  safePlaySound(pentatonic('low'), 0.01, 0.2); 
              } else {
                  createParticles(px, py, p.color, 35); // Vؤ‚آ­ce أ„إ¹ؤ‚ث‡stic pro hrؤ‚ث‡أ„إ¹e
                  deathShockwaves.push({x: px, y: py, r: p.r, color: p.color, life: 255});
                  safePlaySound(pentatonic('low'), 0.01, 0.15);
              }
          }
      }
      if (p.body) Matter.World.remove(world, p.body);
      players.splice(i, 1);
      continue;
    }

    // --- BLESKY OD TOP 10 S HP > 1000 (1x za sekundu, -1 HP nejblizsi kouli) ---
    if (currentTop10.includes(p.name) && p.hp >= 1000 && !p.isZombie && frameCount % 60 === (i % 60)) {
        let closest = null;
        let closestDist = Infinity;
        for (let other of players) {
            if (other === p || other.hp <= 0 || other.immunityTimer > 0 || !other.body) continue;
            let ld = dist(p.body.position.x, p.body.position.y, other.body.position.x, other.body.position.y);
            if (ld < closestDist) { closestDist = ld; closest = other; }
        }
        if (closest) {
            closest.hp -= 1;
            if (!isExtremeLoad) {
                lightnings.push({x1: p.body.position.x, y1: p.body.position.y, x2: closest.body.position.x, y2: closest.body.position.y, life: 25, c: p.color});
            }
            if (!isHeavyLoad) createParticles(closest.body.position.x, closest.body.position.y, p.color, 3);
            if (!isHeavyLoad) addPopup("-1", closest.body.position.x, closest.body.position.y, color(255, 100, 100));
            safePlaySound(pentatonic('low'), 0.008, 0.25);
        }
    }
    
    // GALAKTICKؤ‚إ¥ VORTEX (Pohyblivؤ‚ث‌ stؤ¹â„¢ed, aby nevznikla statickؤ‚ث‡ zؤ‚ث‡cpa)
    // Stؤ¹â„¢ed gravitace nynؤ‚آ­ neustؤ‚ث‡le pomalu cestuje po arؤ‚آ©nأ„â€؛
    let cx = W/2 + Math.sin(frameCount * 0.005) * (W * 0.40); 
    let cy = (ARENA_TOP+ARENA_BOT)/2 + Math.cos(frameCount * 0.007) * ((ARENA_BOT-ARENA_TOP) * 0.40);
    
    // AFK: zmrazeni po nahodnem casu 45-60s neaktivity, rozmrazeni po nahodnem casu 5-15s أ¢â€ â€™ cyklus
    // MAX 3 hracu muzou byt zmrazeni najednou (vizual + fyzika), vypocty bezi dal pro vsechny
    if (!p.isBot && !p.isZombie && p.lastActionTime) {
        // Nastavit nahodny prah klidu pri prvnim volani nebo po rozmrazeni
        if (!p.afkDelay) p.afkDelay = 45000 + Math.random() * 15000; // 45-60s
        if (!p.isFrozen && Date.now() - p.lastActionTime > p.afkDelay) {
            // Zmrazit jen pokud neni zadny hrac jiz zmrazeny
            let currentlyFrozen = players.filter(x => x.isFrozen).length;
            if (currentlyFrozen < 1) {
                p.isFrozen = true;
                p.frozenSince = Date.now();
                p.frozenDuration = 5000 + Math.random() * 10000; // 5-15s
                Matter.Body.set(p.body, 'frictionAir', 0.4);
            }
            // Pokud je uz nekdo zmrazeny, timer AFK bezi dal, ale hrace nezmrazujeme
        } else if (p.isFrozen && p.frozenSince && Date.now() - p.frozenSince > (p.frozenDuration || 10000)) {
            // Auto-rozmrazit a dat novy nahodny cas klidu
            p.isFrozen = false;
            p.frozenSince = null;
            p.frozenDuration = null;
            p.afkDelay = 45000 + Math.random() * 15000; // novy nahodny prah 45-60s
            p.lastActionTime = Date.now(); // reset: bude poletovat dalsi cyklus
            Matter.Body.set(p.body, 'frictionAir', 0.08);
        }
    }
    let afkMult = (p.isFrozen) ? 0.02 : 1.0;
    
    // ==========================================
    // OKO HURIKؤ‚آپNU (Tah pouze z dؤ‚ث‡lky + odtlaأ„إ¤ovؤ‚ث‡nؤ‚آ­ ve stؤ¹â„¢edu)
    // ==========================================
    let center = { x: W/2, y: (ARENA_TOP + ARENA_BOT) / 2 };
    let distVec = Matter.Vector.sub(center, p.body.position);
    let distToCenter = Matter.Vector.magnitude(distVec) || 1;
    let dirToCenter = { x: distVec.x / distToCenter, y: distVec.y / distToCenter };
    let tangent = { x: -dirToCenter.y, y: dirToCenter.x };

    let pullForce = 0;
    
    // 1. ZNATELNأ„إ، SILNأ„إ،Jؤ¹ ؤ‚إ¤ TAH OD KRAJؤ¹آ® DO STؤ¹ثœEDU (zabrؤ‚ث‡nؤ‚آ­ zؤ‚ث‡sekؤ¹إ»m u stأ„â€؛n)
    if (distToCenter > 300) {
        pullForce = 0.00025 * p.body.mass * afkMult; // Zvؤ‚ث‌ؤ¹ث‡eno z 0.00008
    } 
    // 2. Lehkؤ‚آ© odtlaأ„إ¤ovؤ‚ث‡nؤ‚آ­ od ؤ‚إںplnؤ‚آ©ho stؤ¹â„¢edu, aby se neslisovaly
    else if (distToCenter < 150) {
        pullForce = -0.00003 * p.body.mass * afkMult; // Zvؤ‚ث‌ؤ¹ث‡eno z -0.00002
    }

    // ==========================================
    // 3. ORGANIؤŒTؤڑJإ أچ A CHAOTICKأ‌ VORTEX
    // ==========================================
    // A: Pomalأ، hlavnأ­ sأ­la (otoؤچأ­ smؤ›r zhruba kaإ¾dأ© 3 aإ¾ 4 minuty)
    let mainWave = Math.sin(frameCount * 0.00015); 

    // B: Kolأ­sأ،nأ­ rychlosti (plynulأ© poryvy, kterأ© pإ™idأ،vajأ­ a ubأ­rajأ­ sأ­lu)
    let wobble = Math.sin(frameCount * 0.001) * 0.35;

    // C: Zأ³novأ½ chaos (kaإ¾dأ، ؤچأ،st arأ©ny mأ، trochu jinأ½ tah, rozbأ­jأ­ to geometrickأ© tvary)
    // Pإ™idأ،nأ­m frameCount se tyto "vأ­ry uvnitإ™ vأ­ru" neustأ،le pإ™esouvajأ­ v prostoru
    let localChaos = (Math.sin(p.body.position.x * 0.005 + frameCount * 0.01) + 
                      Math.cos(p.body.position.y * 0.005 - frameCount * 0.008)) * 0.25;

    // Seؤچtenأ­ vإ،ech vlivإ¯ do jednoho organickأ©ho pohybu
    let globalVortex = (mainWave + wobble + localChaos) * 0.00022;

    // --- 2 VTEإکINOVأ‌ BUFF PإکI UHODNUTأچ HأپDANKY ---
    if (typeof globalVortexBuffEndFrame !== 'undefined' && frameCount < globalVortexBuffEndFrame) {
        globalVortex *= 5; // 5x rychlejإ،أ­ roztoؤچenأ­ celأ© arأ©ny
    }

    let vortexForce = globalVortex * p.body.mass * afkMult; 
    // ==========================================

    let finalFx = (dirToCenter.x * pullForce) + (tangent.x * vortexForce);
    let finalFy = (dirToCenter.y * pullForce) + (tangent.y * vortexForce);

    // OPTIMALIZACE: Noise poأ„إ¹ؤ‚آ­tؤ‚ث‡me jen kaؤ¹ؤ¾dؤ‚ث‌ 3. frame pؤ¹â„¢i zؤ‚ث‡tأ„â€؛ؤ¹ؤ¾i
    if (!p.lastNoiseX || frameCount % (players.length > 60 ? 3 : 1) === 0) {
        p.lastNoiseX = noise(p.noiseOffsetX) - 0.5;
        p.lastNoiseY = noise(p.noiseOffsetY) - 0.5;
    }
    let noiseValX = p.lastNoiseX;
    let noiseValY = p.lastNoiseY;

    finalFx += noiseValX * 0.00012 * p.body.mass; // Snؤ‚آ­ؤ¹ؤ¾enؤ‚ث‌ ؤ¹ث‡um o 15%
    finalFy += noiseValY * 0.00012 * p.body.mass;

    // Hracu maji o 45% vetsi silu, aby snaze proplouvali a odtlacili boty
    if (!p.isBot) {
        finalFx *= 1.45;
        finalFy *= 1.45;
    }

    // Pomalejؤ¹ث‡ؤ‚آ­ posun ؤ¹ث‡umu = plynulejؤ¹ث‡ؤ‚آ­ zmأ„â€؛ny pohybu
    // POMALEJؤ¹آ ؤ‚إ¤ ZMأ„إ،NA: Pohyb bude plynulejؤ¹ث‡ؤ‚آ­ a tؤ‚ث‡hlejؤ¹ث‡ؤ‚آ­
    p.noiseOffsetX += 0.005; 
    p.noiseOffsetY += 0.005;

    // Obأ„إ¤asnؤ‚آ© silnأ„â€؛jؤ¹ث‡ؤ‚آ­ poؤ¹ث‡ؤ¹ؤ„ouchnutؤ‚آ­ (ponechؤ‚ث‡no, ale mؤ‚آ­rnأ„â€؛ oslabeno)
    if (Math.random() < 0.02) { // Mؤ‚آ©nأ„â€؛ أ„إ¤asto
        finalFx += (Math.random() - 0.5) * 0.0005 * p.body.mass;
        finalFy += (Math.random() - 0.5) * 0.0005 * p.body.mass;
    }

    // --- BOT BEHAVIOR (Chaos movement) ---
    if (p.isBot && frameCount % 60 === (i % 60)) {
        let chaosForce = 0.0002 * p.body.mass; // Snؤ‚آ­ؤ¹ؤ¾eno pro pomalؤ‚آ© plouؤ¹ؤ¾enؤ‚آ­
        Matter.Body.applyForce(p.body, p.body.position, {
            x: (random() - 0.5) * chaosForce,
            y: (random() - 0.5) * chaosForce
        });
    }

    // ؤ¹ث‌ؤ‚ث‡dnؤ‚ث‡ ochrannؤ‚ث‡ zؤ‚إ‚na - vؤ¹ث‡ichni se rurou do jednoho bodu!
    Matter.Body.applyForce(p.body, p.body.position, { x: finalFx, y: finalFy });

    let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
    let isTop10 = currentTop10.includes(p.name);
    let tSpd = isTop10 ? 1.6 : 1.3; // SNؤ‚إ¤ؤ¹ث‌ENO (z 2.2 / 1.8) pro klidnأ„â€؛jؤ¹ث‡ؤ‚آ­ arؤ‚آ©nu
    
    // Sؤ‚إ¤LA PODLE HP: أ„إڑؤ‚آ­m vأ„â€؛tؤ¹ث‡ؤ‚آ­ koule, tؤ‚آ­m lehce vyؤ¹ث‡ؤ¹ث‡ؤ‚آ­ tah na brؤ‚ث‡nu
    tSpd *= (1.0 + Math.sqrt(p.hp) * 0.0015);
    let currentMaxV = maxV;
    
    // --- POMALؤ‚إ¥ Zؤ‚آپKLAD PRO PASIVNؤ‚إ¤ ---
    // Pokud hrؤ‚ث‡أ„إ¤/bot nelajkuje, nedal gift v tomto kole nebo neuhodl hؤ‚ث‡danku, je o 30% pomalejؤ¹ث‡ؤ‚آ­
    let hasBonus = isBuffed || (sessionLikes[p.name] > 0) || (roundGifts[p.name] && roundGifts[p.name].score > 0) || (riddleWins[p.name] > 0);
    if (!hasBonus) {
        tSpd *= 0.4;
        currentMaxV *= 0.4;
    }


    // BONUS ZA LIKOVANI: Hracici kteri nekdy lajkli jsou o 25% rychlejsi nez ostatni hrace
    if (!p.isBot && !p.isZombie && sessionLikes[p.name] > 0) {
        tSpd *= 1.25;
        currentMaxV *= 1.25;
    }
    // ZOMBؤ‚إ¤CI SE PLOUؤ¹ث‌ؤ‚إ¤ (-60% rychlost)
    if (p.isZombie) {
        tSpd *= 0.4;
        currentMaxV *= 0.4;
    }

    // BOTI JSOU POMALEJؤ¹آ ؤ‚إ¤ (-40% rychlost oproti hrؤ‚ث‡أ„إ¤ؤ¹إ»m)
    if (p.isBot) {
        tSpd *= 0.3; // Zpomaleno ze 0.6 pro "plouؤ¹ؤ¾enؤ‚آ­"
        currentMaxV *= 0.3;
    }

    // --- ZRYCHLENؤ‚إ¤ ZA TAPOVؤ‚آپNؤ‚إ¤ (LIKE BUFF) ---
    // Pokud hrؤ‚ث‡أ„إ¹ aktivnأ„â€؛ posؤ‚آ­lؤ‚ث‡ liky, zؤ‚آ­skؤ‚ث‡ doأ„إ¹asnأ„â€؛ o 100 % vyؤ¹ث‡ؤ¹ث‡ؤ‚آ­ rychlost (kompenzace za pomalejؤ¹ث‡ؤ‚آ­ zؤ‚ث‡klad)
    if (isBuffed) {
        tSpd *= 1.35; 
        currentMaxV *= 2.0;
        
        // Vizuؤ‚ث‡lnؤ‚آ­ jiskry smazؤ‚ث‡ny
    }

    if (p.isBounty) {
        tSpd *= 1.4;
        currentMaxV *= 1.4;
    }
    
    if (p.giftSpeedTimer > 0) {
        p.giftSpeedTimer--;
        let speedMult = map(p.giftSpeedTimer, 0, 300, 1.0, 3.0); // Postupnؤ‚آ© vytrؤ‚ث‡cenؤ‚آ­ rychlosti
        tSpd *= speedMult;
        currentMaxV *= speedMult;
    }

    if (p.orbSpeedTimer > 0) {
        p.orbSpeedTimer--;
        tSpd *= 5.0;
        currentMaxV *= 5.0;
        // ؤ¹ث‌lutؤ‚آ© jiskry smazؤ‚ث‡ny
    }

    if (p.shareCooldown > 0) p.shareCooldown--;

    // --- PLYNULؤ‚â€° Pؤ¹آکIDؤ‚آپVؤ‚آپNؤ‚إ¤/UBؤ‚إ¤Rؤ‚آپNؤ‚إ¤ HP (BUFFEROVANؤ‚â€°) ---
    if (p.hpBuffer !== 0) {
        // Rychlost zmأ„â€؛ny: min 1 HP, ale pؤ¹â„¢i velkؤ‚آ©m rozdؤ‚آ­lu zrychlؤ‚آ­me, aby to netrvalo vأ„â€؛أ„إ¹nost
        let step = 1;
        if (Math.abs(p.hpBuffer) > 100) step = Math.ceil(Math.abs(p.hpBuffer) / 60);
        
        if (p.hpBuffer > 0) {
            let add = Math.min(step, p.hpBuffer);
            p.hp += add;
            p.hpBuffer -= add;
            // Popupy jen obأ„إ¹as pro ؤ‚إںsporu FPS
            if (frameCount % 10 === 0) {
                addPopup("+1", p.body.position.x, p.body.position.y - p.r, color(0, 255, 255));
            }
        } else if (p.hpBuffer < 0) {
            let sub = Math.min(step, Math.abs(p.hpBuffer));
            p.hp -= sub;
            p.hpBuffer += sub;
            if (frameCount % 10 === 0) {
                addPopup("-1", p.body.position.x, p.body.position.y - p.r, color(255, 80, 80));
            }
        }
    }

    let vx = p.body.velocity.x;
    let vy = p.body.velocity.y;
    
    if (isNaN(vx) || isNaN(vy) || !isFinite(vx) || !isFinite(vy)) {
        Matter.Body.setVelocity(p.body, {x: 0, y: 0});
    } else {
        let currentSpeed = Math.sqrt(vx*vx + vy*vy);
        if (currentSpeed > 0.1) {
            let factor = tSpd / currentSpeed;
            Matter.Body.setVelocity(p.body, { x: lerp(vx, vx * factor, 0.1), y: lerp(vy, vy * factor, 0.1) });
        }
        
        vx = p.body.velocity.x; vy = p.body.velocity.y;
        if (Math.abs(vx) > currentMaxV || Math.abs(vy) > currentMaxV) {
            Matter.Body.setVelocity(p.body, {
                x: Math.max(-currentMaxV, Math.min(currentMaxV, vx)),
                y: Math.max(-currentMaxV, Math.min(currentMaxV, vy))
            });
        }
    }
  }

  // DYNAMICKؤ‚آپ KAMERA: Oddaluje se podle toho, kolik fyzickؤ‚آ©ho prostoru koule zabؤ‚آ­rajؤ‚آ­!
  let totalArea = 0;
  for (let i = 0; i < players.length; i++) {
      totalArea += players[i].r * players[i].r * Math.PI;
  }
  let screenArea = W * (ARENA_BOT - ARENA_TOP);
  let coverageRatio = totalArea / screenArea;
  
  if (coverageRatio > 0) {
      // Koule nechؤ‚ث‡me natأ„â€؛snat vؤ‚آ­ce (aؤ¹ؤ¾ na 80 % obrazovky) neؤ¹ؤ¾ oddؤ‚ث‡lؤ‚آ­me kameru
      targetCameraScale = Math.sqrt(0.85 / coverageRatio);
  } else {
      targetCameraScale = 1.8;
  }
  // Limity pؤ¹â„¢iblؤ‚آ­ؤ¹ؤ¾enؤ‚آ­/oddؤ‚ث‡lenؤ‚آ­
  targetCameraScale = Math.min(2.0, Math.max(0.45, targetCameraScale));

  cameraScale = lerp(cameraScale, targetCameraScale, 0.015); // Velmi pomalؤ‚آ© a plynulؤ‚آ© oddalovؤ‚ث‡nؤ‚آ­
  
  let viewW = W / cameraScale; 
  let viewH = (ARENA_BOT - ARENA_TOP) / cameraScale;
  
  if (!isNaN(viewW) && !isNaN(viewH)) {
      Matter.Body.setPosition(wallTop, { x: cx, y: cy - viewH/2 - wallThick/2 });
      Matter.Body.setPosition(wallBot, { x: cx, y: cy + viewH/2 + wallThick/2 });
      Matter.Body.setPosition(wallLeft, { x: cx - viewW/2 - wallThick/2, y: cy });
      Matter.Body.setPosition(wallRight, { x: cx + viewW/2 + wallThick/2, y: cy });
  }
}

// --- FUNKCE PRO POZADؤ‚إ¤ ODSTRANأ„إ¤NY ---
function handleBossPlanet() {
    if (!showBossPlanet || players.length === 0) return;

    // Vytvoؤ¹â„¢enؤ‚آ­ globؤ‚ث‡lnؤ‚آ­ho zؤ‚ث‡mku (pokud jeؤ¹ث‡tأ„â€؛ neexistuje)
    if (typeof window.bossLockTimer === 'undefined') window.bossLockTimer = 0;

    // 1. Vyأ„إ¹istؤ‚آ­me frontu od mrtvؤ‚ث‌ch hrؤ‚ث‡أ„إ¹ؤ¹إ» nebo tأ„â€؛ch, co uؤ¹ؤ¾ v arؤ‚آ©nأ„â€؛ nejsou
    while (egoQueue.length > 0) {
        let name = egoQueue[0];
        let p = players.find(x => x.name === name && x.hp > 0);
        if (p) break;
        egoQueue.shift();
    }

    // 2. PRIORITA: Fronta novؤ‚ث‌ch hrؤ‚ث‡أ„إ¹ؤ¹إ» (kaؤ¹ؤ¾dؤ‚ث‌ dostane 3 vteؤ¹â„¢iny slؤ‚ث‡vy)
    if (egoQueue.length > 0) {
        let nextInQueue = egoQueue[0];
        if (lastValidBossName === nextInQueue) {
            // Aktuؤ‚ث‡lnؤ‚آ­ boss je ten z fronty, zkontrolujeme jestli uؤ¹ؤ¾ mu vyprؤ¹ث‡el أ„إ¹as
            if (millis() > window.bossLockTimer) {
                egoQueue.shift();
                // Shiftem se uvolnؤ‚آ­ mؤ‚آ­sto pro dalؤ¹ث‡ؤ‚آ­ho v ؤ¹â„¢adأ„â€؛ nebo pro top HP hrؤ‚ث‡أ„إ¹e v dalؤ¹ث‡ؤ‚آ­m kroku
            }
        } else {
            // NOVؤ‚إ¥ hrؤ‚ث‡أ„إ¹ z fronty pؤ¹â„¢ebؤ‚آ­rؤ‚ث‡ Ego Smash (pؤ¹â„¢ebije i top HP hrؤ‚ث‡أ„إ¹e)
            lastValidBossName = nextInQueue;
            window.bossLockTimer = millis() + 3000;
        }
    }

    // 3. POKUD JE FRONTA PRؤ‚آپZDNؤ‚آپ: Zobrazؤ‚آ­me hrؤ‚ث‡أ„إ¹e s nejvؤ‚آ­ce HP
    if (egoQueue.length === 0) {
        let potentialKing = [...players].filter(p => !p.isZombie && p.hp > 0 && !p.isBot).sort((a, b) => b.hp - a.hp)[0];

        if (potentialKing) {
            if (lastValidBossName !== potentialKing.name) {
                // Pؤ¹â„¢epneme na top HP hrؤ‚ث‡أ„إ¹e pouze pokud vyprؤ¹ث‡el pؤ¹â„¢edchozؤ‚آ­ zؤ‚ث‡mek
                if (millis() > window.bossLockTimer) {
                    lastValidBossName = potentialKing.name;
                    window.bossLockTimer = millis() + 3000;
                }
            }
        } else {
            // Pokud nikdo reؤ‚ث‡lnؤ‚ث‌ nepؤ¹â„¢eؤ¹ؤ¾il nebo nenؤ‚آ­ v arؤ‚آ©nأ„â€؛, Ego Smash se vypne
            lastValidBossName = null;
        }
    }

    // Pokud nenؤ‚آ­ ؤ¹ؤ¾ؤ‚ث‡dnؤ‚ث‌ platnؤ‚ث‌ krؤ‚ث‡l, poؤ¹ث‡leme stؤ‚ث‡vajؤ‚آ­cؤ‚آ­ planety pryأ„إ¹
    if (!lastValidBossName) {
        bossPlanets.forEach(p => { if(!p.isKnockedOut) { p.isKnockedOut = true; p.vx *= 1.5; p.vy *= 1.5; } });
    }

    let activeBossName = lastValidBossName;
    let cx = W/2;
    let cy = (ARENA_TOP+ARENA_BOT)/2;

    // 3. Hledؤ‚ث‡me planetu, kterؤ‚ث‡ patؤ¹â„¢ؤ‚آ­ aktuؤ‚ث‡lnؤ‚آ­mu krؤ‚ث‡li a jeؤ¹ث‡tأ„â€؛ nenؤ‚آ­ zniأ„إ¹enؤ‚ث‡
    let mainPlanet = activeBossName ? bossPlanets.find(p => !p.isKnockedOut && p.name === activeBossName) : null;

    if (!mainPlanet && activeBossName) {
        // Najdeme tu nejnovأ„â€؛jؤ¹ث‡ؤ‚آ­ existujؤ‚آ­cؤ‚آ­ planetu v arؤ‚آ©nأ„â€؛, kterou pؤ¹إ»jdeme nekompromisnأ„â€؛ sestؤ¹â„¢elit
        let previousPlanet = [...bossPlanets].reverse().find(p => !p.isKnockedOut);

        let newPlanet = {
            name: activeBossName,
            x: 0, y: 0, vx: 0, vy: 0, 
            rot: 0, rotSpeed: random(-0.005, 0.005),
            isKnockedOut: false,
            hasSmashed: false,
            targetPlanet: previousPlanet, // Tu budeme lovit (mؤ¹إ»ؤ¹ؤ¾e jich bؤ‚ث‌t takhle i vؤ‚آ­c za sebou jako vlؤ‚ث‡أ„إ¹ek)
            targetPoint: previousPlanet ? null : { x: cx + random(-50, 50), y: cy + random(-50, 50) } // Pokud jsme ؤ‚إںplnأ„â€؛ prvnؤ‚آ­, letؤ‚آ­me do stؤ¹â„¢edu
        };

        // Spawnovؤ‚ث‡nؤ‚آ­ hluboko mimo obrazovku
        let side = floor(random(4));
        let offX = W * 0.7; let offY = H * 0.6;
        if (side === 0) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy - offY; }
        else if (side === 1) { newPlanet.x = cx + offX; newPlanet.y = cy + random(-200, 200); }
        else if (side === 2) { newPlanet.x = cx + random(-200, 200); newPlanet.y = cy + offY; }
        else { newPlanet.x = cx - offX; newPlanet.y = cy + random(-200, 200); }

        // Nejdؤ¹â„¢ؤ‚آ­v natvrdo smazat vؤ¹ث‡echny existujؤ‚آ­cؤ‚آ­ fialovؤ‚آ© koule, aby tam nezؤ¹إ»stؤ‚ث‡valy viset
        bossPlanets = []; 
        bossPlanets.push(newPlanet);
    }

    let pSize = W * 0.40; 
    
    let boundLeft = cx - W * 0.30; let boundRight = cx + W * 0.30;
    let boundTop = cy - (ARENA_BOT - ARENA_TOP) * 0.35; let boundBot = cy + (ARENA_BOT - ARENA_TOP) * 0.35;

    for (let i = bossPlanets.length - 1; i >= 0; i--) {
        let bp = bossPlanets[i];

        // --- POHYBOVؤ‚آپ LOGIKA ---
        if (bp.isKnockedOut) {
            // Letؤ‚آ­ pryأ„إ¹ po prohؤ¹â„¢e
        } else if (!bp.hasSmashed) {
            // A) Mؤ‚آپME Cؤ‚إ¤L -> LETؤ‚إ¤ME ZNIأ„إڑIT STAROU PLANETU
            if (bp.targetPlanet) {
                let dx = bp.targetPlanet.x - bp.x;
                let dy = bp.targetPlanet.y - bp.y;
                let dist = Math.sqrt(dx*dx + dy*dy) || 1;

                let speed = 16; // Agresivnؤ‚آ­ let a pronؤ‚ث‡sledovؤ‚ث‡nؤ‚آ­
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                // Nؤ‚آپRAZ!
                if (dist < pSize * 0.7) {
                    bp.hasSmashed = true;
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                    bp.smashGreenFlash = 90; // Nastavؤ‚آ­ plynulؤ‚ث‌ zelenؤ‚ث‌ pؤ¹â„¢echod na 1.5 vteؤ¹â„¢iny

                    bp.targetPlanet.isKnockedOut = true;
                    bp.targetPlanet.vx = (dx / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.vy = (dy / dist) * 20 + random(-2, 2);
                    bp.targetPlanet.rotSpeed = random(-0.1, 0.1);

                    let liveAttacker = players.find(p => p.name === bp.name);
                    let attackerColor = liveAttacker ? liveAttacker.color : color(255);

                    // ZAKؤ‚آپZؤ‚آپNO: screenShake, particles, flash
                    safePlaySound(pentatonic('low'), 0.05, 0.8); // Jemnؤ‚ث‌ basovؤ‚ث‌ tؤ‚إ‚n
                }
            } 
            // B) ؤ‚إ،PLNأ„إ¤ PRVNؤ‚إ¤ PLANETA -> MAJESTؤ‚آپTNأ„إ¤ Pؤ¹آکILؤ‚â€°Tؤ‚آپ DO STؤ¹آکEDU
            else if (bp.targetPoint) {
                let dx = bp.targetPoint.x - bp.x;
                let dy = bp.targetPoint.y - bp.y;
                let distSq = dx*dx + dy*dy;
                let dist = Math.sqrt(distSq) || 1;
                
                let speed = 6; // Pomalؤ‚ث‌ pؤ¹â„¢ؤ‚آ­let
                bp.vx = (dx / dist) * speed;
                bp.vy = (dy / dist) * speed;

                if (distSq < 225) {
                    bp.hasSmashed = true; // Dorazila na svؤ‚آ© mؤ‚آ­sto doprostؤ¹â„¢ed arؤ‚آ©ny
                    bp.vx = random(-0.5, 0.5); bp.vy = random(-0.5, 0.5);
                }
            }
        } else {
            // C) PLANETA VLؤ‚آپDNE -> ODRؤ‚آپؤ¹ث‌ؤ‚إ¤ SE OD MANTINELؤ¹آ® V ARؤ‚â€°Nأ„إ¤
            if (bp.x < boundLeft) { bp.x = boundLeft; bp.vx *= -1; }
            if (bp.x > boundRight) { bp.x = boundRight; bp.vx *= -1; }
            if (bp.y < boundTop) { bp.y = boundTop; bp.vy *= -1; }
            if (bp.y > boundBot) { bp.y = boundBot; bp.vy *= -1; }
        }

        // Aplikace pohybu
        bp.x += bp.vx;
        bp.y += bp.vy;
        bp.rot += bp.rotSpeed;

        // Smazؤ‚ث‡nؤ‚آ­ planety ze hry, pokud vyletؤ‚آ­ po prohؤ¹â„¢e ؤ‚إںplnأ„â€؛ pryأ„إ¹
        if (bp.isKnockedOut && (bp.x < -W || bp.x > W*2 || bp.y < -H || bp.y > H*2)) {
            bossPlanets.splice(i, 1);
            continue;
        }

        // --- VYKRESLENؤ‚إ¤ A BARVY ---
        push();
        translate(bp.x, bp.y);
        
        // --- VIDITELNOST: Pokud je nأ„â€؛kdo v arؤ‚آ©nأ„â€؛ vأ„â€؛tؤ¹ث‡ؤ‚آ­ neؤ¹ؤ¾ tato planeta, zneviditelnit ---
        let isSomeoneLarger = players.some(p => !p.isZombie && p.r > (pSize / 2) * 0.95);
        if (isSomeoneLarger && !bp.isKnockedOut) {
            pop();
            continue;
        }
        
        // 4. SYNCHRONIZACE BARVY S REؤ‚آپLNOU PILOU HRؤ‚آپأ„إڑE V ARؤ‚â€°Nأ„إ¤
        let livePlayer = players.find(p => p.name === bp.name);
        let outlineColor = color(200); 
        
        if (livePlayer) {
            let danger = constrain(map(Math.max(0, livePlayer.hp), 50, 0, 0, 1), 0, 1);
            outlineColor = lerpColor(livePlayer.color, color(255, 0, 0), danger); // أ„إڑervenؤ‚ث‡ pؤ¹â„¢i umؤ‚آ­rؤ‚ث‡nؤ‚آ­

            // Obnovenؤ‚ث‌ duhovؤ‚ث‌ efekt
            if (livePlayer.giftSpeedTimer > 0 || livePlayer.immunityTimer > 0 || livePlayer.isGodMode || livePlayer.hasRainbowCrown) {
                colorMode(HSB);
                outlineColor = color(getSafeHue(frameCount * 5), 100, 100);
                colorMode(RGB);
            }
        }

        // Plynulؤ‚آ© zezelenؤ‚ث‡nؤ‚آ­ okraje planety po pؤ¹â„¢evzetؤ‚آ­
        if (bp.smashGreenFlash > 0) {
            outlineColor = lerpColor(outlineColor, color(50, 255, 50), bp.smashGreenFlash / 90.0);
            bp.smashGreenFlash--;
        }

        if (!bp.isKnockedOut) {
            // if (players.length < 40) {
            //     drawingContext.shadowBlur = 20 + sin(frameCount * 0.05) * 10;
            //     drawingContext.shadowColor = outlineColor;
            // }
        }

        fill(5, 5, 10, 180);
        stroke(outlineColor);
        strokeWeight(bp.isKnockedOut ? 2 : 5);
        ellipse(0, 0, pSize);
        drawingContext.shadowBlur = 0;


 
        rotate(bp.rot);

        let img = userAvatars[bp.name]; 
        if (img && img !== "loaded") {
            imageMode(CENTER);
            tint(255, bp.isKnockedOut ? 40 : 180); 
            image(img, 0, 0, pSize, pSize);
            noTint();
            
            drawingContext.save();
            let gradient = drawingContext.createRadialGradient(0, 0, pSize * 0.3, 0, 0, pSize * 0.5);
            gradient.addColorStop(0, "rgba(0,0,0,0)");
            gradient.addColorStop(1, "rgba(0,0,0,0.8)");
            drawingContext.fillStyle = gradient;
            drawingContext.fillRect(-pSize/2, -pSize/2, pSize, pSize);
            drawingContext.restore();
        } else {
            fill(outlineColor); noStroke(); ellipse(0, 0, pSize * 0.8);
            fill(255, bp.isKnockedOut ? 30 : 150); 
            textAlign(CENTER, CENTER); textSize(80); text("أ„â€کؤ¹إںأ¢â‚¬آکأ¢â‚¬آک", 0, 0);
        }
        pop();
    }
}

function drawSpaceBackground() {
  flowTime += 0.003;
  globalFlowAngle = sin(flowTime) * 0.25;
  
  // ANTI-DETECT: Rychlost scrollovؤ‚ث‡nؤ‚آ­ se v أ„إ¹ase neustؤ‚ث‡le plynule mأ„â€؛nؤ‚آ­
  let antiBotShift = sin(frameCount * 0.002) * 0.8; 
  let baseScrollSpeed = 1.2 + antiBotShift; 

  noStroke();
  
  drawingContext.save();
  milkyWay.forEach(mw => {
      fill(mw.color);
      ellipse(mw.x, mw.y, mw.r * 2);
      
      mw.x += sin(globalFlowAngle) * 0.2;
      mw.y += cos(globalFlowAngle) * 0.2 + (baseScrollSpeed * 0.1);
      
      if (mw.y > H * 2 + 500) { mw.y = -H - 500; mw.x = random(-W, W*2); }
      if (mw.x > W * 2 + 500) { mw.x = -W - 500; }
      if (mw.x < -W - 500) { mw.x = W * 2 + 500; }
  });
  drawingContext.restore();

  nebulas.forEach(n => {
     fill(n.color);
     ellipse(n.x, n.y, n.r); 
     n.y += n.speed + (baseScrollSpeed * 0.2);
     if (n.y > H * 2 + 1000) { n.y = -H - 1000; n.x = random(-W, W*2); }
  });

  let isExtremeLoad = players.length > 30;
  let starLimit = isExtremeLoad ? stars.length / 3 : stars.length;
  for(let i=0; i<starLimit; i++) {
    let s = stars[i];
    let currentAlpha = s.baseAlpha;
    if (s.isPulsing && !isExtremeLoad) {
        currentAlpha = (s.baseAlpha * 0.5) + sin(frameCount * s.pulseSpeed + s.pulsePhase) * (s.baseAlpha * 0.5);
    }
    fill(s.rC, s.gC, s.bC, currentAlpha);
    rect(s.x, s.y, s.s, s.s);
    
    s.x += sin(globalFlowAngle) * (s.speed * 0.5);
    s.y += s.speed + baseScrollSpeed * s.layer; 
    
    if (s.y > H * 2) { s.y = -H; s.x = random(-W, W * 2); }
    else if (s.y < -H) { s.y = H * 2; s.x = random(-W, W * 2); }
    if (s.x > W * 2) { s.x = -W; s.y = random(-H, H * 2); }
    else if (s.x < -W) { s.x = W * 2; s.y = random(-H, H * 2); }
  }

  // ZAKؤ‚آپZؤ‚آپNO dle poؤ¹ؤ¾adavku: Vesmؤ‚آ­r bez planet a objektؤ¹إ»
  // drawingContext.save();
  // handleBackgroundObjects(baseScrollSpeed);
  // drawingContext.restore();

  if (random() < 0.04) { 
      let side = Math.floor(random(4));
      let sx, sy, svx, svy;
      
      if (side === 0) { sx = random(-W, W*2); sy = -H; svx = random(-20, 20); svy = random(20, 50); }
      else if (side === 1) { sx = random(-W, W*2); sy = H*2; svx = random(-20, 20); svy = random(-50, -20); }
      else if (side === 2) { sx = -W; sy = random(-H, H*2); svx = random(20, 50); svy = random(-20, 20); }
      else { sx = W*2; sy = random(-H, H*2); svx = random(-50, -20); svy = random(-20, 20); }
      
      shootingStars.push({
          x: sx, y: sy, 
          vx: svx, vy: svy, 
          life: 255, length: random(40, 150),
          thick: random(1, 4)
      });
  }

  for (let i = shootingStars.length - 1; i >= 0; i--) {
      let s = shootingStars[i];
      stroke(255, 255, 255, s.life); strokeWeight(s.thick);
      line(s.x, s.y, s.x - s.vx * (s.length/20), s.y - s.vy * (s.length/20));
      s.x += s.vx; s.y += s.vy; 
      s.life -= 4; 
      
      // 3. Detekce nؤ‚ث‡razu do hrؤ‚ث‡أ„إ¹ؤ¹إ»
      let hit = false;
      for (let p of players) {
          let d = dist(s.x, s.y, p.body.position.x, p.body.position.y);
          
          // OPRAVA 1: Vأ„â€؛tؤ¹ث‡ؤ‚آ­ hitbox (o 20px), aby rychlؤ‚آ© hvأ„â€؛zdy neproletأ„â€؛ly skrz hrؤ‚ث‡أ„إ¹e bez detekce
          let sSize = s.size || s.thick || 5; 
          if (d < p.r + sSize + 20) { 
              
              let speedMag = dist(0, 0, s.vx, s.vy);
              let dirX = s.vx / speedMag;
              let dirY = s.vy / speedMag;
              
              // Zvؤ‚ث‌ؤ¹ث‡enؤ‚ث‡ sؤ‚آ­la pro vؤ‚ث‌raznأ„â€؛jؤ¹ث‡ؤ‚آ­ odhozenؤ‚آ­ hrؤ‚ث‡أ„إ¹e (bez exploze)
              let pushForce = 0.006 * p.body.mass; 
              
              Matter.Body.applyForce(p.body, p.body.position, {
                  x: dirX * pushForce,
                  y: dirY * pushForce
              });

              hit = true;
              break; 
          }
      }

      if (hit) {
          shootingStars.splice(i, 1);
          continue;
      }

      if (s.life <= 0 || s.x < -W*1.5 || s.x > W*2.5 || s.y < -H*1.5 || s.y > H*2.5) {
          shootingStars.splice(i, 1);
      }
  }
  noStroke();
}

function drawDeathShockwaves() {
  for (let i = deathShockwaves.length - 1; i >= 0; i--) {
      let sw = deathShockwaves[i];
      noFill();
      stroke(red(sw.color), green(sw.color), blue(sw.color), sw.life);
          strokeWeight(map(sw.life, 255, 0, sw.isNuke ? 50 : 8, 1)); // Zjednoduؤ¹ث‡enؤ‚ث‡ tlouؤ¹ث‡ؤ¹ؤ„ka
      ellipse(sw.x, sw.y, sw.r); // Vؤ‚ث‌slednؤ‚ث‡ exploze je nynؤ‚آ­ poloviأ„إ¤nؤ‚آ­ (sw.r mؤ‚آ­sto sw.r * 2)
          sw.r += sw.isNuke ? 25 : 8; // Rychlejؤ¹ث‡ؤ‚آ­ rozpؤ‚آ­nؤ‚ث‡nؤ‚آ­ rؤ‚ث‡zovؤ‚آ© vlny
          sw.life -= sw.isNuke ? 4 : 25; // Mnohem rychlejؤ¹ث‡ؤ‚آ­ zmizenؤ‚آ­ (أ„إ¹istؤ¹ث‡ؤ‚آ­ animace)
      if (sw.life <= 0) deathShockwaves.splice(i, 1);
  }
}

function drawLightnings() {
  for(let i = lightnings.length - 1; i >= 0; i--) {
    let l = lightnings[i];
    let a = Math.min(255, l.life * 20); 
    let segs = 4; // Vؤ‚آ­ce segmentؤ¹إ» pro rozeklanأ„â€؛jؤ¹ث‡ؤ‚آ­ vzhled
    let pts = [{x: l.x1, y: l.y1}];
    
    for(let j = 1; j < segs; j++) {
        pts.push({
            x: lerp(l.x1, l.x2, j/segs) + random(-20, 20), 
            y: lerp(l.y1, l.y2, j/segs) + random(-20, 20)
        });
    }
    pts.push({x: l.x2, y: l.y2});

    // Zvؤ‚ث‌raznأ„â€؛nؤ‚ث‡ vnأ„â€؛jؤ¹ث‡ؤ‚آ­ zؤ‚ث‡ؤ¹â„¢e
    stroke(red(l.c), green(l.c), blue(l.c), a);
    strokeWeight(l.life * 1.2 + 4);
    noFill();
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    // Silnأ„â€؛jؤ¹ث‡ؤ‚آ­ svأ„â€؛tlؤ‚آ© jؤ‚ث‡dro
    stroke(255, a + 50);
    strokeWeight(l.life * 0.5 + 2);
    beginShape();
    for(let p of pts) vertex(p.x, p.y);
    endShape();

    l.life--;
    if(l.life <= 0) lightnings.splice(i, 1);
  }
}

function drawPlayer(p) {
  let pos = p.body.position; 
  let safeHp = Math.max(0, p.hp);
  let isBuffed = p.likeBuffTimer && millis() < p.likeBuffTimer;
  // p.likeBuffTimer--; // Jiؤ¹ؤ¾ nenؤ‚آ­ potؤ¹â„¢eba, pouؤ¹ؤ¾ؤ‚آ­vؤ‚ث‡me millis()
  
  let isLeader = (currentTop10[0] === p.name && !p.isZombie);
  let isSecond = (currentTop10[1] === p.name && !p.isZombie);
  let isThird = (currentTop10[2] === p.name && !p.isZombie);
  
  // 1. FIRE TRAIL smazؤ‚ث‡n

  // 2. GOD MODE KOUZLO
  if (p.isGodMode) {
      p.godModeTimer--;
      if (p.godModeTimer <= 0) p.isGodMode = false;
  }

  // Rotace (Zrychleno 10x pؤ¹â„¢i lajkovؤ‚ث‡nؤ‚آ­)
  let baseSpin = 0.02 + Math.min(safeHp * 0.000015, 0.2);
  if (safeHp >= 1000) baseSpin = 0.08 + Math.min(safeHp * 0.00002, 0.4);
  if (p.orbSpeedTimer > 0) baseSpin = Math.max(baseSpin, 0.35);
  p.rot += isBuffed ? baseSpin * p.baseRotDir * 10 : baseSpin * p.baseRotDir;
  
  let isHeavyLoad = players.length > 15;
  let isExtremeLoad = players.length > 30;
  let isEpic = safeHp >= 1000;
  let dangerFactor = constrain(map(safeHp, 50, 0, 0, 1), 0, 1);
  if (p.isZombie) dangerFactor = 0;
  
  let actualColor = lerpColor(p.color, color(255, 0, 0), dangerFactor);

  // Vykreslenؤ‚آ­ stopy (trail) - Vypnuto pro boty pro odstranأ„â€؛nؤ‚آ­ "teأ„إ¹ky" uprostؤ¹â„¢ed
  if (!isExtremeLoad && p.trail.length > 1 && !p.isBot) {
      noFill();
      for (let i = 0; i < p.trail.length - 1; i++) {
          stroke(red(actualColor), green(actualColor), blue(actualColor), map(i, 0, p.trail.length, 0, 150));
          strokeWeight(map(i, 0, p.trail.length, p.r * 0.2, p.r * 0.8));
          line(p.trail[i].x, p.trail[i].y, p.trail[i+1].x, p.trail[i+1].y);
      }
  }

  push(); 
  translate(pos.x, pos.y);

  // === ELASTICKؤ‚إ¥ ؤ¹ث‌ELATINOVؤ‚إ¥ EFEKT (POUZE PRO BOTY) ===
  if (p.isBot) {
      // Inicializace promأ„â€؛nnؤ‚ث‌ch pro plynulؤ‚ث‌ dojezd (pokud jeؤ¹ث‡tأ„â€؛ neexistujؤ‚آ­)
      if (typeof p.visualStretch === 'undefined') {
          p.visualStretch = 0;
          p.stretchAngle = 0;
      }

      let vel = p.body.velocity;
      let speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y); // Aktuؤ‚ث‡lnؤ‚آ­ rychlost
      
      // Vypoأ„إ¤ؤ‚آ­tؤ‚ث‡me, jak moc by se mأ„â€؛la kuliأ„إ¤ka natؤ‚ث‡hnout (max o 35 %)
      let targetStretch = Math.min(speed * 0.015, 0.35); 
      
      // ؤ‚إ،hel letu mأ„â€؛nؤ‚آ­me, jen kdyؤ¹ؤ¾ se reؤ‚ث‡lnأ„â€؛ hؤ‚ث‌be (aby se guma nekroutila pؤ¹â„¢i zastavenؤ‚آ­)
      if (speed > 0.5) {
          p.stretchAngle = Math.atan2(vel.y, vel.x);
      }

      // Plynulؤ‚ث‡ interpolace - tohle vytvoؤ¹â„¢ؤ‚آ­ ten gumovؤ‚ث‌ dojezd po nؤ‚ث‡razu
      p.visualStretch = lerp(p.visualStretch, targetStretch, 0.2);

      // Aplikace gumovؤ‚آ©ho efektu na plؤ‚ث‡tno
      if (p.visualStretch > 0.01) {
          rotate(p.stretchAngle); // Natoأ„إ¤ؤ‚آ­me plؤ‚ث‡tno po smأ„â€؛ru letu
          scale(1 + p.visualStretch, 1 - p.visualStretch); // Natؤ‚ث‡hneme do dؤ‚آ©lky a splؤ‚ث‡cneme do ؤ¹ث‡ؤ‚آ­ؤ¹â„¢ky
          rotate(-p.stretchAngle); // Vrؤ‚ث‡tؤ‚آ­me rotaci zpأ„â€؛t, aby se profilovka neprotؤ‚ث‡أ„إ¤ela vzhؤ¹إ»ru nohama
      }
  }
  // ==================================================

  scale(isBuffed ? 1.05 : 1.0);
  rotate(p.rot);


  let r = p.r; // Pouؤ¹ؤ¾ijeme vizuؤ‚ث‡lnؤ‚آ­ rؤ‚ث‡dius (100 %) mؤ‚آ­sto fyzickؤ‚آ©ho hitboxu (80 %)
  let visualR = r;

  if (p.hp >= 2000 && p.hp < 5000) {
      visualR = r + sin(frameCount * 0.1 + p.body.id) * (r * 0.1);
      noStroke();
      fill(255, 50, 0, 80);
      circle(0, 0, visualR * 2.8 + random(-2, 2));
      fill(255, 150, 0, 120);
      circle(0, 0, visualR * 2.3);
  }
  else if (p.hp >= 5000 && p.hp < 10000) {
      let t = frameCount * 0.08 + p.body.id;
      for(let i = 0; i < 3; i++) {
          let angle = t + (i * TWO_PI / 3);
          let orbX = cos(angle) * (r * 1.8);
          let orbY = sin(angle) * (r * 1.8);
          noStroke();
          fill(0, 242, 254, 200);
          circle(orbX, orbY, r * 0.5);
          fill(255);
          circle(orbX, orbY, r * 0.2);
      }
  }
  else if (p.hp >= 10000) {
      noStroke();
      fill(50, 0, 80, 150);
      circle(0, 0, r * 3.5);
      stroke(200, 50, 255, 200);
      strokeWeight(2);
      for(let i = 0; i < 3; i++) {
          if (random() > 0.4) {
              let angle = random(TWO_PI);
              let l1 = r * random(1.2, 1.8);
              let l2 = r * random(2.0, 3.5);
              let a2 = angle + random(-0.3, 0.3);
              let x1 = cos(angle) * l1, y1 = sin(angle) * l1;
              let x2 = cos(a2) * l2, y2 = sin(a2) * l2;
              line(0, 0, x1, y1);
              line(x1, y1, x2, y2);
          }
      }
  }

  // 3. BOT FACE (Vypnuto - boti nynؤ‚آ­ majؤ‚آ­ profilovky jako reؤ‚ث‡lnؤ‚آ­ hrؤ‚ث‡أ„إ¹i)
  /*
  if (p.isBot) {
      drawBotFace(0, 0, p.r);
  }
  */

  // Varovnؤ‚آ© pulzovؤ‚ث‡nؤ‚آ­ pro umؤ‚آ­rajؤ‚آ­cؤ‚آ­ (Vypnuto pro boty)
  if (!p.isBot && (p.auraFlash > 0 || dangerFactor > 0)) {
      let glowAlpha = p.auraFlash > 0 ? p.auraFlash * 15 : 0;
      if(dangerFactor > 0) glowAlpha = max(glowAlpha, dangerFactor * 120 + sin(frameCount*0.3)*80);
      fill(red(actualColor), green(actualColor), blue(actualColor), glowAlpha);
      noStroke();
      ellipse(0, 0, p.r * 1.8);
  }
  if(p.auraFlash > 0) p.auraFlash--;

  // Speciؤ‚ث‡lnؤ‚آ­ zlatؤ‚ث‡ pulzujؤ‚آ­cؤ‚آ­ aura pro vedoucؤ‚آ­ho hrؤ‚ث‡أ„إ¹e (Vypnuto pro boty)
  if (isLeader && !p.isBot) {
      fill(255, 215, 0, 50 + sin(frameCount * 0.15) * 30);
      noStroke();
      ellipse(0, 0, p.r * 2.4 + sin(frameCount * 0.2) * 15);
  }

  // Buff zؤ‚ث‡ؤ¹â„¢e (Duhovؤ‚ث‡ pro korunku, bؤ‚آ­lؤ‚ث‡ pro bأ„â€؛ؤ¹ؤ¾nؤ‚ث‌ buff)
  if (isBuffed && !p.isBot) { 
      if (p.hasCrown || p.immunityTimer > 0) {
          colorMode(HSB);
          fill(getSafeHue(frameCount * 5), 70, 100, 100 + sin(frameCount * 0.4) * 60);
          colorMode(RGB);
      } else {
          fill(255, 255, 255, 80 + sin(frameCount * 0.5) * 80); 
      }
      noStroke();
      ellipse(0, 0, p.r * 2.0);
  }

  let outlineColor = actualColor;
  if (p.giftSpeedTimer > 0 || p.immunityTimer > 0 || p.isGodMode || p.hasRainbowCrown) {
      colorMode(HSB);
      outlineColor = color(getSafeHue(frameCount * 8), 100, 100); 
      colorMode(RGB);
  }
  if (p.isZombie) outlineColor = color(50, 255, 255); // Tyrkysovؤ‚ث‡ pro zombؤ‚آ­ky (vؤ‚آ­c sci-fi)

  // 4. BOT CRUSHER AURA (ؤ¹ث‌lutؤ‚آ© blesky / zؤ‚ث‡ؤ¹â„¢e)
  if (p.botDmgTimer > 0) {
      push();
      stroke(255, 255, 0, 150 + sin(frameCount * 0.5) * 100);
      strokeWeight(4);
      noFill();
      let auraR = p.r * 1.4 + sin(frameCount * 0.3) * 5;
      ellipse(0, 0, auraR);
      
      // Obأ„إ¤asnؤ‚آ© jiskry
      if (frameCount % 6 === 0) {
          createParticles(pos.x + random(-p.r, p.r), pos.y + random(-p.r, p.r), color(255, 255, 0), 2);
      }
      pop();
  }

  let baseR = red(actualColor);
  let baseG = green(actualColor);
  let baseB = blue(actualColor);

  if (p.sawFade === undefined) p.sawFade = 0;
  if (isBuffed) {
      p.sawFade = Math.min(1.0, p.sawFade + 0.1); 
  } else {
      p.sawFade = Math.max(0.0, p.sawFade - 0.05); 
  }

  if (p.sawFade > 0.01) {
      let teeth = isEpic ? 32 : 24; // Snؤ‚آ­ؤ¹ؤ¾eno pro vؤ‚ث‌kon
      let rOuter = p.r * 1.45; // Vetsi hroty pro lepsi viditelnost
      let rInner = p.r * 1.25;
      let sawAlpha = p.sawFade * 255;

      push();
      // Rychlؤ‚ث‡ rotace cirkulؤ‚ث‡rky (zpomaleno z 0.6 na 0.3 pro lepؤ¹ث‡ؤ‚آ­ viditelnost pohybu)
      rotate(frameCount * 0.3 * p.baseRotDir); 

      // INDUSTRIؤ‚آپLNؤ‚إ¤ VZHLED: Tmavؤ‚ث‌ kov s brouؤ¹ث‡enؤ‚ث‌m ostؤ¹â„¢ؤ‚آ­m
      noStroke();
      fill(40, sawAlpha); // Tmavؤ‚ث‌ zؤ‚ث‡klad disku
      ellipse(0, 0, rOuter * 1.8);

      // 1. ZUBY (Brouؤ¹ث‡enؤ‚ث‡ ocel)
      fill(red(actualColor), green(actualColor), blue(actualColor), sawAlpha * 0.8);
      beginShape();
      for(let i = 0; i < teeth; i++) {
          let idx = Math.floor(i * (64 / teeth)); // 64 je velikost cache pole
          let ang = sawAngles[idx];
          
          // Agresivnؤ‚آ­, ale krؤ‚ث‡tkؤ‚آ© prؤ¹إ»myslovؤ‚آ© zuby - cache optimalizace
          vertex(ang.a1_cos * rInner, ang.a1_sin * rInner); 
          vertex(ang.a2_cos * rOuter, ang.a2_sin * rOuter); 
          vertex(ang.a3_cos * rInner, ang.a3_sin * rInner);
      }
      endShape(CLOSE);

      // 2. VNITؤ¹آکNؤ‚إ¤ MECHANIKA (Brouؤ¹ث‡enؤ‚ث‌ kov s odlesky)
      fill(180, sawAlpha * 0.4);
      ellipse(0, 0, p.r * 2.4);
      
      stroke(255, sawAlpha * 0.5);
      strokeWeight(1);
      noFill();
      ellipse(0, 0, p.r * 2.3); // Detailnؤ‚آ­ krouؤ¹ؤ¾ek uvnitؤ¹â„¢
      
      // Dynamickؤ‚آ© odlesky na أ„إ¹epeli smazؤ‚ث‡ny
      drawingContext.shadowBlur = 0;
      pop();
  }
  
  if (p.isZombie) {
      push();
      drawingContext.setLineDash([8, 8]);
      strokeWeight(2); noFill();
      stroke(80, 200, 80, 100); // Pؤ¹إ»vodnأ„â€؛ أ„إ¹ervenؤ‚ث‡, nynؤ‚آ­ zelenؤ‚ث‡
      ellipse(0, 0, p.r * 1.6);
      drawingContext.lineDashOffset = 8;
      stroke(100, 255, 100, 100); // Svأ„â€؛tlejؤ¹ث‡ؤ‚آ­ zelenؤ‚ث‡ pro druhؤ‚ث‌ pruh
      drawingContext.setLineDash([]); drawingContext.lineDashOffset = 0;
      pop();
  }

  rotate(-p.rot); 
  
  if (p.isBounty) {
      push();
      rotate(frameCount * 0.05);
      let tSize = p.r * 2.8 + sin(frameCount * 0.2) * 10;
      fill(255, 0, 0, 40); stroke(255, 50, 50, 200); strokeWeight(3);
      ellipse(0, 0, tSize);
      let cL = tSize * 0.2;
      line(-tSize/2 - 10, 0, -tSize/2 + cL, 0); line(tSize/2 + 10, 0, tSize/2 - cL, 0);
      line(0, -tSize/2 - 10, 0, -tSize/2 + cL); line(0, tSize/2 + 10, 0, tSize/2 - cL);
      noFill(); stroke(255, 0, 0, 100); strokeWeight(1); ellipse(0, 0, tSize * 0.6);
      pop();
  }

  if (p.immunityTimer > 0) {
      push();

      pop();
  }

  if (p.hasCrown) {
      push();
      translate(0, -p.r * 1.5 - 10);
      fill(255, 215, 0); stroke(255); strokeWeight(2);
      beginShape();
      vertex(-15, 0); vertex(-25, -15); vertex(-8, -8); 
      vertex(0, -25); vertex(8, -8); vertex(25, -15); vertex(15, 0);
