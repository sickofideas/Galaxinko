<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxinko - Lite Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #050508;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
      font-family: sans-serif;
    }
    #game-container {
      position: relative;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
    }
    canvas {
      display: block;
    }
    #admin-bar {
      position: absolute;
      top: -40px;
      left: 0;
      width: 900px;
      height: 40px;
      background: #111;
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 0 10px;
      box-sizing: border-box;
      font-size: 12px;
      z-index: 100;
      border-bottom: 2px solid #333;
    }
    #admin-bar input[type="range"] {
      width: 80px;
    }
    #admin-bar button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 3px;
    }
    #resetBtn {
      background: #f44336 !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="admin-bar">
      <button id="langBtn">LANG: CZ</button>
      <span>Grav: <input type="range" id="gravSlider" min="0.01" max="3" step="0.01" value="0.8"></span>
      <span>Bounce: <input type="range" id="bounceSlider" min="0.1" max="1.5" step="0.1" value="0.8"></span>
      <span>Vol: <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.5"></span>
      <button id="autoBtn">AUTO: ON</button>
      <button id="resetBtn">RESET SCORES</button>
    </div>
  </div>

<script>
// ==========================================
// GALAXINKO LITE - PURE DOPAMINE EDITION
// ==========================================
const GAME_TITLE = "GALAXINKO LITE";
const GAME_VERSION = "v15.0.2"; 

let currentLang = "CZ";
const W = 900;
const H = 1100;       // Celková výška plátna
const PLAY_H = 1000;  // Kde končí herní plocha (zdi a zóny)
const ZONE_H = 80;

const T = {
  EN: {
    LIVE: "🔴 LIVE ", SYS_ON: "SYSTEM: ONLINE", SYNC: "TELEMETRY: GREEN",
    GFORCE: "G-FORCE:", BOUNCEX: "BOUNCE-X:", REC: "RECORDS",
    WARP_CORE: "MISSION TIME:", TOP: "TOP COMMANDERS",
    WARN: "WARNING: RE-ENTRY", RET: "CALCULATING ORBITS...", COMPL: "MISSION COMPLETE",
    SECTOR: "ORBIT:", NEXT: "NEXT LAUNCH IN:", NEW_C: "🔥 NEW COMMANDER! 🔥", L_PL: "PLAYER_UPLINK",
    TTS_POW: "Thruster boost from ", TTS_INC: "Incoming payload from ",
    TTS_SEC_C: "Orbit operations complete.", TTS_SEC_W: "Welcome to orbit ",
    TTS_WELC: "Welcome aboard ", 
    GIFT_MSGS: ["Make way, space sponsor {0} is dropping credits!", "Attention! {0} just bought a piece of the galaxy!", "{0} activated the money warp drive!"],
    GIFT_ALERT: "🔥 {0} ACTIVATED GIFT RAIN! 🔥"
  },
  CZ: {
    LIVE: "🔴 ŽIVĚ ", SYS_ON: "SYSTÉM: ONLINE", SYNC: "TELEMETRIE: OK",
    GFORCE: "G-SÍLA:", BOUNCEX: "ODRAZ-X:", REC: "REKORDY",
    WARP_CORE: "ČAS MISE:", TOP: "NEJLEPŠÍ PILOTI",
    WARN: "VAROVÁNÍ: NÁVRAT", RET: "KALKULACE ORBITY...", COMPL: "MISE DOKONČENA",
    SECTOR: "ORBITA:", NEXT: "DALŠÍ START ZA:", NEW_C: "🔥 NOVÝ VELITEL! 🔥", L_PL: "HRÁČ_UPLINK",
    TTS_POW: "Zážeh motorů od ", TTS_INC: "Přilétá náklad od ",
    TTS_SEC_C: "Operace na orbitě dokončeny.", TTS_SEC_W: "Vítejte na orbitě ",
    TTS_WELC: "Vítej na palubě ",
    GIFT_MSGS: ["Ustupte, vesmírný sponzor {0} rozhazuje kredity!", "Pozor! {0} si právě koupil kus galaxie!", "{0} aktivuje peněžní warp pohon!"],
    GIFT_ALERT: "🔥 {0} SPUSTIL DÉŠŤ DÁRKŮ! 🔥"
  }
};

const UI_THEMES = [[0, 255, 255], [255, 50, 255], [50, 255, 50], [255, 200, 0], [255, 100, 50]];
let currentTheme = UI_THEMES[0];

let engine, world;
let balls = [], pegs = [], zones = [], walls = [], explosions = [];
let leaderboard = {}, giftLeaderboard = {}, allTimeRecords = [];
let timer = 180, resultsTimer = 10, lastTick = 0, roundCount = 1, waitStartTime = 0;
let gameState = "PLAYING", flashEffect = 0, shakeAmount = 0;
let currentDestination = "NEON PRIME";
let currentGravity = 0.8, currentBounce = 0.8;
let portals = [], floatingTexts = [], shockwaves = [], joinPopupQueue = [], activeJoinPopup = null;
let spamBuffer = {};
let avatarRibbon = [], userAvatars = {};
let fxSynth, audioStarted = false;
let isAutoMode = true;

// Background
let stars = [], dust = [], shootingStars = [];

const TIKFINITY_URL = "ws://localhost:21213/";
let socket;
let availableVoices = [];
let camOffset = { x: 0, y: 0, z: 1.0 }; // Pro hud

function setup() {
  let cvs = createCanvas(W, H);
  cvs.parent('game-container');
  smooth();
  textFont('Press Start 2P');
  
  fxSynth = new p5.PolySynth();
  fxSynth.setADSR(0.01, 0.1, 0.2, 0.1);
  
  for (let i = 0; i < 150; i++) stars.push({ x: random(W), y: random(H), s: random(1, 3), speed: random(0.2, 0.6) });
  for (let i = 0; i < 300; i++) dust.push({ x: random(W), y: random(H), s: random(0.5, 2) });
  
  setupDOMControls();
  initTTS();
  initGame();
  connectTikfinity();
}

function setupDOMControls() {
  document.getElementById('langBtn').onclick = () => {
    currentLang = currentLang === "EN" ? "CZ" : "EN";
    document.getElementById('langBtn').innerText = 'LANG: ' + currentLang;
  };
  document.getElementById('autoBtn').onclick = () => {
    isAutoMode = !isAutoMode;
    document.getElementById('autoBtn').innerText = isAutoMode ? 'AUTO: ON' : 'AUTO: OFF';
    document.getElementById('autoBtn').style.background = isAutoMode ? '#4CAF50' : '#555';
  };
  document.getElementById('resetBtn').onclick = () => {
    leaderboard = {};
    giftLeaderboard = {};
    avatarRibbon = [];
  };
}

function connectTikfinity() {
  socket = new WebSocket(TIKFINITY_URL);
  socket.onopen = () => console.log("[Tikfinity] Connected");
  socket.onmessage = (e) => {
    try {
      let d = JSON.parse(e.data);
      let evt = d?.event || d?.type || "";
      let n = d?.data?.nickname || d?.data?.uniqueId || "Anonym";
      
      if (n && n !== "Anonym") {
        let u = n.substring(0, 15).replace(/[^\p{L}\p{N} ]/gu, "").trim() || "Pilot";
        
        // Avatar loading
        let imgUrl = d?.data?.profilePictureUrl || d?.profilePictureUrl || "";
        if (imgUrl && !userAvatars[u]) {
          loadImage(imgUrl, img => { userAvatars[u] = img; joinPopupQueue.push({name: u, img: img}); }, () => {});
        } else if (!userAvatars[u]) {
          joinPopupQueue.push({name: u, img: null});
          userAvatars[u] = "loaded"; // prevent spam
        }

        if (evt === "chat") {
          spawnBall(u);
        } else if (evt === "gift") {
          // --- TIKTOK GIFTS MECHANIC ---
          let giftValue = d?.data?.diamonds || 1; 
          let amountOfBalls = giftValue * 3; // 3 neonové koule za každý coin
          spawnGiftBalls(u, amountOfBalls);
        } else if (evt === "like") {
          let c = d.data?.likeCount || 1;
          handleLikes(u, c);
        } else if (evt === "follow") {
          spawnBall(u, 3); // 3 balls for follow
          if (random() < 0.3) speakName(u);
        }
      }
    } catch (err) {}
  };
  socket.onclose = () => setTimeout(connectTikfinity, 5000);
}

function handleLikes(u, c) {
  if (!spamBuffer[u]) {
    spamBuffer[u] = { total: 0, buffered: 0, state: 'CHARGING', fade: 255 };
    if (!avatarRibbon.find(a => a.name === u)) {
      avatarRibbon.push({ name: u, color: color(random(100,255), random(100,255), random(100,255)), displayUntil: millis() + 3600000 });
    }
  }
  let sp = spamBuffer[u];
  sp.state = 'CHARGING';
  sp.fade = 255;
  sp.total += c;
  
  if (sp.total < 10) {
    for (let i = 0; i < min(c, 10); i++) setTimeout(() => spawnBall(u), i * 100);
  } else {
    sp.buffered += c;
  }
}

function spawnGiftBalls(userName, amount) {
  if (!audioStarted) startSpaceAudio();
  
  if (!giftLeaderboard[userName]) giftLeaderboard[userName] = { totalGifts: 0, expireTime: 0 };
  giftLeaderboard[userName].totalGifts += amount;
  giftLeaderboard[userName].expireTime = millis() + (amount * 60000); // 1 min per ball
  
  // Priority TTS
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  speakAnnouncer(random(T[currentLang].GIFT_MSGS).replace("{0}", userName), 2);
  
  shakeAmount = 40;
  playJackpotSound();
  addFloatingText(T[currentLang].GIFT_ALERT.replace("{0}", userName), W/2, H/2, color(255, 215, 0), true);

  // Rain effect
  for (let i = 0; i < amount; i++) {
    setTimeout(() => {
      let bSize = 22; 
      let b = Matter.Bodies.rectangle(W/2 + random(-150, 150), 30, bSize, bSize, { 
        restitution: 0.5, friction: 0.1, density: 0.05 
      });
      let bCol = (i % 2 === 0) ? color(255, 215, 0) : color(random(100,255), random(100,255), 255);
      
      balls.push({ 
        body: b, name: userName, color: bCol, scored: false, combo: 0, 
        spawnTime: millis(), isRainbow: (i%2!==0), portalCooldown: 0, 
        multiplier: 1, size: bSize, isGiftBall: true 
      });
      Matter.World.add(world, b);
      playSpawnSound();
    }, i * 120);
  }
}

function spawnBall(userName, mult = 1) {
  if (gameState !== "PLAYING" || balls.length > 500) return;
  if (!audioStarted) startSpaceAudio();
  playSpawnSound();
  
  let bSize = 14; 
  let ballBody = Matter.Bodies.rectangle(W/2 + random(-30, 30), 40, bSize, bSize, { 
    restitution: currentBounce, friction: 0.2, density: 0.001 
  });
  
  if (!leaderboard[userName]) leaderboard[userName] = { score: 0, color: color(random(100, 255), random(150, 255), random(150, 255)) };
  
  balls.push({ 
    body: ballBody, name: userName, color: leaderboard[userName].color, 
    scored: false, combo: 0, spawnTime: millis(), isRainbow: false, 
    portalCooldown: 0, multiplier: mult, size: bSize, isGiftBall: false 
  });
  Matter.World.add(world, ballBody);
}

function initGame() {
  engine = Matter.Engine.create({ enableSleeping: true }); 
  world = engine.world; 
  world.gravity.y = currentGravity;

  let opts = { isStatic: true, restitution: 1.2, friction: 0 };
  Matter.World.add(world, [ 
    Matter.Bodies.rectangle(-25, PLAY_H / 2, 50, PLAY_H * 2, opts), 
    Matter.Bodies.rectangle(W + 25, PLAY_H / 2, 50, PLAY_H * 2, opts), 
    Matter.Bodies.rectangle(W / 2, PLAY_H + 48, W, 100, { isStatic: true, friction: 1 }) 
  ]);
  
  let blocker = Matter.Bodies.circle(W / 2, 130, 4, { isStatic: true, restitution: 1.5 }); 
  pegs.push(blocker); Matter.World.add(world, blocker);
  
  // Portals
  portals = [{ x: random(100, W - 100), y: random(200, 400) }, { x: random(100, W - 100), y: random(PLAY_H - 350, PLAY_H - 150) }];
  
  // Peg Board (Clean Diamond Pattern)
  let spacingX = 40, spacingY = 40, startY = 220;
  let rows = Math.floor((PLAY_H - 300) / spacingY);
  let cols = Math.floor((W - 100) / spacingX);
  let startX = (W - (cols * spacingX)) / 2;

  for (let r = 0; r < rows; r++) {
    let rowCols = cols;
    let isOffset = (r % 2 === 1);
    if (isOffset) rowCols -= 1;
    let rStartX = startX + (isOffset ? spacingX / 2 : 0);

    for (let c = 0; c < rowCols; c++) {
      let cDist = Math.abs(c - rowCols / 2);
      let midR = rows / 2; 
      let rDist = Math.abs(r - midR); 
      
      // Diamond Shape logic
      if (cDist + rDist * 0.8 <= cols / 2) {
        let px = rStartX + c * spacingX + random(-1, 1);
        let py = startY + r * spacingY;
        let pg = Matter.Bodies.circle(px, py, 4, { isStatic: true, restitution: currentBounce, collisionFilter: { category: 2 } });
        pg.isBonus = random() < 0.03;
        pegs.push(pg); Matter.World.add(world, pg);
      }
    }
  }
  
  // Zones
  let sV = [5000, 1000, 500, 200, 100, 50, 20, 10, 5, 2, 1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 5000];
  let cX = 0; zones = [];
  for (let i = 0; i < 21; i++) {
    let zW = (map(abs(i - 10), 0, 10, 2.5, 1.0) / 36.1) * W;
    zones.push({ 
      x: cX, w: zW, score: sV[i], flash: 0, 
      baseColor: sV[i] >= 5000 ? color(50, 45, 15, 180) : color(10, 10, 40, 180) 
    });
    if (i > 0) { 
      let wl = Matter.Bodies.rectangle(cX, PLAY_H - (ZONE_H / 2), 6, ZONE_H, { isStatic: true, friction: 0.5 }); 
      walls.push(wl); Matter.World.add(world, wl); 
    }
    cX += zW;
  }
}

function draw() {
  if (!engine) return;
  
  // Sync UI Sliders
  let gV = parseFloat(document.getElementById('gravSlider').value);
  let bV = parseFloat(document.getElementById('bounceSlider').value);
  if (gV !== currentGravity || bV !== currentBounce) {
    if (isAutoMode) document.getElementById('autoBtn').click();
    currentGravity = gV; currentBounce = bV;
    world.gravity.y = currentGravity;
  }

  if (isAutoMode && frameCount % 600 === 0) {
    currentGravity = random(0.5, 1.5);
    currentBounce = random(0.5, 1.2);
    document.getElementById('gravSlider').value = currentGravity;
    document.getElementById('bounceSlider').value = currentBounce;
    world.gravity.y = currentGravity;
  }

  background(5, 5, 12);
  drawBackground();
  
  Matter.Engine.update(engine, 1000 / 60);

  push();
  if (shakeAmount > 0) {
    translate(random(-shakeAmount, shakeAmount), random(-shakeAmount, shakeAmount));
    shakeAmount *= 0.85;
  }

  drawPortals();
  drawZones();
  drawWalls();
  drawPegs();
  handleSpamBuffer();
  drawBalls();
  drawExplosions();
  handleShockwaves();
  handleFloatingTexts();
  handleJoinPopups();
  
  drawUI();
  drawVIPGifterBar();
  drawProceduralHUD();
  drawAntiBotOverlay();
  
  if (gameState === "WAITING") {
    drawTxt(T[currentLang].WARN, W/2, PLAY_H/2, color(255, 50, 50), 30, CENTER);
  }
  if (gameState === "RESULTS") {
    drawResultsOverlay();
  }

  if (flashEffect > 0) {
    noStroke(); fill(255, 255, 255, map(flashEffect, 0, 60, 0, 150)); 
    rect(0, 0, W, H); flashEffect--;
  }
  
  drawCallToAction();
  pop();

  if (millis() - lastTick > 1000) {
    if (gameState === "PLAYING") {
      timer--;
      if (timer <= 0) {
        gameState = "WAITING"; 
        shakeAmount = 10;
        speakAnnouncer(T[currentLang].TTS_SEC_C, 2);
        waitStartTime = millis(); // Nastavenie času začiatku čakania
      }
    } else if (gameState === "RESULTS") {
      resultsTimer--;
      if (resultsTimer <= 0) resetGame();
    }
    lastTick = millis();
  }

  // Ak sú všetky guličky preč, alebo ubehlo aspoň 8 sekúnd, prepne sa na výsledky
  if (gameState === "WAITING" && (balls.length === 0 || millis() - waitStartTime > 8000)) {
    gameState = "RESULTS"; resultsTimer = 10;
  }
}

function drawBackground() {
  noStroke();
  fill(255, 150);
  for (let s of stars) {
    s.y += s.speed; if (s.y > H) { s.y = 0; s.x = random(W); }
    ellipse(s.x, s.y, s.s);
  }
  for (let d of dust) {
    d.y += d.s; if (d.y > H) { d.y = 0; d.x = random(W); }
    fill(0, 255, 255, 30); ellipse(d.x, d.y, d.s * 2);
  }
}

function drawBalls() {
  for (let i = balls.length - 1; i >= 0; i--) {
    let b = balls[i];
    if (!b.body) { removeBall(b); continue; }
    
    let pos = b.body.position;
    if (b.portalCooldown > 0) b.portalCooldown--;
    
    // Portal teleport
    if (portals.length === 2 && b.portalCooldown <= 0) {
      if (dist(pos.x, pos.y, portals[0].x, portals[0].y) < 40) {
        Matter.Body.setPosition(b.body, { x: portals[1].x, y: portals[1].y });
        Matter.Body.setVelocity(b.body, { x: random(-5, 5), y: 0 });
        b.portalCooldown = 60; playSpawnSound();
      } else if (dist(pos.x, pos.y, portals[1].x, portals[1].y) < 40) {
        Matter.Body.setPosition(b.body, { x: portals[0].x, y: portals[0].y });
        Matter.Body.setVelocity(b.body, { x: random(-5, 5), y: 0 });
        b.portalCooldown = 60; playSpawnSound();
      }
    }

    // Peg collision effects
    if (pos.y < PLAY_H - 100) {
      for (let p of pegs) {
        let dx = pos.x - p.position.x, dy = pos.y - p.position.y;
        if (dx*dx + dy*dy < 300) {
          p.glow = 255;
          if (p.isBonus) {
            createExplosion(p.position.x, p.position.y, color(50,255,100));
            updateScore(b.name, 500);
            addFloatingText("+500", p.position.x, p.position.y, color(50,255,100));
            if(audioStarted) try { fxSynth.play(600, 0.05, 0, 0.1); } catch(e){}
          }
        }
      }
    }

    // Scoring
    if (pos.y > PLAY_H - ZONE_H - 30 && !b.scored) {
      let czIndex = zones.findIndex(z => pos.x >= z.x && pos.x < z.x + z.w);
      if (czIndex !== -1) {
        b.scored = true;
        let cz = zones[czIndex];
        
        if (b.isGiftBall) {
          updateScore(b.name, 50000);
          addFloatingText("+50,000", pos.x, pos.y, color(255, 215, 0), true);
          cz.flash = 255; cz.flashColor = color(255, 215, 0);
          shakeAmount = 8; playJackpotSound();
        } else {
          let pts = cz.score * b.multiplier;
          updateScore(b.name, pts);
          addFloatingText("+" + pts, pos.x, pos.y, pts >= 5000 ? color(255, 215, 0) : color(100, 255, 100), pts >= 5000);
          cz.flash = 255; cz.flashColor = b.color;
          if (pts >= 5000) { shakeAmount = 5; playJackpotSound(); }
        }
      }
    }

    // Drawing
    push(); translate(pos.x, pos.y); rotate(b.body.angle);
    let drawCol = b.isRainbow ? color((frameCount*15)%360, 255, 255) : b.color;
    if (b.isRainbow) colorMode(HSB);

    if (b.isGiftBall) {
      drawingContext.shadowBlur = 20; drawingContext.shadowColor = drawCol;
      fill(drawCol); noStroke(); rect(-b.size/2, -b.size/2, b.size, b.size, 4);
      drawingContext.shadowBlur = 0; fill(0); textAlign(CENTER, CENTER); textSize(12); text("🎁", 0, 0);
    } else {
      fill(drawCol); noStroke(); rect(-b.size/2, -b.size/2, b.size, b.size, 2);
    }
    
    if (b.isRainbow) colorMode(RGB);
    
    rotate(-b.body.angle);
    if (!b.isGiftBall && (balls.length < 100 || b.multiplier > 1)) {
      textAlign(CENTER); textSize(10); noStroke();
      fill(0, 150); text(b.name.substring(0,8), 1, -b.size/2 - 5 + 1);
      fill(255); text(b.name.substring(0,8), 0, -b.size/2 - 5);
    }
    pop();

    if (pos.y > PLAY_H + 50 || pos.x < -50 || pos.x > W + 50) removeBall(b);
  }
}

function drawZones() {
  for (let z of zones) {
    if (z.flash > 0) { fill(z.flashColor); z.flash -= 10; } else fill(z.baseColor);
    noStroke(); rect(z.x, PLAY_H - ZONE_H, z.w, ZONE_H);
    push(); translate(z.x + z.w / 2, PLAY_H - 30); rotate(-HALF_PI);
    drawTxt(z.score.toLocaleString(), 0, 0, z.score >= 5000 ? color(255, 230, 100) : color(255), z.w < 30 ? 10 : 15, CENTER);
    pop();
  }
}

function drawWalls() { 
  stroke(100); strokeWeight(2); 
  for (let w of walls) line(w.position.x, PLAY_H - ZONE_H, w.position.x, PLAY_H); 
}

function drawPegs() {
  noStroke(); 
  for (let p of pegs) {
    p.glow = p.glow || 0;
    if (p.glow > 0) { fill(0, 255, 255, p.glow); rect(p.position.x - 6, p.position.y - 6, 12, 12); p.glow -= 15; }
    if (p.isBonus) { fill(50, 255, 50); ellipse(p.position.x, p.position.y, 10 + sin(frameCount*0.2)*3); }
    else { fill(150, 200, 255); rect(p.position.x - 3, p.position.y - 3, 6, 6); }
  }
}

function drawPortals() {
  for (let i = 0; i < portals.length; i++) {
    let pt = portals[i];
    push(); translate(pt.x, pt.y); rotate(frameCount * 0.05 * (i === 0 ? 1 : -1));
    let baseCol = i === 0 ? color(0, 150, 255) : color(255, 150, 0);
    noStroke(); fill(red(baseCol), green(baseCol), blue(baseCol), 150); ellipse(0, 0, 40 + sin(frameCount*0.1)*10);
    fill(0); ellipse(0, 0, 20); pop();
  }
}

function drawVIPGifterBar() {
  let now = millis();
  for (let user in giftLeaderboard) {
    if (now > giftLeaderboard[user].expireTime) delete giftLeaderboard[user];
  }

  let gifters = Object.keys(giftLeaderboard);
  if (gifters.length === 0) return;

  push();
  let barHeight = 90;
  let barY = PLAY_H + 5; 
  
  fill(10, 10, 20, 240); stroke(255, 215, 0); strokeWeight(3);
  rect(10, barY, W - 20, barHeight, 15);

  textAlign(CENTER, CENTER); textSize(14); fill(255, 215, 0); noStroke();
  drawingContext.shadowBlur = 10; drawingContext.shadowColor = color(255, 215, 0);
  text("🏆 VIP COMMANDERS 🏆", W / 2, barY + 15);
  drawingContext.shadowBlur = 0;

  let maxDisplay = 6;
  let displayGifters = gifters.slice(0, maxDisplay);
  let spacing = (W - 40) / displayGifters.length;
  let startX = 20 + spacing / 2;

  for (let i = 0; i < displayGifters.length; i++) {
    let u = displayGifters[i];
    let gData = giftLeaderboard[u];
    let px = startX + i * spacing;

    push(); translate(px, barY + 50);
    
    if (userAvatars[u] && userAvatars[u] !== "loaded") {
      drawingContext.save(); drawingContext.beginPath(); arc(-40, 0, 16, 0, TWO_PI); drawingContext.clip();
      imageMode(CENTER); image(userAvatars[u], -40, 0, 32, 32); drawingContext.restore();
      stroke(255, 215, 0); strokeWeight(2); noFill(); ellipse(-40, 0, 32, 32);
    } else {
      fill(200); ellipse(-40, 0, 32, 32);
    }

    textAlign(LEFT, CENTER); noStroke();
    fill(255); textSize(11); text(u.length > 8 ? u.substring(0, 8) + '.' : u, -18, -8);
    fill(255, 215, 0); textSize(10); text(gData.totalGifts + " GIFTS", -18, 8);
    pop();
  }
  pop();
}

function handleSpamBuffer() {
  let active = Object.keys(spamBuffer).filter(u => spamBuffer[u].state === 'CHARGING' || spamBuffer[u].state === 'RELEASING');
  if (active.length === 0) return;
  
  let spacing = 60, startX = (W / 2) - ((active.length - 1) * spacing) / 2;
  for (let i = 0; i < active.length; i++) {
    let u = active[i]; let sp = spamBuffer[u];
    let bx = startX + i * spacing, by = 120;
    
    push(); translate(bx, by); scale(sp.state === 'CHARGING' ? 1 + sin(frameCount*0.2)*0.2 : 1);
    let uCol = leaderboard[u] ? leaderboard[u].color : color(255);
    
    drawingContext.shadowBlur = 15; drawingContext.shadowColor = uCol;
    stroke(uCol); strokeWeight(2); fill(10, 10, 30, sp.fade); ellipse(0, 0, 40);
    drawingContext.shadowBlur = 0;
    
    noStroke(); fill(255, 200, 0, sp.fade); textAlign(CENTER, CENTER); textSize(12);
    if (sp.total > 0) text("+" + sp.total, 0, -30);
    fill(uCol); textSize(9); text(u.substring(0,6), 0, 30);
    pop();

    if (sp.state === 'RELEASING') {
      sp.fade -= 10; if (sp.fade <= 0) delete spamBuffer[u];
    }
  }
}

function drawUI() {
  push();
  fill(5, 5, 15, 240); noStroke(); rect(0, 0, W, 70);
  stroke(currentTheme[0], currentTheme[1], currentTheme[2], 120); strokeWeight(2); line(0, 70, W, 70);
  
  textAlign(LEFT, CENTER); fill(currentTheme); textSize(40); text(GAME_TITLE, 15, 35);
  
  let dW = 200, dX = W / 2 - (dW / 2);
  fill(10, 10, 20); stroke(currentTheme); strokeWeight(2); rect(dX, 10, dW, 50, 8);
  
  textAlign(CENTER, CENTER);
  fill(200); textSize(10); text(T[currentLang].WARP_CORE, dX + dW/2, 25);
  fill(timer < 10 ? color(255,50,50) : currentTheme); textSize(24); text(timer + "s", dX + dW/2, 45);
  
  // Leaderboard (Top Right)
  translate(W - 220, 85);
  // Get top 100
  let sorted = Object.entries(leaderboard).sort((a, b) => b[1].score - a[1].score).slice(0, 100);
  
  // Fixed box height (up to 15 items visually fit well)
  let boxCapacity = 15;
  let visibleItems = min(boxCapacity, max(1, sorted.length));
  let rH = 45 + visibleItems * 20; 
  
  fill(0, 0, 15, 200); stroke(currentTheme); rect(0, 0, 210, rH, 8);
  noStroke(); fill(currentTheme); textAlign(CENTER); textSize(11); text(T[currentLang].TOP, 105, 25);
  stroke(255, 30); line(10, 35, 200, 35);
  
  noStroke(); textAlign(LEFT);
  
  // Draw Top 5 statically
  let top5 = sorted.slice(0, 5);
  top5.forEach((e, i) => {
    let y = 55 + i * 20; 
    drawTxt(`${i === 0 ? '👑 ' : ''}${i + 1}. ${e[0].substring(0,8)}`, 10, y, e[1].color, 10, LEFT);
    drawTxt(e[1].score.toLocaleString(), 200, y, color(255), 10, RIGHT);
  });

  // Draw Scrolling rest (from index 5 onwards)
  let rest = sorted.slice(5);
  if (rest.length > 0) {
      let scrollAreaY = 55 + 5 * 20; // Start after top 5
      let scrollAreaH = rH - scrollAreaY - 5; // Remaining height in box
      let totalRestH = rest.length * 20;
      
      let scrollOffset = 0;
      // Scroll only if it exceeds the area
      if (totalRestH > scrollAreaH) {
          // Speed multiplier 0.5, pauses briefly when looping
          scrollOffset = (frameCount * 0.5) % (totalRestH + scrollAreaH);
      }
      
      // Clipping mask to keep text inside the box
      drawingContext.save();
      drawingContext.beginPath();
      drawingContext.rect(0, scrollAreaY - 10, 210, scrollAreaH + 10);
      drawingContext.clip();
      
      rest.forEach((e, i) => {
          // Calculate Y pos and offset. Start from bottom of the box and move up
          let y = scrollAreaY + (i * 20) - scrollOffset + scrollAreaH;
          
          // Draw only if somewhat visible (optimization)
          if (y > scrollAreaY - 20 && y < scrollAreaY + scrollAreaH + 20) {
              drawTxt(`${i + 6}. ${e[0].substring(0,8)}`, 10, y, e[1].color, 10, LEFT);
              drawTxt(e[1].score.toLocaleString(), 200, y, color(255), 10, RIGHT);
          }
      });
      drawingContext.restore();
  }
  
  pop();
}

function drawProceduralHUD() {
  push(); 
  stroke(255, 10); strokeWeight(1); 
  for (let i = 0; i < H; i += 4) line(0, i + (frameCount % 4), W, i + (frameCount % 4));
  fill(0, 255, 0, 150); textSize(8); textAlign(LEFT);
  text(`POS_X: ${camOffset.x.toFixed(4)}`, 20, PLAY_H - 40); 
  text(`POS_Y: ${camOffset.y.toFixed(4)}`, 20, PLAY_H - 30); 
  text(`ZOOM: ${camOffset.z.toFixed(4)}`, 20, PLAY_H - 20);
  textAlign(RIGHT); 
  text(`SENS_TEMP: ${(24 + noise(frameCount * 0.01) * 5).toFixed(1)}°C`, W - 20, PLAY_H - 30); 
  text(`BUFFER_LOAD: ${balls.length * 2}%`, W - 20, PLAY_H - 20); 
  pop();
}

function drawPixelAvatar(x, y, w, h) {
  push(); translate(x, y); noStroke();
  let vlasy = color(240, 220, 110), kuze = color(245, 200, 170), triko = color(currentTheme[0], currentTheme[1], currentTheme[2]), stin = color(0, 0, 0, 50), oci = color(40);
  let pw = w / 20, ph = h / 15, sway = sin(frameCount * 0.05) * 2, handMove = sin(frameCount * 0.2) * 4, eyesOpen = (frameCount % 120 > 5);
  
  fill(triko); rect(pw * 5 + sway, ph * 7, pw * 10, ph * 8, 2); fill(stin); rect(pw * 7 + sway, ph * 7, pw * 6, ph * 1);
  let headSway = sway * 0.5; fill(kuze); rect(pw * 6 + headSway, ph * 2, pw * 8, ph * 6, 3);
  fill(vlasy); rect(pw * 5 + headSway, ph * 1, pw * 10, ph * 3, 2); rect(pw * 5 + headSway, ph * 3, pw * 2, ph * 7, 2); rect(pw * 13 + headSway, ph * 3, pw * 2, ph * 7, 2);
  
  if (eyesOpen) { fill(oci); rect(pw * 8 + headSway, ph * 4, pw * 1, ph * 2); rect(pw * 11 + headSway, ph * 4, pw * 1, ph * 2); } 
  else { fill(stin); rect(pw * 8 + headSway, ph * 5, pw * 1, ph * 1); rect(pw * 11 + headSway, ph * 5, pw * 1, ph * 1); }
  
  fill(color(200, 100, 100)); rect(pw * 9 + headSway, ph * 7, pw * 2, ph * 1);
  fill(kuze); rect(pw * 3, ph * 8 + handMove, pw * 3, ph * 4, 2); rect(pw * 14, ph * 8 - handMove, pw * 3, ph * 4, 2); pop();
}

function drawAntiBotOverlay() {
  push(); 
  noStroke(); 
  for (let i = 0; i < 20; i++) { fill(255, random(5, 25)); rect(random(W), random(H), random(1, 3), random(1, 3)); }
  for (let i = 0; i < 10; i++) { fill(currentTheme[0], currentTheme[1], currentTheme[2], random(5, 15)); rect(random(W), random(H), random(1, 4), random(1, 4)); }
  if (random() < 0.08) { fill(currentTheme[0], currentTheme[1], currentTheme[2], 30); rect(0, random(H), W, random(1, 6)); }
  let camX = W - 110, camY = PLAY_H - 185;
  fill(10, 10, 10, 200); stroke(50); strokeWeight(2); rect(camX, camY, 100, 75, 5); drawPixelAvatar(camX + 5, camY + 5, 90, 65); noStroke();
  for (let cx = 0; cx < 100; cx += 5) for (let cy = 0; cy < 75; cy += 5) { if (noise(cx * 0.1, cy * 0.1, frameCount * 0.1) > 0.6) { fill(255, 255, 255, 30); rect(camX + cx, camY + cy, 5, 5); } }
  fill(255, 50, 50); textFont('Courier New'); textStyle(BOLD); textSize(10); textAlign(LEFT, TOP); text(T[currentLang].L_PL, camX + 5, camY + 5);
  if (frameCount % 60 < 30) { fill(255, 0, 0); noStroke(); ellipse(camX + 90, camY + 10, 6, 6); }
  pop();
}

function drawResultsOverlay() {
  fill(0, 0, 20, 230); rect(0, 0, W, H);
  drawTxt(T[currentLang].COMPL, W / 2, 160, currentTheme, 50, CENTER);
  
  let sorted = Object.entries(leaderboard).sort((a, b) => b[1].score - a[1].score).slice(0, 5);
  for (let i = 0; i < sorted.length; i++) {
    let y = 300 + i * 80;
    fill(255, 10); rect(100, y - 40, W - 200, 70, 10);
    drawTxt(`${i === 0 ? "👑 " : ""}${sorted[i][0]}`, 130, y, sorted[i][1].color, i===0?30:20, LEFT);
    drawTxt(sorted[i][1].score.toLocaleString(), W - 130, y, color(255), i===0?35:25, RIGHT);
  }
  drawTxt(`${T[currentLang].NEXT} ${resultsTimer}s`, W / 2, H - 150, color(255, 50, 50), 24, CENTER);
}

function drawCallToAction() {
  if (gameState !== "PLAYING" || balls.length > 50) return;
  let pulse = sin(frameCount * 0.1) * 0.2 + 1;
  push(); textAlign(CENTER, CENTER); textSize(24 * pulse);
  fill(255, 255, 255, 150);
  text("TAP SCREEN OR COMMENT TO DROP!", W/2, PLAY_H/2 - 100);
  pop();
}

function drawTxt(t, x, y, c, s, a = CENTER) {
  push(); noStroke(); textAlign(a, CENTER); textSize(s);
  fill(0, 150); text(t, x + 2, y + 2); fill(c); text(t, x, y); pop();
}

// ======================
// UTILS & PHYSICS
// ======================
function removeBall(b) {
  Matter.World.remove(world, b.body);
  balls.splice(balls.indexOf(b), 1);
}

function updateScore(n, p) {
  if (!leaderboard[n]) leaderboard[n] = { score: 0, color: color(255) };
  leaderboard[n].score += p;
}

function createExplosion(x, y, c) {
  for (let i = 0; i < 15; i++) explosions.push({ x: x, y: y, vx: random(-4, 4), vy: random(-4, 4), life: 255, col: c });
}

function drawExplosions() {
  noStroke();
  for (let i = explosions.length - 1; i >= 0; i--) {
    let e = explosions[i]; fill(red(e.col), green(e.col), blue(e.col), e.life); rect(e.x, e.y, 4, 4);
    e.x += e.vx; e.y += e.vy; e.life -= 8; if (e.life <= 0) explosions.splice(i, 1);
  }
}

function addFloatingText(txt, x, y, col, isJp = false) {
  floatingTexts.push({ text: txt, x: x, y: y, life: 255, color: col, scale: isJp ? 1.5 : 1, vy: -1 });
}

function handleFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    let ft = floatingTexts[i];
    drawTxt(ft.text, ft.x, ft.y, color(red(ft.color), green(ft.color), blue(ft.color), ft.life), 12 * ft.scale, CENTER);
    ft.y += ft.vy; ft.life -= 3; if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function handleShockwaves() {
  noFill(); strokeWeight(3);
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    let sw = shockwaves[i]; stroke(255, 255, 255, sw.life); ellipse(sw.x, sw.y, sw.radius * 2);
    sw.radius += 8; sw.life -= 10; if (sw.life <= 0) shockwaves.splice(i, 1);
  }
}

function handleJoinPopups() {
  if (!activeJoinPopup && joinPopupQueue.length > 0) {
    activeJoinPopup = joinPopupQueue.shift(); activeJoinPopup.timer = 150;
    speakAnnouncer(T[currentLang].TTS_WELC + activeJoinPopup.name, 1);
  }
  if (activeJoinPopup) {
    activeJoinPopup.timer--;
    push(); translate(W / 2, PLAY_H / 2);
    fill(10, 10, 30, 220); stroke(currentTheme); strokeWeight(2);
    rectMode(CENTER); rect(0, 0, 400, 100, 10); rectMode(CORNER);
    
    if (activeJoinPopup.img && activeJoinPopup.img !== "loaded") { 
      imageMode(CENTER); image(activeJoinPopup.img, -140, 0, 60, 60); 
    }
    textAlign(LEFT, CENTER); noStroke();
    fill(currentTheme); textSize(12); text(T[currentLang].NEW_C, -90, -20);
    fill(255); textSize(24); text(activeJoinPopup.name, -90, 15);
    pop();
    if (activeJoinPopup.timer <= 0) activeJoinPopup = null;
  }
}

function resetGame() {
  roundCount++; gameState = "PLAYING"; resultsTimer = 10; timer = 180;
  spamBuffer = {}; avatarRibbon = [];
  if (world) Matter.World.clear(world, false);
  pegs = []; walls = []; balls = []; portals = []; explosions = [];
  initGame();
}

function mouseClicked() { 
  if (!audioStarted) startSpaceAudio(); 
  if (mouseY > 40 && mouseY < PLAY_H - 100) spawnBall("Player" + floor(random(100))); 
}

// ======================
// AUDIO & TTS
// ======================
function startSpaceAudio() { audioStarted = true; userStartAudio(); }
function playSpawnSound() { if (audioStarted) try { fxSynth.play(random([440, 554, 659]), 0.05, 0, 0.1); } catch(e){} }
function playJackpotSound() { if (audioStarted) try { fxSynth.play('C5', 0.1, 0, 0.1); setTimeout(()=>fxSynth.play('G5',0.1,0,0.2), 100); } catch(e){} }

function initTTS() {
  if ('speechSynthesis' in window) {
    let setV = () => { availableVoices = window.speechSynthesis.getVoices(); };
    window.speechSynthesis.onvoiceschanged = setV; setV();
  }
}

function speakAnnouncer(txt, pri = 0) {
  if (!audioStarted || !('speechSynthesis' in window)) return;
  if (window.speechSynthesis.speaking && pri < 1) return;
  let u = new SpeechSynthesisUtterance(txt);
  let vol = parseFloat(document.getElementById('volSlider').value);
  u.volume = vol; u.pitch = 0.8; u.rate = 1.1;
  window.speechSynthesis.speak(u);
}

function speakName(n) {
  if (!audioStarted || !('speechSynthesis' in window)) return;
  let u = new SpeechSynthesisUtterance(n);
  u.volume = parseFloat(document.getElementById('volSlider').value);
  window.speechSynthesis.speak(u);
}
</script>
